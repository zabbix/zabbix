      result: ZBX_KEY_ACCESS_DENY
    - metric: 'system.run[echo 1]'
      result: ZBX_KEY_ACCESS_DENY
    - metric: 'system.run[echo 2,a]'
      result: ZBX_KEY_ACCESS_DENY
    - metric: 'system.localtime[utc]'
      result: ZBX_KEY_ACCESS_ALLOW
---
test case: Combined wildcard in key
