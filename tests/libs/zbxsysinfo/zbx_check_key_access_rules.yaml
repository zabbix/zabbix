      type: ZBX_KEY_ACCESS_ALLOW_REGEXP
    - pattern: '*'
      type: ZBX_KEY_ACCESS_DENY
out:
  number_of_rules: 2
  metrics:
    - metric: 'system.run[echo 1]'
      result: ZBX_KEY_ACCESS_DENY
    - metric: 'system.run[/bin/hostname]'
      result: ZBX_KEY_ACCESS_DENY
    - metric: 'system.localtime'
      result: ZBX_KEY_ACCESS_DENY
