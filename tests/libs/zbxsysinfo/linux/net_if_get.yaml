# Mixed valid and invalid lines to ensure the parser doesn't break the read loop
test case: mixed valid and invalid procfs lines
in:
  key: 'net.if.get'
out:
  json: '{"config":[{"name":"eth0","type":"virtual"},{"name":"eth1","type":"virtual"}],"values":[{"name":"eth0","in":{"bytes":100,"packets":10,"errors":0,"dropped":0,"overruns":0,"frame":0,"compressed":0,"multicast":0},"out":{"bytes":200,"packets":20,"errors":0,"dropped":0,"overruns":0,"collisions":0,"carrier":0,"compressed":0}},{"name":"eth1","in":{"bytes":300,"packets":30,"errors":0,"dropped":0,"overruns":0,"frame":0,"compressed":0,"multicast":0},"out":{"bytes":400,"packets":40,"errors":0,"dropped":0,"overruns":0,"collisions":0,"carrier":0,"compressed":0}}]}'
files:
  /proc/net/dev: |
    Inter-|   Receive                                                |  Transmit
     face |bytes    packets errs drop fifo frame compressed multicast|bytes    packets errs drop fifo colls carrier compressed
      eth0:      100      10    0    0    0     0          0         0      200      20    0    0    0     0       0          0
    broken_line_without_colon 0 0 0
    eth_broken: text instead of numbers here
      eth1:      300      30    0    0    0     0          0         0      400      40    0    0    0     0       0          0
