# ===========================================================================
# Regex: stored as literal vs extracted — pairs showing value change with data
# ===========================================================================
test case: 'regex: session token — stored literally without data'
in:
  key: '{session}'
  value: 'regex:session=([a-zA-Z0-9]+)'
out:
  return: SUCCEED
  macro_value: 'regex:session=([a-zA-Z0-9]+)'
---
test case: 'regex: session token — extracted from Set-Cookie header when data provided'
in:
  key: '{session}'
  value: 'regex:session=([a-zA-Z0-9]+)'
  data: 'Set-Cookie: session=abc123XYZ; Path=/; HttpOnly'
out:
  return: SUCCEED
  macro_value: 'abc123XYZ'
---
test case: 'regex: host ID — stored literally without data'
in:
  key: '{hostid}'
  value: 'regex:hostid is ([0-9]+)'
out:
  return: SUCCEED
  macro_value: 'regex:hostid is ([0-9]+)'
---
test case: 'regex: host ID — extracted from page body when data provided'
in:
  key: '{hostid}'
  value: 'regex:hostid is ([0-9]+)'
  data: 'The current hostid is 1024 in this system'
out:
  return: SUCCEED
  macro_value: '1024'
---
test case: 'regex: version string — stored literally without data'
in:
  key: '{ver}'
  value: 'regex:version ([0-9]+\.[0-9]+\.[0-9]+)'
out:
  return: SUCCEED
  macro_value: 'regex:version ([0-9]+\.[0-9]+\.[0-9]+)'
---
test case: 'regex: version string major.minor.patch — extracted when data provided'
in:
  key: '{ver}'
  value: 'regex:version ([0-9]+\.[0-9]+\.[0-9]+)'
  data: 'Server version 7.2.1 is running'
out:
  return: SUCCEED
  macro_value: '7.2.1'
---
test case: 'regex: query-string token — extracted when data provided'
in:
  key: '{token}'
  value: 'regex:token=([^&\r\n]+)'
  data: 'action=login&token=secret_abc&redirect=/'
out:
  return: SUCCEED
  macro_value: 'secret_abc'
---
test case: 'regex: quoted JSON string value — extracted when data provided'
in:
  key: '{hostname}'
  value: 'regex:"hostname":"([^"]+)"'
  data: '{"id":1,"hostname":"zabbix-server","status":"active"}'
out:
  return: SUCCEED
