test case: 'jsonpath: prefix with null data must not crash (ZBX-27770)'
in:
  key: '{myvar}'
  value: 'jsonpath:$.key'
out:
  return: SUCCEED
---
test case: 'jsonpath prefix stored literally when data is null'
in:
  key: '{myvar}'
  value: 'jsonpath:$.name'
out:
  return: SUCCEED
