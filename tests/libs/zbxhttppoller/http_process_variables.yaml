# ----------------------------------------------------------------------------
# ZBX-27770 side effect: static variable after dynamic variable
#
# On master: a regex: variable at scenario init (data=NULL) returned FAIL and
# exited the loop early, leaving any subsequent plain variables un-stored.
# jsonpath:/xmlxpath: crashed the server before getting that far.
#
# After the fix: all variables are processed regardless of order — dynamic
# ones are stored literally as placeholders, plain ones are stored normally.
# This means a static variable defined after a dynamic one in the scenario
# variable list is now correctly available for step 1's URL/POST substitution.
# ----------------------------------------------------------------------------
test case: 'ZBX-27770 side effect: static variable after regex variable both stored when data is null'
in:
  variables:
    - key: '{hostid}'
      value: 'regex:hostid is ([0-9]+)'
    - key: '{BASE_URL}'
      value: 'https://example.com'
out:
  return: SUCCEED
  macro_values:
    - key: '{hostid}'
      value: 'regex:hostid is ([0-9]+)'
    - key: '{BASE_URL}'
      value: 'https://example.com'
---
