---
test case: 'regex: anchored at end extracts suffix'
in:
  key: '{myvar}'
  value: 'regex:(end)$'
  data: 'reach the end'
out:
  return: SUCCEED
  macro_value: 'end'
---
test case: 'regex: character class extracts word'
in:
