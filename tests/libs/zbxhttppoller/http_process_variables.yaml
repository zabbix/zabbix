---
test case: 'jsonpath extracts string value from JSON'
in:
  key: '{myvar}'
  value: 'jsonpath:$.name'
  data: '{"name":"zabbix"}'
out:
  return: SUCCEED
  macro_value: 'zabbix'
---
test case: 'jsonpath extracts value from nested JSON object'
in:
  key: '{myvar}'
  value: 'jsonpath:$.outer.inner'
  data: '{"outer":{"inner":"deep"}}'
out:
  return: SUCCEED
  macro_value: 'deep'
---
test case: 'jsonpath extracts numeric value as string'
in:
  key: '{myvar}'
  value: 'jsonpath:$.count'
  data: '{"count":42}'
out:
  return: SUCCEED
  macro_value: '42'
---
test case: 'jsonpath extracts boolean true as string'
in:
  key: '{myvar}'
  value: 'jsonpath:$.active'
  data: '{"active":true}'
out:
  return: SUCCEED
  macro_value: 'true'
---
test case: 'jsonpath non-existent key fails'
in:
