---
test case: 'xmlxpath extracts text content of element'
in:
  key: '{myvar}'
  value: 'xmlxpath:/root/text()'
  data: '<?xml version="1.0"?><root>hello</root>'
out:
  return: SUCCEED
  macro_value: 'hello'
---
test case: 'xmlxpath extracts nested element text content'
in:
  key: '{myvar}'
  value: 'xmlxpath:/root/child/text()'
  data: '<?xml version="1.0"?><root><child>nested</child></root>'
out:
  return: SUCCEED
  macro_value: 'nested'
---
test case: 'xmlxpath string() function returns element text'
in:
  key: '{myvar}'
  value: 'xmlxpath:string(/root)'
  data: '<?xml version="1.0"?><root>hello</root>'
out:
  return: SUCCEED
  macro_value: 'hello'
