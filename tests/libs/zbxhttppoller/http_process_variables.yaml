test case: 'regex: numeric ID from JSON-like content — extracted when data provided'
in:
  key: '{id}'
  value: 'regex:"id":([0-9]+)'
  data: '{"id":42,"name":"host"}'
out:
  return: SUCCEED
  macro_value: '42'
