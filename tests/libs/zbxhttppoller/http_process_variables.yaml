test case: 'xmlxpath: prefix with null data must not crash (ZBX-27770)'
in:
  key: '{myvar}'
  value: 'xmlxpath://node'
out:
  return: SUCCEED
---
test case: 'xmlxpath prefix stored literally when data is null'
in:
  key: '{myvar}'
  value: 'xmlxpath://root'
out:
  return: SUCCEED
  macro_value: 'xmlxpath://root'
---
test case: 'xmlxpath extracts text content of element'
in:
  key: '{myvar}'
  value: 'xmlxpath:/root/text()'
  data: '<?xml version="1.0"?><root>hello</root>'
out:
  return: SUCCEED
  macro_value: 'hello'
---
test case: 'xmlxpath extracts nested element text content'
in:
  key: '{myvar}'
  value: 'xmlxpath:/root/child/text()'
  data: '<?xml version="1.0"?><root><child>nested</child></root>'
out:
  return: SUCCEED
  macro_value: 'nested'
---
test case: 'xmlxpath string() function returns element text'
in:
  key: '{myvar}'
  value: 'xmlxpath:string(/root)'
  data: '<?xml version="1.0"?><root>hello</root>'
out:
  return: SUCCEED
  macro_value: 'hello'
---
test case: 'xmlxpath non-existent element returns empty nodeset and fails'
in:
  key: '{myvar}'
  value: 'xmlxpath://missing'
  data: '<?xml version="1.0"?><root>hello</root>'
out:
  return: FAIL
---
test case: 'xmlxpath text() on empty element returns empty nodeset and fails'
in:
  key: '{myvar}'
  value: 'xmlxpath://empty/text()'
  data: '<?xml version="1.0"?><root><empty/></root>'
out:
  return: FAIL
---
test case: 'xmlxpath on invalid XML fails'
in:
  key: '{myvar}'
  value: 'xmlxpath://root'
  data: 'not valid xml'
out:
  return: FAIL
