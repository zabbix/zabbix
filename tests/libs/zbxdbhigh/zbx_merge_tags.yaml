test case: "Add tags to destination with no tags"
in:
  dst_tags: []
  src_tags:
    - tag: tag1
      value: value1
      automatic: ZBX_DB_TAG_NORMAL
    - tag: tag2
      value: value2
      automatic: ZBX_DB_TAG_NORMAL
