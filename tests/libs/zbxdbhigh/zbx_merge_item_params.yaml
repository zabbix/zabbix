---
test case: same names same values
in:
  names_src:
  - "Name1"
  - "Name2"
  - "Name3"
  values_src:
  - "1"
  - "2"
  - "3"
  names_dst:
  - "Name1"
  - "Name2"
  - "Name3"
  values_dst:
  - "1"
  - "2"
  - "3"
out:
  result: SUCCEED
  exp_names:
  - "Name1"
  - "Name2"
  - "Name3"
  exp_values:
  - "1"
  - "2"
  - "3"
