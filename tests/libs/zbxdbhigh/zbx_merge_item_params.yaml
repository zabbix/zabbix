---
test case: broken utf8
in:
  used_buffer: yes
  src_name_buf_length: 5
  src_name_buf:
    - '\xF4\x90\x80\x80\x00' # name2
  src_value_buf_length: 2
  src_value_buf:
    - '\x31\x00' # 1
  dst_name_buf_length: 6
  dst_name_buf:
    - '\x6E\x61\x6D\x65\x32\x00' # name2
  dst_value_buf_length: 2
  dst_value_buf:
    - '\x32\x00' # 2
out:
  error_msg: |
    Cannot create item parameter: name "?" has invalid UTF-8 sequence.
  result: FAIL
---
test case: broken utf8 rollback name
in:
  used_buffer: yes
  src_name_buf_length: 5
  src_name_buf:
    - '\xF4\x90\x80\x80\x00' # broken utf8
  src_value_buf_length: 2
  src_value_buf:
    - '\x31\x00' # 1
  dst_name_buf_length: 6
  dst_name_buf:
    - '\x6E\x61\x6D\x65\x32\x00' # name2
  dst_value_buf_length: 2
  dst_value_buf:
    - '\x32\x00' # 2
  rollback: yes
out:
  error_msg: |
    Cannot update item parameter: name "?" has invalid UTF-8 sequence.
  result: FAIL
  exp_names:
  - "name2"
  exp_values:
  - "2"
---
test case: broken utf8 rollback value
in:
  used_buffer: yes
  src_name_buf_length: 6
  src_name_buf:
    - '\x6E\x61\x6D\x65\x31\x00' # name1
  src_value_buf_length: 5
  src_value_buf:
    - '\xF4\x90\x80\x80\x00' # broken utf8
  dst_name_buf_length: 6
  dst_name_buf:
    - '\x6E\x61\x6D\x65\x33\x00' # name3
  dst_value_buf_length: 2
  dst_value_buf:
    - '\x35\x00' # 5
  rollback: yes
out:
  error_msg: |
    Cannot update item parameter: value "?" has invalid UTF-8 sequence.
  result: FAIL
  exp_names:
  - "name3"
  exp_values:
  - "5"
...
