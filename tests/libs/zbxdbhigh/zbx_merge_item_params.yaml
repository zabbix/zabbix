---
test case: same names same values bin
in:
  used_buffer: yes
  src_name_buf_length: 6
  src_name_buf:
    - '\x6E\x61\x6D\x65\x31\x00' # name1
  src_value_buf_length: 2
  src_value_buf:
    - '\x31\x00' # 1
  dst_name_buf_length: 6
  dst_name_buf:
    - '\x6E\x61\x6D\x65\x31\x00' # name1
  dst_value_buf_length: 2
  dst_value_buf:
    - '\x31\x00' # 1
out:
  result: SUCCEED
  exp_names:
  - "name1"
  exp_values:
  - "1"
