                  dependencies:
                    - name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size average'
                      expression: 'min(/PostgreSQL by ODBC/pgsql.tablespace.size[{#TABLESPACE.NAME}],5m) >= {$PG.TABLESPACE.SIZE.AVG:"{#TABLESPACE.NAME}"}'
                  tags:
                    - tag: scope
                      value: capacity
          master_item:
