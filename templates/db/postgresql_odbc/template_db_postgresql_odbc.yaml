        - uuid: 6243b0c9e9ba4685947709ea12b1a5c8
          name: 'Workload metrics discovery (v17)'
          type: DEPENDENT
          key: pgsql.workload.stats.version.17.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V17}'
                value: 'false'
              - macro: '{#BELOW_V18}'
                value: 'true'
          description: 'Discovers `query` metrics in PostgreSQL 17.'
          item_prototypes:
            - uuid: cd04a234781a40a083ce9f5cb20104a0
              name: 'Workload: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.workload.snapshot.version.17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                WITH
                  pgss_config AS (
                    SELECT
                      current_setting ('pg_stat_statements.track', true) AS track_level,
                      COALESCE(
                        current_setting ('pg_stat_statements.track_nested', true),
                        '0'
                      ) AS track_nested,
                      current_setting ('pg_stat_statements.max', true) AS max_statements
                  ),
                  stats AS (
                    SELECT
                      COUNT(*) AS distinct_statements,
                      SUM(calls) AS total_calls,
                      AVG(total_exec_time / NULLIF(calls, 0)) AS avg_exec_time_ms,
                      MAX(total_exec_time / NULLIF(calls, 0)) AS max_exec_time_ms,
                      SUM(temp_blks_read) AS temp_blks_read,
                      SUM(temp_blks_written) AS temp_blks_written,
                      SUM(plans) AS total_plans,
                      SUM(total_plan_time) AS total_plan_time_ms,
                      COALESCE(AVG(total_plan_time / NULLIF(plans, 0)), 0) AS avg_plan_time_ms,
                      COALESCE(
                        SUM(rows) FILTER (
                          WHERE
                            query LIKE 'INSERT%'
                        ),
                        0
                      ) AS rows_inserted,
                      COALESCE(
                        SUM(rows) FILTER (
                          WHERE
                            query LIKE 'UPDATE%'
                        ),
                        0
                      ) AS rows_updated,
                      COALESCE(
                        SUM(rows) FILTER (
                          WHERE
                            query LIKE 'DELETE%'
                        ),
                        0
                      ) AS rows_deleted
                    FROM
                      pg_stat_statements
                  )
                SELECT
                  jsonb_build_object (
                    'pg_stat_statements',
                    jsonb_build_object (
                      'extension_version',
                      (
                        SELECT
                          extversion
                        FROM
                          pg_extension
                        WHERE
                          extname = 'pg_stat_statements'
                      ),
                      'configuration',
                      (
                        SELECT
                          jsonb_build_object (
                            'track',
                            track_level,
                            'track_nested',
                            track_nested,
                            'max',
                            max_statements
                          )
                        FROM
                          pgss_config
                      )
                    ),
                    'metrics',
                    jsonb_build_object (
                      'distinct_statements',
                      distinct_statements,
                      'total_calls',
                      total_calls,
                      'execution_time_ms',
                      jsonb_build_object ('avg', avg_exec_time_ms, 'max', max_exec_time_ms),
                      'plan_time_ms',
                      jsonb_build_object (
                        'total',
                        total_plan_time_ms,
                        'avg',
                        avg_plan_time_ms,
                        'plans',
                        total_plans
                      ),
                      'temp_io_blocks',
                      jsonb_build_object (
                        'read',
                        temp_blks_read,
                        'written',
                        temp_blks_written
                      ),
                      'rows_affected',
                      jsonb_build_object (
                        'inserted',
                        rows_inserted,
                        'updated',
                        rows_updated,
                        'deleted',
                        rows_deleted
                      )
                    )
                  ) AS metrics
                FROM
                  stats;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: |
                Collects top queries from `pg_stat_statements`.
                IMPORTANT!
                Ensure `pg_stat_statements` is installed, add it to `shared_preload_libraries`, turn on `compute_query_id`, and set `pg_stat_statements.track` to `all`, so all queries are tracked.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
              tags:
                - tag: component
                  value: raw
            - uuid: 1a6c8b9ba5a24ebbbed90f7754ff4276
              name: 'Workload: Average execution'
              type: DEPENDENT
              key: 'pgsql.workload.avg.exec.time.version.17[{#SINGLETON}]'
              value_type: FLOAT
              units: s
              description: 'Average query execution time from `pg_stat_statements`.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: JSONPATH
                  parameters:
                    - $.metrics.execution_time_ms.avg
                - type: MULTIPLIER
                  parameters:
                    - '0.001'
              master_item:
                key: 'db.odbc.select[pgsql.workload.snapshot.version.17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: queries
            - uuid: 1f73286d6a6a4388a5324167b3e421ad
              name: 'Workload: Plan time average'
              type: DEPENDENT
              key: 'pgsql.workload.avg.plan.time.version.17[{#SINGLETON}]'
              value_type: FLOAT
              units: s
              description: 'Average time per plan execution.'
