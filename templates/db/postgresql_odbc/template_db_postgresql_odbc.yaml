      discovery_rules:
        - uuid: 1c51decca55847a8adba4260f53e0acf
          name: 'Database discovery'
          type: ODBC
          key: 'db.odbc.select[pgsql.db.discovery,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          delay: 1h
          params: |
            WITH T AS (
              SELECT
                datname AS "{#DBNAME}"
              FROM pg_database
              WHERE
                NOT datistemplate
                AND datallowconn
            )
            SELECT '{"data":'|| regexp_replace(coalesce(json_agg(T), '[]'::json)::text, E'[\\n\\r\\s]+', '', 'g') || '}'
            FROM T
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#DBNAME}'
                value: '{$PG.LLD.FILTER.DBNAME.MATCHES}'
              - macro: '{#DBNAME}'
                value: '{$PG.LLD.FILTER.DBNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: |
            Discovers databases (DB) in the database management system (DBMS), except:
            - templates;
            - default "postgres" DB;
            - DBs that do not allow connections.
          item_prototypes:
            - uuid: 98b74e578a3e48f3990bc16eb0217a17
              name: 'DB [{#DBNAME}]: Database age'
              type: ODBC
              key: 'db.odbc.select[pgsql.db.age,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"]'
              delay: 10m
              units: '!transactions'
              params: |
                SELECT age(datfrozenxid)
                  FROM pg_catalog.pg_database
                  WHERE datname = '{#DBNAME}'
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Age of the database in transactions (XID distance from `datfrozenxid`).'
              tags:
                - tag: component
                  value: application
                - tag: database
                  value: '{#DBNAME}'
            - uuid: cb7067b756bc4b3eb5be2ee2361df6f8
              name: 'DB [{#DBNAME}]: Bloating tables'
              type: ODBC
              key: 'db.odbc.select[pgsql.db.bloating_tables,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"]'
              units: '!tables'
              params: |
                SELECT count(*)
                FROM pg_catalog.pg_stat_all_tables
                WHERE (n_dead_tup/(n_live_tup+n_dead_tup)::float8) > 0.2
                  AND (n_live_tup+n_dead_tup) > 50
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Number of bloating tables.'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
            - uuid: f6bc4dd7f66a4a399a16230b6a7a8f2d
              name: 'DB [{#DBNAME}]: Database size'
              type: ODBC
              key: 'db.odbc.select[pgsql.db.size,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"]'
              delay: 5m
              units: B
              params: 'SELECT pg_database_size(current_database())'
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Database size.'
              tags:
                - tag: component
                  value: storage
                - tag: database
                  value: '{#DBNAME}'
              trigger_prototypes:
                - uuid: 548cfe86300648bebead1e0eb5242fe1
                  expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.db.size,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"],5m) >= {$PG.DATABASE.SIZE.AVG:"{#DBNAME}"}'
                  name: 'PostgreSQL: DB [{#DBNAME}]: Size average'
                  event_name: 'PostgreSQL: DB [{#DBNAME}]: Size >= `avg` state for 5m'
                  opdata: '{#DBNAME} current size: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'Database `{#DBNAME}` size >= `{$PG.DATABASE.SIZE.AVG}` bytes.'
                  dependencies:
                    - name: 'PostgreSQL: DB [{#DBNAME}]: Size high'
                      expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.db.size,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"],5m) >= {$PG.DATABASE.SIZE.HIGH:"{#DBNAME}"}'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: c03251945afb4ef4abbb02fe5b120655
                  expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.db.size,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"],5m) >= {$PG.DATABASE.SIZE.HIGH:"{#DBNAME}"}'
                  name: 'PostgreSQL: DB [{#DBNAME}]: Size high'
                  event_name: 'PostgreSQL: DB [{#DBNAME}]: Size >= `high` state for 5m'
                  opdata: '{#DBNAME} current size: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'Database `{#DBNAME}` size >= `{$PG.DATABASE.SIZE.HIGH}` bytes.'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: 14d67f8e57934e99a8dc0730ea5a3253
                  expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.db.size,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"],5m) >= {$PG.DATABASE.SIZE.WARN:"{#DBNAME}"}'
                  name: 'PostgreSQL: DB [{#DBNAME}]: Size warning'
                  event_name: 'PostgreSQL: DB [{#DBNAME}]: Size >= `warn` state for 5m'
                  opdata: '{#DBNAME} current size: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'Database `{#DBNAME}` size >= `{$PG.DATABASE.SIZE.WARN}` bytes.'
                  dependencies:
                    - name: 'PostgreSQL: DB [{#DBNAME}]: Size average'
                      expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.db.size,,"Database={#DBNAME};{$PG.CONNSTRING.ODBC}"],5m) >= {$PG.DATABASE.SIZE.AVG:"{#DBNAME}"}'
