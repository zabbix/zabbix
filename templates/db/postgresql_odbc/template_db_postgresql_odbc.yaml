                  json_build_object ('reads', SUM(reads), 'writes', SUM(writes)) AS result
                FROM
                  pg_stat_io;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Aggregated `pg_stat_io` metrics for PostgreSQL 16-17.'
              tags:
                - tag: component
