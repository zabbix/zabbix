                    stats AS (
                        SELECT
                            sum(calls) AS total_calls,
                            avg(total_exec_time / NULLIF(calls, 0)) AS avg_exec_time_ms,
                            max(total_exec_time / NULLIF(calls, 0)) AS max_exec_time_ms,
                            sum(temp_blks_written) AS temp_blks_written
                        FROM
