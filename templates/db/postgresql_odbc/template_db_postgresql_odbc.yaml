              master_item:
                key: 'db.odbc.select[pgsql.workload.snapshot.above.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: queries
            - uuid: 47b4f6cc09ba446591ae3396cfe16acb
              name: 'Workload: Rows deleted'
              type: DEPENDENT
              key: 'pgsql.workload.rows.deleted.above.15[{#SINGLETON}]'
              units: '!rows'
