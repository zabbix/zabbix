        - uuid: c10ee16518b74163b984cf1cc9967865
          name: 'I/O metrics discovery (v18+)'
          type: DEPENDENT
          key: pgsql.io.discovery.version.above.18
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V18}'
                value: 'false'
          description: 'Discovers `I/O` metrics in PostgreSQL 18 and above.'
          item_prototypes:
            - uuid: cecad6427f454bcbae8483537ed85bc8
              name: 'I/O: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.stat.io.version.above.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                SELECT
                  json_build_object (
                    'read_bytes',
                    SUM(read_bytes),
                    'write_bytes',
                    SUM(write_bytes),
                    'reads',
                    SUM(reads),
                    'writes',
                    SUM(writes),
                    'hits',
                    SUM(hits),
                    'io_time_ms',
                    SUM(read_time + write_time),
                    'wal_write_bytes',
                    SUM(write_bytes) FILTER (
                      WHERE
                        object = 'wal'
                    )
                  )
                FROM
                  pg_stat_io;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Aggregated `pg_stat_io metrics` for PostgreSQL 18 and above.'
              tags:
                - tag: component
                  value: raw
            - uuid: adfb23183c124388aac92e6985cf3e08
              name: 'I/O: Buffer hit ratio'
              type: DEPENDENT
              key: 'pgsql.io.hit.ratio.version.above.18[{#SINGLETON}]'
              value_type: FLOAT
              units: '%'
              description: 'Percentage of buffer cache hits.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var obj = JSON.parse(value);
                      var reads = obj.reads || 0;
                      var hits = obj.hits || 0;
                      if (reads + hits === 0) return 0;
                      return (hits * 100) / (reads + hits);
              master_item:
                key: 'db.odbc.select[pgsql.stat.io.version.above.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: cache
              trigger_prototypes:
                - uuid: 6536f38216f94c5aaa7ccdf5bc9468f9
                  expression: 'max(/PostgreSQL by ODBC/pgsql.io.hit.ratio.version.above.18[{#SINGLETON}],5m) <= {$PG.IO.CACHE.AVG}'
                  name: 'PostgreSQL: I/O:Buffer hit average'
                  event_name: 'PostgreSQL: I/O buffer hit ratio <= {$PG.IO.CACHE.AVG}% for 5m'
                  opdata: 'Current hit ratio: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'I/O buffer hit ratio <= `{$PG.IO.CACHE.AVG}`%. Moderate cache efficiency drop. Investigate queries and disk latency.'
                  dependencies:
                    - name: 'PostgreSQL: I/O:Buffer hit high'
                      expression: 'max(/PostgreSQL by ODBC/pgsql.io.hit.ratio.version.above.18[{#SINGLETON}],5m) <= {$PG.IO.CACHE.HIGH}'
                  tags:
                    - tag: scope
                      value: performance
                - uuid: 26c1ae0058ad413b8e6748d4ea44304c
                  expression: 'max(/PostgreSQL by ODBC/pgsql.io.hit.ratio.version.above.18[{#SINGLETON}],5m) <= {$PG.IO.CACHE.HIGH}'
                  name: 'PostgreSQL: I/O:Buffer hit high'
                  event_name: 'PostgreSQL: I/O buffer hit ratio <= {$PG.IO.CACHE.HIGH}% for 5m'
                  opdata: 'Current hit ratio: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'I/O buffer hit ratio <= `{$PG.IO.CACHE.HIGH}`%. Critical cache inefficiency. High disk I/O expected. Investigate storage performance immediately.'
                  tags:
                    - tag: scope
                      value: performance
                - uuid: cf43ed75ff884b00906c09bd5dfc7d48
                  expression: 'max(/PostgreSQL by ODBC/pgsql.io.hit.ratio.version.above.18[{#SINGLETON}],5m) <= {$PG.IO.CACHE.WARN}'
                  name: 'PostgreSQL: I/O:Buffer hit warning'
                  event_name: 'PostgreSQL: I/O buffer hit ratio <= {$PG.IO.CACHE.WARN}% for 5m'
                  opdata: 'Current hit ratio: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'I/O buffer hit ratio <= `{$PG.IO.CACHE.WARN}`%. Slightly below optimal. Monitor memory and disk activity.'
                  dependencies:
                    - name: 'PostgreSQL: I/O:Buffer hit average'
                      expression: 'max(/PostgreSQL by ODBC/pgsql.io.hit.ratio.version.above.18[{#SINGLETON}],5m) <= {$PG.IO.CACHE.AVG}'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: ef9827f4ea8240b399adf24507e30991
              name: 'I/O: Read bytes total'
              type: DEPENDENT
              key: 'pgsql.io.read.bytes.version.above.18[{#SINGLETON}]'
              units: B
              description: 'Total number of bytes read by PostgreSQL.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.read_bytes
              master_item:
                key: 'db.odbc.select[pgsql.stat.io.version.above.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: io
            - uuid: a12ce5ad49244c8bba2998486dbca252
              name: 'I/O: Time total'
              type: DEPENDENT
              key: 'pgsql.io.time.ms.version.above.18[{#SINGLETON}]'
              value_type: FLOAT
              units: s
              description: |
                Total time spent on I/O operations (read + write).
                IMPORTANT!
                Requires `track_io_timing = on` in `postgresql.conf` or via `ALTER SYSTEM`.
                Otherwise, this metric will always be `0`.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.io_time_ms
                - type: MULTIPLIER
                  parameters:
                    - '0.001'
              master_item:
                key: 'db.odbc.select[pgsql.stat.io.version.above.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: io
            - uuid: f3a155d947a149f6b6ac0df6173352cc
              name: 'I/O: WAL write bytes total'
              type: DEPENDENT
              key: 'pgsql.io.wal.write.bytes.version.above.18[{#SINGLETON}]'
              units: B
              description: 'Total number of bytes written to WAL.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.wal_write_bytes
              master_item:
                key: 'db.odbc.select[pgsql.stat.io.version.above.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: wal
            - uuid: e3241245ae74455ca37cac252b0455d0
              name: 'I/O: Write bytes total'
              type: DEPENDENT
              key: 'pgsql.io.write.bytes.version.above.18[{#SINGLETON}]'
              units: B
              description: 'Total number of bytes written by PostgreSQL.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.write_bytes
              master_item:
                key: 'db.odbc.select[pgsql.stat.io.version.above.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: io
          master_item:
            key: pgsql.version.validator
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: a7c52e8f0f3d4e7cb12a9f7b1d64b9e3
          name: 'I/O metrics discovery (v16–17)'
          type: DEPENDENT
          key: pgsql.io.discovery.version.below.18
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V16}'
                value: 'false'
              - macro: '{#BELOW_V18}'
                value: 'true'
          description: 'Discovers `I/O` metrics in PostgreSQL 16 and 17.'
          item_prototypes:
            - uuid: e9d8b7c6a5f64d1eaf5b1c7e3b5d2a4f
              name: 'I/O: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.stat.io.version.below.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
