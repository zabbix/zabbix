            - uuid: 0d8de46ad7f7401598da9d662aa11c5d
              name: 'Workload: PGSS version'
              type: DEPENDENT
              key: 'pgsql.workload.pgss.version.above.15[{#SINGLETON}]'
              value_type: CHAR
              description: 'Version of `pg_stat_statements`.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
