zabbix_export:
  version: '8.0'
  template_groups:
    - uuid: 748ad4d098d447d492bb935c907f652f
      name: Templates/Databases
  templates:
    - uuid: e0a7c3e725c445228b03116dc6114fe9
      template: 'PostgreSQL by ODBC'
      name: 'PostgreSQL by ODBC'
      description: |
        This template enables PostgreSQL monitoring in Zabbix via ODBC without external scripts.
        Tablespace discovery is executed for all PostgreSQL versions; full item support is available from PostgreSQL 12.
        Setup:
        1. Create the PostgreSQL monitoring user with `pg_monitor` permissions:
          CREATE USER zbx_monitor WITH PASSWORD '<PASSWORD>' INHERIT;
          GRANT pg_monitor TO zbx_monitor;
        
        2. Allow TCP connections for `zbx_monitor` in `pg_hba.conf`.
        
        3. Install the PostgreSQL ODBC driver.
        
        4. Configure the connection string (`{$PG.CONNSTRING.ODBC}`) with at least:
          - 'Driver=' (from odbcinst.ini or path)
          - 'Servername=' (host/IP)
          - 'Port=' (if needed)
        
          Optional: add SSL/TLS parameters if encryption is required.
          Example:
          Servername=<instanceip>;Port=5432;Driver=/usr/lib64/psqlodbcw.so;SSLmode=require
        
        5. Set the user password in the macro `{$PG.PASSWORD}`.
        
        For full instructions, see README.md.
        
        Generated by official Zabbix template tool "Templator"
      wizard_ready: 'YES'
      readme: |
        ## Setup
        
        1. Create the PostgreSQL user for monitoring (`<password>` at your discretion) and inherit permissions from the default role `pg_monitor`:
        
        ```sql
        CREATE USER zbx_monitor WITH PASSWORD '<PASSWORD>' INHERIT;
        GRANT pg_monitor TO zbx_monitor;
        ```
        
        2. Edit the `pg_hba.conf` configuration file to allow TCP connections for the user `zbx_monitor`. For example, you could add one of the following rows to allow local connections from the same host:
        
        ```bash
        # TYPE  DATABASE        USER            ADDRESS                 METHOD
          host       all        zbx_monitor     localhost               trust
          host       all        zbx_monitor     127.0.0.1/32            md5
          host       all        zbx_monitor     ::1/128                 scram-sha-256
        ```
        
        For more information please read the PostgreSQL documentation `https://www.postgresql.org/docs/current/auth-pg-hba-conf.html`.
        
        3. Install the PostgreSQL ODBC driver. Check the [`Zabbix documentation`](https://www.zabbix.com/documentation/8.0/manual/config/items/itemtypes/odbc_checks/) for details about ODBC checks and [`recommended parameters page`](https://www.zabbix.com/documentation/8.0/manual/config/items/itemtypes/odbc_checks/unixodbc_postgresql).
        
        4. Set up the connection string in the `PostgreSQL connection string` host wizard configuration field. The minimum required parameters are:
        
        - `Driver=` - set the name of the driver which will be used for monitoring (from the `odbcinst.ini` file) or specify the path to the driver file (for example `/usr/lib64/psqlodbcw.so`);
        - `Servername=` - set the host name or IP address of the PostgreSQL instance;
        - `Port=` - adjust the port number if needed.
        
        **Note:** if you want to use SSL/TLS encryption to protect communications with the remote PostgreSQL instance, you can also specify encryption parameters here.
        
        It is assumed that you set up the PostgreSQL instance to work in the desired encryption mode. Check the [`PostgreSQL documentation`](https://www.postgresql.org/docs/current/ssl-tcp.html) for details.
        
        For example, to enable required encryption in transport mode without identity checks, the connection string could look like this (replace `<instanceip>` with the address of the PostgreSQL instance):
        
        ```
        Servername=<instanceip>;Port=5432;Driver=/usr/lib64/psqlodbcw.so;SSLmode=require
        ```
        
        5. Set the password that you specified in step 1 in the `PostgreSQL user password` field.
      vendor:
        name: Zabbix
        version: 8.0-2
      groups:
        - name: Templates/Databases
      items:
        - uuid: 9440208c49134347809eff39109c644f
          name: 'Get archive'
          type: ODBC
          key: 'db.odbc.select[pgsql.archive.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            WITH values AS (
              SELECT
                4096/(ceil(pg_settings.setting::numeric/1024/1024))::int AS segment_parts_count,
                setting::bigint AS segment_size,
                ('x' || substring(pg_stat_archiver.last_archived_wal from 9 for 8))::bit(32)::int AS last_wal_div,
                ('x' || substring(pg_stat_archiver.last_archived_wal from 17 for 8))::bit(32)::int AS last_wal_mod,
                CASE WHEN pg_is_in_recovery() THEN NULL 
                  ELSE ('x' || substring(pg_walfile_name(pg_current_wal_lsn()) from 9 for 8))::bit(32)::int END AS current_wal_div,
                CASE WHEN pg_is_in_recovery() THEN NULL 
                  ELSE ('x' || substring(pg_walfile_name(pg_current_wal_lsn()) from 17 for 8))::bit(32)::int END AS current_wal_mod
              FROM pg_settings, pg_stat_archiver
              WHERE pg_settings.name = 'wal_segment_size')
            SELECT json_build_object(
              'archived_count', (SELECT archived_count FROM pg_stat_archiver),
              'failed_count', (SELECT failed_count FROM pg_stat_archiver),
              'count_files', (SELECT greatest(coalesce((segment_parts_count - last_wal_mod) + ((current_wal_div - last_wal_div - 1) * segment_parts_count) + current_wal_mod - 1, 0), 0) FROM values),
              'size_files', (SELECT greatest(coalesce(((segment_parts_count - last_wal_mod) + ((current_wal_div - last_wal_div - 1) * segment_parts_count) + current_wal_mod - 1) * segment_size, 0), 0) FROM values)
            ) AS result
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects archive status metrics.'
          tags:
            - tag: component
              value: raw
        - uuid: 1d267b6aed064d03b4f464b27c1e897e
          name: 'Get connections sum'
          type: ODBC
          key: 'db.odbc.select[pgsql.connections.sum.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT row_to_json(T)
              FROM (
                SELECT
                  sum(CASE WHEN state = 'active' THEN 1 ELSE 0 END) AS active,
                  sum(CASE WHEN state = 'idle' THEN 1 ELSE 0 END) AS idle,
                  sum(CASE WHEN state = 'idle in transaction' THEN 1 ELSE 0 END) AS idle_in_transaction,
                  sum(CASE WHEN state = 'idle in transaction (aborted)' THEN 1 ELSE 0 END) AS idle_in_transaction_aborted,
                  sum(CASE WHEN state = 'fastpath function call' THEN 1 ELSE 0 END) AS fastpath_function_call,
                  sum(CASE WHEN state = 'disabled' THEN 1 ELSE 0 END) AS disabled,
                  count(*) AS total,
                  count(*)*100/(SELECT current_setting('max_connections')::int) AS total_pct,
                  sum(CASE WHEN wait_event IS NOT NULL THEN 1 ELSE 0 END) AS waiting,
                  (SELECT count(*) FROM pg_prepared_xacts) AS prepared
                FROM pg_stat_activity WHERE datid IS NOT NULL AND state IS NOT NULL) T
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Collects all metrics from `pg_stat_activity`:
            https://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-ACTIVITY-VIEW
          tags:
            - tag: component
              value: raw
        - uuid: 0f93764d56574a288467ad16dce11a17
          name: 'Get dbstat inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.dbstat.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              json_object_agg (coalesce(datname, 'null'), row_to_json (T))
            FROM
              (
                SELECT
                  datname,
                  numbackends AS numbackends,
                  xact_commit AS xact_commit,
                  xact_rollback AS xact_rollback,
                  blks_read AS blks_read,
                  blks_hit AS blks_hit,
                  tup_returned AS tup_returned,
                  tup_fetched AS tup_fetched,
                  tup_inserted AS tup_inserted,
                  tup_updated AS tup_updated,
                  tup_deleted AS tup_deleted,
                  conflicts AS conflicts,
                  temp_files AS temp_files,
                  temp_bytes AS temp_bytes,
                  deadlocks AS deadlocks,
                  blk_read_time AS blk_read_time,
                  blk_write_time AS blk_write_time
                FROM
                  pg_catalog.pg_stat_database
                WHERE
                  datname IS NOT NULL
              ) T;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Collects all metrics from `pg_stat_database` per database:
            https://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-DATABASE-VIEW
          tags:
            - tag: component
              value: raw
        - uuid: 6ea1a17fad8b4ef3aba8b49a0922a77d
          name: 'Get dbstat sum'
          type: ODBC
          key: 'db.odbc.select[pgsql.dbstat.sum.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              row_to_json (T)
            FROM
              (
                SELECT
                  sum(numbackends) AS numbackends,
                  sum(xact_commit) AS xact_commit,
                  sum(xact_rollback) AS xact_rollback,
                  sum(blks_read) AS blks_read,
                  sum(blks_hit) AS blks_hit,
                  sum(tup_returned) AS tup_returned,
                  sum(tup_fetched) AS tup_fetched,
                  sum(tup_inserted) AS tup_inserted,
                  sum(tup_updated) AS tup_updated,
                  sum(tup_deleted) AS tup_deleted,
                  sum(conflicts) AS conflicts,
                  sum(temp_files) AS temp_files,
                  sum(temp_bytes) AS temp_bytes,
                  sum(deadlocks) AS deadlocks,
                  sum(blk_read_time) AS blk_read_time,
                  sum(blk_write_time) AS blk_write_time
                FROM
                  pg_stat_database
              ) T
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Collects all metrics from `pg_stat_database` as sums for all databases:
            https://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-DATABASE-VIEW
          tags:
            - tag: component
              value: raw
        - uuid: e5df321a28e043b292abdc5061ffb480
          name: 'Health: Get data'
          type: ODBC
          key: 'db.odbc.select[pgsql.health.snapshot.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              json_build_object (
                'total_connections',
                (
                  SELECT
                    count(*)
                  FROM
                    pg_stat_activity
                ),
                'active_connections',
                (
                  SELECT
                    count(*)
                  FROM
                    pg_stat_activity
                  WHERE
                    state = 'active'
                ),
                'waiting_locks',
                (
                  SELECT
                    count(*)
                  FROM
                    pg_locks
                  WHERE
                    NOT granted
                ),
                'max_xid_age',
                (
                  SELECT
                    max(age (datfrozenxid))
                  FROM
                    pg_database
                ),
                'max_xid_percent',
                (
                  SELECT
                    round(100.0 * max(age (datfrozenxid)) / 2000000000, 6)
                  FROM
                    pg_database
                ),
                'cache_hit_ratio',
                (
                  SELECT
                    round(
                      100.0 * sum(blks_hit) / nullif(sum(blks_hit + blks_read), 0),
                      2
                    )
                  FROM
                    pg_stat_database
                ),
                'deadlocks',
                (
                  SELECT
                    sum(deadlocks)
                  FROM
                    pg_stat_database
                ),
                'autovacuum',
                json_build_object (
                  'active',
                  (
                    SELECT
                      count(*)
                    FROM
                      pg_stat_activity
                    WHERE
                      backend_type = 'autovacuum worker'
                      AND state <> 'idle'
                  ),
                  'idle',
                  (
                    SELECT
                      count(*)
                    FROM
                      pg_stat_activity
                    WHERE
                      backend_type = 'autovacuum worker'
                      AND state = 'idle'
                  )
                )
              ) AS health;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects raw PostgreSQL health metrics.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: raw
        - uuid: efa015e294684fdeb711a0fde1256cf9
          name: 'Get locks inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.locks.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            WITH
              T AS (
                SELECT
                  db.datname dbname,
                  lower(replace (Q.mode, 'Lock', '')) AS MODE,
                  coalesce(T.qty, 0) val
                FROM
                  pg_database db
                  JOIN (
                    VALUES
                      ('AccessShareLock'),
                      ('RowShareLock'),
                      ('RowExclusiveLock'),
                      ('ShareUpdateExclusiveLock'),
                      ('ShareLock'),
                      ('ShareRowExclusiveLock'),
                      ('ExclusiveLock'),
                      ('AccessExclusiveLock')
                  ) Q (MODE) ON TRUE
                  NATURAL LEFT JOIN (
                    SELECT
                      datname,
                      MODE,
                      count(MODE) qty
                    FROM
                      pg_locks lc
                      RIGHT JOIN pg_database db ON db.oid = lc.database
                    GROUP BY
                      1,
                      2
                  ) T
                WHERE
                  NOT db.datistemplate
                ORDER BY
                  1,
                  2
              )
            SELECT
              json_object_agg (dbname, row_to_json (T2))
            FROM
              (
                SELECT
                  dbname,
                  sum(val) AS total,
                  sum(
                    CASE
                      WHEN MODE = 'accessexclusive' THEN val
                    END
                  ) AS accessexclusive,
                  sum(
                    CASE
                      WHEN MODE = 'accessshare' THEN val
                    END
                  ) AS accessshare,
                  sum(
                    CASE
                      WHEN MODE = 'exclusive' THEN val
                    END
                  ) AS EXCLUSIVE,
                  sum(
                    CASE
                      WHEN MODE = 'rowexclusive' THEN val
                    END
                  ) AS rowexclusive,
                  sum(
                    CASE
                      WHEN MODE = 'rowshare' THEN val
                    END
                  ) AS rowshare,
                  sum(
                    CASE
                      WHEN MODE = 'share' THEN val
                    END
                  ) AS SHARE,
                  sum(
                    CASE
                      WHEN MODE = 'sharerowexclusive' THEN val
                    END
                  ) AS sharerowexclusive,
                  sum(
                    CASE
                      WHEN MODE = 'shareupdateexclusive' THEN val
                    END
                  ) AS shareupdateexclusive
                FROM
                  T
                GROUP BY
                  dbname
              ) T2
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Collects all metrics from `pg_locks` per database:
            https://www.postgresql.org/docs/current/explicit-locking.html#LOCKING-TABLES
          tags:
            - tag: component
              value: raw
        - uuid: e1f5776255024fc49507a4ed15e7fc16
          name: 'LRQ: Get data'
          type: ODBC
          key: 'db.odbc.select[pgsql.longest.running.query.data.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              json_build_object (
                'pid',
                pid,
                'duration',
                EXTRACT(
                  EPOCH
                  FROM
                    now () - query_start
                ),
                'query',
                query
              ) AS result
            FROM
              pg_stat_activity
            WHERE
              state = 'active'
              AND query NOT LIKE 'START_REPLICATION SLOT%'
            ORDER BY
              now () - query_start DESC
            LIMIT
              1;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Returns data about the currently active LRQ (Longest Running Query) and its execution duration from `pg_stat_activity`.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: raw
        - uuid: 266a9b5c1e604d97ac5a74ccdb598c97
          name: 'Oldest active XID'
          type: ODBC
          key: 'db.odbc.select[pgsql.oldest.xid,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          value_type: FLOAT
          params: |
            SELECT greatest(max(age(backend_xmin)), max(age(backend_xid)))
              FROM pg_catalog.pg_stat_activity
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Age of the oldest active transaction (XID) among live backends.'
          tags:
            - tag: component
              value: transactions
          triggers:
            - uuid: b7195f1ea9494fc8a97f8a8e35c643b2
              expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.oldest.xid,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"],15m) >= {$PG.XID_ACTIVE.AVG}'
              name: 'PostgreSQL: Oldest active XID average'
              event_name: 'PostgreSQL: Oldest Active XID >= {$PG.XID_ACTIVE.AVG} for 15m'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: AVERAGE
              description: 'Oldest active XID >= `{$PG.XID_ACTIVE.AVG}`. Check for long-running transactions.'
              dependencies:
                - name: 'PostgreSQL: Oldest active XID high'
                  expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.oldest.xid,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"],15m) >= {$PG.XID_ACTIVE.HIGH}'
              tags:
                - tag: scope
                  value: performance
            - uuid: 61ec00b8a8ef4418ac61916ff1f220da
              expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.oldest.xid,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"],15m) >= {$PG.XID_ACTIVE.HIGH}'
              name: 'PostgreSQL: Oldest active XID high'
              event_name: 'PostgreSQL: Oldest Active XID >= {$PG.XID_ACTIVE.HIGH} for 15m'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: HIGH
              description: 'Oldest active XID >= `{$PG.XID_ACTIVE.HIGH}`. Investigate immediately.'
              tags:
                - tag: scope
                  value: performance
            - uuid: 4697373c9deb45b2ad7586752fa6c6a4
              expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.oldest.xid,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"],15m) >= {$PG.XID_ACTIVE.WARN}'
              name: 'PostgreSQL: Oldest active XID warning'
              event_name: 'PostgreSQL: Oldest Active XID >= {$PG.XID_ACTIVE.WARN} for 15m'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Oldest active XID >= `{$PG.XID_ACTIVE.WARN}`. Monitor long transactions.'
              dependencies:
                - name: 'PostgreSQL: Oldest active XID average'
                  expression: 'min(/PostgreSQL by ODBC/db.odbc.select[pgsql.oldest.xid,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"],15m) >= {$PG.XID_ACTIVE.AVG}'
              tags:
                - tag: scope
                  value: performance
        - uuid: 3c16a3c2db7641c2b6958649d7b4809e
          name: Ping
          type: ODBC
          key: 'db.odbc.select[pgsql.ping,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          params: 'SELECT 1'
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Used to test a connection to see if it is alive. Set to `0` if the query is unsuccessful.'
          valuemap:
            name: 'Service state'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: application
            - tag: component
              value: health
          triggers:
            - uuid: 758e569b51954fcf82c7cb3fa391c882
              expression: 'last(/PostgreSQL by ODBC/db.odbc.select[pgsql.ping,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"])=0'
              name: 'PostgreSQL: Service is down'
              priority: HIGH
              description: 'Last test of a connection was unsuccessful.'
              tags:
                - tag: scope
                  value: performance
        - uuid: ee6b3f64e07d4acd875dbd83dccd51d0
          name: 'Get queries inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.queries.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            WITH T AS
              (SELECT db.datname,
                coalesce(T.query_time_max, 0) query_time_max,
                coalesce(T.tx_time_max, 0) tx_time_max,
                coalesce(T.mro_time_max, 0) mro_time_max,
                coalesce(T.query_time_sum, 0) query_time_sum,
                coalesce(T.tx_time_sum, 0) tx_time_sum,
                coalesce(T.mro_time_sum, 0) mro_time_sum,
                coalesce(T.query_slow_count, 0) query_slow_count,
                coalesce(T.tx_slow_count, 0) tx_slow_count,
                coalesce(T.mro_slow_count, 0) mro_slow_count
              FROM pg_database db NATURAL
              LEFT JOIN (
                SELECT datname,
                  extract(epoch FROM now())::integer ts,
                  coalesce(max(extract('epoch' FROM (clock_timestamp() - query_start))::integer * (state NOT IN ('idle', 'idle in transaction', 'idle in transaction (aborted)') AND query !~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) query_time_max,
                  coalesce(max(extract('epoch' FROM (clock_timestamp() - query_start))::integer * (state NOT IN ('idle') AND query !~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) tx_time_max,
                  coalesce(max(extract('epoch' FROM (clock_timestamp() - query_start))::integer * (state NOT IN ('idle') AND query ~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) mro_time_max,
                  coalesce(sum(extract('epoch' FROM (clock_timestamp() - query_start))::integer * (state NOT IN ('idle', 'idle in transaction', 'idle in transaction (aborted)') AND query !~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) query_time_sum,
                  coalesce(sum(extract('epoch' FROM (clock_timestamp() - query_start))::integer * (state NOT IN ('idle') AND query !~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) tx_time_sum,
                  coalesce(sum(extract('epoch' FROM (clock_timestamp() - query_start))::integer * (state NOT IN ('idle') AND query ~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) mro_time_sum,
            
                  coalesce(sum((extract('epoch' FROM (clock_timestamp() - query_start)) > {$PG.QUERY_EXECUTION_TIME.MAX.WARN})::integer * (state NOT IN ('idle', 'idle in transaction', 'idle in transaction (aborted)') AND query !~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) query_slow_count,
                  coalesce(sum((extract('epoch' FROM (clock_timestamp() - query_start)) > {$PG.QUERY_EXECUTION_TIME.MAX.WARN})::integer * (state NOT IN ('idle') AND query !~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) tx_slow_count,
                  coalesce(sum((extract('epoch' FROM (clock_timestamp() - query_start)) > {$PG.QUERY_EXECUTION_TIME.MAX.WARN})::integer * (state NOT IN ('idle') AND query ~* E'^(\\s*(--[^\\n]*\\n|/\\*.*\\*/|\\n))*(autovacuum|VACUUM|ANALYZE|REINDEX|CLUSTER|CREATE|ALTER|TRUNCATE|DROP)')::integer), 0) mro_slow_count
                FROM pg_stat_activity
                WHERE pid <> pg_backend_pid()
                GROUP BY 1) T
              WHERE NOT db.datistemplate )
            SELECT json_object_agg(datname, row_to_json(T))
            FROM T
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects all metrics by query execution time.'
          tags:
            - tag: component
              value: raw
        - uuid: fefca23f666f46fdb870340913589dc5
          name: 'Get relation inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.relation.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
                json_object_agg (
                    schema_name,
                    json_build_object (
                        'total_bytes',
                        total_bytes,
                        'table_count',
                        table_count
                    )
                )
            FROM
                (
                    SELECT
                        n.nspname AS schema_name,
                        COALESCE(SUM(pg_total_relation_size (c.oid)), 0) AS total_bytes,
                        COUNT(c.oid) AS table_count
                    FROM
                        pg_namespace n
                        LEFT JOIN pg_class c ON c.relnamespace = n.oid
                        AND c.relkind = 'r'
                    WHERE
                        n.nspname NOT IN ('pg_catalog', 'information_schema')
                    GROUP BY
                        n.nspname
                ) AS sub;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects raw relation size information from the primary core database.'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
            - type: JAVASCRIPT
              parameters:
                - |
                  var obj = JSON.parse(value);
                  var arr = [];
                  for (var key in obj) {
                    arr.push({
                  	"name": key,
                  	"total_bytes": obj[key].total_bytes,
                  	"table_count": obj[key].table_count
                    });
                  }
                  return JSON.stringify(arr);
          tags:
            - tag: component
              value: raw
        - uuid: d156db3cb35049a88179060583961156
          name: 'Replication: Standby'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.count,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          units: '!replicas'
          params: 'SELECT count(*) FROM pg_stat_replication'
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Number of standby servers.'
          tags:
            - tag: component
              value: replication
        - uuid: 3f2b5c02a6be40d4837205f68aaacabb
          name: 'Get replication inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              json_object_agg (application_name, row_to_json (t))
            FROM
              (
                SELECT
                  application_name,
                  EXTRACT(
                    EPOCH
                    FROM
                      COALESCE(flush_lag, CAST('0' AS INTERVAL))
                  ) AS flush_lag,
                  EXTRACT(
                    EPOCH
                    FROM
                      COALESCE(replay_lag, CAST('0' AS INTERVAL))
                  ) AS replay_lag,
                  EXTRACT(
                    EPOCH
                    FROM
                      COALESCE(write_lag, CAST('0' AS INTERVAL))
                  ) AS write_lag
                FROM
                  pg_stat_replication
              ) t;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects metrics from `pg_stat_replication`, which contains information about the WAL sender process, showing statistics about replication to that sender''s connected standby server.'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
          tags:
            - tag: component
              value: raw
        - uuid: 669d87ebf9324d6eaa26c3cb44efc850
          name: 'Replication: Lag in bytes'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.lag.b,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          units: B
          params: |
            SELECT
              CASE
                WHEN NOT pg_is_in_recovery ()
                OR pg_last_wal_receive_lsn () = pg_last_wal_replay_lsn () THEN 0
                ELSE (
                  SELECT
                    pg_catalog.pg_wal_lsn_diff (
                      pg_last_wal_receive_lsn (),
                      pg_last_wal_replay_lsn ()
                    )
                )
              END AS lag_bytes
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Replication lag with master, in bytes.'
          tags:
            - tag: component
              value: replication
        - uuid: bb87b83d35784d3ea5be2263fa3722b0
          name: 'Replication: Lag in seconds'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.lag.sec,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          units: s
          params: |
            SELECT
              CASE
                WHEN NOT pg_is_in_recovery()
                  OR pg_last_wal_receive_lsn() = pg_last_wal_replay_lsn()
                THEN 0
                ELSE COALESCE(
                  CAST(EXTRACT(EPOCH FROM now() - pg_last_xact_replay_timestamp()) AS INTEGER),
                  0
                )
              END AS lag;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Replication lag with master, in seconds.'
          tags:
            - tag: component
              value: replication
        - uuid: f8205cdd902a4a688b5bcb7f65d8e41d
          name: 'Replication: Role'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.recovery_role,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          params: 'SELECT pg_is_in_recovery()::int'
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Replication role:
            1 - Standby mode
            0 - Master mode
          valuemap:
            name: 'PostgreSQL recovery role'
          tags:
            - tag: component
              value: replication
        - uuid: 6cc8c748f6174d3dba9aa9b39570b006
          name: 'Replication: Status'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.status,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          params: |
            SELECT
              CASE
                WHEN NOT pg_is_in_recovery () THEN 2
                ELSE (
                  SELECT
                    count(*)
                  FROM
                    pg_stat_wal_receiver
                )
              END AS repl_status
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Shows replication streaming state:
            0 - Standby offline
            1 - Standby streaming
            2 - Master node
          valuemap:
            name: 'PostgreSQL replication status'
          tags:
            - tag: component
              value: replication
        - uuid: 3b5e7e50b0284a9fb8f7240dff0feab9
          name: 'Get subscription inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.subscription.inventory.get{,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              json_agg (
                json_build_object (
                  'subid',
                  subid,
                  'subname',
                  subname,
                  'apply_error_count',
                  apply_error_count,
                  'sync_error_count',
                  sync_error_count,
                  'stats_reset',
                  COALESCE(
                    EXTRACT(
                      EPOCH
                      FROM
                        stats_reset
                    ),
                    0
                  )
                )
              ) AS result
            FROM
              pg_stat_subscription_stats
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: |
            Shows `apply errors`, `sync errors`, and `last reset time` for each subscription.
            IMPORTANT!
            Logical replication subscription metrics are supported for PostgreSQL 15–18 and are designed for subscriber databases with existing subscriptions. Unsupported or missing values will be discarded.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
          tags:
            - tag: component
              value: raw
        - uuid: 8f619110278f4d3284f4a8ec80f5f972
          name: 'Get tablespace inventory'
          type: ODBC
          key: 'db.odbc.select[pgsql.tablespace.inventory.get{,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          history: '0'
          value_type: TEXT
          params: |
            SELECT json_build_object(
                'data', COALESCE(
                    json_agg(
                        json_build_object(
                            'name', t.spcname,
                            'oid', t.oid,
                            'owner', pg_get_userbyid(t.spcowner),
                            'location', COALESCE(pg_tablespace_location(t.oid), '(none)'),
                            'size_bytes', pg_tablespace_size(t.oid),
                            'is_default', t.spcname IN ('pg_default', 'pg_global')
                        )
                    ),
                    '[]'::json
                )
            ) AS result
            FROM pg_tablespace t;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects raw tablespace inventory JSON.'
