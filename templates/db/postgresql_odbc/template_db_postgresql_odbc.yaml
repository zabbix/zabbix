          triggers:
            - uuid: e7f8c9d1a2b3456f9876543210abcdef
              expression: 'last(/PostgreSQL by ODBC/pgsql.version.wordsize,#1)<>last(/PostgreSQL by ODBC/pgsql.version.wordsize,#2) and length(last(/PostgreSQL by ODBC/pgsql.version.wordsize))>0'
