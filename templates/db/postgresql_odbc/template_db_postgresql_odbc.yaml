              tags:
                - tag: component
                  value: queries
            - uuid: ee4e95a690ff425881af1da678e96bbe
              name: 'Workload: Temporary blocks written'
              type: DEPENDENT
              key: 'pgsql.workload.temp.blocks.written.above.15[{#SINGLETON}]'
