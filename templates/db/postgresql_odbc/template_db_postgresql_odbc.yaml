                  expression: 'min(/PostgreSQL by ODBC/pgsql.replication.slots.inactive.retaining.above.15[{#SINGLETON}],5m) >= {$PG.REPLICATION.SLOTS.RETAINING.HIGH}'
                  name: 'PostgreSQL: Replication slots: Retaining WAL high'
                  event_name: 'PostgreSQL: Slots retaining WAL >= {$PG.REPLICATION.SLOTS.RETAINING.HIGH} for 5m'
                  opdata: 'Current count: {ITEM.LASTVALUE1}'
                  priority: HIGH
