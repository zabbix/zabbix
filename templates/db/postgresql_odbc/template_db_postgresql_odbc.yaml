        - uuid: 46a6f3cdfff244a28cb712c4186afc7f
          name: 'Replication discovery'
          type: ODBC
          key: 'db.odbc.select[pgsql.replication.process.discovery,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          delay: 15m
          params: |
            SELECT
                json_build_object (
                    'data',
                    COALESCE(
                        json_agg (
                            json_build_object ('{#APPLICATION_NAME}', application_name)
                        ),
                        '[]'
                    )
                )
            FROM
                pg_stat_replication
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#APPLICATION_NAME}'
                value: '{$PG.LLD.FILTER.APPLICATION.MATCHES}'
              - macro: '{#APPLICATION_NAME}'
                value: '{$PG.LLD.FILTER.APPLICATION.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discovers replication lag metrics.'
          item_prototypes:
            - uuid: 9e7797789d2c47efb9af2c86f8c6a93e
              name: 'Application [{#APPLICATION_NAME}]: Get data'
              type: DEPENDENT
              key: 'pgsql.replication.get["{#APPLICATION_NAME}"]'
              history: '0'
              value_type: TEXT
              description: 'Collects metrics from `pg_stat_replication` about the application `{#APPLICATION_NAME}` that is connected to this WAL sender, which contains information about the WAL sender process, showing statistics about replication to that sender''s connected standby server.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[''{#APPLICATION_NAME}'']'
                  error_handler: DISCARD_VALUE
              master_item:
                key: 'db.odbc.select[pgsql.replication.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: application
                  value: '{#APPLICATION_NAME}'
                - tag: component
                  value: raw
            - uuid: 86109b6d1b084de186dcda5d455da992
              name: 'Application [{#APPLICATION_NAME}]: Replication flush lag'
              type: DEPENDENT
              key: 'pgsql.replication.process.flush_lag["{#APPLICATION_NAME}"]'
              value_type: FLOAT
              units: s
              description: 'Time elapsed between flushing recent WAL locally and receiving notification that this standby server has written and flushed it (but not yet applied it). This can be used to gauge the delay that `synchronous_commit` level incurred while committing if this server was configured as a synchronous standby.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.flush_lag
              master_item:
                key: 'pgsql.replication.get["{#APPLICATION_NAME}"]'
              tags:
                - tag: application
                  value: '{#APPLICATION_NAME}'
                - tag: component
                  value: replication
            - uuid: 2cad17fa29c24f0da0fffe962c337f13
              name: 'Application [{#APPLICATION_NAME}]: Replication replay lag'
              type: DEPENDENT
              key: 'pgsql.replication.process.replay_lag["{#APPLICATION_NAME}"]'
              value_type: FLOAT
              units: s
              description: 'Time elapsed between flushing recent WAL locally and receiving notification that this standby server has written, flushed, and applied it. This can be used to gauge the delay that `synchronous_commit` level `remote_apply` incurred while committing if this server was configured as a synchronous standby.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.replay_lag
              master_item:
                key: 'pgsql.replication.get["{#APPLICATION_NAME}"]'
              tags:
                - tag: application
                  value: '{#APPLICATION_NAME}'
                - tag: component
                  value: replication
            - uuid: f5f62a5cac254d5eb891beadd6ca950d
              name: 'Application [{#APPLICATION_NAME}]: Replication write lag'
              type: DEPENDENT
              key: 'pgsql.replication.process.write_lag["{#APPLICATION_NAME}"]'
              value_type: FLOAT
              units: s
              description: 'Time elapsed between flushing recent WAL locally and receiving notification that this standby server has written it (but not yet flushed it or applied it). This can be used to gauge the delay that `synchronous_commit` level `remote_write` incurred while committing if this server was configured as a synchronous standby.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.write_lag
              master_item:
                key: 'pgsql.replication.get["{#APPLICATION_NAME}"]'
              tags:
                - tag: application
                  value: '{#APPLICATION_NAME}'
                - tag: component
                  value: replication
          graph_prototypes:
            - uuid: 52b70e3a3691467d8ca7a420d2f7f3c5
              name: 'Application [{#APPLICATION_NAME}]: Replication lag'
              graph_items:
                - color: 199C0D
                  item:
                    host: 'PostgreSQL by ODBC'
                    key: 'pgsql.replication.process.flush_lag["{#APPLICATION_NAME}"]'
                - sortorder: '1'
                  color: F63100
                  item:
                    host: 'PostgreSQL by ODBC'
                    key: 'pgsql.replication.process.replay_lag["{#APPLICATION_NAME}"]'
                - sortorder: '2'
                  color: 00611C
                  item:
                    host: 'PostgreSQL by ODBC'
                    key: 'pgsql.replication.process.write_lag["{#APPLICATION_NAME}"]'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 3h
        - uuid: fee729c8c626409ba1849e0f6d99392c
          name: 'Bgwriter metrics discovery (v17+)'
          type: DEPENDENT
          key: pgsql.bgwriter.above_17.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V17}'
                value: 'false'
          description: 'Discovers `bgwriter` metrics in PostgreSQL 17 and above.'
          item_prototypes:
            - uuid: 46c4d56f21b24f4face87858445e7b5e
              name: 'Get bgwriter'
              type: ODBC
              key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                SELECT
                  row_to_json (T)
                FROM
                  (
                    SELECT
                      pg_postmaster_start_time () AS postmaster_start_time,
                      psc.num_timed AS checkpoints_timed,
                      psc.num_requested AS checkpoints_req,
                      psc.write_time AS checkpoint_write_time,
                      psc.sync_time AS checkpoint_sync_time,
                      psc.buffers_written AS buffers_checkpoint,
                      psb.buffers_clean AS buffers_clean,
                      psb.maxwritten_clean AS maxwritten_clean,
                      psb.buffers_alloc AS buffers_alloc
                    FROM
                      pg_stat_checkpointer AS psc,
                      pg_stat_bgwriter AS psb
                  ) T;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: |
                Collect all metrics from pg_stat_bgwriter:
                https://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-BGWRITER-VIEW
              tags:
                - tag: component
                  value: raw
            - uuid: 7c2521a1c02240d6846344cc447ffd45
              name: 'Bgwriter: Buffers allocated per second'
              type: DEPENDENT
              key: 'pgsql.bgwriter.buffers_alloc.rate.above_17[{#SINGLETON}]'
              value_type: FLOAT
              units: '!allocated/s'
              description: 'Number of buffers allocated per second.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.buffers_alloc
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
            - uuid: 52123eb6463b4d7d990a66398d773e0c
              name: 'Checkpoint: Buffers written during checkpoints per second'
              type: DEPENDENT
              key: 'pgsql.bgwriter.buffers_checkpoint.rate.above_17[{#SINGLETON}]'
              value_type: FLOAT
              units: '!written/s'
              description: 'Number of buffers written during checkpoints per second.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.buffers_checkpoint
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
            - uuid: e29ed04f09044901a25e3865acf98965
              name: 'Checkpoint: Buffers written by the background writer per second'
              type: DEPENDENT
              key: 'pgsql.bgwriter.buffers_clean.rate.above_17[{#SINGLETON}]'
              value_type: FLOAT
