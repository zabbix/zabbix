        - uuid: 1c1a68ff76b848ea972395bf2341d9cc
          name: 'Workload metrics discovery (v18+)'
          type: DEPENDENT
          key: pgsql.workload.stats.version.18.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V18}'
                value: 'false'
          description: 'Discovers `query` metrics in PostgreSQL 18 and above.'
          item_prototypes:
            - uuid: 24d6dc268d6244a9bfcd83e1e121e3d6
              name: 'Workload: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.workload.snapshot.version.18.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                WITH pgss_config AS (
                    SELECT
                        current_setting('pg_stat_statements.track', true) AS track_level,
                        COALESCE(current_setting('pg_stat_statements.track_nested', true), '0')::int AS track_nested,
                        current_setting('pg_stat_statements.max', true) AS max_statements
                ),
                stats AS (
                    SELECT
                        COUNT(*) AS distinct_statements,
                        COALESCE(SUM(calls), 0) AS total_calls,
                        COALESCE(AVG(mean_exec_time), 0) AS avg_exec_time_ms,
                        COALESCE(MAX(max_exec_time), 0) AS max_exec_time_ms,
                        COALESCE(MIN(min_exec_time), 0) AS min_exec_time_ms,
                        COALESCE(SUM(plans), 0) AS total_plans,
                        COALESCE(SUM(total_plan_time), 0) AS total_plan_time_ms,
                        COALESCE(AVG(mean_plan_time), 0) AS avg_plan_time_ms,
                        COALESCE(MAX(max_plan_time), 0) AS max_plan_time_ms,
                        COALESCE(MIN(min_plan_time), 0) AS min_plan_time_ms,
                        COALESCE(SUM(temp_blks_read), 0) AS temp_blks_read,
                        COALESCE(SUM(temp_blks_written), 0) AS temp_blks_written,
                        COALESCE(SUM(rows) FILTER (WHERE query LIKE 'INSERT%'),0) AS rows_inserted,
                        COALESCE(SUM(rows) FILTER (WHERE query LIKE 'UPDATE%'),0) AS rows_updated,
                        COALESCE(SUM(rows) FILTER (WHERE query LIKE 'DELETE%'),0) AS rows_deleted
                    FROM pg_stat_statements
                )
                SELECT jsonb_build_object(
                    'pg_stat_statements', jsonb_build_object(
                        'extension_version', (SELECT extversion FROM pg_extension WHERE extname='pg_stat_statements'),
                        'configuration', (SELECT jsonb_build_object('track', track_level, 'track_nested', track_nested, 'max', max_statements) FROM pgss_config)
                    ),
                    'metrics', jsonb_build_object(
                        'distinct_statements', distinct_statements,
                        'total_calls', total_calls,
                        'execution_time_ms', jsonb_build_object(
                            'avg', avg_exec_time_ms,
                            'max', max_exec_time_ms,
                            'min', min_exec_time_ms
                        ),
                        'plan_time_ms', jsonb_build_object(
                            'total', total_plan_time_ms,
                            'avg', avg_plan_time_ms,
                            'max', max_plan_time_ms,
                            'min', min_plan_time_ms,
                            'plans', total_plans
                        ),
                        'temp_io_blocks', jsonb_build_object('read', temp_blks_read,'written', temp_blks_written),
                        'rows_affected', jsonb_build_object('inserted', rows_inserted,'updated', rows_updated,'deleted', rows_deleted)
                    )
                ) AS metrics
                FROM stats;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: |
                Collects top queries from `pg_stat_statements`.
                IMPORTANT!
                Ensure `pg_stat_statements` is installed, add it to `shared_preload_libraries`, turn on `compute_query_id`, and set `pg_stat_statements.track` to `all`, so all queries are tracked.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
              tags:
                - tag: component
                  value: raw
            - uuid: 5c806912fcf4466bbac864a509736cee
