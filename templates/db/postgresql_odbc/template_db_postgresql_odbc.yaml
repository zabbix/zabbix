              description: 'Number of buffers written by the background writer per second.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.buffers_clean
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
            - uuid: 28219abecf7a44ff948ce97840263b41
              name: 'Checkpoint: Requested per second'
              type: DEPENDENT
              key: 'pgsql.bgwriter.checkpoints_req.rate.above_17[{#SINGLETON}]'
              value_type: FLOAT
              units: '!requested/s'
              description: 'Number of requested checkpoints that have been performed per second.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.checkpoints_req
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
            - uuid: 8065cdd159d84ea69b99983abf0d6beb
              name: 'Checkpoint: Scheduled per second'
