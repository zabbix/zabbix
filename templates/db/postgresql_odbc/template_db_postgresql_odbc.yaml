        - uuid: bc51f0b5bf024f2d98b729f9c19e5fb3
          name: 'WAL statistics metrics discovery (v14+)'
          type: DEPENDENT
          key: pgsql.wal.stats.above.14.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V14}'
                value: 'false'
          description: 'Discovers `WAL statistics` metrics in PostgreSQL 14 and above.'
          item_prototypes:
            - uuid: 9aa6e88e063a4beba6f373be04ea4f4a
              name: 'WAL statistics: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.wal.stats.above.14.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                WITH
                  wal AS (
                    SELECT
                      wal_records,
                      wal_fpi,
                      wal_bytes,
                      wal_buffers_full,
                      stats_reset
                    FROM
                      pg_stat_wal
                  ),
                  rep AS (
                    SELECT
                      json_agg (
                        json_build_object (
                          'pid',
                          pid,
                          'application_name',
                          application_name,
                          'client_addr',
                          client_addr,
                          'state',
                          state,
                          'sent_lsn',
                          sent_lsn,
                          'write_lsn',
                          write_lsn,
                          'flush_lsn',
                          flush_lsn,
                          'replay_lsn',
                          replay_lsn,
                          'write_lag',
                          write_lag,
                          'flush_lag',
                          flush_lag,
                          'replay_lag',
                          replay_lag,
                          'sync_state',
                          sync_state
                        )
                      ) AS replication
                    FROM
                      pg_stat_replication
                  ),
                  receiver AS (
                    SELECT
                      json_build_object (
                        'pid',
                        pid,
                        'status',
                        status,
                        'written_lsn',
                        written_lsn,
                        'flushed_lsn',
                        flushed_lsn,
                        'received_tli',
                        received_tli,
                        'last_msg_send_time',
                        last_msg_send_time,
                        'last_msg_receipt_time',
                        last_msg_receipt_time,
                        'latest_end_lsn',
                        latest_end_lsn,
                        'latest_end_time',
                        latest_end_time
                      ) AS receiver
                    FROM
                      pg_stat_wal_receiver
                  ),
                  slots AS (
                    SELECT
                      json_agg (
                        json_build_object (
                          'slot_name',
                          slot_name,
                          'plugin',
                          plugin,
                          'slot_type',
                          slot_type,
                          'database',
                          database,
                          'active',
                          active,
                          'restart_lsn',
                          restart_lsn,
                          'confirmed_flush_lsn',
                          confirmed_flush_lsn,
                          'wal_status',
                          wal_status,
                          'safe_wal_size',
                          safe_wal_size
                        )
                      ) AS slots
                    FROM
                      pg_replication_slots
                  )
                SELECT
                  json_build_object (
                    'wal',
                    (
                      SELECT
                        row_to_json (wal)
                      FROM
                        wal
                    ),
                    'replication',
                    (
                      SELECT
                        replication
                      FROM
                        rep
                    ),
                    'receiver',
                    (
                      SELECT
                        receiver
                      FROM
                        receiver
                    ),
                    'slots',
                    (
                      SELECT
                        slots
                      FROM
                        slots
                    )
                  ) AS result;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Collects WAL activity metrics from `pg_stat_wal`.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.wal
              tags:
                - tag: component
                  value: raw
            - uuid: ed5d5eba76ef4123ac2478b26b98c6a7
              name: 'WAL statistics: Buffers full total'
              type: DEPENDENT
              key: 'pgsql.wal.stats.buffers.full.above.14[{#SINGLETON}]'
              description: |
                Total number of times WAL buffers were full since last statistics reset.
                A non-zero or increasing value indicates WAL buffer pressure and possible performance impact.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.wal_buffers_full
              master_item:
                key: 'db.odbc.select[pgsql.wal.stats.above.14.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: wal
            - uuid: e2ac6e9c317541389277f187d71fe5dc
              name: 'WAL statistics: Bytes generated total'
              type: DEPENDENT
              key: 'pgsql.wal.stats.bytes.total.above.14[{#SINGLETON}]'
              units: B
              description: 'Total number of WAL bytes generated since last statistics reset.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.wal_bytes
              master_item:
                key: 'db.odbc.select[pgsql.wal.stats.above.14.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: wal
            - uuid: 3a2488a905fd4c2ea1db9ea3c6b9560e
              name: 'WAL statistics: Full page images total'
              type: DEPENDENT
              key: 'pgsql.wal.stats.fpi.above.14[{#SINGLETON}]'
              description: |
                Total number of full page images written to WAL since last statistics reset.
                Higher values increase WAL volume and may indicate frequent checkpoints or cold page writes.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.wal_fpi
              master_item:
                key: 'db.odbc.select[pgsql.wal.stats.above.14.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: wal
            - uuid: 4d67edd3e89e4723bd7b5382d3fe2509
              name: 'WAL statistics: Records total'
              type: DEPENDENT
              key: 'pgsql.wal.stats.records.above.14[{#SINGLETON}]'
              description: 'Total number of WAL records generated since last statistics reset.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.wal_records
              master_item:
                key: 'db.odbc.select[pgsql.wal.stats.above.14.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: wal
            - uuid: 4063086df37446868142c2d8fb614b46
              name: 'WAL statistics: Reset time'
              type: DEPENDENT
              key: 'pgsql.wal.stats.reset.above.14[{#SINGLETON}]'
              units: unixtime
              description: 'Timestamp of the last reset of WAL statistics.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.stats_reset
                - type: JAVASCRIPT
                  parameters:
                    - 'return Math.floor(new Date(value).getTime() / 1000);'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 7d
              master_item:
                key: 'db.odbc.select[pgsql.wal.stats.above.14.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: wal
          master_item:
            key: pgsql.version.validator
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: ebdb07934baa43279acd5384cde7f146
          name: 'Workload metrics discovery (v15–16)'
          type: DEPENDENT
          key: pgsql.workload.stats.above.15.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V15}'
                value: 'false'
              - macro: '{#BELOW_V17}'
                value: 'true'
          description: 'Discovers `query` metrics in PostgreSQL 15 and 16.'
          item_prototypes:
            - uuid: d6bca0d81a3b4dfd8e6d10970f475c53
              name: 'Workload: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.workload.snapshot.above.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                WITH
                    stats AS (
                        SELECT
                            SUM(calls) AS total_calls,
                            AVG(total_exec_time / NULLIF(calls, 0)) AS avg_exec_time_ms,
                            MAX(total_exec_time / NULLIF(calls, 0)) AS max_exec_time_ms,
                            SUM(temp_blks_written) AS temp_blks_written,
                            COALESCE(
                                SUM(rows) FILTER (
                                    WHERE
                                        query LIKE 'INSERT%'
                                ),
                                0
                            ) AS rows_inserted,
                            COALESCE(
                                SUM(rows) FILTER (
                                    WHERE
                                        query LIKE 'UPDATE%'
                                ),
                                0
                            ) AS rows_updated,
                            COALESCE(
                                SUM(rows) FILTER (
                                    WHERE
                                        query LIKE 'DELETE%'
                                ),
                                0
                            ) AS rows_deleted
                        FROM
                            pg_stat_statements
                    )
                SELECT
                    json_build_object (
                        'pgss_version',
                        (
                            SELECT
                                extversion
                            FROM
                                pg_extension
                            WHERE
                                extname = 'pg_stat_statements'
                            LIMIT
                                1
                        ),
                        'metrics',
                        json_build_object (
                            'total_calls',
                            (
                                SELECT
                                    total_calls
                                FROM
                                    stats
                            ),
                            'avg_exec_time_ms',
                            (
                                SELECT
                                    avg_exec_time_ms
                                FROM
                                    stats
                            ),
                            'max_exec_time_ms',
                            (
                                SELECT
                                    max_exec_time_ms
                                FROM
                                    stats
                            ),
                            'temp_blks_written',
                            (
                                SELECT
                                    temp_blks_written
                                FROM
                                    stats
                            ),
                            'rows_inserted',
                            (
                                SELECT
                                    rows_inserted
                                FROM
                                    stats
                            ),
                            'rows_updated',
                            (
                                SELECT
                                    rows_updated
                                FROM
                                    stats
                            ),
                            'rows_deleted',
                            (
                                SELECT
                                    rows_deleted
                                FROM
                                    stats
                            )
                        )
                    ) AS metrics;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: |
                Collects top queries from `pg_stat_statements`.
                IMPORTANT!
                Ensure `pg_stat_statements` is installed, add it to `shared_preload_libraries`, turn on `compute_query_id`, and set `pg_stat_statements.track` to `all`, so all queries are tracked.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
              tags:
                - tag: component
                  value: raw
            - uuid: 58ed40d4f4744e49b49c98968b85477c
              name: 'Workload: Average execution'
              type: DEPENDENT
              key: 'pgsql.workload.avg_exec_time.above.15[{#SINGLETON}]'
              value_type: FLOAT
              units: s
              description: 'Average query execution time from `pg_stat_statements`.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
