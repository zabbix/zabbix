        - uuid: 4bfb0c1697f043d9acf640b84cc8d945
          name: 'Build: Get data'
          type: ODBC
          key: 'db.odbc.select[pgsql.version.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          delay: 15m
          history: '0'
          value_type: CHAR
          params: |
            SELECT
              json_build_object (
                'pg_version',
                substring(
                  version ()
                  FROM
                    'PostgreSQL ([0-9.]+)'
                ),
                'package_info',
                substring(
                  version ()
                  FROM
                    '\(([^)]+)\)'
                ),
                'platform',
                substring(
                  version ()
                  FROM
                    'on ([^,]+)'
                ),
                'compiler',
                substring(
                  version ()
                  FROM
                    'compiled by ([^ ,]+)'
                ),
                'compiler_pkg',
                substring(
                  version ()
                  FROM
                    'compiled by [^(]+\(([^)]+)\)'
                ),
                'compiler_version',
                substring(
                  version ()
                  FROM
                    '\) ([0-9.]+),'
                ),
                'word_size',
                substring(
                  version ()
                  FROM
                    ', ([0-9]+-bit)$'
                )
              ) AS version_info;
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Retrieves PostgreSQL version and build details, including platform, compiler, and package information.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: class
              value: database
            - tag: component
              value: application
            - tag: component
              value: raw
        - uuid: 0b76450dd17d47a1829f51960dcb1374
          name: 'Build: Version (numeric)'
          type: ODBC
          key: 'db.odbc.select[pgsql.version.num,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          delay: 15m
          trends: '0'
          params: 'SELECT current_setting(''server_version_num'')'
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Reports the version number of the server as an integer.'
          preprocessing:
