        - uuid: 9f8a1bae3c264b50b768afde4e85e727
          name: 'Relation schema discovery'
          type: DEPENDENT
          key: pgsql.relation.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#SCHEMA.NAME}'
                value: '{$PG.LLD.FILTER.SCHEMA.MATCHES}'
              - macro: '{#SCHEMA.NAME}'
                value: '{$PG.LLD.FILTER.SCHEMA.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discovers all PostgreSQL schemas in the primary core database.'
          item_prototypes:
            - uuid: 6491a8e759cf494ea15446822b5fcf87
              name: 'Relation [{#SCHEMA.NAME}]: Size'
              type: DEPENDENT
              key: 'pgsql.relation.size[{#SCHEMA.NAME}]'
              units: B
              description: 'Total on-disk size of all relations in schema.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.name=="{#SCHEMA.NAME}")].total_bytes.first()'
              master_item:
                key: 'db.odbc.select[pgsql.relation.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
            - uuid: b7299ec8663d4f67829702630b1e209f
              name: 'Relation [{#SCHEMA.NAME}]: Count'
              type: DEPENDENT
              key: 'pgsql.relation.tables[{#SCHEMA.NAME}]'
              description: 'Number of tables in schema.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.name=="{#SCHEMA.NAME}")].table_count.first()'
              master_item:
                key: 'db.odbc.select[pgsql.relation.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          master_item:
            key: 'db.odbc.select[pgsql.relation.inventory.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          lld_macro_paths:
            - lld_macro: '{#SCHEMA.NAME}'
              path: $.name
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: d9c2e7a1b4f54c3eb2a1f8d123456789
          name: 'Replication slots metrics discovery (v15+)'
          type: DEPENDENT
          key: pgsql.replication.slots.above.15.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V15}'
                value: 'false'
          description: 'Discovers `replication slots` metrics in PostgreSQL 15 and above.'
          item_prototypes:
            - uuid: a95a0c68cc644d9695fef2a97a393a71
              name: 'Replication slots: Get slots'
              type: ODBC
              key: 'db.odbc.select[pgsql.replication.slots.above.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                SELECT
                  json_build_object (
                    'slots_total',
                    COUNT(*),
                    'slots_active',
                    COUNT(*) FILTER (
                      WHERE
                        active
                    ),
                    'slots_inactive',
                    COUNT(*) FILTER (
                      WHERE
                        NOT active
                    ),
                    'max_safe_wal_size',
                    COALESCE(MAX(safe_wal_size), 0),
                    'worst_slot_lag_bytes',
                    COALESCE(
                      MAX(
                        pg_wal_lsn_diff (pg_current_wal_lsn (), restart_lsn)
                      ),
                      0
                    ),
                    'inactive_retaining_slots',
                    COUNT(*) FILTER (
                      WHERE
                        NOT active
                        AND safe_wal_size > 0
                    )
                  )
                FROM
                  pg_catalog.pg_replication_slots;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: |
                Collects raw replication slot information from `pg_replication_slots`, including activity state, WAL retention, and slot type.
                IMPORTANT!
                Ensure logical replication is enabled: set `wal_level=logical`, `max_replication_slots` >= 1, `max_wal_senders` >= 1 in `postgresql.conf`.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
              tags:
                - tag: component
                  value: raw
            - uuid: b498ff6668b84228b6c35737ccc9f0bd
              name: 'Replication slots: Slots active'
              type: DEPENDENT
              key: 'pgsql.replication.slots.active.above.15[{#SINGLETON}]'
              description: 'Number of active replication slots.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.slots_active
              master_item:
                key: 'db.odbc.select[pgsql.replication.slots.above.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 4b1d06ac0ebf41edb053eb62d634a13d
              name: 'Replication slots: Slots inactive'
              type: DEPENDENT
              key: 'pgsql.replication.slots.inactive.above.15[{#SINGLETON}]'
              description: 'Number of inactive replication slots.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.slots_inactive
              master_item:
                key: 'db.odbc.select[pgsql.replication.slots.above.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 59e444729e60475385c1d3112ebc989f
              name: 'Replication slots: Slots retaining'
              type: DEPENDENT
              key: 'pgsql.replication.slots.inactive.retaining.above.15[{#SINGLETON}]'
              description: 'Number of inactive replication slots that are still retaining WAL.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.inactive_retaining_slots
              master_item:
                key: 'db.odbc.select[pgsql.replication.slots.above.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: replication
                - tag: component
                  value: wal
              trigger_prototypes:
                - uuid: 360a43a5b4344884adb970fd3b55b148
                  expression: 'min(/PostgreSQL by ODBC/pgsql.replication.slots.inactive.retaining.above.15[{#SINGLETON}],5m) >= {$PG.REPLICATION.SLOTS.RETAINING.AVG}'
