                - uuid: 844c22697f914f7baf1121d9e3a96035
                  expression: 'min(/PostgreSQL by ODBC/pgsql.tablespace.size[{#TABLESPACE.NAME}],5m) >= {$PG.TABLESPACE.SIZE.WARN:"{#TABLESPACE.NAME}"}'
                  name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size warning'
                  event_name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size >= `warn` state for 5m'
                  opdata: '{#TABLESPACE.NAME} current size: {ITEM.LASTVALUE1}'
                  priority: WARNING
