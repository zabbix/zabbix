              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
            - uuid: 5a5d84878d22478aa856228b4486b55d
              name: 'Bgwriter: Checkpoint sync per second'
              type: DEPENDENT
              key: 'pgsql.bgwriter.checkpoint_sync_time.rate.above_17[{#SINGLETON}]'
              value_type: FLOAT
              units: '!sync/s'
