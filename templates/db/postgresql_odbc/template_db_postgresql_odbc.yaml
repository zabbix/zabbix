            - uuid: 5cdcdd6b777b4ee79b835b69818f2a51
              name: 'Tablespace [{#TABLESPACE.NAME}]: Size'
              type: DEPENDENT
              key: 'pgsql.tablespace.size[{#TABLESPACE.NAME}]'
