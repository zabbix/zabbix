              tags:
                - tag: component
                  value: bgwriter
            - uuid: 70d6cea0481741d08a572e732b3e237d
              name: 'Bgwriter: Number of bgwriter cleaning scan stopped per second'
              type: DEPENDENT
              key: 'pgsql.bgwriter.maxwritten_clean.rate.above_17[{#SINGLETON}]'
              value_type: FLOAT
              units: '!stopped/s'
              description: 'Number of times the background writer stopped a cleaning scan because it had written too many buffers per second.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.maxwritten_clean
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
            - uuid: 90d7e8344b3e476caeb60a8d26d38118
              name: 'Bgwriter: Postmaster start time'
              type: DEPENDENT
              key: 'pgsql.bgwriter.postmaster_start_epoch.above_17[{#SINGLETON}]'
              units: unixtime
              description: 'The time when the postmaster was last started.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.postmaster_start_time
                - type: JAVASCRIPT
                  parameters:
                    - 'return Math.floor(new Date(value).getTime() / 1000);'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 7d
              master_item:
                key: 'db.odbc.select[pgsql.bgwriter.above_17.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: bgwriter
          master_item:
            key: pgsql.version.validator
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
