        - uuid: 8af13c6154744e9596a0f96dfbf09d8b
          name: 'Get WAL'
          type: ODBC
          key: 'db.odbc.select[pgsql.wal.stat.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          delay: 5m
          history: '0'
          value_type: TEXT
          params: |
            SELECT
              row_to_json (T)
            FROM
              (
                SELECT
                  CASE
                    WHEN pg_is_in_recovery () THEN 0
                    ELSE pg_wal_lsn_diff (pg_current_wal_lsn (), '0/00000000')
                  END AS WRITE,
                  CASE
                    WHEN NOT pg_is_in_recovery () THEN 0
                    ELSE pg_wal_lsn_diff (pg_last_wal_receive_lsn (), '0/00000000')
                  END AS RECEIVE,
                  count(*)
                FROM
                  pg_ls_waldir () AS COUNT
              ) T
          username: '{$PG.USER}'
          password: '{$PG.PASSWORD}'
          description: 'Collects write-ahead log (WAL) metrics.'
          tags:
            - tag: component
              value: raw
