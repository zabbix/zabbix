        - uuid: 692bcbf9a3c5485faa412501772fc76a
          name: 'Build: Version validator'
          type: DEPENDENT
          key: pgsql.version.validator
          history: '0'
          value_type: CHAR
          description: 'Validates the PostgreSQL version and sets version macros for LLDs.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var version_num = parseInt(value, 10);
                  
                  if (isNaN(version_num)) {
                    Zabbix.log(3, 'Error parsing PG version number: ' + value);
                    return JSON.stringify([]);
                  }
                  
                  var result = [{
                    '{#BELOW_V12}': 'false',
                    '{#BELOW_V13}': 'false',
                    '{#BELOW_V14}': 'false',
                    '{#BELOW_V15}': 'false',
                    '{#BELOW_V16}': 'false',
                    '{#BELOW_V17}': 'false',
                    '{#BELOW_V18}': 'false',
                    '{#SINGLETON}': ''
                  }];
                  
                  if (version_num < 120000) result[0]['{#BELOW_V12}'] = 'true';
                  if (version_num < 130000) result[0]['{#BELOW_V13}'] = 'true';
                  if (version_num < 140000) result[0]['{#BELOW_V14}'] = 'true';
                  if (version_num < 150000) result[0]['{#BELOW_V15}'] = 'true';
                  if (version_num < 160000) result[0]['{#BELOW_V16}'] = 'true';
                  if (version_num < 170000) result[0]['{#BELOW_V17}'] = 'true';
                  if (version_num < 180000) result[0]['{#BELOW_V18}'] = 'true';
                  
                  if (version_num < 100000) {
                    return JSON.stringify([]);
                  }
                  
                  return JSON.stringify(result);
          master_item:
            key: 'db.odbc.select[pgsql.version.num,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          tags:
            - tag: component
              value: global
            - tag: component
              value: validator
        - uuid: b5d80758332e473391d3834662b7355d
          name: 'Build: Word size'
          type: DEPENDENT
          key: pgsql.version.wordsize
          value_type: CHAR
          description: 'PostgreSQL word size (32-bit / 64-bit).'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.word_size
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          master_item:
            key: 'db.odbc.select[pgsql.version.get,,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
          tags:
