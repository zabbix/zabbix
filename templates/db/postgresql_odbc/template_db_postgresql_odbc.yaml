                - uuid: 09ffc55775e94265b2d969b2d6662f62
                  expression: 'min(/PostgreSQL by ODBC/pgsql.tablespace.size[{#TABLESPACE.NAME}],5m) >= {$PG.TABLESPACE.SIZE.AVG:"{#TABLESPACE.NAME}"}'
                  name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size average'
                  event_name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size >= `avg` state for 5m'
                  opdata: '{#TABLESPACE.NAME} current size: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'Tablespace `{#TABLESPACE.NAME}` size >= `{$PG.TABLESPACE.SIZE.AVG}` bytes.'
                  dependencies:
                    - name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size high'
                      expression: 'min(/PostgreSQL by ODBC/pgsql.tablespace.size[{#TABLESPACE.NAME}],5m) >= {$PG.TABLESPACE.SIZE.HIGH:"{#TABLESPACE.NAME}"}'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: b6d21f1b3f3c4e6c8e5232d199aae736
                  expression: 'min(/PostgreSQL by ODBC/pgsql.tablespace.size[{#TABLESPACE.NAME}],5m) >= {$PG.TABLESPACE.SIZE.HIGH:"{#TABLESPACE.NAME}"}'
                  name: 'PostgreSQL: Tablespace [{#TABLESPACE.NAME}]: Size high'
