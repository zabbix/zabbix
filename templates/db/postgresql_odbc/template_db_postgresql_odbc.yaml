        - uuid: 7c315d5963254d6d9fa2790b2bf010e1
          name: 'Replication slots metrics discovery (v12–14)'
          type: DEPENDENT
          key: pgsql.replication.slots.below_15.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V12}'
                value: 'false'
              - macro: '{#BELOW_V15}'
                value: 'true'
          description: 'Discovers `replication slots` metrics in PostgreSQL 12 to 14.'
          item_prototypes:
            - uuid: ecb1eb567e664bcf8330520e5d202c81
              name: 'Replication slots: Get slots'
              type: ODBC
              key: 'db.odbc.select[pgsql.replication.slots.below.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                SELECT
                    json_build_object (
                        'slots_total',
                        COUNT(*),
                        'slots_active',
                        SUM(
                            CASE
                                WHEN active THEN 1
                                ELSE 0
                            END
                        ),
                        'slots_inactive',
                        SUM(
                            CASE
                                WHEN NOT active THEN 1
                                ELSE 0
                            END
                        )
                    )
                FROM
                    pg_catalog.pg_replication_slots;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: |
                Collects raw replication slot information from `pg_replication_slots`, including activity state, WAL retention, and slot type.
                IMPORTANT!
                Ensure logical replication is enabled: set `wal_level=logical`, `max_replication_slots` >= 1, `max_wal_senders` >= 1 in `postgresql.conf`.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
              tags:
                - tag: component
                  value: raw
            - uuid: 41572b8051914eeda6f4587d210a958c
              name: 'Replication slots: Slots active'
              type: DEPENDENT
              key: 'pgsql.replication.slots.active.below.15[{#SINGLETON}]'
              description: 'Number of active replication slots.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.slots_active
              master_item:
                key: 'db.odbc.select[pgsql.replication.slots.below.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 691aad3920564c8fbc19ebd6d8ae908d
              name: 'Replication slots: Slots inactive'
              type: DEPENDENT
              key: 'pgsql.replication.slots.inactive.below.15[{#SINGLETON}]'
              description: 'Number of inactive replication slots.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.slots_inactive
              master_item:
                key: 'db.odbc.select[pgsql.replication.slots.below.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 09fca175ef874ef4bd6e4bc50795d283
              name: 'Replication slots: Slots total'
              type: DEPENDENT
              key: 'pgsql.replication.slots.total.below.15[{#SINGLETON}]'
              description: 'Total number of replication slots.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.slots_total
              master_item:
                key: 'db.odbc.select[pgsql.replication.slots.below.15.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: replication
          master_item:
            key: pgsql.version.validator
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: bdebb7e9e22f4c40a933cb6a5986142d
          name: 'SLRU metrics discovery (v13+)'
          type: DEPENDENT
          key: pgsql.slru.above_13.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BELOW_V13}'
                value: 'false'
          description: 'Discovers `SLRU` metrics in PostgreSQL 13 and above.'
          item_prototypes:
            - uuid: cd6e9bfc3cfb4ae891fef2a563b83c90
              name: 'SLRU: Get data'
              type: ODBC
              key: 'db.odbc.select[pgsql.stat.slru.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              history: '0'
              value_type: TEXT
              params: |
                SELECT
                  json_agg (
                    json_build_object (
                      'name',
                      name,
                      'blks_read',
                      blks_read,
                      'blks_hit',
                      blks_hit,
                      'stats_reset',
                      stats_reset
                    )
                  ) AS result
                FROM
                  pg_stat_slru;
              username: '{$PG.USER}'
              password: '{$PG.PASSWORD}'
              description: 'Collects SLRU (Simple Least Recently Used) cache statistics from `pg_stat_slru`.'
              tags:
                - tag: component
                  value: raw
            - uuid: 1b9a60bdb13d4c349def6c672ab07ce6
              name: 'SLRU: Blocks hit total'
              type: DEPENDENT
              key: 'pgsql.slru.blks_hit.total[{#SINGLETON}]'
              units: '!blocks'
              description: 'Total number of SLRU (Simple Least Recently Used) blocks found in cache (hits) since last statistics reset.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[*].blks_hit'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      return JSON.parse(value).reduce(function (sum, currentValue) {
                      	 return sum + currentValue;
                      });
              master_item:
                key: 'db.odbc.select[pgsql.stat.slru.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: slru
            - uuid: 4dd0008d1c4b41ca9889f6bdb628a140
              name: 'SLRU: Blocks read per second'
              type: DEPENDENT
              key: 'pgsql.slru.blks_read.rate[{#SINGLETON}]'
              value_type: FLOAT
              units: '!blocks/s'
              description: 'Rate of SLRU (Simple Least Recently Used) blocks read per second.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[*].blks_read'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      return JSON.parse(value).reduce(function (sum, currentValue) {
                      	 return sum + currentValue;
                      });
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'db.odbc.select[pgsql.stat.slru.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: slru
            - uuid: 0322297d89b140debc18bbca51c40dda
              name: 'SLRU: Blocks read total'
              type: DEPENDENT
              key: 'pgsql.slru.blks_read.total[{#SINGLETON}]'
              units: '!blocks'
              description: 'Total number of SLRU (Simple Least Recently Used) blocks read since last statistics reset.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[*].blks_read'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      return JSON.parse(value).reduce(function (sum, currentValue) {
                      	 return sum + currentValue;
                      });
              master_item:
                key: 'db.odbc.select[pgsql.stat.slru.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: slru
            - uuid: 8ad779685d794735b731016c4503e7ca
              name: 'SLRU: Buffer hit ratio'
              type: DEPENDENT
              key: 'pgsql.slru.hit.ratio[{#SINGLETON}]'
              value_type: FLOAT
              units: '%'
              description: |
                Percentage of SLRU (Simple Least Recently Used) blocks served from cache (hits / total blocks).
                Higher means better performance.
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var hits = 0;
                      var reads = 0;
                      for (var i = 0; i < data.length; i++) {
                        hits += parseInt(data[i].blks_hit);
                        reads += parseInt(data[i].blks_read);
                      }
                      if ((hits + reads) === 0) {
                        return 100;
                      }
                      return 100 * hits / (hits + reads);
              master_item:
                key: 'db.odbc.select[pgsql.stat.slru.get{#SINGLETON},,"Database={$PG.DATABASE};{$PG.CONNSTRING.ODBC}"]'
              tags:
                - tag: component
                  value: slru
              trigger_prototypes:
                - uuid: f1a4a4db8c4a4109a7a6851224289e29
                  expression: 'max(/PostgreSQL by ODBC/pgsql.slru.hit.ratio[{#SINGLETON}],5m) <= {$PG.SLRU.CACHE.AVG}'
                  name: 'PostgreSQL: SLRU: Buffer hit average'
                  event_name: 'PostgreSQL: SLRU buffer hit ratio <= {$PG.SLRU.CACHE.AVG}% for 5m'
                  opdata: 'Current hit ratio: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'SLRU buffer hit ratio <= `{$PG.SLRU.CACHE.AVG}`%. Moderate cache efficiency drop. Investigate I/O patterns and autovacuum activity.'
                  dependencies:
                    - name: 'PostgreSQL: SLRU: Buffer hit high'
                      expression: 'max(/PostgreSQL by ODBC/pgsql.slru.hit.ratio[{#SINGLETON}],5m) <= {$PG.SLRU.CACHE.HIGH}'
                  tags:
                    - tag: scope
                      value: performance
                - uuid: 6c60c6ac8f8740c4aa85b076546762cd
                  expression: 'max(/PostgreSQL by ODBC/pgsql.slru.hit.ratio[{#SINGLETON}],5m) <= {$PG.SLRU.CACHE.HIGH}'
                  name: 'PostgreSQL: SLRU: Buffer hit high'
                  event_name: 'PostgreSQL: SLRU buffer hit ratio <= {$PG.SLRU.CACHE.HIGH}% for 5m'
                  opdata: 'Current hit ratio: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'SLRU buffer hit ratio <= `{$PG.SLRU.CACHE.HIGH}`%. Critical cache inefficiency. High I/O load expected. Investigate disk usage and hot transactions immediately.'
                  tags:
                    - tag: scope
                      value: performance
                - uuid: b36a370015f04544aacf8efa84959103
                  expression: 'max(/PostgreSQL by ODBC/pgsql.slru.hit.ratio[{#SINGLETON}],5m) <= {$PG.SLRU.CACHE.WARN}'
                  name: 'PostgreSQL: SLRU: Buffer hit warning'
                  event_name: 'PostgreSQL: SLRU buffer hit ratio <= {$PG.SLRU.CACHE.WARN}% for 5m'
                  opdata: 'Current hit ratio: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'SLRU buffer hit ratio <= `{$PG.SLRU.CACHE.WARN}`%. Slightly below optimal. Monitor I/O and queries.'
                  dependencies:
                    - name: 'PostgreSQL: SLRU: Buffer hit average'
                      expression: 'max(/PostgreSQL by ODBC/pgsql.slru.hit.ratio[{#SINGLETON}],5m) <= {$PG.SLRU.CACHE.AVG}'
                  tags:
                    - tag: scope
                      value: performance
          master_item:
            key: pgsql.version.validator
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: 2faf2300c0a8442cb67b1984428dbb90
          name: 'Subscription stats metrics discovery'
          type: DEPENDENT
          key: pgsql.subscription.discover
          filter:
            evaltype: AND
