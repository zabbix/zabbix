          name: 'Aria pagecache hit rate'
          type: CALCULATED
          key: mariadb.aria_pagecache_hit_rate
          value_type: FLOAT
          units: '%'
          params: |
            100 - ( last(//mariadb.aria_pagecache_reads) / 
            ( last(//mariadb.aria_pagecache_read_requests) + 
            ( last(//mariadb.aria_pagecache_read_requests) = 0 ) ) * 100 * 
            ( last(//mariadb.aria_pagecache_read_requests) > 0 ) )
          description: 'Percentage of Aria pagecache read requests served from cache (higher means fewer disk reads).'
