        - uuid: 71546cb00e664e12801b3ecfcc8f628b
          name: 'Full table scan ratio'
          type: CALCULATED
          key: mariadb.full_scans.ratio
          value_type: FLOAT
          params: |
            last(//mariadb.select_scan.rate) / 
            ( last(//mariadb.com_select.rate) + 
            ( last(//mariadb.com_select.rate) = 0 ) ) * 
            ( last(//mariadb.com_select.rate) > 0 )
          description: 'The ratio of `SELECT` statements executed as full table scans to all `SELECT` statements.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: operations
