  triggers:
    - uuid: 254756ed1bcb4ae3b342d34b86e1b6fc
      expression: 'max(/MySQL by Zabbix agent active/mysql.buffer_pool_utilization,5m)<{$MYSQL.BUFF_UTIL.MIN.WARN} and last(/MySQL by Zabbix agent active/mysql.uptime)>3600'
      name: 'MySQL: Buffer pool utilization is too low'
      event_name: 'MySQL: Buffer pool utilization is too low (less than {$MYSQL.BUFF_UTIL.MIN.WARN}% for 5m)'
      priority: WARNING
      description: 'The buffer pool utilization has been less than `{$MYSQL.BUFF_UTIL.MIN.WARN}`% in the last 5 minutes with server uptime over 1 hour. This means that there is a lot of unused RAM allocated for the buffer pool, which you can easily reallocate at the moment.'
      tags:
        - tag: scope
          value: notice
    - uuid: 7305e6955c754c4ab400fef9f0dd876e
      expression: 'avg(/MySQL by Zabbix agent active/mysql.full_scans.ratio,5m)>{$MYSQL.FULLSCAN.RATIO.WARN} and avg(/MySQL by Zabbix agent active/mysql.com_select.rate,5m)>{$MYSQL.FULLSCAN.SELECT_RATE.MIN.WARN}'
      name: 'MySQL: High rate of full table scans'
      event_name: 'MySQL: High rate of full table scans (over {$MYSQL.FULLSCAN.RATIO.WARN} for 5m)'
      priority: WARNING
      description: 'The rate of `SELECT` statements exceeds `{$MYSQL.FULLSCAN.SELECT_RATE.MIN.WARN}` per second and the full table scan ratio has been above `{$MYSQL.FULLSCAN.RATIO.WARN}` for the last 5 minutes.'
      tags:
        - tag: scope
          value: performance
