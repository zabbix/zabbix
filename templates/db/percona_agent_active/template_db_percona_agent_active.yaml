        - uuid: ebfd6362f7e54c729ac24f51dd44ee47
          name: 'InnoDB scan efficiency'
          type: CALCULATED
          key: percona.innodb_scan.efficiency
          value_type: FLOAT
          units: '%'
          params: |
            100 - ( last(//percona.innodb_scan_pages_disjointed.rate) / 
            ( last(//percona.innodb_total_scans.rate) + 
            ( last(//percona.innodb_total_scans.rate) = 0 ) ) * 100 )
          description: 'Percentage of efficiently scanned pages, where lower values may indicate increased InnoDB fragmentation.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
