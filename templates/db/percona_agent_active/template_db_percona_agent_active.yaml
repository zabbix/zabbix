                      expression: '(last(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT}'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: 16fc8415768f410c8efecbc247150717
                  expression: '(last(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT}'
