            - uuid: bfa837816eee444396c9f9fd5c0532b2
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Get data'
              type: ZABBIX_ACTIVE
              key: 'percona.tabledata["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
