              priority: WARNING
              description: 'Free table space is high (fragmentation warning).'
              dependencies:
                - name: 'Percona: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
                  expression: 'last(/Percona by Zabbix agent active/percona.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.FRAGMENTATION.CRIT} and last(/Percona by Zabbix agent active/percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.DATA_FREE.MIN.CRIT} and last(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.TABLE_SIZE.MIN.CRIT}'
              tags:
                - tag: scope
                  value: performance
            - uuid: 79b2f2feea7e4c5d9d2f1e6a402cd7ee
              expression: 'last(/Percona by Zabbix agent active/percona.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.FRAGMENTATION.CRIT} and last(/Percona by Zabbix agent active/percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.DATA_FREE.MIN.CRIT} and last(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.TABLE_SIZE.MIN.CRIT}'
              name: 'Percona: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
              event_name: 'Percona: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high (fragmentation critical)'
              priority: HIGH
