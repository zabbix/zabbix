        - uuid: d3ebddfaa82446b1bbb7da6930f0f552
          name: 'Slow queries per second'
          type: DEPENDENT
          key: percona.slow_queries.rate
          value_type: FLOAT
          description: 'Number of queries that have taken more than `long_query_time` seconds.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Slow_queries'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: queries
          triggers:
            - uuid: bafb2509af964d4289a523d43c518740
              expression: 'min(/Percona by Zabbix agent active/percona.slow_queries.rate,5m)>{$PERCONA.SLOW_QUERIES.MAX.WARN}'
              name: 'Percona: Server has slow queries'
              event_name: 'Percona: Server has slow queries (over {$PERCONA.SLOW_QUERIES.MAX.WARN} for 5m)'
              priority: WARNING
              description: 'The number of slow queries has been more than `{$PERCONA.SLOW_QUERIES.MAX.WARN}` in the last 5 minutes.'
              tags:
                - tag: scope
                  value: performance
        - uuid: 6f4c116cd1db4ffd8b3c0d08a1f92028
          name: 'Threads cached'
          type: DEPENDENT
          key: percona.threads_cached
          description: 'Number of threads in the thread cache.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_cached'']/field[@name=''Value'']/text()'
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 1dc6d6d122304bc88e455d5417a1dea7
          name: 'Threads connected'
          type: DEPENDENT
          key: percona.threads_connected
          description: 'Number of currently open connections.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_connected'']/field[@name=''Value'']/text()'
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 24affdfd14d1454f918aa2aaad1b673d
          name: 'Threads created per second'
          type: DEPENDENT
          key: percona.threads_created.rate
          value_type: FLOAT
          description: 'Number of threads created to handle connections. If the value of `Threads_created` is large, you may want to increase the `thread_cache_size` value. The cache miss rate can be calculated as `Threads_created`/`Connections`.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_created'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: c113f85c6ae6495a9f6b64fa1ed8fc5c
          name: 'Threads running'
          type: DEPENDENT
          key: percona.threads_running
          description: 'Number of threads that are not sleeping.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_running'']/field[@name=''Value'']/text()'
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 815432d06fb24fa489332b74a8f76894
          name: Uptime
          type: DEPENDENT
          key: percona.uptime
          units: uptime
          description: 'Number of seconds that the server has been up.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Uptime'']/field[@name=''Value'']/text()'
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: 82f8212df8e04dacbccf5fde32607f15
              expression: 'nodata(/Percona by Zabbix agent active/percona.uptime,30m)=1'
              name: 'Percona: Failed to fetch data'
              event_name: 'Percona: Failed to fetch data (or no data for 30m)'
              priority: INFO
              description: 'Zabbix has not received any data for the last 30 minutes.'
              dependencies:
                - name: 'Percona: Service is unreachable'
                  expression: 'last(/Percona by Zabbix agent active/percona.ping["{$PERCONA.HOST}","{$PERCONA.PORT}"])=0'
              tags:
                - tag: scope
                  value: availability
            - uuid: de74fed5aea14a64a4644b7b6c81581e
              expression: 'last(/Percona by Zabbix agent active/percona.uptime)<10m'
              name: 'Percona: Service has been restarted'
              event_name: 'Percona: Service has been restarted (uptime < 10m)'
              priority: INFO
              description: 'Percona uptime is less than 10 minutes.'
              tags:
                - tag: scope
                  value: notice
        - uuid: a669969734f04451bbcc95378491187a
          name: Version
          type: ZABBIX_ACTIVE
          key: 'percona.version["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          delay: 15m
          value_type: CHAR
          description: 'Percona server version.'
          preprocessing:
            - type: REGEX
              parameters:
                - '(Server version)\s+(.+)'
                - \2
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: 11e24f3285074119962e313ec791993a
              expression: 'last(/Percona by Zabbix agent active/percona.version["{$PERCONA.HOST}","{$PERCONA.PORT}"],#1)<>last(/Percona by Zabbix agent active/percona.version["{$PERCONA.HOST}","{$PERCONA.PORT}"],#2) and length(last(/Percona by Zabbix agent active/percona.version["{$PERCONA.HOST}","{$PERCONA.PORT}"]))>0'
              name: 'Percona: Version has changed'
              event_name: 'Percona: Version has changed (new version value received: {ITEM.VALUE})'
              priority: INFO
              description: 'The Percona version has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
      discovery_rules:
        - uuid: 84c59d373afd4683a1e5b5a8c62d88ca
          name: 'Database discovery'
          type: ZABBIX_ACTIVE
          key: 'percona.db.discovery["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#DBNAME}'
                value: '{$PERCONA.DBNAME.MATCHES}'
              - macro: '{#DBNAME}'
                value: '{$PERCONA.DBNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of databases.'
          item_prototypes:
            - uuid: 349acee36dde49c5997ce5ef2992fbdb
              name: 'Database [{#DBNAME}]: Size'
              type: ZABBIX_ACTIVE
              key: 'percona.dbsize["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}"]'
              delay: 5m
              units: B
              description: 'Database size.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: storage
                - tag: database
                  value: '{#DBNAME}'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(value.split('\n').filter(function (name) {
                  	return name.trim() !== '';
                  }).map(function (name) {
                  	return ({'{#DBNAME}': name});
                  }));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: b3bbd51dc8d748db9172139ee58db792
          name: 'Replication discovery'
          type: ZABBIX_ACTIVE
          key: 'percona.replication.discovery["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          delay: 1h
          description: 'Discovery of the replication.'
          item_prototypes:
            - uuid: 8c981a2dade441d4afab5f7e3f02bfca
              name: 'Replication: Seconds behind source {#MASTER_HOST}'
              type: DEPENDENT
              key: 'percona.seconds_behind_master["{#MASTER_HOST}"]'
              units: s
              description: |
                The number of seconds the replica SQL thread has been behind processing the source binary log.
                A high number (or an increasing one) can indicate that the replica is unable to handle events
                from the source in a timely fashion.
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Seconds_Behind_Master'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
                - type: MATCHES_REGEX
                  parameters:
                    - \d+
                  error_handler: CUSTOM_ERROR
                  error_handler_params: 'Replication is not performed.'
              master_item:
                key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: ea76ce2289ec4f3598db5614415f467d
                  expression: 'min(/Percona by Zabbix agent active/percona.seconds_behind_master["{#MASTER_HOST}"],5m)>{$PERCONA.REPL_LAG.MAX.WARN}'
                  name: 'Percona: Replication lag is too high'
                  event_name: 'Percona: Replication lag is too high (over {$PERCONA.REPL_LAG.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Replication delay is too long.'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 71215e01aea5467a81554162bf06300d
              name: 'Replication: Last IO error {#MASTER_HOST}'
              type: DEPENDENT
              key: 'percona.slave_io_error["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Describes the last I/O error message reported by the replica I/O thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Last_IO_Error'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 5a2a0d7efa194a159e051d0db8da2807
              name: 'Replication: Replica IO running {#MASTER_HOST}'
              type: DEPENDENT
              key: 'percona.slave_io_running["{#MASTER_HOST}"]'
              description: |
                Indicates whether the I/O thread for reading the source's binary log is running.
                Normally, you want this to be `Yes` unless you have not yet started a replication or have
                explicitly stopped it with `STOP REPLICA`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_IO_Running'']/text()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Yes: 1,
                        No: 2,
                        Connecting: 3
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: cf531d988643466681c0f38bd9fb4c39
                  expression: 'last(/Percona by Zabbix agent active/percona.slave_io_running["{#MASTER_HOST}"])<>1'
                  name: 'Percona: The replica I/O thread is not connected to a replication source'
                  priority: WARNING
                  description: 'Indicates whether the replica I/O thread is connected to the source.'
                  dependencies:
                    - name: 'Percona: The replica I/O thread is not running'
                      expression: 'last(/Percona by Zabbix agent active/percona.slave_io_running["{#MASTER_HOST}"])=2'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: 37e84ffa413d49d687e4460fd4f51651
                  expression: 'last(/Percona by Zabbix agent active/percona.slave_io_running["{#MASTER_HOST}"])=2'
                  name: 'Percona: The replica I/O thread is not running'
                  priority: AVERAGE
                  description: 'Indicates whether the I/O thread for reading the source''s binary log is running.'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: d7db7db008e14e7b8d54ccb33e03ebaf
              name: 'Replication: Last SQL error {#MASTER_HOST}'
              type: DEPENDENT
              key: 'percona.slave_sql_error["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Describes the last SQL error message reported by the replica SQL thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Last_SQL_Error'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: d0825e7e97244164ba9438fa39a1c0a1
              name: 'Replication: Replica SQL running {#MASTER_HOST}'
              type: DEPENDENT
              key: 'percona.slave_sql_running["{#MASTER_HOST}"]'
              description: |
                Indicates whether the SQL thread for executing events in the relay log is running.
                As with the I/O thread, this should normally be `Yes`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_SQL_Running'']/text()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Yes: 1,
                        No: 2,
                        Connecting: 3
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: 74272e069e1e485f8fc5b053f7f85af8
                  expression: 'last(/Percona by Zabbix agent active/percona.slave_sql_running["{#MASTER_HOST}"])=2'
                  name: 'Percona: The SQL thread is not running'
                  priority: WARNING
                  description: 'Indicates whether the SQL thread for executing events in the relay log is running.'
                  dependencies:
                    - name: 'Percona: The replica I/O thread is not running'
                      expression: 'last(/Percona by Zabbix agent active/percona.slave_io_running["{#MASTER_HOST}"])=2'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 0154611c3afd4031afdd77897a0fefe2
              name: 'Replication: Replica SQL running state {#MASTER_HOST}'
              type: DEPENDENT
              key: 'percona.slave_sql_running_state["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Shows the state of the SQL thread.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_SQL_Running_State'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: a5dc7cc2361f4873a63ed285e6b36e7c
              name: 'Replication: Replica status {#MASTER_HOST}'
              type: ZABBIX_ACTIVE
              key: 'percona.slave_status["{$PERCONA.HOST}","{$PERCONA.PORT}","{#SQL_STATEMENT}"]'
              history: '0'
              value_type: TEXT
              description: 'Gets status information on the essential parameters of the replica threads.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value.indexOf('Source_Host') !== -1) {
                      	value = value.replace(/Source/g, 'Master');
                      	value = value.replace(/Replica_/g, 'Slave_');
                      }
                      
                      return value;
              tags:
                - tag: component
                  value: raw
          lld_macro_paths:
            - lld_macro: '{#MASTER_HOST}'
              path: $.master_host
            - lld_macro: '{#SQL_STATEMENT}'
              path: $.statement
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  if (value.length === 0) {
                  	return '[]';
                  }
                  
                  try {
                  	var matches = value.match(/statement="show (slave|replica) status[\s\S]*(?:Master|Source)_Host[^>]*>([^<]+)</);
                  
                  	if (matches && matches[1] && matches[2]) {
                  		return JSON.stringify([{
                  			statement: matches[1],
                  			master_host: matches[2].trim()
                  		}]);
                  	}
                  
                  	return '[]';
                  }
                  catch (e) {
                  	Zabbix.log(4, '[ Percona by Zabbix agent ] ERROR: ' + e.message);
                  	return '[]';
                  }
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: 0c45bae3395c44ff853f45e5275f0b0e
          name: 'Database [{#DBNAME}]: Table discovery'
          type: ZABBIX_ACTIVE
          key: 'percona.table.discovery["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}"]'
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#TABLE_NAME}'
                value: '{$PERCONA.TABLE.NAMES.MATCHES:"{#DBNAME}"}'
              - macro: '{#TABLE_NAME}'
                value: '{$PERCONA.TABLE.NAMES.NOT_MATCHES:"{#DBNAME}"}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of tables of the databases.'
          item_prototypes:
            - uuid: 034bb533ffe34ef1afd146f93fcb1afc
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Data free'
              type: DEPENDENT
              key: 'percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The amount of unused but allocated space.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''DATA_FREE'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.tabledata["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: caa13597c3b94e669e3287e5365fe519
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Data length'
              type: DEPENDENT
              key: 'percona.table.data_length["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The size of the data in the table.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''DATA_LENGTH'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.tabledata["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 1ea38d4d92294fdaad0fd95c515ee29e
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Free ratio'
              type: CALCULATED
              key: 'percona.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]'
              value_type: FLOAT
              params: 'last(//percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) / last(//percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"])'
              description: |
                The fraction of allocated table space that is currently unused (`DATA_FREE` / (`DATA_LENGTH` + `INDEX_LENGTH`)).
                High values indicate potential table fragmentation or inefficient space usage.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: a8cdf0194a494fe893a58917ba0ce653
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Index length'
              type: DEPENDENT
              key: 'percona.table.index_length["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The size occupied by the table''s indexes.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''INDEX_LENGTH'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.tabledata["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: ba2bbb39e4e44ec58c1211bc1729a80d
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Rows'
              type: DEPENDENT
              key: 'percona.table.rows["{#DBNAME}","{#TABLE_NAME}"]'
              units: '!rows'
              description: 'The approximate number of rows in the table. For InnoDB, the `TABLE_ROWS` value is approximate and may differ from the actual count.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''TABLE_ROWS'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.tabledata["{$PERCONA.HOST}","{$PERCONA.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: f8dd2aef863149d8bcf69fc30bd5516c
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Total size'
              type: CALCULATED
              key: 'percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              params: 'last(//percona.table.data_length["{#DBNAME}","{#TABLE_NAME}"]) + last(//percona.table.index_length["{#DBNAME}","{#TABLE_NAME}"])'
              description: 'The sum of `DATA_LENGTH` and `INDEX_LENGTH` represents the total size of the table.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
              trigger_prototypes:
                - uuid: 387462eddbbb447cb517bfdd27038435
