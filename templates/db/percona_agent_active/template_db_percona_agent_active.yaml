              expression: 'last(/Percona by Zabbix agent active/percona.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.FRAGMENTATION.WARN} and last(/Percona by Zabbix agent active/percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.DATA_FREE.MIN.WARN} and last(/Percona by Zabbix agent active/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.TABLE_SIZE.MIN.WARN}'
              name: 'Percona: Table [{#DBNAME}/{#TABLE_NAME}]: Free space high'
