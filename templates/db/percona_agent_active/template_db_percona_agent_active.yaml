                - tag: scope
                  value: performance
          parent_discovery_rule:
            key: 'percona.db.discovery["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(value.split('\n').filter(function (name) {
                  	return name.trim() !== '';
                  }).map(function (name) {
                  	return ({'{#TABLE_NAME}': name});
                  }));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: c297b5f304bd419b97b3df9c95849f53
          name: 'Thread pool metric discovery'
          type: DEPENDENT
          key: percona.threadpool.enable.discovery
          description: |
            The discovery of additional thread pool metrics when `thread_handling='pool-of-threads'`.
            [Learn more](https://docs.percona.com/percona-server/8.4/threadpool.html).
          item_prototypes:
            - uuid: a650db9ffe254323996854ceeb152b32
              name: 'Thread pool idle threads'
              type: DEPENDENT
              key: 'percona.threadpool_idle_threads[{#SINGLETON}]'
              description: 'Number of idle threads in the pool.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row[field/text()=''Threadpool_idle_threads'']/field[@name=''Value'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
              tags:
                - tag: component
                  value: threads
            - uuid: 4af382e4e6924f1a80957538b09d5343
              name: 'Thread pool threads'
              type: DEPENDENT
              key: 'percona.threadpool_threads[{#SINGLETON}]'
              description: 'Number of threads in the pool.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row[field/text()=''Threadpool_threads'']/field[@name=''Value'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
              tags:
                - tag: component
                  value: threads
            - uuid: 00d0f78718f34bb59e09f0e02acef321
              name: 'Thread pool idle ratio'
              type: CALCULATED
              key: 'percona.thread_pool_idle_ratio[{#SINGLETON}]'
              value_type: FLOAT
              units: '%'
              params: '100 * last(//percona.threadpool_idle_threads[{#SINGLETON}]) / last(//percona.threadpool_threads[{#SINGLETON}])'
              description: 'Percentage of thread pool worker threads that are currently idle.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: threads
            - uuid: f6d35ec4177743a292f5f5586dce4c72
              name: 'Thread pool max threads'
              type: DEPENDENT
              key: 'percona.thread_pool_max_threads[{#SINGLETON}]'
              description: 'The maximum number of threads in the pool.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row[field/text()=''thread_pool_max_threads'']/field[@name=''Value'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.get_global_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
              tags:
                - tag: component
                  value: threads
            - uuid: d0e341cf89c4403f9701492fa4b9c801
              name: 'Thread pool stall limit'
              type: DEPENDENT
              key: 'percona.thread_pool_stall_limit[{#SINGLETON}]'
              value_type: FLOAT
              units: s
              description: 'Amount of time before a running thread is considered stalled.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row[field/text()=''thread_pool_stall_limit'']/field[@name=''Value'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '0.001'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'percona.get_global_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
              tags:
                - tag: component
                  value: threads
            - uuid: dea74dd5e66847859a27446b6c6f564e
              name: 'Thread pool utilization'
              type: CALCULATED
              key: 'percona.thread_pool_utilization[{#SINGLETON}]'
              value_type: FLOAT
              units: '%'
              params: '100 * ( last(//percona.threadpool_threads[{#SINGLETON}]) - last(//percona.threadpool_idle_threads[{#SINGLETON}]) ) / last(//percona.thread_pool_max_threads[{#SINGLETON}])'
              description: 'Percentage of the configured thread pool capacity currently in use.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: threads
          trigger_prototypes:
            - uuid: a52c9c0e2dba45a4a6c824769ac43b12
              expression: 'max(/Percona by Zabbix agent active/percona.thread_pool_idle_ratio[{#SINGLETON}],5m)<{$PERCONA.THREADPOOL.IDLE_RATIO.MIN.WARN} and last(/Percona by Zabbix agent active/percona.threadpool_threads[{#SINGLETON}])>0'
              name: 'Percona: Thread pool idle ratio is too low'
              event_name: 'Percona: Thread pool idle ratio is too low (less than {$PERCONA.THREADPOOL.IDLE_RATIO.MIN.WARN} for 5m)'
              priority: WARNING
              description: 'Thread pool idle ratio has been less than `{$PERCONA.THREADPOOL.IDLE_RATIO.MIN.WARN}`% in the last 5 minutes.'
              tags:
                - tag: scope
                  value: capacity
            - uuid: be0df6cf564d4c09af8d8e9f9c2900ea
              expression: 'last(/Percona by Zabbix agent active/percona.threadpool_threads[{#SINGLETON}])>=last(/Percona by Zabbix agent active/percona.thread_pool_max_threads[{#SINGLETON}]) and last(/Percona by Zabbix agent active/percona.thread_pool_max_threads[{#SINGLETON}])>0'
              name: 'Percona: Thread pool max threads reached'
              priority: HIGH
              description: 'Thread pool has reached the configured max thread limit.'
              tags:
                - tag: scope
                  value: availability
            - uuid: 07b96113c7c14356a8175451c39c2c23
              expression: 'min(/Percona by Zabbix agent active/percona.thread_pool_utilization[{#SINGLETON}],5m)>{$PERCONA.THREADPOOL.UTILIZATION.MAX.WARN} and last(/Percona by Zabbix agent active/percona.thread_pool_max_threads[{#SINGLETON}])>0'
              name: 'Percona: Thread pool utilization is too high'
              event_name: 'Percona: Thread pool utilization is too high (over {$PERCONA.THREADPOOL.UTILIZATION.MAX.WARN} for 5m)'
              priority: WARNING
              description: 'Thread pool utilization has been above `{$PERCONA.THREADPOOL.UTILIZATION.MAX.WARN}`% in the last 5 minutes.'
              tags:
                - tag: scope
                  value: capacity
          master_item:
            key: 'percona.get_global_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''thread_handling'']/field[@name=''Value'']/text()'
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(
                    value === 'pool-of-threads' ? [{'{#SINGLETON}': ''}] : []
                  );
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 3h
