        - uuid: 901544b68b8b4b8a96e19b59a72aba46
          name: 'InnoDB buffer pool wait free'
          type: DEPENDENT
          key: percona.innodb_buffer_pool_wait_free
          value_type: FLOAT
          description: |
            Number of times InnoDB waited for a free page before reading or creating a page.
            Normally, writes to the InnoDB buffer pool happen in the background.
            When no clean pages are available, dirty pages are flushed first
            in order to free some up. This counts the number of waits for this operation
            to finish. If this value is not small, consider increasing `innodb_buffer_pool_size`.
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Innodb_buffer_pool_wait_free'']/field[@name=''Value'']/text()'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: innodb
            - tag: component
              value: memory
        - uuid: 8b3fc0641dd54befbebdad604636f8fb
          name: 'InnoDB buffer pool wait free per second'
          type: DEPENDENT
          key: percona.innodb_buffer_pool_wait_free.rate
          value_type: FLOAT
          description: |
            Number of times per second InnoDB waited for a free page before reading or creating a page.
            Non-zero values indicate the buffer pool is too small; increase `innodb_buffer_pool_size`.
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Innodb_buffer_pool_wait_free'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: innodb
            - tag: component
              value: memory
        - uuid: fc75ec111605455fa1d75f9db82cea63
          name: 'Calculated value of innodb_log_file_size'
          type: CALCULATED
          key: percona.innodb_log_file_size
          value_type: FLOAT
          params: '(last(//percona.innodb_os_log_written) - last(//percona.innodb_os_log_written,#1:now-1h)) / {$PERCONA.INNODB_LOG_FILES}'
          description: '`Innodb_log_file_size` is calculated as: (`innodb_os_log_written`-`innodb_os_log_written`(time shift -1h))/`{$PERCONA.INNODB_LOG_FILES}`. `Innodb_log_file_size` is the size in bytes of each InnoDB redo log file in the log group. The combined size can be no more than 512 GB. Larger values mean less disk I/O due to less flushing checkpoint activity, but also slower recovery from a crash.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
        - uuid: 9396147c0b614e2788b0e3250ec60201
          name: 'InnoDB log waits per second'
          type: DEPENDENT
          key: percona.innodb_log_waits.rate
          value_type: FLOAT
          description: |
            Number of InnoDB log waits per second. An increase in this per-second value
            indicates that threads are increasingly waiting for redo log writes, which typically
            points to disk subsystem performance issues or an `innodb_log_file_size` that is too small.
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Innodb_log_waits'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: 'percona.get_status_variables["{$PERCONA.HOST}","{$PERCONA.PORT}"]'
          tags:
            - tag: component
              value: innodb
            - tag: component
              value: system
        - uuid: fcd3d1faec9946e89df7fa3b14dd74d4
          name: 'InnoDB number open files'
