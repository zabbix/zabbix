        - uuid: ad834ad584224d45ba6e9b03d60179e5
          name: 'Buffer pool efficiency'
          type: CALCULATED
          key: percona.buffer_pool_efficiency
          value_type: FLOAT
          units: '%'
          params: |
            100 - (last(//percona.innodb_buffer_pool_reads) / 
            ( last(//percona.innodb_buffer_pool_read_requests) + 
            ( last(//percona.innodb_buffer_pool_read_requests) = 0 ) ) * 100 * 
            ( last(//percona.innodb_buffer_pool_read_requests) > 0 ))
          description: 'Shows how effectively the buffer pool is serving reads.'
          tags:
            - tag: component
              value: memory
        - uuid: f63cf6e2a1494311bcb26a942fae0176
          name: 'Buffer pool utilization'
          type: CALCULATED
          key: percona.buffer_pool_utilization
          value_type: FLOAT
          units: '%'
          params: |
            ( last(//percona.innodb_buffer_pool_pages_total) - 
            last(//percona.innodb_buffer_pool_pages_free) ) / 
            ( last(//percona.innodb_buffer_pool_pages_total) + 
            ( last(//percona.innodb_buffer_pool_pages_total) = 0 ) ) * 100 * 
            ( last(//percona.innodb_buffer_pool_pages_total) > 0 )
          description: 'Ratio of used to total pages in the buffer pool.'
          tags:
            - tag: component
              value: memory
