          key: mariadb.open_table_definitions
          value_type: FLOAT
          description: 'Number of cached table definitions.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Open_table_definitions'']/field[@name=''Value'']/text()'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: tables
        - uuid: c28c32b34b9b4ae980af88180d7044e6
          name: Status
          key: 'mariadb.ping["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          description: 'MariaDB server status.'
          valuemap:
            name: 'Service state'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - 'return value.indexOf(''is alive'') !== -1 ? 1 : 0;'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          tags:
            - tag: component
              value: application
            - tag: component
              value: health
          triggers:
            - uuid: 6c6eebaa77304bb6a63bb7531d99432b
              expression: 'last(/MariaDB by Zabbix agent/mariadb.ping["{$MARIADB.HOST}","{$MARIADB.PORT}"])=0'
              name: 'MariaDB: Service is unreachable'
              priority: HIGH
              description: 'MariaDB is unreachable.'
              tags:
                - tag: scope
                  value: availability
        - uuid: b0752cd46d9846e68ee440d07e1e7a21
          name: 'Queries per second'
          type: DEPENDENT
          key: mariadb.queries.rate
          value_type: FLOAT
          description: 'Number of statements executed by the server. This variable includes statements executed within stored programs, unlike the `Questions` variable.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Queries'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: queries
        - uuid: fa761a5617484660a82614038b84df4d
          name: 'Questions per second'
          type: DEPENDENT
          key: mariadb.questions.rate
          value_type: FLOAT
          description: 'Number of statements executed by the server. This includes only statements sent to the server by clients and not statements executed within stored programs, unlike the `Queries` variable.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Questions'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: queries
        - uuid: 496717e6c3204008844df3ed5f831616
          name: 'Select scan per second'
          type: DEPENDENT
          key: mariadb.select_scan.rate
          value_type: FLOAT
          description: 'The number of `SELECT` queries that required a full table scan. A high value indicates a lack of or improper use of indexes.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Select_scan'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: operations
        - uuid: de4daed65f76487cad6af188215dbf5c
          name: 'Slow queries per second'
          type: DEPENDENT
          key: mariadb.slow_queries.rate
          value_type: FLOAT
          description: 'Number of queries that have taken more than `long_query_time` seconds.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Slow_queries'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: queries
          triggers:
            - uuid: 251503a3791444789866b6bbf5ad249f
              expression: 'min(/MariaDB by Zabbix agent/mariadb.slow_queries.rate,5m)>{$MARIADB.SLOW_QUERIES.MAX.WARN}'
              name: 'MariaDB: Server has slow queries'
              event_name: 'MariaDB: Server has slow queries (over {$MARIADB.SLOW_QUERIES.MAX.WARN} for 5m)'
              priority: WARNING
              description: 'The number of slow queries has been more than `{$MARIADB.SLOW_QUERIES.MAX.WARN}` in the last 5 minutes.'
              tags:
                - tag: scope
                  value: performance
        - uuid: c710c87256b547819aa07b53d0757c25
          name: 'Threads cached'
          type: DEPENDENT
          key: mariadb.threads_cached
          description: 'Number of threads in the thread cache.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_cached'']/field[@name=''Value'']/text()'
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 9aabe6cfca0e46c080c284aaaf12dcef
          name: 'Threads connected'
          type: DEPENDENT
          key: mariadb.threads_connected
          description: 'Number of currently open connections.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_connected'']/field[@name=''Value'']/text()'
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: f4bfdce918bf494985ec513e4923be14
          name: 'Threads created per second'
          type: DEPENDENT
          key: mariadb.threads_created.rate
          value_type: FLOAT
          description: 'Number of threads created to handle connections. If the value of `Threads_created` is large, you may want to increase the `thread_cache_size` value. The cache miss rate can be calculated as `Threads_created`/`Connections`.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_created'']/field[@name=''Value'']/text()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 8f60ad04d6aa4df684fa8193fcfaff7c
          name: 'Threads running'
          type: DEPENDENT
          key: mariadb.threads_running
          description: 'Number of threads that are not sleeping.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Threads_running'']/field[@name=''Value'']/text()'
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: threads
        - uuid: d194b5bfabf74ea199dc79610bfa1eed
          name: Uptime
          type: DEPENDENT
          key: mariadb.uptime
          units: uptime
          description: 'Number of seconds that the server has been up.'
          preprocessing:
            - type: XMLPATH
              parameters:
                - '/resultset/row[field/text()=''Uptime'']/field[@name=''Value'']/text()'
          master_item:
            key: 'mariadb.get_status_variables["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: c7ca301f5f55409c8a7d3e87f81838e5
              expression: 'nodata(/MariaDB by Zabbix agent/mariadb.uptime,30m)=1'
              name: 'MariaDB: Failed to fetch info data'
              event_name: 'MariaDB: Failed to fetch info data (or no data for 30m)'
              priority: INFO
              description: 'Zabbix has not received any data for items for the last 30 minutes.'
              dependencies:
                - name: 'MariaDB: Service is unreachable'
                  expression: 'last(/MariaDB by Zabbix agent/mariadb.ping["{$MARIADB.HOST}","{$MARIADB.PORT}"])=0'
              tags:
                - tag: scope
                  value: availability
            - uuid: f63a7b00ff2b48ea8ecc0d37eea77f29
              expression: 'last(/MariaDB by Zabbix agent/mariadb.uptime)<10m'
              name: 'MariaDB: Service has been restarted'
              event_name: 'MariaDB: Service has been restarted (uptime < 10m)'
              priority: INFO
              description: 'MariaDB uptime is less than 10 minutes.'
              tags:
                - tag: scope
                  value: notice
        - uuid: 7db82a7caa75461dab8fc39a6a47ac6a
          name: Version
          key: 'mariadb.version["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          delay: 15m
          value_type: CHAR
          description: 'MariaDB server version.'
          preprocessing:
            - type: REGEX
              parameters:
                - '(Server version)\s+(.+)'
                - \2
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: ec2a202d9a0a42c8957807b721a7ed59
              expression: 'last(/MariaDB by Zabbix agent/mariadb.version["{$MARIADB.HOST}","{$MARIADB.PORT}"],#1)<>last(/MariaDB by Zabbix agent/mariadb.version["{$MARIADB.HOST}","{$MARIADB.PORT}"],#2) and length(last(/MariaDB by Zabbix agent/mariadb.version["{$MARIADB.HOST}","{$MARIADB.PORT}"]))>0'
              name: 'MariaDB: Version has changed'
              event_name: 'MariaDB: Version has changed (new version value received: {ITEM.VALUE})'
              priority: INFO
              description: 'The MariaDB version has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
      discovery_rules:
        - uuid: 8d1750cfcf744791be566d0f39b0ba27
          name: 'Database discovery'
          key: 'mariadb.db.discovery["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#DBNAME}'
                value: '{$MARIADB.DBNAME.MATCHES}'
              - macro: '{#DBNAME}'
                value: '{$MARIADB.DBNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of databases.'
          item_prototypes:
            - uuid: 947fe16d867644e0a479c3a90e79734d
              name: 'Database [{#DBNAME}]: Size'
              key: 'mariadb.dbsize["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}"]'
              delay: 5m
              units: B
              description: 'Database size.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: storage
                - tag: database
                  value: '{#DBNAME}'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(value.split('\n').filter(function (name) {
                  	return name.trim() !== '';
                  }).map(function (name) {
                  	return ({'{#DBNAME}': name});
                  }));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: 512188a17a04492da58716309049b44e
          name: 'Replication discovery'
          key: 'mariadb.replication.discovery["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          delay: 1h
          description: 'Discovery of the replication.'
          item_prototypes:
            - uuid: be3705eb9d9b4bc396d5ec79bab18255
              name: 'Replication: Seconds behind source {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mariadb.seconds_behind_master["{#MASTER_HOST}"]'
              units: s
              description: |
                The number of seconds the replica SQL thread has been behind processing the source binary log.
                A high number (or an increasing one) can indicate that the replica is unable to handle events
                from the source in a timely fashion.
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Seconds_Behind_Master'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
                - type: MATCHES_REGEX
                  parameters:
                    - \d+
                  error_handler: CUSTOM_ERROR
                  error_handler_params: 'Replication is not performed.'
              master_item:
                key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: fd426b40272c4d3c9a77366a38b88a87
                  expression: 'min(/MariaDB by Zabbix agent/mariadb.seconds_behind_master["{#MASTER_HOST}"],5m)>{$MARIADB.REPL_LAG.MAX.WARN}'
                  name: 'MariaDB: Replication lag is too high'
                  event_name: 'MariaDB: Replication lag is too high (over {$MARIADB.REPL_LAG.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Replication delay is too long.'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 5aee1eb357814430be4f0ebb1009ebd3
              name: 'Replication: Last IO error {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mariadb.slave_io_error["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Describes the last I/O error message reported by the replica I/O thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Last_IO_Error'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 337c4bb555864fefbe5fb121a8de2972
              name: 'Replication: Replica IO running {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mariadb.slave_io_running["{#MASTER_HOST}"]'
              description: |
                Indicates whether the I/O thread for reading the source's binary log is running.
                Normally, you want this to be `Yes` unless you have not yet started a replication or have
                explicitly stopped it with `STOP REPLICA`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_IO_Running'']/text()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Yes: 1,
                        No: 2,
                        Connecting: 3
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: ff70c734c5df4567be88aaadad208703
                  expression: 'last(/MariaDB by Zabbix agent/mariadb.slave_io_running["{#MASTER_HOST}"])<>1'
                  name: 'MariaDB: The replica I/O thread is not connected to a replication source'
                  priority: WARNING
                  description: 'Indicates whether the replica I/O thread is connected to the source.'
                  dependencies:
                    - name: 'MariaDB: The replica I/O thread is not running'
                      expression: 'last(/MariaDB by Zabbix agent/mariadb.slave_io_running["{#MASTER_HOST}"])=2'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: 319be8995e6347e7a23fcb5a610e2d0b
                  expression: 'last(/MariaDB by Zabbix agent/mariadb.slave_io_running["{#MASTER_HOST}"])=2'
                  name: 'MariaDB: The replica I/O thread is not running'
                  priority: AVERAGE
                  description: 'Indicates whether the I/O thread for reading the source''s binary log is running.'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 39990c31cdf14732a36bd4c1307c08db
              name: 'Replication: Last SQL error {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mariadb.slave_sql_error["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Describes the last SQL error message reported by the replica SQL thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Last_SQL_Error'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: d79f2672049341408fd06b9fb697a14b
              name: 'Replication: Replica SQL running {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mariadb.slave_sql_running["{#MASTER_HOST}"]'
              description: |
                Indicates whether the SQL thread for executing events in the relay log is running.
                As with the I/O thread, this should normally be `Yes`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_SQL_Running'']/text()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Yes: 1,
                        No: 2,
                        Connecting: 3
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: 856239c77f2f44139065acc5067a7f9f
                  expression: 'last(/MariaDB by Zabbix agent/mariadb.slave_sql_running["{#MASTER_HOST}"])=2'
                  name: 'MariaDB: The SQL thread is not running'
                  priority: WARNING
                  description: 'Indicates whether the SQL thread for executing events in the relay log is running.'
                  dependencies:
                    - name: 'MariaDB: The replica I/O thread is not running'
                      expression: 'last(/MariaDB by Zabbix agent/mariadb.slave_io_running["{#MASTER_HOST}"])=2'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 685fde243a97429a8d6ef06046c39610
              name: 'Replication: Replica SQL running state {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mariadb.slave_sql_running_state["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Shows the state of the SQL driver threads.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_SQL_Running_State'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: e11cfd89cecf4c4f9c819ac0539eb177
              name: 'Replication: Replica status {#MASTER_HOST}'
              key: 'mariadb.slave_status["{$MARIADB.HOST}","{$MARIADB.PORT}","{#SQL_STATEMENT}"]'
              history: '0'
              value_type: TEXT
              description: 'Gets status information on the essential parameters of the replica threads.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value.indexOf('Source_Host') !== -1) {
                      	value = value.replace(/Source/g, 'Master');
                      	value = value.replace(/Replica_/g, 'Slave_');
                      }
                      
                      return value;
              tags:
                - tag: component
                  value: raw
          lld_macro_paths:
            - lld_macro: '{#MASTER_HOST}'
              path: $.master_host
            - lld_macro: '{#SQL_STATEMENT}'
              path: $.statement
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  if (value.length === 0) {
                  	return '[]';
                  }
                  
                  try {
                  	var matches = value.match(/statement="show (slave|replica) status[\s\S]*(?:Master|Source)_Host[^>]*>([^<]+)</);
                  
                  	if (matches && matches[1] && matches[2]) {
                  		return JSON.stringify([{
                  			statement: matches[1],
                  			master_host: matches[2].trim()
                  		}]);
                  	}
                  
                  	return '[]';
                  }
                  catch (e) {
                  	Zabbix.log(4, '[ MariaDB by Zabbix agent ] ERROR: ' + e.message);
                  	return '[]';
                  }
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: 29b8a5084f3f4fe49d2dd626f6ec4bac
          name: 'Database [{#DBNAME}]: Table discovery'
          key: 'mariadb.table.discovery["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}"]'
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#TABLE_NAME}'
                value: '{$MARIADB.TABLE.NAMES.MATCHES:"{#DBNAME}"}'
              - macro: '{#TABLE_NAME}'
                value: '{$MARIADB.TABLE.NAMES.NOT_MATCHES:"{#DBNAME}"}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of tables of the databases.'
          item_prototypes:
            - uuid: 3abc962889c14090b9daac91478739df
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Data free'
              type: DEPENDENT
              key: 'mariadb.table.data_free["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The amount of unused but allocated space.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''DATA_FREE'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mariadb.tabledata["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: c6981843844c4ddca97f746c4ddd0957
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Data length'
              type: DEPENDENT
              key: 'mariadb.table.data_length["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The size of the data in the table.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''DATA_LENGTH'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mariadb.tabledata["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 97661fbc34aa4a108dfcf5af331516ae
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Free ratio'
              type: CALCULATED
              key: 'mariadb.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]'
              value_type: FLOAT
              params: 'last(//mariadb.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) / last(//mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"])'
              description: |
                The fraction of allocated table space that is currently unused (`DATA_FREE` / (`DATA_LENGTH` + `INDEX_LENGTH`)).
                High values indicate potential table fragmentation or inefficient space usage.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 15d2c92610464101bf2a43a8957949b3
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Index length'
              type: DEPENDENT
              key: 'mariadb.table.index_length["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The size occupied by the table''s indexes.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''INDEX_LENGTH'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mariadb.tabledata["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 9a3a712902e0410d8422c7386fc3eaaf
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Rows'
              type: DEPENDENT
              key: 'mariadb.table.rows["{#DBNAME}","{#TABLE_NAME}"]'
              units: '!rows'
              description: 'The approximate number of rows in the table. For InnoDB, the `TABLE_ROWS` value is approximate and may differ from the actual count.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''TABLE_ROWS'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mariadb.tabledata["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 9879b92af01044da9d13071dea1a64ca
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Total size'
              type: CALCULATED
              key: 'mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              params: 'last(//mariadb.table.data_length["{#DBNAME}","{#TABLE_NAME}"]) + last(//mariadb.table.index_length["{#DBNAME}","{#TABLE_NAME}"])'
              description: 'The sum of `DATA_LENGTH` and `INDEX_LENGTH` represents the total size of the table.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
              trigger_prototypes:
                - uuid: 82c696ced06a445e84c63a441a07a183
                  expression: '(last(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$MARIADB.TOTALSIZE.GROWTH.MAX.WARN}'
                  name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is high'
                  event_name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is high (over {$MARIADB.TOTALSIZE.GROWTH.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Total table size growth is high.'
                  dependencies:
                    - name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is too high'
                      expression: '(last(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$MARIADB.TOTALSIZE.GROWTH.MAX.CRIT}'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: 18bfe3e3662e4f678ea6a138ad3cbc0c
                  expression: '(last(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$MARIADB.TOTALSIZE.GROWTH.MAX.CRIT}'
                  name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is too high'
                  event_name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is too high (over {$MARIADB.TOTALSIZE.GROWTH.MAX.CRIT} for 5m)'
                  priority: HIGH
                  description: 'Total table size growth is too high.'
                  tags:
                    - tag: scope
                      value: capacity
            - uuid: 042a8fae46c0437eba5fd151999a1946
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Get data'
              key: 'mariadb.tabledata["{$MARIADB.HOST}","{$MARIADB.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              history: '0'
              value_type: TEXT
              description: 'Database table data.'
              tags:
                - tag: component
                  value: raw
          trigger_prototypes:
            - uuid: dd311c03ade3491bac8860732dd3b040
              expression: 'last(/MariaDB by Zabbix agent/mariadb.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.FRAGMENTATION.WARN} and last(/MariaDB by Zabbix agent/mariadb.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.DATA_FREE.MIN.WARN} and last(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.TABLE_SIZE.MIN.WARN}'
              name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Free space high'
              event_name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Free space high (fragmentation warning)'
              priority: WARNING
              description: 'Free table space is high (fragmentation warning).'
              dependencies:
                - name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
                  expression: 'last(/MariaDB by Zabbix agent/mariadb.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.FRAGMENTATION.CRIT} and last(/MariaDB by Zabbix agent/mariadb.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.DATA_FREE.MIN.CRIT} and last(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.TABLE_SIZE.MIN.CRIT}'
              tags:
                - tag: scope
                  value: performance
            - uuid: a11763f71c004647985f6e57e867292e
              expression: 'last(/MariaDB by Zabbix agent/mariadb.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.FRAGMENTATION.CRIT} and last(/MariaDB by Zabbix agent/mariadb.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.DATA_FREE.MIN.CRIT} and last(/MariaDB by Zabbix agent/mariadb.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$MARIADB.TABLE_SIZE.MIN.CRIT}'
              name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
              event_name: 'MariaDB: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high (fragmentation critical)'
              priority: HIGH
              description: 'Free table space is very high (fragmentation critical).'
              tags:
                - tag: scope
                  value: performance
          parent_discovery_rule:
            key: 'mariadb.db.discovery["{$MARIADB.HOST}","{$MARIADB.PORT}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(value.split('\n').filter(function (name) {
                  	return name.trim() !== '';
                  }).map(function (name) {
                  	return ({'{#TABLE_NAME}': name});
                  }));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
      tags:
        - tag: class
          value: database
