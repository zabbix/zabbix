        - uuid: 513709d8f6e34cd98976af668b10f168
          name: 'Calculated value of innodb_log_file_size'
          type: CALCULATED
          key: mariadb.innodb_log_file_size
          value_type: FLOAT
          params: '(last(//mariadb.innodb_os_log_written) - last(//mariadb.innodb_os_log_written,#1:now-1h)) / {$MARIADB.INNODB_LOG_FILES}'
          description: '`Innodb_log_file_size` is calculated as: (`innodb_os_log_written`-`innodb_os_log_written`(time shift -1h))/`{$MARIADB.INNODB_LOG_FILES}`. `Innodb_log_file_size` is the size in bytes of each InnoDB redo log file in the log group. The combined size can be no more than 512 GB. Larger values mean less disk I/O due to less flushing checkpoint activity, but also slower recovery from a crash.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
