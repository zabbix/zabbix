  triggers:
    - uuid: 555944eca79a4d4db613e3317a628b76
      expression: 'max(/MariaDB by Zabbix agent/mariadb.buffer_pool_utilization,5m)<{$MARIADB.BUFF_UTIL.MIN.WARN} and last(/MariaDB by Zabbix agent/mariadb.uptime)>3600'
      name: 'MariaDB: Buffer pool utilization is too low'
      event_name: 'MariaDB: Buffer pool utilization is too low (less than {$MARIADB.BUFF_UTIL.MIN.WARN}% for 5m)'
      priority: WARNING
      description: 'The buffer pool utilization has been less than `{$MARIADB.BUFF_UTIL.MIN.WARN}`% in the last 5 minutes with server uptime over 1 hour. This means that there is a lot of unused RAM allocated for the buffer pool, which you can easily reallocate at the moment.'
      tags:
        - tag: scope
          value: notice
    - uuid: 4ce661b484904239ae8f4ecf8eed4afe
      expression: 'avg(/MariaDB by Zabbix agent/mariadb.full_scans.ratio,5m)>{$MARIADB.FULLSCAN.RATIO.WARN} and avg(/MariaDB by Zabbix agent/mariadb.com_select.rate,5m)>{$MARIADB.FULLSCAN.SELECT_RATE.MIN.WARN}'
      name: 'MariaDB: High rate of full table scans'
      event_name: 'MariaDB: High rate of full table scans (over {$MARIADB.FULLSCAN.RATIO.WARN} for 5m)'
      priority: WARNING
      description: 'The rate of `SELECT` statements exceeds `{$MARIADB.FULLSCAN.SELECT_RATE.MIN.WARN}` per second and the full table scan ratio has been above `{$MARIADB.FULLSCAN.RATIO.WARN}` for the last 5 minutes.'
      tags:
        - tag: scope
          value: performance
