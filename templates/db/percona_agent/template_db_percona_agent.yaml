                      value: capacity
                - uuid: f5addd4871854b34bee6370bd9954a43
                  expression: '(last(/Percona by Zabbix agent/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/Percona by Zabbix agent/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT}'
