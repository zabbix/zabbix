                  expression: 'last(/Percona by Zabbix agent/percona.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.FRAGMENTATION.CRIT} and last(/Percona by Zabbix agent/percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.DATA_FREE.MIN.CRIT} and last(/Percona by Zabbix agent/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.TABLE_SIZE.MIN.CRIT}'
              tags:
                - tag: scope
                  value: performance
            - uuid: 7922495bf8e748589d9f2e6d2c0708c9
              expression: 'last(/Percona by Zabbix agent/percona.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.FRAGMENTATION.CRIT} and last(/Percona by Zabbix agent/percona.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.DATA_FREE.MIN.CRIT} and last(/Percona by Zabbix agent/percona.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$PERCONA.TABLE_SIZE.MIN.CRIT}'
              name: 'Percona: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
              event_name: 'Percona: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high (fragmentation critical)'
              priority: HIGH
