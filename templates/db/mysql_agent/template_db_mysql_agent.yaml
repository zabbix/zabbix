          triggers:
            - uuid: 7eab3a7337904ad1b2061d209371543b
              expression: 'last(/MySQL by Zabbix agent/mysql.version["{$MYSQL.HOST}","{$MYSQL.PORT}"],#1)<>last(/MySQL by Zabbix agent/mysql.version["{$MYSQL.HOST}","{$MYSQL.PORT}"],#2) and length(last(/MySQL by Zabbix agent/mysql.version["{$MYSQL.HOST}","{$MYSQL.PORT}"]))>0'
              name: 'MySQL: Version has changed'
              event_name: 'MySQL: Version has changed (new version value received: {ITEM.VALUE})'
              priority: INFO
              description: 'The MySQL version has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
      discovery_rules:
        - uuid: 8ceb226f000d48f099ee6e128ad551b5
          name: 'Database discovery'
          key: 'mysql.db.discovery["{$MYSQL.HOST}","{$MYSQL.PORT}"]'
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#DBNAME}'
                value: '{$MYSQL.DBNAME.MATCHES}'
              - macro: '{#DBNAME}'
                value: '{$MYSQL.DBNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of databases.'
          item_prototypes:
            - uuid: dda45077011d4f8fa5c25b1f351179ca
              name: 'Database [{#DBNAME}]: Size'
              key: 'mysql.dbsize["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}"]'
              delay: 5m
              units: B
              description: 'Database size.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: storage
                - tag: database
                  value: '{#DBNAME}'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(value.split('\n').filter(function (name) {
                  	return name.trim() !== '';
                  }).map(function (name) {
                  	return ({'{#DBNAME}': name});
                  }));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: aed60b7ae3794d0ba25ad82da12b8966
          name: 'Replication discovery'
          key: 'mysql.replication.discovery["{$MYSQL.HOST}","{$MYSQL.PORT}"]'
          delay: 1h
          description: 'Discovery of the replication.'
          item_prototypes:
            - uuid: 48555d71074f4cd4a61dca6187c8b29a
              name: 'Replication: Seconds behind source {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mysql.seconds_behind_master["{#MASTER_HOST}"]'
              units: s
              description: |
                The number of seconds the replica SQL thread has been behind processing the source binary log.
                A high number (or an increasing one) can indicate that the replica is unable to handle events
                from the source in a timely fashion.
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Seconds_Behind_Master'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
                - type: MATCHES_REGEX
                  parameters:
                    - \d+
                  error_handler: CUSTOM_ERROR
                  error_handler_params: 'Replication is not performed.'
              master_item:
                key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: a5c91da088414d279f5ea3cd59093ce9
                  expression: 'min(/MySQL by Zabbix agent/mysql.seconds_behind_master["{#MASTER_HOST}"],5m)>{$MYSQL.REPL_LAG.MAX.WARN}'
                  name: 'MySQL: Replication lag is too high'
                  event_name: 'MySQL: Replication lag is too high (over {$MYSQL.REPL_LAG.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Replication delay is too long.'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 0d2b3b8b0c114b2a974df352a25572c9
              name: 'Replication: Last IO error {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mysql.slave_io_error["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Describes the last I/O error message reported by the replica I/O thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Last_IO_Error'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 1c075f4785604d92a33a868e213070d8
              name: 'Replication: Replica IO running {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mysql.slave_io_running["{#MASTER_HOST}"]'
              description: |
                Indicates whether the I/O thread for reading the source's binary log is running.
                Normally, you want this to be `Yes` unless you have not yet started a replication or have
                explicitly stopped it with `STOP REPLICA`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_IO_Running'']/text()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Yes: 1,
                        No: 2,
                        Connecting: 3
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: 8ee45932311443cb906306b1d2c99b19
                  expression: 'last(/MySQL by Zabbix agent/mysql.slave_io_running["{#MASTER_HOST}"])<>1'
                  name: 'MySQL: The replica I/O thread is not connected to a replication source'
                  priority: WARNING
                  description: 'Indicates whether the replica I/O thread is connected to the source.'
                  dependencies:
                    - name: 'MySQL: The replica I/O thread is not running'
                      expression: 'last(/MySQL by Zabbix agent/mysql.slave_io_running["{#MASTER_HOST}"])=2'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: 4c8ca45f26254d9a9a1c9248f1fa1537
                  expression: 'last(/MySQL by Zabbix agent/mysql.slave_io_running["{#MASTER_HOST}"])=2'
                  name: 'MySQL: The replica I/O thread is not running'
                  priority: AVERAGE
                  description: 'Indicates whether the I/O thread for reading the source''s binary log is running.'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 82c6efeb6dc746f5bd3110b736883db1
              name: 'Replication: Last SQL error {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mysql.slave_sql_error["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Describes the last SQL error message reported by the replica SQL thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Last_SQL_Error'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 967c6fd13cc04562a9fea174bd90b8c4
              name: 'Replication: Replica SQL running {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mysql.slave_sql_running["{#MASTER_HOST}"]'
              description: |
                Indicates whether the SQL thread for executing events in the relay log is running.
                As with the I/O thread, this should normally be `Yes`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_SQL_Running'']/text()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Yes: 1,
                        No: 2,
                        Connecting: 3
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: bd0d20c05e3b46b6a7c341e5d122208b
                  expression: 'last(/MySQL by Zabbix agent/mysql.slave_sql_running["{#MASTER_HOST}"])=2'
                  name: 'MySQL: The SQL thread is not running'
                  priority: WARNING
                  description: 'Indicates whether the SQL thread for executing events in the relay log is running.'
                  dependencies:
                    - name: 'MySQL: The replica I/O thread is not running'
                      expression: 'last(/MySQL by Zabbix agent/mysql.slave_io_running["{#MASTER_HOST}"])=2'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 27e807d840d4474484c2e1f896726b6b
              name: 'Replication: Replica SQL running state {#MASTER_HOST}'
              type: DEPENDENT
              key: 'mysql.slave_sql_running_state["{#MASTER_HOST}"]'
              value_type: TEXT
              description: 'Shows the state of the SQL driver threads.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''Slave_SQL_Running_State'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: d87c7c03e5884a43912f60ad91c3b46f
              name: 'Replication: Replica status {#MASTER_HOST}'
              key: 'mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]'
              history: '0'
              value_type: TEXT
              description: 'Gets status information on the essential parameters of the replica threads.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value.indexOf('Source_Host') !== -1) {
                      	value = value.replace(/Source/g, 'Master');
                      	value = value.replace(/Replica_/g, 'Slave_');
                      }
                      
                      return value;
              tags:
                - tag: component
                  value: raw
          lld_macro_paths:
            - lld_macro: '{#MASTER_HOST}'
              path: $.master_host
            - lld_macro: '{#SQL_STATEMENT}'
              path: $.statement
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  if (value.length === 0) {
                  	return '[]';
                  }
                  
                  try {
                  	var matches = value.match(/statement="show (slave|replica) status[\s\S]*(?:Master|Source)_Host[^>]*>([^<]+)</);
                  
                  	if (matches && matches[1] && matches[2]) {
                  		return JSON.stringify([{
                  			statement: matches[1],
                  			master_host: matches[2].trim()
                  		}]);
                  	}
                  
                  	return '[]';
                  }
                  catch (e) {
                  	Zabbix.log(4, '[ MySQL by Zabbix agent ] ERROR: ' + e.message);
                  	return '[]';
                  }
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: d6d53e8ef06a4fe8a561657da1e78ca7
          name: 'Database [{#DBNAME}]: Table discovery'
          key: 'mysql.table.discovery["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}"]'
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#TABLE_NAME}'
                value: '{$MYSQL.TABLE.NAMES.MATCHES:"{#DBNAME}"}'
              - macro: '{#TABLE_NAME}'
                value: '{$MYSQL.TABLE.NAMES.NOT_MATCHES:"{#DBNAME}"}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of tables of the databases.'
          item_prototypes:
            - uuid: 41e794f0395d44c5ada4e1bf8bd0b1ec
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Data free'
              type: DEPENDENT
              key: 'mysql.table.data_free["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The amount of unused but allocated space.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''DATA_FREE'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mysql.tabledata["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: c6858baca75f4827b852954bfa17bdd4
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Data length'
              type: DEPENDENT
              key: 'mysql.table.data_length["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The size of the data in the table.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''DATA_LENGTH'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mysql.tabledata["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 6ab5096e6ca14c1284e6e031e1fa249d
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Free ratio'
              type: CALCULATED
              key: 'mysql.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]'
              value_type: FLOAT
              params: 'last(//mysql.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) / last(//mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"])'
              description: |
                The fraction of allocated table space that is currently unused (`DATA_FREE` / (`DATA_LENGTH` + `INDEX_LENGTH`)).
                High values indicate potential table fragmentation or inefficient space usage.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 660bcf33e01d45ad90bb2d5fd719d9a6
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Index length'
              type: DEPENDENT
              key: 'mysql.table.index_length["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              description: 'The size occupied by the table''s indexes.'
              preprocessing:
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''INDEX_LENGTH'']/text()'
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mysql.tabledata["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 7a1c351ddc4e484292fb399dcf0b0e0a
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Rows'
              type: DEPENDENT
              key: 'mysql.table.rows["{#DBNAME}","{#TABLE_NAME}"]'
              units: '!rows'
              description: 'The approximate number of rows in the table. For InnoDB, the `TABLE_ROWS` value is approximate and may differ from the actual count.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: XMLPATH
                  parameters:
                    - '/resultset/row/field[@name=''TABLE_ROWS'']/text()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'mysql.tabledata["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 62ec9bfb576d4ad3b4da8f6cd5564d90
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Total size'
              type: CALCULATED
              key: 'mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"]'
              units: B
              params: 'last(//mysql.table.data_length["{#DBNAME}","{#TABLE_NAME}"]) + last(//mysql.table.index_length["{#DBNAME}","{#TABLE_NAME}"])'
              description: 'The sum of `DATA_LENGTH` and `INDEX_LENGTH` represents the total size of the table.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: tables
                - tag: database
                  value: '{#DBNAME}'
                - tag: table
                  value: '{#TABLE_NAME}'
              trigger_prototypes:
                - uuid: 09cef33431964dcc93ab6b13280af913
                  expression: '(last(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$MYSQL.TOTALSIZE.GROWTH.MAX.WARN}'
                  name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is high'
                  event_name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is high (over {$MYSQL.TOTALSIZE.GROWTH.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Total table size growth is high.'
                  dependencies:
                    - name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is too high'
                      expression: '(last(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$MYSQL.TOTALSIZE.GROWTH.MAX.CRIT}'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: c8b6f8670856472f912007762472496c
                  expression: '(last(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"])-min(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"],5m))>{$MYSQL.TOTALSIZE.GROWTH.MAX.CRIT}'
                  name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is too high'
                  event_name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Total size growth is too high (over {$MYSQL.TOTALSIZE.GROWTH.MAX.CRIT} for 5m)'
                  priority: HIGH
                  description: 'Total table size growth is too high.'
                  tags:
                    - tag: scope
                      value: capacity
            - uuid: 188a1930ae99494ca8850849ed690636
              name: 'Table [{#DBNAME}/{#TABLE_NAME}]: Get data'
              key: 'mysql.tabledata["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}","{#TABLE_NAME}"]'
              history: '0'
              value_type: TEXT
              description: 'Database table data.'
              tags:
                - tag: component
                  value: raw
          trigger_prototypes:
            - uuid: 4d4cf0796c114af7922f6663aca42e2a
              expression: 'last(/MySQL by Zabbix agent/mysql.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.FRAGMENTATION.WARN} and last(/MySQL by Zabbix agent/mysql.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.DATA_FREE.MIN.WARN} and last(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.TABLE_SIZE.MIN.WARN}'
              name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Free space high'
              event_name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Free space high (fragmentation warning)'
              priority: WARNING
              description: 'Free table space is high (fragmentation warning).'
              dependencies:
                - name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
                  expression: 'last(/MySQL by Zabbix agent/mysql.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.FRAGMENTATION.CRIT} and last(/MySQL by Zabbix agent/mysql.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.DATA_FREE.MIN.CRIT} and last(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.TABLE_SIZE.MIN.CRIT}'
              tags:
                - tag: scope
                  value: performance
            - uuid: bfa882960c8c4879874457b0925eb0da
              expression: 'last(/MySQL by Zabbix agent/mysql.table.free_ratio["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.FRAGMENTATION.CRIT} and last(/MySQL by Zabbix agent/mysql.table.data_free["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.DATA_FREE.MIN.CRIT} and last(/MySQL by Zabbix agent/mysql.table.total_size["{#DBNAME}","{#TABLE_NAME}"]) > {$MYSQL.TABLE_SIZE.MIN.CRIT}'
              name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high'
              event_name: 'MySQL: Table [{#DBNAME}/{#TABLE_NAME}]: Free space very high (fragmentation critical)'
              priority: HIGH
              description: 'Free table space is very high (fragmentation critical).'
              tags:
                - tag: scope
                  value: performance
          parent_discovery_rule:
            key: 'mysql.db.discovery["{$MYSQL.HOST}","{$MYSQL.PORT}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return JSON.stringify(value.split('\n').filter(function (name) {
                  	return name.trim() !== '';
                  }).map(function (name) {
                  	return ({'{#TABLE_NAME}': name});
                  }));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
      tags:
        - tag: class
          value: database
        - tag: subclass
          value: sql
        - tag: target
          value: mysql
      macros:
        - macro: '{$MYSQL.ABORTED_CONN.MAX.WARN}'
          value: '3'
          description: 'Number of failed attempts to connect to the MySQL server for trigger expressions.'
          config:
            type: TEXT
            priority: '3'
            section_name: Thresholds
            label: 'Number of failed attempts to connect threshold'
            description: 'Threshold for the maximum number of failed attempts to connect to the MySQL server. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.BUFF_UTIL.MIN.WARN}'
          value: '50'
          description: 'The minimum buffer pool utilization in percent for trigger expressions.'
          config:
            type: TEXT
            priority: '8'
            section_name: Thresholds
            label: 'Buffer pool utilization threshold'
            description: 'Threshold of the minimum percentage of buffer pool utilization. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.CREATED_TMP_DISK_TABLES.MAX.WARN}'
          value: '10'
          description: 'The maximum number of temporary tables created on a disk per second for trigger expressions.'
          config:
            type: TEXT
            priority: '10'
            section_name: Thresholds
            label: 'Temporary tables created on a disk per second threshold'
            description: 'Threshold for the maximum number of temporary tables created on a disk per second. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.CREATED_TMP_FILES.MAX.WARN}'
          value: '10'
          description: 'The maximum number of temporary files created on a disk per second for trigger expressions.'
          config:
            type: TEXT
            priority: '11'
            section_name: Thresholds
            label: 'Temporary files created on a disk per second threshold'
            description: 'Threshold for the maximum number of temporary files created on a disk per second. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.CREATED_TMP_TABLES.MAX.WARN}'
          value: '30'
          description: 'The maximum number of temporary tables created in memory per second for trigger expressions.'
          config:
            type: TEXT
            priority: '9'
            section_name: Thresholds
            label: 'Temporary tables created in memory per second threshold'
            description: 'Threshold for the maximum number of temporary tables created in memory per second. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.DATA_FREE.MIN.CRIT}'
          value: 5G
          description: 'The minimum `Data_free` value for critical fragmentation trigger expressions.'
          config:
            type: TEXT
            priority: '22'
            section_name: Thresholds
            label: 'Critical data free threshold'
            description: 'The minimum `Data_free` value for critical fragmentation trigger expressions.'
        - macro: '{$MYSQL.DATA_FREE.MIN.WARN}'
          value: 1G
          description: 'The minimum `Data_free` value for warning fragmentation trigger expressions.'
          config:
            type: TEXT
            priority: '21'
            section_name: Thresholds
            label: 'Warning data free threshold'
            description: 'The minimum `Data_free` value for warning fragmentation trigger expressions.'
        - macro: '{$MYSQL.DBNAME.MATCHES}'
          value: .+
          description: 'Filter of discoverable databases.'
          config:
            type: TEXT
            priority: '13'
            section_name: Filters
            label: 'Include database filter'
            description: 'Regex string to include discovered database by its name.'
        - macro: '{$MYSQL.DBNAME.NOT_MATCHES}'
          value: information_schema|performance_schema|mysql|sys
          description: 'Filter to exclude discovered databases.'
          config:
            type: TEXT
            priority: '14'
            section_name: Filters
            label: 'Exclude database filter'
            description: 'Regex string to exclude discovered database by its name.'
        - macro: '{$MYSQL.FRAGMENTATION.CRIT}'
          value: '0.6'
          description: 'The free ratio threshold for critical fragmentation trigger expressions.'
          config:
            type: TEXT
            priority: '20'
            section_name: Thresholds
            label: 'Critical fragmentation threshold'
            description: 'The free ratio threshold for critical fragmentation trigger expressions.'
        - macro: '{$MYSQL.FRAGMENTATION.WARN}'
          value: '0.3'
          description: 'The free ratio threshold for warning fragmentation trigger expressions.'
          config:
            type: TEXT
            priority: '19'
            section_name: Thresholds
            label: 'Warning fragmentation threshold'
            description: 'The free ratio threshold for warning fragmentation trigger expressions.'
        - macro: '{$MYSQL.FULLSCAN.RATIO.WARN}'
          value: '0.1'
          description: 'Warning threshold for full table scan ratio.'
          config:
            type: TEXT
            priority: '6'
            section_name: Thresholds
            label: 'Full table scan ratio threshold'
            description: 'Threshold for full table scan ratio (fraction of SELECT statements executed as full table scans). No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.FULLSCAN.SELECT_RATE.MIN.WARN}'
          value: '5'
          description: 'The minimum `SELECT` statement rate (per second) for trigger expressions.'
          config:
            type: TEXT
            priority: '7'
            section_name: Thresholds
            label: 'SELECT statements rate threshold'
            description: 'Threshold for minimum SELECT statements rate (per second) required for evaluating full table scan ratio. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.HOST}'
          value: 127.0.0.1
          description: 'Hostname or IP of MySQL host or container.'
          config:
            type: TEXT
            priority: '1'
            label: 'MySQL address'
            description: 'Hostname or IP address of MySQL host or container.'
        - macro: '{$MYSQL.INNODB_LOG_FILES}'
          value: '2'
          description: 'Number of physical files in the InnoDB redo log for calculating `innodb_log_file_size`.'
          config:
            type: TEXT
            priority: '12'
            section_name: Thresholds
            label: 'InnoDB redo log files number (for calculating)'
            description: 'Threshold for the maximum number of physical files in the InnoDB redo log for calculating `innodb_log_file_size`. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.PORT}'
          value: '3306'
          description: 'MySQL service port.'
          config:
            type: TEXT
            priority: '2'
            label: 'MySQL service port'
            description: 'In the range from 1 to 65535 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$MYSQL.REPL_LAG.MAX.WARN}'
          value: 30m
          description: 'Amount of time the replica is behind the source for trigger expressions.'
          config:
            type: TEXT
            priority: '4'
            section_name: Thresholds
            label: 'Replication lag threshold'
            description: 'Threshold of the maximum time the replica is behind the source.'
        - macro: '{$MYSQL.SLOW_QUERIES.MAX.WARN}'
          value: '3'
          description: 'Number of slow queries for trigger expressions.'
          config:
            type: TEXT
            priority: '5'
