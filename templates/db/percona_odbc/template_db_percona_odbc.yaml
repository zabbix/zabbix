  triggers:
    - uuid: 3141e4edf0c34bb1856ed392f2bc7c87
      expression: 'max(/Percona by ODBC/percona.buffer_pool_utilization,5m)<{$PERCONA.BUFF_UTIL.MIN.WARN} and last(/Percona by ODBC/percona.uptime)>3600'
      name: 'Percona: Buffer pool utilization is too low'
      event_name: 'Percona: Buffer pool utilization is too low (less than {$PERCONA.BUFF_UTIL.MIN.WARN}% for 5m)'
      priority: WARNING
      description: 'The buffer pool utilization has been less than `{$PERCONA.BUFF_UTIL.MIN.WARN}`% in the last 5 minutes with server uptime over 1 hour. This means that there is a lot of unused RAM allocated for the buffer pool, which you can easily reallocate at the moment.'
      tags:
        - tag: scope
          value: notice
    - uuid: 31410d8174ad46acadac90dd9e1f1d0b
      expression: 'avg(/Percona by ODBC/percona.full_scans.ratio,5m)>{$PERCONA.FULLSCAN.RATIO.WARN} and avg(/Percona by ODBC/percona.com_select.rate,5m)>{$PERCONA.FULLSCAN.SELECT_RATE.MIN.WARN}'
      name: 'Percona: High rate of full table scans'
      event_name: 'Percona: High rate of full table scans (over {$PERCONA.FULLSCAN.RATIO.WARN} for 5m)'
      priority: WARNING
      description: 'The rate of `SELECT` statements exceeds `{$PERCONA.FULLSCAN.SELECT_RATE.MIN.WARN}` per second and the full table scan ratio has been above `{$PERCONA.FULLSCAN.RATIO.WARN}` for the last 5 minutes.'
      tags:
        - tag: scope
          value: performance
    - uuid: 37b847a0d3f847c19f90419a0409a354
      expression: 'max(/Percona by ODBC/percona.innodb_scan.efficiency,5m)<{$PERCONA.INNODB_EFFICIENCY.MIN.WARN} and last(/Percona by ODBC/percona.innodb_total_scans.rate)>{$PERCONA.INNODB_SCANS.MIN.WARN}'
      name: 'Percona: InnoDB efficiency is low'
      event_name: 'Percona: InnoDB efficiency is low (less than {$PERCONA.INNODB_EFFICIENCY.MIN.WARN}% for 5m)'
      priority: WARNING
      description: 'The InnoDB efficiency has been less than `{$PERCONA.INNODB_EFFICIENCY.MIN.WARN}`% in the last 5 minutes.'
      dependencies:
        - name: 'Percona: InnoDB efficiency is too low'
          expression: 'max(/Percona by ODBC/percona.innodb_scan.efficiency,5m)<{$PERCONA.INNODB_EFFICIENCY.MIN.CRIT} and last(/Percona by ODBC/percona.innodb_total_scans.rate)>{$PERCONA.INNODB_SCANS.MIN.CRIT}'
      tags:
        - tag: scope
          value: performance
    - uuid: a89b784e02db42b9aa59306cad1bd769
      expression: 'max(/Percona by ODBC/percona.innodb_scan.efficiency,5m)<{$PERCONA.INNODB_EFFICIENCY.MIN.CRIT} and last(/Percona by ODBC/percona.innodb_total_scans.rate)>{$PERCONA.INNODB_SCANS.MIN.CRIT}'
      name: 'Percona: InnoDB efficiency is too low'
      event_name: 'Percona: InnoDB efficiency is too low (less than {$PERCONA.INNODB_EFFICIENCY.MIN.CRIT}% for 5m)'
      priority: HIGH
      description: 'The InnoDB efficiency has been less than `{$PERCONA.INNODB_EFFICIENCY.MIN.CRIT}`% in the last 5 minutes.'
      tags:
        - tag: scope
          value: performance
