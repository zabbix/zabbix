        - uuid: 31419cbb3cc2485dac2757867badd0f4
          name: 'InnoDB buffer pool wait free'
          type: DEPENDENT
          key: percona.innodb_buffer_pool_wait_free
          value_type: FLOAT
          description: 'Number of times InnoDB waited for a free page before reading or creating a page. Normally, writes to the InnoDB buffer pool happen in the background. When no clean pages are available, dirty pages are flushed first in order to free some up. This counts the numbers of wait for this operation to finish. If this value is not small, look at the increasing `innodb_buffer_pool_size`.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Innodb_buffer_pool_wait_free'')].Value.first()'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: innodb
            - tag: component
              value: memory
        - uuid: 89e6a99d04444d2faee8e77ec9b4e7b2
          name: 'InnoDB buffer pool wait free per second'
          type: DEPENDENT
          key: percona.innodb_buffer_pool_wait_free.rate
          value_type: FLOAT
          description: 'Number of times per second InnoDB waited for a free page before reading or creating a page. Non-zero values indicate the buffer pool is too small increase `innodb_buffer_pool_size`.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Innodb_buffer_pool_wait_free'')].Value.first()'
            - type: CHANGE_PER_SECOND
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
