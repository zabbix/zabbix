          value: CHANGE_IF_NEEDED
          description: 'Filter of discoverable tables. Use a context to change the filter of discoverable tables for a specific database.'
          config:
            type: TEXT
            priority: '20'
            section_name: Filters
            label: 'Include table filter'
            description: 'Regex string to include discovered table by its name.'
        - macro: '{$PERCONA.TABLE.NAMES.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Filter to exclude discovered tables. Use a context to change the filter to exclude discovered tables for a specific database.'
          config:
            type: TEXT
            priority: '21'
            section_name: Filters
            label: 'Exclude table filter'
            description: 'Regex string to exclude discovered table by its name.'
        - macro: '{$PERCONA.TABLE_SIZE.MIN.CRIT}'
          value: 10G
          description: 'The minimum table size for critical fragmentation trigger expressions.'
          config:
            type: TEXT
            priority: '29'
            section_name: Filters
            label: 'Critical table size threshold'
            description: 'The minimum table size for critical fragmentation trigger expressions.'
        - macro: '{$PERCONA.TABLE_SIZE.MIN.WARN}'
          value: 3G
          description: 'The minimum table size for warning fragmentation trigger expressions.'
          config:
            type: TEXT
            priority: '28'
            section_name: Filters
            label: 'Warning table size threshold'
            description: 'The minimum table size for warning fragmentation trigger expressions.'
        - macro: '{$PERCONA.THREADPOOL.IDLE_RATIO.MIN.WARN}'
          value: '20'
          description: 'The minimum thread pool idle ratio in percent for trigger expressions.'
          config:
            type: TEXT
            priority: '32'
            section_name: Thresholds
            label: 'Thread pool idle ratio threshold'
            description: 'Threshold of the minimum thread pool idle ratio in percent. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$PERCONA.THREADPOOL.UTILIZATION.MAX.WARN}'
          value: '85'
          description: 'The maximum thread pool utilization in percent for trigger expressions.'
          config:
            type: TEXT
            priority: '31'
            section_name: Thresholds
            label: 'Threadpool utilization threshold'
            description: 'Threshold of the maximum thread pool utilization in percent. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT}'
          value: 1G
          description: 'The critical threshold of the total table size growth for trigger expressions.'
          config:
            type: TEXT
            priority: '23'
            section_name: Filters
            label: 'Maximum table total size growth (critical)'
            description: 'The critical threshold of the table total size growth for trigger expressions.'
        - macro: '{$PERCONA.TOTALSIZE.GROWTH.MAX.WARN}'
          value: 300M
          description: 'The warning threshold of the total table size growth for trigger expressions.'
          config:
            type: TEXT
            priority: '22'
            section_name: Filters
            label: 'Maximum table total size growth (warning)'
            description: 'The warning threshold of the total table size growth for trigger expressions.'
        - macro: '{$PERCONA.USER}'
          description: 'Percona username.'
          config:
            type: TEXT
            priority: '2'
            label: 'Percona user'
            description: 'Username for Percona used in the ODBC data source connection.'
