              event_name: 'Percona: Number of on-disk temporary tables created per second is high (over {$PERCONA.CREATED_TMP_DISK_TABLES.MAX.WARN} for 5m)'
              priority: WARNING
              description: 'The application using the database may be in need of query optimization.'
