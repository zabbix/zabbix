              value: innodb
            - tag: component
              value: memory
        - uuid: 3141fd31a2514e3f827b0060a6d5bfc4
          name: 'Calculated value of innodb_log_file_size'
          type: CALCULATED
          key: percona.innodb_log_file_size
          value_type: FLOAT
          params: '(last(//percona.innodb_os_log_written) - last(//percona.innodb_os_log_written,#1:now-1h)) / {$PERCONA.INNODB_LOG_FILES}'
          description: '`Innodb_log_file_size` is calculated as: (`innodb_os_log_written`-`innodb_os_log_written`(time shift -1h))/`{$PERCONA.INNODB_LOG_FILES}`. `Innodb_log_file_size` is the size in bytes of the each InnoDB redo log file in the log group. The combined size can be no more than 512 GB. Larger values mean less disk I/O due to less flushing checkpoint activity, but also slower recovery from a crash.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
        - uuid: 314190ea780d4f439721cd952fb98656
          name: 'InnoDB log waits per second'
          type: DEPENDENT
          key: percona.innodb_log_waits.rate
          value_type: FLOAT
          description: 'Number of InnoDB log waits per second. An increase in this per-second value indicates that threads are increasingly waiting for redo log writes, which typically points to disk subsystem performance issues or an `innodb_log_file_size` that is too small.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Innodb_log_waits'')].Value.first()'
            - type: CHANGE_PER_SECOND
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: innodb
            - tag: component
              value: system
