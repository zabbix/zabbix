            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Threads_connected'')].Value.first()'
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 3141d5788f8a449b994dbe76536076a2
          name: 'Threads created per second'
          type: DEPENDENT
          key: percona.threads_created.rate
          value_type: FLOAT
          description: 'Number of threads created to handle connections. If the value of `Threads_created` is large, you may want to increase the `thread_cache_size` value. The cache miss rate can be calculated as `Threads_created`/`Connections`.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Threads_created'')].Value.first()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 3141fa83f6a94efda34d7b41c95c89ac
          name: 'Threads running'
          type: DEPENDENT
          key: percona.threads_running
          description: 'Number of threads that are not sleeping.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Threads_running'')].Value.first()'
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: threads
        - uuid: 3141d224ebdf46e7b25a0be015f21972
          name: Uptime
          type: DEPENDENT
          key: percona.uptime
          units: uptime
          description: 'Number of seconds that the server has been up.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Uptime'')].Value.first()'
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: 3141b4fc244b41a6a30237e7a382fa54
              expression: 'nodata(/Percona by ODBC/percona.uptime,30m)=1'
              name: 'Percona: Failed to fetch info data'
              event_name: 'Percona: Failed to fetch info data (or no data for 30m)'
              priority: INFO
              description: 'Zabbix has not received any data for items for the last 30 minutes.'
              dependencies:
                - name: 'Percona: Service is unreachable'
                  expression: 'last(/Percona by ODBC/db.odbc.select[ping,"{$PERCONA.DSN}"])=0'
              tags:
                - tag: scope
                  value: availability
            - uuid: 31415996bd85434998595e041d6b0908
              expression: 'last(/Percona by ODBC/percona.uptime)<10m'
              name: 'Percona: Service has been restarted'
              event_name: 'Percona: Service has been restarted (uptime < 10m)'
              priority: INFO
              description: 'Percona uptime is less than 10 minutes.'
              tags:
                - tag: scope
                  value: notice
      discovery_rules:
        - uuid: 3141fb6afdae4587bc32864fa42728f2
          name: 'Database discovery'
          type: DEPENDENT
          key: percona.database.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#DATABASE}'
                value: '{$PERCONA.DBNAME.MATCHES}'
              - macro: '{#DATABASE}'
                value: '{$PERCONA.DBNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for the discovery of databases.'
          item_prototypes:
            - uuid: 3141179ef78b4a31affa9e049b4048b8
              name: 'Database [{#DATABASE}]: Size'
              type: ODBC
              key: 'db.odbc.select[{#DATABASE}_size,"{$PERCONA.DSN}"]'
              delay: 5m
              units: B
              params: 'SELECT COALESCE(SUM(DATA_LENGTH + INDEX_LENGTH),0) FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA="{#DATABASE}"'
              username: '{$PERCONA.USER}'
              password: '{$PERCONA.PASSWORD}'
              description: 'Database size.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: storage
                - tag: database
                  value: '{#DATABASE}'
          master_item:
            key: 'db.odbc.get[get_database,"{$PERCONA.DSN}"]'
          lld_macro_paths:
            - lld_macro: '{#DATABASE}'
              path: $.Database
            - lld_macro: '{#TABLES_MATCHES}'
              path: $.matches
            - lld_macro: '{#TABLES_NOT_MATCHES}'
              path: $.not_matches
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var dbs = JSON.parse(value);
                  
                  dbs.forEach(function (db) {
                    var name = db.Database;
                    db.matches = "{" + "$PERCONA.TABLE.NAMES.MATCHES:" + name + "}";
                    db.not_matches = "{" + "$PERCONA.TABLE.NAMES.NOT_MATCHES:" + name + "}";
                  });
                  
                  return JSON.stringify(dbs);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: 3141d04c1b7a45a4b8c581d728eb1563
          name: 'Replication discovery'
          type: DEPENDENT
          key: percona.replication.discovery
          description: 'Discovery of the replication.'
          item_prototypes:
            - uuid: 314136bd0bad47718fe345c1274203f5
              name: 'Replication {#REPLICA.KEY} status'
              type: ODBC
              key: 'db.odbc.get["get_{#REPLICA.KEY}_status","{$PERCONA.DSN}"]'
              history: '0'
              value_type: TEXT
              params: 'show {#REPLICA.KEY} status'
              username: '{$PERCONA.USER}'
              password: '{$PERCONA.PASSWORD}'
              description: 'Gets status information on the essential parameters of the `{#REPLICA.KEY}` threads.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: JSONPATH
                  parameters:
                    - $.first()
                  error_handler: DISCARD_VALUE
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var result = [];
                      
                      try {
                      	const obj = JSON.parse(value);
                      	if ("Source_Host" in obj) {
                      		result = [{
                      			"replica_key": "replica",
                      			"replica_name": "Replica",
                      			"source_key": "source",
                      			"source_name": "Source"
                      		}];
                      	} else {
                      		result = [{
                      			"replica_key": "slave",
                      			"replica_name": "Slave",
                      			"source_key": "master",
                      			"source_name": "Master"
                      		}];
                      	}
                      } catch (error) {
                      	Zabbix.log(3, "Percona replica status ERROR: " + error);
                      }
                      
                      return JSON.stringify(result);
              tags:
                - tag: component
                  value: raw
          master_item:
            key: 'db.odbc.select[version,"{$PERCONA.DSN}"]'
          lld_macro_paths:
            - lld_macro: '{#REPLICA.KEY}'
              path: $.replica_key
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  const ref = '{$PERCONA.REPLICA.STATUS.MIN.VER}';
                  
                  if (!value || value.length === 0) {
                  	return "[]";
                  }
                  
                  var dataReplica = [{
                  	"replica_key": "replica",
                  }];
                  
                  var dataSlave = [{
                  	"replica_key": "slave",
                  }];
                  
                  const valueParts = value.replace('-', '.').split('.').map(Number);
                  const refParts = ref.replace('-', '.').split('.').map(Number);
                  
                  const maxLength = Math.max(valueParts.length, refParts.length);
                  
                  for (var i = 0; i < maxLength; i++) {
                  	const valuePart = valueParts[i] || 0;
                  	const refPart = refParts[i] || 0;
                  
                  	if (valuePart > refPart) {
                  		return JSON.stringify(dataReplica);
                  	}
                  	if (valuePart < refPart) {
                  		return JSON.stringify(dataSlave);
                  	}
                  }
                  
                  return JSON.stringify(dataReplica);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: 314135c0267c48e28bc6ecb99fb2380d
          name: 'Replication [{#REPLICA.KEY}]: Replica discovery'
          type: DEPENDENT
          key: 'percona.replication.discovery["{#REPLICA.KEY}_discovery","{$PERCONA.DSN}"]'
          description: 'Discovery of the replication.'
          item_prototypes:
            - uuid: 314165c4bee84e74bb6e00061ab27f0c
              name: 'Replication: Get data'
              type: ODBC
              key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              history: '0'
              value_type: TEXT
              params: 'show {#REPLICA.KEY} status'
              username: '{$PERCONA.USER}'
              password: '{$PERCONA.PASSWORD}'
              description: 'Gets status information on the essential parameters of the `{#REPLICA.KEY}` threads.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.first()
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: raw
            - uuid: 3141a43d0582459dbba2decdd1238fbe
              name: 'Replication: {#SOURCE.NAME} Host'
              type: DEPENDENT
              key: 'percona.master_host["{#REPLICA.KEY}/{#REPLICA.NAME}"]'
              value_type: CHAR
              description: 'Describes the hostname or IP address of the Percona primary (source/master) server that the replica uses.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.{#SOURCE.NAME}_Host'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 3141b22867f54551afbed139d746e210
              name: 'Replication: Seconds behind {#SOURCE.NAME}'
              type: DEPENDENT
              key: 'percona.seconds_behind_master["{#REPLICA.KEY}/{#REPLICA.NAME}"]'
              units: s
              description: 'The number of seconds the `{#REPLICA.KEY}` SQL thread has been behind processing the `{#SOURCE.KEY}` binary log. A high number (or an increasing one) can indicate that the `{#REPLICA.KEY}` is unable to handle events from the `{#SOURCE.KEY}` in a timely fashion.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Seconds_Behind_{#SOURCE.NAME}'
                - type: MATCHES_REGEX
                  parameters:
                    - \d+
                  error_handler: CUSTOM_ERROR
                  error_handler_params: 'Replication is not performed.'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: 31418a73bbf34ffcb95b3e11e2824feb
                  expression: 'min(/Percona by ODBC/percona.seconds_behind_master["{#REPLICA.KEY}/{#REPLICA.NAME}"],5m)>{$PERCONA.REPL_LAG.MAX.WARN}'
                  name: 'Percona: Replication lag is too high'
                  event_name: 'Percona: Replication lag is too high (over {$PERCONA.REPL_LAG.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Replication delay is too long.'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 31417b80eb904bc9bfa0a211161d2aca
              name: 'Replication: {#REPLICA.NAME} Last IO error'
              type: DEPENDENT
              key: 'percona.slave_io_error["{#REPLICA.KEY}/{#REPLICA.NAME}"]'
              value_type: TEXT
              description: 'Describes the last I/O error message reported by the replica I/O thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.Last_IO_Error
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 3141b116753d4124a88443fe4de20d41
              name: 'Replication: {#REPLICA.NAME} IO running'
              type: DEPENDENT
              key: 'percona.slave_io_running["{#REPLICA.KEY}/{#REPLICA.NAME}"]'
              description: 'Indicates whether the I/O thread for reading the `{#SOURCE.KEY}` binary log is running. Normally, you want this to be `Yes` unless you have not yet started a replication or have explicitly stopped it with `stop {#REPLICA.KEY}`.'
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.{#REPLICA.NAME}_IO_Running'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      const idx = [
                      	'Yes',
                      	'No',
                      	'Connecting'
                      ].indexOf(value);
                      return idx === -1 ? 0 : idx + 1;
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: 31416036f4f14ae7adc8c70126bb315a
                  expression: 'last(/Percona by ODBC/percona.slave_io_running["{#REPLICA.KEY}/{#REPLICA.NAME}"])<>1'
                  name: 'Percona: The {#REPLICA.KEY} I/O thread is not connected to a replication {#SOURCE.KEY}'
                  priority: WARNING
                  description: 'Indicates whether the `{#REPLICA.KEY}` I/O thread is connected to the `{#SOURCE.KEY}`.'
                  dependencies:
                    - name: 'Percona: The {#REPLICA.KEY} I/O thread is not running'
                      expression: 'last(/Percona by ODBC/percona.slave_io_running["{#REPLICA.KEY}/{#REPLICA.NAME}"])=0'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: 3141061a61df4bbb8bac516ecec91b70
                  expression: 'last(/Percona by ODBC/percona.slave_io_running["{#REPLICA.KEY}/{#REPLICA.NAME}"])=0'
                  name: 'Percona: The {#REPLICA.KEY} I/O thread is not running'
                  priority: AVERAGE
                  description: 'Indicates whether the I/O thread for reading the `{#SOURCE.KEY}` binary log is running.'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 3141f5d118b74be291b46644e57f7320
              name: 'Replication: {#REPLICA.NAME} Last SQL error'
              type: DEPENDENT
              key: 'percona.slave_sql_error["{#REPLICA.KEY}/{#REPLICA.NAME}"]'
              value_type: TEXT
              description: 'Describes the last SQL error message reported by the replica SQL thread that caused replication to stop or behave incorrectly.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.Last_SQL_Error
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
            - uuid: 3141e79554c14c2aad08036febb15d71
              name: 'Replication: {#REPLICA.NAME} SQL running'
              type: DEPENDENT
              key: 'percona.slave_sql_running["{#REPLICA.KEY}/{#REPLICA.NAME}"]'
              description: |
                Indicates whether the SQL thread for executing events in the relay log is running.
                As with the I/O thread, this should normally be `Yes`.
              valuemap:
                name: 'Running state'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.{#REPLICA.NAME}_SQL_Running'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      const idx = [
                      	'Yes',
                      	'No',
                      	'Connecting'
                      ].indexOf(value);
                      return idx === -1 ? 0 : idx + 1;
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
              trigger_prototypes:
                - uuid: 314129e5e3f34e8b828b4a0e2eaa0026
                  expression: 'last(/Percona by ODBC/percona.slave_sql_running["{#REPLICA.KEY}/{#REPLICA.NAME}"])=0'
                  name: 'Percona: The SQL thread is not running'
                  priority: WARNING
                  description: 'Indicates whether the SQL thread for executing events in the relay log is running.'
                  dependencies:
                    - name: 'Percona: The {#REPLICA.KEY} I/O thread is not running'
                      expression: 'last(/Percona by ODBC/percona.slave_io_running["{#REPLICA.KEY}/{#REPLICA.NAME}"])=0'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 3141b463bb9740a4a4256306f11816bf
              name: 'Replication: SQL running state'
              type: DEPENDENT
              key: 'percona.slave_sql_running_state["{#REPLICA.KEY}.{#REPLICA.NAME}"]'
              value_type: TEXT
              description: 'Shows the state of the SQL driver threads.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.{#REPLICA.NAME}_SQL_Running_State'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'db.odbc.get["{#REPLICA.KEY}/{#REPLICA.NAME}_get_data","{$PERCONA.DSN}"]'
              tags:
                - tag: component
                  value: replication
          parent_discovery_rule:
            key: percona.replication.discovery
          master_item:
            key: 'db.odbc.get["get_{#REPLICA.KEY}_status","{$PERCONA.DSN}"]'
          lld_macro_paths:
            - lld_macro: '{#REPLICA.NAME}'
              path: $.replica_name
            - lld_macro: '{#SOURCE.KEY}'
              path: $.source_key
            - lld_macro: '{#SOURCE.NAME}'
              path: $.source_name
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
        - uuid: 6c42ba38d3744f6493357444b49d250c
          name: 'Database [{#DATABASE}]: Enable table discovery'
          type: SCRIPT
          key: 'percona.table.enable.discovery[{#DATABASE}]'
          delay: 1h
          params: |
            const params = JSON.parse(value);
            var out = [];
            
            const tables_matches = params['tables_matches'];
            const tables_not_matches = params['tables_not_matches'];
            
            if (tables_matches !== 'CHANGE_IF_NEEDED' || tables_not_matches !== 'CHANGE_IF_NEEDED') {
            	out = [{'singleton': ''}];
            }
            return JSON.stringify(out);
          description: 'Used to enable table discovery.'
          item_prototypes:
            - uuid: 314196efa5c74a09aed6fc566d0d68c1
              name: 'Database [{#DATABASE}]: Get tables'
              type: ODBC
              key: 'db.odbc.get[{#SINGLETON}{#DATABASE}_tables,"{$PERCONA.DSN}"]'
              delay: 1h
              history: '0'
              value_type: TEXT
              params: 'SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA = ''{#DATABASE}'' AND TABLE_NAME REGEXP ''{$PERCONA.TABLE.NAMES.MATCHES:"{#DATABASE}"}'' AND TABLE_NAME NOT REGEXP ''{$PERCONA.TABLE.NAMES.NOT_MATCHES:"{#DATABASE}"}'';'
              username: '{$PERCONA.USER}'
              password: '{$PERCONA.PASSWORD}'
              description: 'Database table discovery.'
              tags:
                - tag: component
                  value: raw
          parent_discovery_rule:
            key: percona.database.discovery
          parameters:
            - name: tables_matches
              value: '{#TABLES_MATCHES}'
            - name: tables_not_matches
              value: '{#TABLES_NOT_MATCHES}'
          lld_macro_paths:
            - lld_macro: '{#SINGLETON}'
              path: $.singleton
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          overrides:
            - name: 'Disable tables discovery'
              step: '1'
              filter:
                conditions:
                  - macro: '{#SINGLETON}'
                    operator: NOT_EXISTS
              operations:
                - operator: LIKE
                  value: 'Get tables'
                  discover: NO_DISCOVER
                  status: DISABLED
                - operationobject: LLD_RULE_PROTOTYPE
                  operator: LIKE
                  value: 'Tables discovery'
                  discover: NO_DISCOVER
                  status: DISABLED
        - uuid: 314195267ff645bd8db8ae0fd6264e34
          name: 'Database [{#DATABASE}]: Table discovery'
          type: DEPENDENT
          key: 'percona.tables.discovery[{#SINGLETON}{#DATABASE}]'
          description: 'Used for the discovery of tables of the databases.'
          item_prototypes:
            - uuid: 31410e0841b546069a28f104d8994138
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Get data'
              type: ODBC
              key: 'db.odbc.get[{#SINGLETON}{#DATABASE}/{#TABLE_NAME}.data,"{$PERCONA.DSN}"]'
              delay: 5m
              history: '0'
              value_type: TEXT
              params: 'SELECT TABLE_NAME, DATA_LENGTH, INDEX_LENGTH, DATA_FREE, TABLE_ROWS FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA = ''{#DATABASE}'' AND TABLE_NAME = ''{#TABLE_NAME}'';'
              username: '{$PERCONA.USER}'
              password: '{$PERCONA.PASSWORD}'
              description: 'Database table data.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.first()
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: raw
            - uuid: 31418b535c62423eb8003bce432033ae
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Data free'
              type: DEPENDENT
              key: 'percona.table.data_free[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]'
              units: B
              description: 'The amount of unused but allocated space.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.DATA_FREE
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get[{#SINGLETON}{#DATABASE}/{#TABLE_NAME}.data,"{$PERCONA.DSN}"]'
              tags:
                - tag: database
                  value: '{#DATABASE}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 31411366222f4c3e965cdbe0185ab4de
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Data length'
              type: DEPENDENT
              key: 'percona.table.data_length[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]'
              units: B
              description: 'The size of the data in the table.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.DATA_LENGTH
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get[{#SINGLETON}{#DATABASE}/{#TABLE_NAME}.data,"{$PERCONA.DSN}"]'
              tags:
                - tag: database
                  value: '{#DATABASE}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 3141a26520e84f45965da139b618377e
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Free ratio'
              type: CALCULATED
              key: 'percona.table.free_ratio[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]'
              value_type: FLOAT
              params: '(last(//percona.table.data_free[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) / last(//percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]))'
              description: |
                The fraction of allocated table space that is currently unused (`DATA_FREE` / (`DATA_LENGTH` + `INDEX_LENGTH`)).
                High values indicate potential table fragmentation or inefficient space usage.
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: database
                  value: '{#DATABASE}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 31417374b56041da825e544b24d52d87
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Index length'
              type: DEPENDENT
              key: 'percona.table.index_length[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]'
              units: B
              description: 'The size occupied by the table''s indexes.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.INDEX_LENGTH
                - type: MULTIPLIER
                  parameters:
                    - '1'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get[{#SINGLETON}{#DATABASE}/{#TABLE_NAME}.data,"{$PERCONA.DSN}"]'
              tags:
                - tag: database
                  value: '{#DATABASE}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 31413b13155942428a8d67abb80f9487
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Rows'
              type: DEPENDENT
              key: 'percona.table.rows[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]'
              units: '!rows'
              description: 'The approximate number of rows in the table. For InnoDB, the `TABLE_ROWS` value is approximate and may differ from the actual count.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: JSONPATH
                  parameters:
                    - $.TABLE_ROWS
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get[{#SINGLETON}{#DATABASE}/{#TABLE_NAME}.data,"{$PERCONA.DSN}"]'
              tags:
                - tag: database
                  value: '{#DATABASE}'
                - tag: table
                  value: '{#TABLE_NAME}'
            - uuid: 314152a0187e41dbaa227f9b8c8ef063
              name: 'Table [{#DATABASE}/{#TABLE_NAME}]: Total size'
              type: CALCULATED
              key: 'percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]'
              units: B
              params: 'last(//percona.table.data_length[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) + last(//percona.table.index_length[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"])'
              description: 'The sum of `DATA_LENGTH` and `INDEX_LENGTH` represents the total size of the table.'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: database
                  value: '{#DATABASE}'
                - tag: table
                  value: '{#TABLE_NAME}'
              trigger_prototypes:
                - uuid: 3141c4cba9dd49b996a5d1cc84df1657
                  expression: '(last(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"])-min(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"],5m))>{$PERCONA.TOTALSIZE.GROWTH.MAX.WARN}'
                  name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Total size growth is high'
                  event_name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Total size growth is high (over {$PERCONA.TOTALSIZE.GROWTH.MAX.WARN} for 5m)'
                  priority: WARNING
                  description: 'Total table size growth is high.'
                  dependencies:
                    - name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Total size growth is too high'
                      expression: '(last(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"])-min(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"],5m))>{$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT}'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: 3141fdd7fba64ac18de0a2eaf0b86170
                  expression: '(last(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"])-min(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"],5m))>{$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT}'
                  name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Total size growth is too high'
                  event_name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Total size growth is too high (over {$PERCONA.TOTALSIZE.GROWTH.MAX.CRIT} for 5m)'
                  priority: HIGH
                  description: 'Total table size growth is too high.'
                  tags:
                    - tag: scope
                      value: capacity
          trigger_prototypes:
            - uuid: 31410effd39a4031b2f8e26c11065400
              expression: 'last(/Percona by ODBC/percona.table.free_ratio[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.FRAGMENTATION.WARN} and last(/Percona by ODBC/percona.table.data_free[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.DATA_FREE.MIN.WARN} and last(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.TABLE_SIZE.MIN.WARN}'
              name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Free space high'
              event_name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Free space high (fragmentation warning)'
              priority: WARNING
              description: 'Free table space is high (fragmentation warning).'
              dependencies:
                - name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Free space very high'
                  expression: 'last(/Percona by ODBC/percona.table.free_ratio[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.FRAGMENTATION.CRIT} and last(/Percona by ODBC/percona.table.data_free[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.DATA_FREE.MIN.CRIT} and last(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.TABLE_SIZE.MIN.CRIT}'
              tags:
                - tag: scope
                  value: performance
            - uuid: 314142ca19694e88a8757561b19aae96
              expression: 'last(/Percona by ODBC/percona.table.free_ratio[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.FRAGMENTATION.CRIT} and last(/Percona by ODBC/percona.table.data_free[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.DATA_FREE.MIN.CRIT} and last(/Percona by ODBC/percona.table.total_size[{#SINGLETON}{#DATABASE}/{#TABLE_NAME},"{$PERCONA.DSN}"]) > {$PERCONA.TABLE_SIZE.MIN.CRIT}'
              name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Free space very high'
              event_name: 'Percona: Table [{#DATABASE}/{#TABLE_NAME}]: Free space very high (fragmentation critical)'
              priority: HIGH
              description: 'Free table space is very high (fragmentation critical).'
              tags:
                - tag: scope
                  value: performance
          parent_discovery_rule:
            key: 'percona.table.enable.discovery[{#DATABASE}]'
          master_item:
            key: 'db.odbc.get[{#SINGLETON}{#DATABASE}_tables,"{$PERCONA.DSN}"]'
