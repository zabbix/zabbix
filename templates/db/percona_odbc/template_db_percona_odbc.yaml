zabbix_export:
  version: '8.0'
  template_groups:
    - uuid: 748ad4d098d447d492bb935c907f652f
      name: Templates/Databases
  templates:
    - uuid: 314164deeed1474192de77a60fa27ff1
      template: 'Percona by ODBC'
      name: 'Percona by ODBC'
      description: |
        Requirements for template operation:
        1. Create a Percona user for monitoring. For example:
        
        CREATE USER 'zbx_monitor'@'%' IDENTIFIED BY '<password>';
        GRANT REPLICATION CLIENT,PROCESS,SHOW DATABASES,SHOW VIEW ON *.* TO 'zbx_monitor'@'%';
        
        2. Set the user name and password in the host macros ({$PERCONA.USER} and {$PERCONA.PASSWORD}) if they are not already specified in the `odbc.ini` configuration file for ODBC monitoring.
        
        Generated by official Zabbix template tool "Templator"
      wizard_ready: 'YES'
      readme: |
        ## Setup
        
        1. Create a Percona user for monitoring (`<password>` at your discretion):
        
        ```text
        CREATE USER 'zbx_monitor'@'%' IDENTIFIED BY '<password>';
        GRANT REPLICATION CLIENT,PROCESS,SHOW DATABASES,SHOW VIEW ON *.* TO 'zbx_monitor'@'%';
        ```
        
        2. Set the username and password in the `Percona user` and `Percona password` fields in the host wizard,
        if they are not already specified in the `odbc.ini` configuration file for ODBC monitoring.
        
        Optionally, it is possible to customize the template:
        - The discovery of tables is disabled by default. To enable table discovery, change the value of the macro `{$PERCONA.TABLE.NAMES.MATCHES}` to the name of a single table, or use a regex string to include multiple tables.
        - You can also add an additional context macro `{$PERCONA.TABLE.NAMES.MATCHES:<dbname>}` for specific databases to precisely control which tables should be discovered.
        - To exclude certain tables from discovery, change the value of the macro `{$PERCONA.TABLE.NAMES.NOT_MATCHES}` to the name of a single table, or use a regex string to exclude multiple tables.
        - You can also add an additional context macro `{$PERCONA.TABLE.NAMES.NOT_MATCHES:<dbname>}` for specific databases to precisely control which tables should be excluded.
      vendor:
        name: Zabbix
        version: 8.0-0
      groups:
        - name: Templates/Databases
      items:
        - uuid: 31411bf6b6af401c9dfb10c0cbfddee1
          name: 'Get database'
          type: ODBC
          key: 'db.odbc.get[get_database,"{$PERCONA.DSN}"]'
          delay: 1h
          history: '0'
          value_type: TEXT
          params: 'show databases'
          username: '{$PERCONA.USER}'
          password: '{$PERCONA.PASSWORD}'
          description: 'Used for scanning databases in DBMS.'
          tags:
            - tag: component
              value: raw
        - uuid: 6ca32ea78f9140c6a66dbac3467cdc70
          name: 'Get global variables'
          type: ODBC
          key: 'db.odbc.get[get_global_variables,"{$PERCONA.DSN}"]'
          delay: 1h
          history: '0'
          value_type: TEXT
          params: |
            SHOW GLOBAL VARIABLES 
            WHERE Variable_name IN (
              'thread_handling',
              'thread_pool_max_threads',
              'thread_pool_stall_limit'
            );
          username: '{$PERCONA.USER}'
          password: '{$PERCONA.PASSWORD}'
          tags:
            - tag: component
              value: raw
        - uuid: 3141f88741d746bf88e8951ef69681f9
          name: 'Get status variables'
          type: ODBC
          key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          history: '0'
          value_type: TEXT
          params: 'show global status'
          username: '{$PERCONA.USER}'
          password: '{$PERCONA.PASSWORD}'
          description: 'Gets server global status information.'
          tags:
            - tag: component
              value: raw
        - uuid: 314114e38799427cb6520f47bf8afe6c
          name: Status
          type: ODBC
          key: 'db.odbc.select[ping,"{$PERCONA.DSN}"]'
          params: 'select "1"'
          username: '{$PERCONA.USER}'
          password: '{$PERCONA.PASSWORD}'
          description: 'Percona server status.'
          valuemap:
            name: 'Service state'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          tags:
            - tag: component
              value: application
            - tag: component
              value: health
          triggers:
            - uuid: 3141e41d7b4f4336a3e5ef4720f6ee41
              expression: 'last(/Percona by ODBC/db.odbc.select[ping,"{$PERCONA.DSN}"])=0'
              name: 'Percona: Service is unreachable'
              priority: HIGH
              description: 'Percona is unreachable.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 314180ca366e4d33801472bcd013f881
          name: Version
          type: ODBC
          key: 'db.odbc.select[version,"{$PERCONA.DSN}"]'
          delay: 15m
          value_type: CHAR
          params: 'select version()'
          username: '{$PERCONA.USER}'
          password: '{$PERCONA.PASSWORD}'
          description: 'Percona server version.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: 3141a1d3d82d47ac85964baeae121b2b
              expression: 'last(/Percona by ODBC/db.odbc.select[version,"{$PERCONA.DSN}"],#1)<>last(/Percona by ODBC/db.odbc.select[version,"{$PERCONA.DSN}"],#2) and length(last(/Percona by ODBC/db.odbc.select[version,"{$PERCONA.DSN}"]))>0'
              name: 'Percona: Version has changed'
              event_name: 'Percona: Version has changed (new version value received: {ITEM.VALUE})'
              priority: INFO
              description: 'The Percona version has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 31415748ba4742c0aa3c4f29509a162d
          name: 'Aborted clients per second'
          type: DEPENDENT
          key: percona.aborted_clients.rate
          value_type: FLOAT
          description: 'Number of connections that were aborted because the client died without closing the connection properly.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Aborted_clients'')].Value.first()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: connections
        - uuid: 31415e79abd744f78ce579a83381ba87
          name: 'Aborted connections per second'
          type: DEPENDENT
          key: percona.aborted_connects.rate
          value_type: FLOAT
          description: 'Number of failed attempts to connect to the Percona server.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Aborted_connects'')].Value.first()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: connections
          triggers:
            - uuid: 3141cb80f9c3442d978c63780b1ebc9f
              expression: 'min(/Percona by ODBC/percona.aborted_connects.rate,5m)>{$PERCONA.ABORTED_CONN.MAX.WARN}'
              name: 'Percona: Server has aborted connections'
              event_name: 'Percona: Server has aborted connections (over {$PERCONA.ABORTED_CONN.MAX.WARN} for 5m)'
              priority: AVERAGE
              description: 'The number of failed attempts to connect to the Percona server has been more than `{$PERCONA.ABORTED_CONN.MAX.WARN}` in the last 5 minutes.'
              dependencies:
                - name: 'Percona: Refused connections'
                  expression: 'last(/Percona by ODBC/percona.connection_errors_max_connections.rate)>0'
              tags:
                - tag: scope
                  value: availability
        - uuid: 31417e72fd9d404a8e1fd4e72c92d75c
          name: 'Binlog cache disk use'
          type: DEPENDENT
          key: percona.binlog_cache_disk_use
          value_type: FLOAT
          description: 'Number of transactions that used a temporary disk cache because they could not fit in the regular binary log cache, being larger than `binlog_cache_size`.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Binlog_cache_disk_use'')].Value.first()'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: cache
        - uuid: 3141e91206bb4138a945ea0de2d8c01d
          name: 'Buffer pool efficiency'
          type: CALCULATED
          key: percona.buffer_pool_efficiency
          value_type: FLOAT
          units: '%'
          params: |
            100 - (last(//percona.innodb_buffer_pool_reads) / 
            ( last(//percona.innodb_buffer_pool_read_requests) + 
            ( last(//percona.innodb_buffer_pool_read_requests) = 0 ) ) * 100 * 
            ( last(//percona.innodb_buffer_pool_read_requests) > 0 ))
          description: 'The item shows how effectively the buffer pool is serving reads.'
          tags:
            - tag: component
              value: memory
        - uuid: 314120e067ea405eb939d319fa9690e9
          name: 'Buffer pool utilization'
          type: CALCULATED
          key: percona.buffer_pool_utilization
          value_type: FLOAT
          units: '%'
          params: |
            ( last(//percona.innodb_buffer_pool_pages_total) - 
            last(//percona.innodb_buffer_pool_pages_free) ) / 
            ( last(//percona.innodb_buffer_pool_pages_total) + 
            ( last(//percona.innodb_buffer_pool_pages_total) = 0 ) ) * 100 * 
            ( last(//percona.innodb_buffer_pool_pages_total) > 0 )
          description: 'Ratio of used to total pages in the buffer pool.'
          tags:
            - tag: component
              value: memory
        - uuid: 3141592e6ae74e64bc54c649418761a6
          name: 'Bytes received'
          type: DEPENDENT
          key: percona.bytes_received.rate
          value_type: FLOAT
          units: Bps
          description: 'Number of bytes received from all clients.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.Variable_name==''Bytes_received'')].Value.first()'
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'db.odbc.get[get_status_variables,"{$PERCONA.DSN}"]'
          tags:
            - tag: component
              value: network
        - uuid: 31417bc186f24014a70c75da2386986d
