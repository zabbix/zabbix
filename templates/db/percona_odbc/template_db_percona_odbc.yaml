            - uuid: c280466cf94c4b3ab6f1149473bbdf56
              name: 'Thread pool threads'
              type: DEPENDENT
              key: 'percona.threadpool_threads[{#SINGLETON}]'
              description: 'Number of threads in the pool.'
              preprocessing:
                - type: JSONPATH
                  parameters:
