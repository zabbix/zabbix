zabbix_export:
  version: '8.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 070df8fe673b439bb8ec96030cb358e6
      template: 'Microsoft Hyper-V Standalone by SSH'
      name: 'Microsoft Hyper-V Standalone by SSH'
      description: 'Generated by official Zabbix template tool "Templator"'
      wizard_ready: 'YES'
      readme: |
        ### Prerequisites & Least Privilege Scope (Information security)
        
        Solution requires a service account with sufficient privileges to query virtualization subsystems. The exact implementation of these privileges (e.g., via Local Administrators group, Delegated Permissions, or JEA) is at the discretion of the infrastructure administrator, provided the following functional requirements are met.
        
        #### Connectivity & Execution
        
        *   **SSH Access:** The account must be able to establish an SSH session.
            
        *   **PowerShell Execution:** The account requires permission to execute PowerShell commands (non-interactive mode).
            
        
        #### WMI & CIM Namespaces (Read Access)
        
        The solution relies heavily on WMI queries. Read access is required for the following namespaces:
        
        *   root\\cimv2 (Operating System, Processor, Physical Memory, Logical Disk).
            
        *   root\\virtualization\\v2 (Hyper-V VM states, Resource Metering, Configuration).
                
        ### SSH Setup
        
        1.  **Create a Service Account**: Create a user (e.g., zabbix\_mon) in the domain or locally on all nodes.
            
        2.  **Install SSH service**:
            
        
            ```powershell
            # Install SSH service
            Add-WindowsCapability -Online -Name OpenSSH.Server
        
            # Set autorun and start service
            Start-Service sshd
            Set-Service -Name sshd -StartupType 'Automatic'
        
            # Open port in firewall
            if (!(Get-NetFirewallRule -Name "OpenSSH-Server-In-TCP" -ErrorAction SilentlyContinue | Select-Object Name, Enabled)) {
                New-NetFirewallRule -Name 'OpenSSH-Server-In-TCP' -DisplayName 'OpenSSH Server (sshd)' -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort 22
            }
        
            # Enable resource metering for all VMs (needed for statistics without PerfCounters)
            Get-VM -Name * | Enable-VMResourceMetering
            ```
                
        3.  **Zabbix Configuration**:
            
            *   Ensure timeout is set to at least **30 seconds** (script takes ~15s).
                
        
        ### Verification
        
        ```ssh -l <user_name>@<domain_name> <claster_name>```
        
        or
        
        ```ssh -l <loacal_user> <claster_name>```
        
        ### Enable Resource Metering for VMs
        
        To ensure accurate collection of CPU, Disk I/O, and Network traffic metrics, Resource Metering must be enabled on all Virtual Machines. By default, Hyper-V creates new VMs with this feature disabled.
        
        Recommended Approach: Create a Scheduled Task on each Hyper-V Node to automatically enable metering for new VMs.
        
        PowerShell Deployment Command (Run as Admin): This command creates a daily task named HyperV-AutoEnableMetering that runs under the SYSTEM account.
        
        ```powershell
        $Action = New-ScheduledTaskAction -Execute "powershell.exe" `
            -Argument '-NoProfile -Command "Get-VM | Where-Object ResourceMeteringEnabled -eq $false | Enable-VMResourceMetering"'
        
        $Trigger = New-ScheduledTaskTrigger -Daily -At "04:00"
        
        Register-ScheduledTask -Action $Action -Trigger $Trigger `
            -TaskName "HyperV-AutoEnableMetering" `
            -User "NT AUTHORITY\SYSTEM" `
            -RunLevel Highest `
            -Description "Automatically enables Resource Metering for new VMs to support Zabbix monitoring."
        ```
      vendor:
        name: Zabbix
        version: 8.0-0
      groups:
        - name: Templates/Applications
      items:
        - uuid: 5065c88ab64948d7850fe4b8eac24209
          name: 'Get data message'
          type: DEPENDENT
          key: hyperv.get_data.message
          value_type: CHAR
          description: 'Message from the data retrieval process for Microsoft Hyper-V.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.Message
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 5cd965957e1241cc8b29cbde8238f9e9
              expression: 'last(/Microsoft Hyper-V Standalone by SSH/hyperv.get_data.message)<>"OK"'
              name: 'Hyper-V Standalone: Data retrieval failure'
              opdata: 'Message: {ITEM.LASTVALUE}'
              priority: DISASTER
              description: 'Trigger fires when there is an error retrieving data from Hyper-V.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 197c1b64f9d143aeab56314bed7271ce
          name: 'Get data performance'
          type: DEPENDENT
          key: hyperv.get_data.performance
          value_type: FLOAT
          units: s
          description: 'Time taken to retrieve data about Microsoft Hyper-V via SSH.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.Data.Perf.TotalTime
              error_handler: DISCARD_VALUE
            - type: MULTIPLIER
              parameters:
                - '0.001'
          master_item:
            key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
          tags:
            - tag: component
              value: performance
            - tag: component
              value: system
        - uuid: 1f7eaaa3f6b040b99ab188f8fd33e3a4
          name: 'Get data'
          type: SSH
          key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
          history: '0'
          value_type: TEXT
          params: 'powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference=''SilentlyContinue'';$Sw=[System.Diagnostics.Stopwatch]::StartNew();$Result=@{Message=''OK'';Data=@{VMs=@();Perf=@{}}};try{$VMs=Get-VM;$Met=$VMs|Measure-VM;$Map=@{};if($Met){foreach($m in $Met){$Map[$m.VMId.ToString()]=$m}};foreach($vm in $VMs){$s=$Map[$vm.Id.ToString()];$Cpu=0;$Dr=0;$Dw=0;$Ni=0;$No=0;if($s){$Cpu=[math]::Round($s.AverageProcessorUsage,0);if($s.AggregatedDiskDataRead -ge 0){$Dr=$s.AggregatedDiskDataRead;$Dw=$s.AggregatedDiskDataWritten};$Nr=$s.NetworkMeteredTrafficReport;if($Nr){foreach($n in $Nr){if($n.Direction -eq ''Inbound''){$Ni+=$n.TotalTraffic}elseif($n.Direction -eq ''Outbound''){$No+=$n.TotalTraffic}}}};$Mu=if($vm.MemoryDemand -gt 0){$vm.MemoryDemand}else{$vm.MemoryAssigned};$Result.Data.VMs+=@{Name=$vm.Name;Id=$vm.Id.ToString();State=[int]$vm.State;CPU=$Cpu;UsedMem=[long]$Mu;TotalMem=[long]$vm.MemoryAssigned;DiskRead=[long]$Dr;DiskWrite=[long]$Dw;NetIn=[long]$Ni;NetOut=[long]$No;Uptime=if($vm.Uptime){[int]$vm.Uptime.TotalSeconds}else{0}}}}catch{$Result.Message=''Error:''+$_.Exception.Message};$Sw.Stop();$Result.Data.Perf.TotalTime=$Sw.ElapsedMilliseconds;$Result|ConvertTo-Json -Depth 3 -Compress"'
          username: '{$HYPERV.SSH.USER}'
          password: '{$HYPERV.SSH.PASSWORD}'
          description: 'Collects data about Microsoft Hyper-V via SSH.'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '0'
                - '.*timeout error.*'
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"Message": "Timeout error. Consider increasing the timeout setting.", "Data": {"Perf": {"TotalTime": 0}}}'
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"Message": "Error getting data. Check the logs for more details.", "Data": {"Perf": {"TotalTime": 0}}}'
          timeout: 60s
          tags:
            - tag: component
              value: raw
      discovery_rules:
        - uuid: 5e41ebd67e3d4f2c83ada515fe38aebd
          name: 'VM discovery'
          type: DEPENDENT
          key: hyperv.vm.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#VM.NAME}'
                value: '{$HYPERV.FILTER.LLD.VM.NAME.MATCHES}'
              - macro: '{#VM.NAME}'
                value: '{$HYPERV.FILTER.LLD.VM.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#VM.STATUS}'
                value: '{$HYPERV.FILTER.LLD.VM.STATUS.MATCHES}'
              - macro: '{#VM.STATUS}'
                value: '{$HYPERV.FILTER.LLD.VM.STATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discover Hyper-V Virtual machines.'
          item_prototypes:
            - uuid: 7278696cb5484cdfbef7c82abcee932a
              name: 'VM [{#VM.NAME}]: CPU utilization'
              type: DEPENDENT
              key: 'hyperv.vm.cpu.utilization[{#VM.ID}]'
              value_type: FLOAT
              units: Hz
              description: 'CPU utilization of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].CPU.first()'
                  error_handler: DISCARD_VALUE
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: cpu
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: 49239fc69c224f77b80458992e7b89c6
              name: 'VM [{#VM.NAME}]: Disk read (bytes per second)'
              type: DEPENDENT
              key: 'hyperv.vm.disk.read[{#VM.ID}]'
              units: Bps
              description: 'Disk read speed of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].DiskRead.first()'
                  error_handler: DISCARD_VALUE
                - type: MULTIPLIER
                  parameters:
                    - '1048576'
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: storage
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: f76cc6ae01ef461d8040c12c0f651479
              name: 'VM [{#VM.NAME}]: Disk write (bytes per second)'
              type: DEPENDENT
              key: 'hyperv.vm.disk.write[{#VM.ID}]'
              units: Bps
              description: 'Disk write speed of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].DiskWrite.first()'
                  error_handler: DISCARD_VALUE
                - type: MULTIPLIER
                  parameters:
                    - '1048576'
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: storage
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: 48d9719a34974d63947865a8b756f47c
              name: 'VM [{#VM.NAME}]: Total memory'
              type: DEPENDENT
              key: 'hyperv.vm.memory.total[{#VM.ID}]'
              units: B
              description: 'Total memory of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].TotalMem.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: memory
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: 710e01d005234324b2373289ce57b696
              name: 'VM [{#VM.NAME}]: Used memory'
              type: DEPENDENT
              key: 'hyperv.vm.memory.used[{#VM.ID}]'
              units: B
              description: 'Used memory of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].UsedMem.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: memory
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: e966bba8534d4857a187e113fcb1ed7e
              name: 'VM [{#VM.NAME}]: Memory utilization'
              type: DEPENDENT
              key: 'hyperv.vm.memory.utilization[{#VM.ID}]'
              value_type: FLOAT
              units: '%'
              description: 'Memory utilization of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].first()'
                  error_handler: DISCARD_VALUE
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      
                      if (data.TotalMem === 0) {
                      	return 0;
                      }
                      
                      return data.UsedMem / data.TotalMem * 100;
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: memory
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
              trigger_prototypes:
                - uuid: 7134ad86cf254f6bbde30dfa7a41a3a6
                  expression: 'last(/Microsoft Hyper-V Standalone by SSH/hyperv.vm.memory.utilization[{#VM.ID}])>{$HYPERV.TRIGGER.VM.MEMORY.UTILIZATION:"{#VM.NAME}"}'
                  name: 'Hyper-V Standalone: Virtual machine [{#VM.NAME}]: High memory utilization'
                  opdata: 'Memory utilization: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'Trigger fires when the memory utilization on Hyper-V Virtual machine {#VM.NAME} exceeds {$HYPERV.TRIGGER.VM.MEMORY.UTILIZATION:"{#VM.NAME}"}%.'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: 6290934292d941439702ed2f356c6241
              name: 'VM [{#VM.NAME}]: Network in (bits per second)'
              type: DEPENDENT
              key: 'hyperv.vm.net.in[{#VM.ID}]'
              units: bps
              description: 'Network incoming traffic of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].NetIn.first()'
                  error_handler: DISCARD_VALUE
                - type: MULTIPLIER
                  parameters:
                    - '1048576'
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: network
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: 74162a991ef345048dab413aa1de6293
              name: 'VM [{#VM.NAME}]: Network out (bits per second)'
              type: DEPENDENT
              key: 'hyperv.vm.net.out[{#VM.ID}]'
              units: bps
              description: 'Network outgoing traffic of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].NetOut.first()'
                  error_handler: DISCARD_VALUE
                - type: MULTIPLIER
                  parameters:
                    - '1048576'
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: CHANGE_PER_SECOND
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: network
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
            - uuid: d4a3a17a690841a186e0d63c71d102dd
              name: 'VM [{#VM.NAME}]: Status'
              type: DEPENDENT
              key: 'hyperv.vm.status[{#VM.ID}]'
              description: 'Status of Hyper-V Virtual machine {#VM.NAME}.'
              valuemap:
                name: 'Virtual machine status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].State.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
              trigger_prototypes:
                - uuid: 9c1b69e832284274bf7228ba01138667
                  expression: 'last(/Microsoft Hyper-V Standalone by SSH/hyperv.vm.status[{#VM.ID}])<>{$HYPERV.TRIGGER.VM.STATUS.NORMAL:"{#VM.NAME}"}'
                  name: 'Hyper-V Standalone: Virtual machine [{#VM.NAME}] {ITEM.VALUE}'
                  opdata: 'VM status: {ITEM.LASTVALUE}'
                  priority: AVERAGE
                  description: 'Trigger fires when the Hyper-V Virtual Machine {#VM.NAME} is not normal status.'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 8c9b1e5a0c7f4d1e8b2a9c3d4e5f6789
              name: 'VM [{#VM.NAME}]: Uptime'
              type: DEPENDENT
              key: 'hyperv.vm.uptime[{#VM.ID}]'
              units: uptime
              description: 'Uptime of Hyper-V Virtual machine {#VM.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Data.VMs[?(@.Id==''{#VM.ID}'')].Uptime.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
              tags:
                - tag: component
                  value: vm
                - tag: vm
                  value: '{#VM.NAME}'
              trigger_prototypes:
                - uuid: 3f031b38fdaf427a9291a15b37ceb6cf
                  expression: 'last(/Microsoft Hyper-V Standalone by SSH/hyperv.vm.uptime[{#VM.ID}])<900 and last(/Microsoft Hyper-V Standalone by SSH/hyperv.vm.uptime[{#VM.ID}])<>0'
                  name: 'Hyper-V Standalone: Virtual machine [{#VM.NAME}] has rebooted'
                  opdata: 'Uptime: {ITEM.LASTVALUE}'
                  priority: INFO
                  description: 'Trigger fires when the uptime of Hyper-V Virtual machine {#VM.NAME} is less than 15 minutes, which may indicate that the VM has recently rebooted.'
                  tags:
                    - tag: scope
                      value: availability
          master_item:
            key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
          lld_macro_paths:
            - lld_macro: '{#VM.ID}'
              path: $.Id
            - lld_macro: '{#VM.NAME}'
              path: $.Name
            - lld_macro: '{#VM.STATUS}'
              path: $.State
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.Data.VMs
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
      tags:
        - tag: class
          value: software
        - tag: target
          value: hyper-v
      macros:
        - macro: '{$HYPERV.FILTER.LLD.VM.NAME.MATCHES}'
          value: '.*'
          description: 'LLD filter for Hyper-V Virtual Machines based on VM name.'
          config:
            type: TEXT
            priority: '7'
            section_name: Filters
            label: 'LLD filter for virtual machines'
            description: 'Regular expression to filter Hyper-V Virtual Machines based on their names. Only VMs with names matching this regex will be monitored. Default is ''.*'' (matches all VMs).'
            regex: '.*'
        - macro: '{$HYPERV.FILTER.LLD.VM.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'LLD filter for Hyper-V Virtual Machines based on VM name.'
          config:
            type: TEXT
            priority: '8'
            section_name: Filters
            label: 'LLD filter for virtual machines (Negative)'
            description: 'Regular expression to filter Hyper-V Virtual Machines based on their names. Nodes with names matching this regex will be excluded from monitoring.'
            regex: '.*'
        - macro: '{$HYPERV.FILTER.LLD.VM.STATUS.MATCHES}'
          value: '.*'
          description: 'LLD filter for Hyper-V Virtual Machine Status.'
          config:
            type: TEXT
            priority: '9'
            section_name: Filters
            label: 'LLD filter for virtual machine status'
            description: 'Regular expression to filter Hyper-V Virtual Machine Status. Only VMs with statuses matching this regex will be monitored. Default is ''.*'''
            regex: '.*'
        - macro: '{$HYPERV.FILTER.LLD.VM.STATUS.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'LLD filter for Hyper-V Virtual Machine Status.'
          config:
            type: TEXT
            priority: '10'
            section_name: Filters
            label: 'LLD filter for virtual machine status (Negative)'
            description: 'Regular expression to filter Hyper-V Virtual Machine Status. Nodes with statuses matching this regex will be excluded from monitoring.'
            regex: '.*'
        - macro: '{$HYPERV.SSH.ADDRESS}'
          value: 127.0.0.1
          description: 'SSH address.'
          config:
            type: TEXT
            priority: '3'
            label: 'SSH address'
            description: 'Address for SSH connection to the Hyper-V Standalone server. Default is 127.0.0.1.'
            required: 'YES'
            regex: '.*'
        - macro: '{$HYPERV.SSH.PASSWORD}'
          type: SECRET_TEXT
          description: 'SSH password.'
          config:
            type: TEXT
            priority: '2'
            label: 'SSH password'
            description: 'Password for SSH connection to the Hyper-V Standalone server.'
            required: 'YES'
            regex: '.*'
        - macro: '{$HYPERV.SSH.PORT}'
          value: '22'
          description: 'SSH port.'
          config:
            type: TEXT
            priority: '4'
            label: 'SSH port'
            description: 'Port for SSH connection to the Hyper-V Standalone server. Default is 22. In the range from 1 to 65535 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$HYPERV.SSH.USER}'
          value: 'user[@domain]'
          description: 'SSH username.'
          config:
            type: TEXT
            priority: '1'
            label: 'SSH username'
            description: 'Username for SSH connection to the Hyper-V Standalone server. Examples: ''user'', ''user@domain''.'
            required: 'YES'
            regex: '.*'
        - macro: '{$HYPERV.TRIGGER.VM.MEMORY.UTILIZATION}'
          value: '85'
          description: 'Threshold for Hyper-V Virtual Machine memory utilization trigger. Support context `{#VM.NAME}`'
          config:
            type: TEXT
            priority: '6'
            section_name: Thresholds
            label: 'VM memory utilization threshold'
            description: 'Threshold for Hyper-V Virtual Machine memory utilization trigger. Trigger will fire when VM memory utilization exceeds this value. Default is 85%. In the range from 1 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$HYPERV.TRIGGER.VM.STATUS.NORMAL}'
          value: '2'
          description: 'Normal state for Hyper-V Virtual machine status trigger. Support context `{#VM.NAME}`'
          config:
            type: LIST
            priority: '5'
            label: 'VM normal status'
            description: 'Normal state for Hyper-V Virtual machine status trigger. Trigger will fire when VM status is different from this value. Default is ''Running''.'
            options:
              - value: '2'
                text: Running
              - value: '3'
                text: 'Off'
              - value: '6'
                text: Saved
              - value: '9'
                text: Paused
      dashboards:
        - uuid: ef0d9bd48e174e4abccda391336f3ccc
          name: Hyper-V
          display_period: '600'
          auto_start: 'NO'
          pages:
