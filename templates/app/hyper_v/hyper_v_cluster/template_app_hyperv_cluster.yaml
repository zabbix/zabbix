          description: 'LLD filter for Hyper-V Virtual Machines based on VM name.'
          config:
            type: TEXT
            priority: '20'
            section_name: Filters
            label: 'LLD filter for virtual machines (negative)'
            description: 'Regular expression to filter Hyper-V Virtual Machines based on their names. Nodes with names matching this regex will be excluded from monitoring.'
            regex: '.*'
        - macro: '{$HYPERV.FILTER.LLD.VM.STATUS.MATCHES}'
          value: '.*'
          description: 'LLD filter for Hyper-V Virtual machine status.'
          config:
            type: TEXT
            priority: '21'
            section_name: Filters
            label: 'LLD filter for virtual machine status'
            description: 'Regular expression to filter Hyper-V Virtual machine status. Only VMs with statuses matching this regex will be monitored. Default is ''.*'''
            regex: '.*'
        - macro: '{$HYPERV.FILTER.LLD.VM.STATUS.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'LLD filter for Hyper-V Virtual machine status.'
          config:
            type: TEXT
            priority: '22'
            section_name: Filters
            label: 'LLD filter for virtual machine status (negative)'
            description: 'Regular expression to filter Hyper-V Virtual machine status. Nodes with statuses matching this regex will be excluded from monitoring.'
            regex: '.*'
        - macro: '{$HYPERV.SSH.ADDRESS}'
          value: 127.0.0.1
          description: 'SSH address.'
          config:
            type: TEXT
            priority: '3'
            label: 'SSH address'
            description: 'Address for SSH connection to the Hyper-V Failover Cluster nodes. Default is 127.0.0.1.'
            required: 'YES'
            regex: '.*'
        - macro: '{$HYPERV.SSH.PASSWORD}'
          type: SECRET_TEXT
          description: 'SSH password.'
          config:
            type: TEXT
            priority: '2'
            label: 'SSH password'
            description: 'Password for SSH connection to the Hyper-V Failover Cluster nodes.'
            required: 'YES'
            regex: '.*'
        - macro: '{$HYPERV.SSH.PORT}'
          value: '22'
          description: 'SSH port.'
          config:
            type: TEXT
            priority: '4'
            label: 'SSH port'
            description: 'Port for SSH connection to the Hyper-V Failover Cluster nodes. Default is 22. In the range from 1 to 65535 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$HYPERV.SSH.USER}'
          value: 'user[@domain]'
          description: 'SSH username.'
          config:
            type: TEXT
            priority: '1'
            label: 'SSH username'
            description: 'Username for SSH connection to the Hyper-V Failover Cluster nodes. Examples: ''user'', ''user@domain''.'
            required: 'YES'
            regex: '.*'
        - macro: '{$HYPERV.TRIGGER.CSV.SPACE.UTILIZATION}'
          value: '85'
          description: 'Threshold for Hyper-V Cluster CSV space utilization trigger. Support context `{#CSV.NAME}`'
          config:
            type: TEXT
            priority: '7'
            section_name: Thresholds
            label: 'CSV space utilization threshold'
            description: 'Threshold for Hyper-V Cluster CSV space utilization trigger. Trigger will fire when space utilization exceeds this value. Default is 85%. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$HYPERV.TRIGGER.NODE.CPU.UTILIZATION}'
          value: '85'
          description: 'Threshold for Hyper-V Cluster Node CPU utilization trigger. Support context `{#NODE.NAME}`'
          config:
            type: TEXT
            priority: '6'
            section_name: Thresholds
            label: 'CPU utilization threshold'
            description: 'Threshold for Hyper-V Cluster Node CPU utilization trigger. Trigger will fire when CPU utilization exceeds this value. Default is 85%. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$HYPERV.TRIGGER.NODE.MEMORY.UTILIZATION}'
          value: '85'
