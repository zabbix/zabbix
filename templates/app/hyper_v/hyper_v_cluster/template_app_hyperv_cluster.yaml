        - uuid: d1e4f3b1c4b34f2ea5f3e8b6e2f4c123
          name: 'Get data'
          type: SSH
          key: 'ssh.run[hyper-v.get_data,{$HYPERV.SSH.ADDRESS},{$HYPERV.SSH.PORT}]'
          history: '0'
          value_type: TEXT
          params: 'powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference=''Stop''; $Sw=[System.Diagnostics.Stopwatch]::StartNew(); $Result=@{Message=''OK''; Data=@{Cluster=@{};Nodes=@();Storage=@();VMs=@();S2D=@{Pools=@();PhysicalDisks=@()};Perf=@{}}}; try { $C=Get-Cluster; $Q=Get-ClusterQuorum; $Nets=Get-ClusterNetwork; $Result.Data.Cluster=@{Name=$C.Name;Id=$C.Id.ToString();QuorumRes=$Q.QuorumResource.Name;QuorumState=[int]$Q.QuorumResource.State;NetsTotal=$Nets.Count;NetsDown=($Nets|Where State -ne 1).Count}; $Nodes=Get-ClusterNode; $CSVs=Get-ClusterSharedVolume; $Active=$Nodes|Where State -eq 0|Select -Exp Name; $SB={ $Tw=[System.Diagnostics.Stopwatch]::StartNew(); $O=Get-CimInstance Win32_OperatingSystem; $P=Get-CimInstance Win32_Processor|Measure LoadPercentage -Average; $C=Get-CimInstance Win32_PerfFormattedData_CsvFsPerfProvider_ClusterCSVFileSystem|Select Name,ReadBytesPersec,WriteBytesPersec; $VMList=@(); $LocalVMs=Get-VM; $BulkM=$null; try{$BulkM=$LocalVMs|Measure-VM -ErrorAction SilentlyContinue}catch{}; $Map=@{}; if($BulkM){$BulkM|%{if($_.VMId){$Map[$_.VMId.ToString()]=$_}}}; Foreach($vm in $LocalVMs){ $m=$Map[$vm.Id.ToString()]; $Cpu=0;$Dr=0;$Dw=0;$Ni=0;$No=0; if($m){$Cpu=[math]::Round($m.AverageProcessorUsage,0); if($m.AggregatedDiskDataRead -ge 0){$Dr=$m.AggregatedDiskDataRead;$Dw=$m.AggregatedDiskDataWritten} elseif($m.HardDiskMeteredResourceReport){Foreach($d in $m.HardDiskMeteredResourceReport){$Dr+=$d.TotalDiskRead;$Dw+=$d.TotalDiskWrite}}; $NetReport=$m.NetworkMeteredTrafficReport; if(-not $NetReport){$NetReport=$m.NetworkMeteredResourceReport}; if($NetReport){Foreach($n in $NetReport){ if($n.PSObject.Properties[''TotalTraffic'']){ if($n.Direction -eq ''Inbound''){$Ni+=$n.TotalTraffic}elseif($n.Direction -eq ''Outbound''){$No+=$n.TotalTraffic} } elseif($n.PSObject.Properties[''TotalIncomingNetworkTraffic'']){ $Ni+=$n.TotalIncomingNetworkTraffic;$No+=$n.TotalOutgoingNetworkTraffic } }} }; $MemUsed=0; if($vm.MemoryDemand -gt 0){$MemUsed=$vm.MemoryDemand}elseif($vm.MemoryAssigned){$MemUsed=$vm.MemoryAssigned}; $VMList+=[PSCustomObject]@{Id=$vm.Id.ToString();Name=$vm.Name;State=[int]$vm.State;TotalMem=if($vm.MemoryAssigned){$vm.MemoryAssigned}else{0};UsedMem=$MemUsed;CPU=$Cpu;DiskRead=$Dr;DiskWrite=$Dw;NetIn=$Ni;NetOut=$No;Uptime=if($vm.Uptime){[int]$vm.Uptime.TotalSeconds}else{0}} }; $Tw.Stop(); @{CPU=$P.Average;FreeMem=$O.FreePhysicalMemory*1024;TotalMem=$O.TotalVisibleMemorySize*1024;Csv=$C;VMList=$VMList;Time=$Tw.ElapsedMilliseconds} }; try { $Res=Invoke-Command -ComputerName $Active -ScriptBlock $SB -ErrorAction Stop } catch { $Result.Message = ''Remote nodes query failed: '' + $_.Exception.Message }; ForEach($N in $Nodes){ $R=$null; if($Res){$R=$Res|Where PSComputerName -eq $N.Name}; $Result.Data.Nodes+=@{Name=$N.Name;Id=$N.UniqueId;State=[int]$N.State;CPU=if($R){$R.CPU}else{0};FreeMem=if($R){$R.FreeMem}else{0};TotalMem=if($R){$R.TotalMem}else{0};ResponseTime=if($R){$R.Time}else{0}} }; $Vols=Get-CimInstance Win32_Volume | Where {$_.FileSystem -eq ''CSVFS''}; ForEach($Vol in $CSVs){ $I=$Vol.SharedVolumeInfo; If($I -and $I.FriendlyVolumeName){ $Path=$I.FriendlyVolumeName.TrimEnd(''\''); $Sz=$null;$Fr=$null;$Us=0; $L=$Vols|Where Name -like ($Path+''*''); If($L){$Sz=$L.Capacity;$Fr=$L.FreeSpace;If($Sz -gt 0){$Us=[math]::Round((($Sz-$Fr)/$Sz)*100,1)}}; $Rb=0;$Wb=0; if($Res -and $Res.Csv){ $M=$Res.Csv|Where {$Path -like (''*''+$_.Name+''*'')}; $Rb=($M|Measure ReadBytesPersec -Sum).Sum; $Wb=($M|Measure WriteBytesPersec -Sum).Sum }; $Result.Data.Storage+=@{Name=$Vol.Name;Id=$Vol.Id;Path=$Path;State=[int]$Vol.State;Free=$Fr;Total=$Sz;UsedPct=$Us;ReadBps=$Rb;WriteBps=$Wb} } }; try { $PoolRes = Get-ClusterResource | Where ResourceType -eq ''Storage Pool''; if($PoolRes){ $OwnerNode = $PoolRes.OwnerGroup.OwnerNode.Name; $SB_Pool = { $SubSys = Get-StorageSubSystem -FriendlyName ''*Cluster*''; if($SubSys){ $Pools = $SubSys | Get-StoragePool -IsPrimordial $false; $Res=@(); foreach($P in $Pools){ $Disks = $P | Get-PhysicalDisk; $Res+=@{Pool=$P; Disks=$Disks} }; $Res } }; $PoolData = Invoke-Command -ComputerName $OwnerNode -ScriptBlock $SB_Pool; if($PoolData){ foreach($Item in $PoolData){ $P=$Item.Pool; $Result.Data.S2D.Pools+=@{Name=$P.FriendlyName;Health=[int]$P.HealthStatus;Status=[int]$P.OperationalStatus[0];Total=$P.Size;Allocated=$P.AllocatedSize;Free=$P.Size-$P.AllocatedSize}; foreach($D in $Item.Disks){ $Result.Data.S2D.PhysicalDisks+=@{Id=$D.UniqueId;Model=$D.FriendlyName;MediaType=[int]$D.MediaType;Health=[int]$D.HealthStatus;Status=[int]$D.OperationalStatus[0];Size=$D.Size;Slot=$D.SlotNumber;CanPool=$D.CanPool;Node=$env:COMPUTERNAME} } } } } } catch {}; if($Res){ ForEach($R in $Res){ if($R.VMList){ ForEach($V in $R.VMList){ $Result.Data.VMs+=@{Name=$V.Name;Id=$V.Id;Owner=$R.PSComputerName;State=$V.State;CPU=$V.CPU;UsedMem=$V.UsedMem;TotalMem=$V.TotalMem;DiskRead=$V.DiskRead;DiskWrite=$V.DiskWrite;NetIn=$V.NetIn;NetOut=$V.NetOut;Uptime=$V.Uptime} } } } } else { Get-ClusterResource|Where ResourceType -eq ''Virtual Machine''|%{ $Result.Data.VMs+=@{Name=$_.Name;Id="$($_.Id)";State=[int]$_.State} } }; } catch { $Result.Message = ''Critical: '' + $_.Exception.Message } $Sw.Stop(); $Result.Data.Perf.TotalTime=$Sw.ElapsedMilliseconds; $Result | ConvertTo-Json -Depth 4 -Compress"'
          username: '{$HYPERV.SSH.USER}'
