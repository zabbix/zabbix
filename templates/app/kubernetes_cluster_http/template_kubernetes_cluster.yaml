        - uuid: a301b0276d2f45c28c8b4b404988da39
          name: 'Get resource metrics'
          type: DEPENDENT
          key: kube.resource.metrics
          history: '0'
          value_type: TEXT
          description: 'Collecting metrics from kubelet in `/metrics/resource`.'
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - kube_node_info
            - type: JSONPATH
              parameters:
                - $..labels.node
              error_handler: CUSTOM_ERROR
              error_handler_params: 'Failed to get Nodes. Check debug log for more information.'
            - type: JAVASCRIPT
              parameters:
                - |
                  var nodes = JSON.parse(value),
                  	Kube = {
                  	params: {
                  		http_proxy: '{$KUBE.HTTP.PROXY}',
                  		api_token: '{$KUBE.API.TOKEN}',
                  		api_url: '{$KUBE.API.URL}'
                  	},
                  
                  	setParams: function (params) {
                  		['api_url', 'api_token'].forEach(function (field) {
                  			if (typeof params !== 'object' || typeof params[field] === 'undefined'
                  				|| params[field] === '') {
                  				throw 'Required param is not set: "' + field + '".';
                  			}
                  		});
                  
                  		if (typeof Kube.params.api_url === 'string' && !Kube.params.api_url.endsWith('/')) {
                  			Kube.params.api_url += '/';
                  		}
                  	},
                  
                  	clearData: function (value) {
                  		var lines = value.split('\n'),
                  			result = [],
                  			i,
                  			line;
                  
                  		for (i = 0; i < lines.length; i++) {
                  			line = lines[i].trim();
                  
                  			if (line !== '' && line.charAt(0) !== '#') {
                  				result.push(lines[i]);
                  			}
                  		}
                  
                  		return result.join("\n");
                  	},
                  
                  	getField: function (data, path) {
                  		var steps = path.split('.');
                  
                  		for (var i = 0; i < steps.length; i++) {
                  			var step = steps[i];
                  			if (typeof data !== 'object' || typeof data[step] === 'undefined') {
                  				throw 'Required field was not found: ' + path;
                  			}
                  			data = data[step];
                  		}
                  
                  		return data;
                  	},
                  
                  	getCadvisorMetrics: function () {
                  		var result = '',
                  			request = new HttpRequest(),
                  			response;
                  		request.addHeader('Content-Type: application/json');
                  		request.addHeader('Authorization: Bearer ' + Kube.params.api_token);
                  
                  		if (typeof Kube.params.http_proxy !== 'undefined' && Kube.params.http_proxy !== '') {
                  			request.setProxy(Kube.params.http_proxy);
                  			Zabbix.log(4, '[ Kubernetes ] Using http proxy: ' + Kube.params.http_proxy);
                  		}
                  
                  		nodes.forEach(function (resource) {
                  			var url = Kube.params.api_url + 'api/v1/nodes/' + resource + '/proxy/metrics/resource';
                  
                  			Zabbix.log(4, '[ Kubernetes ] Sending request: ' + url);
                  			var response = request.get(url);
                  			Zabbix.log(4, '[ Kubernetes ] Received response with status code ' + request.getStatus() + ': ' + response);
                  
                  			if (request.getStatus() < 200 || request.getStatus() >= 300) {
                  				throw 'Request failed with status code ' + request.getStatus() + ': ' + response;
                  			}
                  			if (response === null) {
                  				throw 'Failed to get state metrics. Check debug log for more information.';
                  			}
                  			result += response;
                  		}
                  		);
                  
                  		return Kube.clearData(result);
                  
                  	}
                  };
                  
                  try {
                  	Kube.setParams(Kube.params);
                  	var resource_metrics = Kube.getCadvisorMetrics();
                  
                  	return resource_metrics;
                  }
                  catch (error) {
                  	error += (String(error).endsWith('.')) ? '' : '.';
                  	Zabbix.log(3, '[ Kubernetes ] ERROR: ' + error);
                  	return JSON.stringify({ error: error });
                  }
          master_item:
            key: kube.state.metrics
          tags:
            - tag: component
              value: raw
