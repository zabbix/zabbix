              tags:
                - tag: component
                  value: phase
                - tag: component
                  value: pvc
                - tag: namespace
                  value: '{#NAMESPACE}'
                - tag: pvc
                  value: '{#NAME}'
              trigger_prototypes:
                - uuid: 633457562e564b19bfbe5670040dadf5
                  expression: 'count(/Kubernetes Cluster by HTTP/kube.pvc.status_phase[{#NAMESPACE}/{#NAME}],2m,,5)>=2'
                  name: 'Kubernetes Cluster: NS [{#NAMESPACE}] PVC [{#NAME}]: PVC is pending'
                  priority: WARNING
                  tags:
                    - tag: scope
                      value: availability
          master_item:
            key: kube.state.metrics
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - kube_persistentvolumeclaim_info
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value),
                  	lookup = {},
                  	output = [];
                  
                  input.forEach(function (metric) {
                  	var namespace = metric.labels.namespace;
                  	if (!(lookup[namespace])) {
                  		lookup[namespace] = 1;
                  		output.push({
                  			'{#IS_SUM}': '',
                  			'{#NAMESPACE}': metric.labels.namespace
                  		});
                  	}
                  	output.push({
                  		'{#NAME}': metric.labels.persistentvolumeclaim,
                  		'{#NAMESPACE}': metric.labels.namespace
                  	});
                  });
                  
                  return JSON.stringify(output);
            - type: DISCARD_UNCHANGED_HEARTBEAT
