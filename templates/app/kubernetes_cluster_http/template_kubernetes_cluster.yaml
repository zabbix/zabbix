              type: DEPENDENT
              key: 'kube.pv.status_phase[{#NAME}]'
              description: 'The current status phase of the persistent volume.'
              valuemap:
                name: 'PV and PVC status phases'
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'kube_persistentvolume_status_phase{persistentvolume="{#NAME}"} == 1'
                    - label
                    - phase
                  error_handler: DISCARD_VALUE
                - type: JAVASCRIPT
                  parameters:
                    - 'return [''Available'', ''Bound'', ''Failed'', ''Lost'', ''Pending'', ''Released''].indexOf(value) + 1 || ''Problem with status processing in JS, no such PV status: '' + value;'
              master_item:
                key: kube.state.metrics
              tags:
                - tag: component
                  value: phase
                - tag: component
                  value: pv
                - tag: pv
                  value: '{#NAME}'
              trigger_prototypes:
                - uuid: 83f5b1a92c7d40c887763d09cd074e58
                  expression: 'count(/Kubernetes Cluster by HTTP/kube.pv.status_phase[{#NAME}],2m,,3)>=2'
                  name: 'Kubernetes Cluster: PV [{#NAME}]: PV has failed'
                  priority: WARNING
                  tags:
                    - tag: scope
                      value: availability
          master_item:
            key: kube.state.metrics
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - 'kube_persistentvolume_info{persistentvolume=~"{$KUBE.LLD.FILTER.PV.MATCHES}", persistentvolume!~"{$KUBE.LLD.FILTER.PV.NOT_MATCHES}"}'
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value),
                  	output = [];
                  
                  input.forEach(function (metric) {
                  	output.push({ '{#NAME}': metric.labels.persistentvolume });
                  });
                  
                  if (output.length > 0) {
                  	output.push({ '{#SINGLETON}': '' });
                  }
                  
                  return JSON.stringify(output);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 3h
          overrides:
            - name: 'sum items'
              step: '1'
              filter:
                conditions:
                  - macro: '{#SINGLETON}'
                    operator: EXISTS
              operations:
                - operator: REGEXP
                  value: 'status phase.*sum'
                  discover: DISCOVER
                - operator: NOT_REGEXP
                  value: 'status phase.*sum'
                  discover: NO_DISCOVER
                - operationobject: TRIGGER_PROTOTYPE
                  operator: REGEXP
                  value: '.*'
                  discover: NO_DISCOVER
        - uuid: 2f90a519786d458a94785ed018b6dd50
          name: 'PVC discovery'
          type: DEPENDENT
          key: kube.pvc.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#NAMESPACE}'
                value: '{$KUBE.LLD.FILTER.NAMESPACE.MATCHES}'
              - macro: '{#NAMESPACE}'
                value: '{$KUBE.LLD.FILTER.NAMESPACE.NOT_MATCHES}'
