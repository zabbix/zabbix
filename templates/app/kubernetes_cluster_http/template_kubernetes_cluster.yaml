            - uuid: 88e33539e7c743b3a9a91d381f6e6fda
              name: 'Network [{#IFNAME}]: Operational status'
              type: DEPENDENT
              key: 'kube.node.network.if.oper.status[{#IFNAME}]'
              description: 'Current operational status of network interface `{#IFNAME}`.'
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'node_network_up{device="{#IFNAME}"}'
                    - value
                    - ''
                  error_handler: DISCARD_VALUE
              master_item:
                key: kube.node.exporter.metrics
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFDESCR}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: a9b5d22980ad421da7d2772a5574d514
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}])=0 and (last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}],#1)<>last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}])<>0 or {$IFCONTROL:"{#IFNAME}"}=0'
                  name: 'Kubernetes Node: Link [{#IFNAME}]: Down'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the operations status is down.
                    2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine context macro to value "0", marking this interface as not important. No new trigger will be fired if this interface is down.
                    3. `last(/TEMPLATE_NAME/METRIC,#1)<>last(/TEMPLATE_NAME/METRIC,#2)` - the trigger fires only if the operational status was up to (1) sometime before (so, do not fire for the 'eternal off' interfaces.)
                    
                    WARNING: if closed manually - it will not fire again on the next poll, because of .diff.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
