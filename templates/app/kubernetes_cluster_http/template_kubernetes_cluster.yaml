          type: DEPENDENT
          key: kube.node.network.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '{$KUBE.NODE.NETWORK.IF.ADMINSTATUS.MATCHES}'
              - macro: '{#IFADMINSTATUS}'
                value: '{$KUBE.NODE.NETWORK.IF.ADMINSTATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFNAME}'
                value: '{$KUBE.NODE.NETWORK.IF.NAME.MATCHES}'
              - macro: '{#IFNAME}'
                value: '{$KUBE.NODE.NETWORK.IF.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFOPERSTATUS}'
                value: '{$KUBE.NODE.NETWORK.IF.OPERSTATUS.MATCHES}'
              - macro: '{#IFOPERSTATUS}'
                value: '{$KUBE.NODE.NETWORK.IF.OPERSTATUS.NOT_MATCHES}'
