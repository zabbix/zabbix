  triggers:
    - uuid: 06db46d9bd4b4e5aa0777bc30c5c1742
      expression: 'last(/Kubernetes Cluster by HTTP/kube.node.ready.count)< {$KUBE.NODE.NUMBER.THRESHOLD} and last(/Kubernetes Cluster by HTTP/kube.node.count)>0'
      name: 'Kubernetes Cluster: Low number of Ready nodes'
      event_name: 'Kubernetes Cluster: Low number of Ready nodes'
      opdata: 'Current value: {ITEM.LASTVALUE1}'
      priority: HIGH
      description: 'The number of Ready nodes in the cluster is less than `{$KUBE.NODE.NUMBER.THRESHOLD}`.'
      dependencies:
        - name: 'Kubernetes Cluster: No Ready nodes'
          expression: 'last(/Kubernetes Cluster by HTTP/kube.node.ready.count)=0 and last(/Kubernetes Cluster by HTTP/kube.node.count)>0'
      tags:
        - tag: scope
          value: availability
    - uuid: c89ee04a45ba45efbb9824afec387040
      expression: 'last(/Kubernetes Cluster by HTTP/kube.node.ready.count)=0 and last(/Kubernetes Cluster by HTTP/kube.node.count)>0'
      name: 'Kubernetes Cluster: No Ready nodes'
      event_name: 'Kubernetes Cluster: No Ready nodes'
      opdata: 'Current value: {ITEM.LASTVALUE1}'
      priority: HIGH
      description: 'There are no Ready nodes in the cluster.'
      tags:
        - tag: scope
          value: availability
    - uuid: 57d02d0bd1a447c4ad65cedcb3505ced
      expression: |
        min(/Kubernetes Node by HTTP/kube.node.load_avg_1min,5m)/last(/Kubernetes Node by HTTP/kube.node.cpu_core)>{$KUBE.NODE.LOAD_AVG_PER_CPU.MAX.WARN}
        and last(/Kubernetes Node by HTTP/kube.node.load_avg_5min)>0
        and last(/Kubernetes Node by HTTP/kube.node.load_avg_15min)>0
      name: 'Kubernetes Node: Load average is too high'
      event_name: 'Kubernetes Node: Load average is too high (per CPU load over {$KUBE.NODE.LOAD_AVG_PER_CPU.MAX.WARN} for 5m)'
      opdata: 'Load averages(1m 5m 15m): ({ITEM.LASTVALUE1} {ITEM.LASTVALUE3} {ITEM.LASTVALUE4}), # of CPUs: {ITEM.LASTVALUE2}'
      priority: AVERAGE
      description: 'The load average per CPU is too high. The system may be slow to respond.'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
