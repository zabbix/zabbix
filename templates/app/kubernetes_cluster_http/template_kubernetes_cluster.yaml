              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Kubernetes Node by HTTP/kube.node.net.if.transmit_errors[{#IFNAME}],5m)<{$KUBE.NODE.NETWORK.ERRORS.WARN:"{#IFNAME}"}*0.8 and max(/Kubernetes Node by HTTP/kube.node.net.if.receive_errors[{#IFNAME}],5m)<{$KUBE.NODE.NETWORK.ERRORS.WARN:"{#IFNAME}"}*0.8'
              name: 'Kubernetes Node: Network [{#IFNAME}]: High error rate'
