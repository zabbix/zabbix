        The template to monitor Kubernetes Cluster.
        
        It works without external scripts and uses the script item to make HTTP requests to the Kubernetes API.
        
        Template `Kubernetes Cluster by HTTP` - collects metrics by HTTP requests from kube-state-metrics, prometheus-node-exporter, kubelet endpoint and Kubernetes API.
        
