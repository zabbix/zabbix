            - type: PROMETHEUS_TO_JSON
              parameters:
                - '{__name__=~"^kube_(replicaset|pod)_owner$", namespace="{#NAMESPACE}", owner_kind=~"^(ReplicaSet|Deployment)$"}'
            - type: JAVASCRIPT
              parameters:
                - |
                  function getField(data, path) {
                  	var steps = path.split('.');
                  
                  	for (var i = 0; i < steps.length; i++) {
                  		var step = steps[i];
                  
                  		if (typeof data !== 'object' || typeof data[step] === 'undefined') {
                  			throw 'Required field "' + path + '" is not present in data received.';
                  		}
                  		data = data[step];
                  	}
                  	return data;
                  }
                  
                  var rs_deployment = {},
                  	deployments = {};
                  
                  try {
                  	var data = JSON.parse(value);
                  
                  	for (var i = 0; i < data.length; i++) {
                  		var entity = data[i],
                  			metric_name = getField(entity, 'name');
                  
                  		if (metric_name === 'kube_replicaset_owner') {
                  			if (getField(entity, 'labels.owner_kind') !== 'Deployment') continue;
                  
                  			var ns = getField(entity, 'labels.namespace'),
                  				rs = getField(entity, 'labels.replicaset'),
                  				dep = getField(entity, 'labels.owner_name')
                  
                  			rs_deployment[ns + "/" + rs] = dep;
                  		}
                  	}
                  
                  	for (var i = 0; i < data.length; i++) {
                  		var entity = data[i],
                  			metric_name = getField(entity, 'name');
                  
                  		if (metric_name === 'kube_pod_owner') {
                  			if (getField(entity, 'labels.owner_kind') !== 'ReplicaSet') continue;
                  
                  			var ns = getField(entity, 'labels.namespace'),
                  				rs = getField(entity, 'labels.owner_name'),
                  				pod = getField(entity, 'labels.pod'),
                  				dep = rs_deployment[ns + "/" + rs];
                  
                  			if (!dep) continue;
                  
                  			var key = ns + "/" + dep;
                  
                  			if (!deployments[key]) {
                  				deployments[key] = {
                  					namespace: ns,
                  					deployment: dep,
                  					pods: []
                  				};
                  			}
                  
                  			deployments[key].pods.push(pod);
                  		}
                  	}
                  } catch (error) {
                  	throw 'Failed to preprocess from KSM. Check debug log for more information.';
                  }
                  
                  var result = [];
                  
                  for (var k in deployments) {
                  	var d = deployments[k];
                  
                  	result.push({
                  		"{#DEPLOYMENT}": d.deployment,
                  		"{#POD}": d.pods.join("|")
                  	});
                  }
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
