      discovery_rules:
        - uuid: 316febcfcf7a485fb781c70b22d01924
          name: 'Filesystem discovery'
          type: DEPENDENT
          key: kube.node.filesystem.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FSNAME}'
                value: '{$KUBE.NODE.FILESYSTEM.MATCHES}'
              - macro: '{#FSNAME}'
                value: '{$KUBE.NODE.FILESYSTEM.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discovery of filesystem mount points from node-exporter metrics.'
          item_prototypes:
            - uuid: df4a16ec5b1645b28998b6d71b979895
              name: 'Filesystem [{#FSNAME}]: Available space'
              type: DEPENDENT
              key: 'kube.node.filesystem.avail_bytes[{#FSNAME}]'
              value_type: FLOAT
              units: B
              description: 'Available space on filesystem `{#FSNAME}`.'
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'node_filesystem_avail_bytes{device!~"rootfs",mountpoint="{#FSNAME}"}'
                    - value
                    - ''
                  error_handler: DISCARD_VALUE
              master_item:
                key: kube.node.exporter.metrics
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
            - uuid: 2a916c563e14495da5f0fb3df7353352
              name: 'Filesystem [{#FSNAME}]: Total space'
              type: DEPENDENT
              key: 'kube.node.filesystem.size_bytes[{#FSNAME}]'
              value_type: FLOAT
              units: B
              description: 'Total space on filesystem `{#FSNAME}`.'
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'node_filesystem_size_bytes{device!~"rootfs",mountpoint="{#FSNAME}"}'
                    - value
                    - ''
                  error_handler: DISCARD_VALUE
              master_item:
                key: kube.node.exporter.metrics
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
            - uuid: 2cfd05fab7c14016968aaa8f9465c2fe
              name: 'Filesystem [{#FSNAME}]: Used space'
              type: CALCULATED
              key: 'kube.node.filesystem.used_bytes[{#FSNAME}]'
              value_type: FLOAT
              units: B
              params: '(last(//kube.node.filesystem.size_bytes[{#FSNAME}]) - last(//kube.node.filesystem.avail_bytes[{#FSNAME}]))'
              description: 'Used space on filesystem `{#FSNAME}`.'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
            - uuid: b7ebf3a7a45b403a847686f90e018d55
              name: 'Filesystem [{#FSNAME}]: Utilization'
              type: CALCULATED
              key: 'kube.node.filesystem.utilization[{#FSNAME}]'
              value_type: FLOAT
              units: '%'
              params: '(last(//kube.node.filesystem.size_bytes[{#FSNAME}]) - last(//kube.node.filesystem.avail_bytes[{#FSNAME}])) / last(//kube.node.filesystem.size_bytes[{#FSNAME}]) * 100'
              description: 'Utilization of filesystem `{#FSNAME}` as a percentage.'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
              trigger_prototypes:
                - uuid: dbbbdb0c486c4e719d92678550cd531f
                  expression: 'min(/Kubernetes Node by HTTP/kube.node.filesystem.utilization[{#FSNAME}], 5m) > {$KUBE.NODE.FS.PUSED.MAX.CRIT:"{#FSNAME}"}'
                  name: 'Kubernetes Node: Filesystem [{#FSNAME}]: Critical available space'
                  event_name: 'Kubernetes Node: FS [{#FSNAME}]: Space is critically low (used > {$KUBE.NODE.FS.PUSED.MAX.CRIT:"{#FSNAME}"}%)'
                  opdata: 'Space used: {{ITEM.LASTVALUE1}.fmtnum(1)}%'
                  priority: HIGH
                  description: 'Filesystem `{#FSNAME}` available space is critically low (< {$KUBE.NODE.FS.PUSED.MAX.CRIT:"{#FSNAME}"}).'
                  tags:
                    - tag: scope
                      value: capacity
                - uuid: cde8e3edab844ee7ace586efc7290279
                  expression: 'min(/Kubernetes Node by HTTP/kube.node.filesystem.utilization[{#FSNAME}], 5m) > {$KUBE.NODE.FS.PUSED.MAX.WARN:"{#FSNAME}"}'
                  name: 'Kubernetes Node: Filesystem [{#FSNAME}]: Low available space'
                  event_name: 'Kubernetes Node: FS [{#FSNAME}]: Space is low (used > {$KUBE.NODE.FS.PUSED.MAX.WARN:"{#FSNAME}"}%)'
                  opdata: 'Space used: {{ITEM.LASTVALUE1}.fmtnum(1)}%'
                  priority: WARNING
                  description: 'Filesystem `{#FSNAME}` available space is lower than {$KUBE.NODE.FS.PUSED.MAX.WARN:"{#FSNAME}"}%.'
                  dependencies:
                    - name: 'Kubernetes Node: Filesystem [{#FSNAME}]: Critical available space'
                      expression: 'min(/Kubernetes Node by HTTP/kube.node.filesystem.utilization[{#FSNAME}], 5m) > {$KUBE.NODE.FS.PUSED.MAX.CRIT:"{#FSNAME}"}'
                  tags:
                    - tag: scope
                      value: capacity
          master_item:
            key: kube.node.exporter.metrics
          lld_macro_paths:
            - lld_macro: '{#FSNAME}'
              path: $.labels.mountpoint
            - lld_macro: '{#FSTYPE}'
              path: $.labels.fstype
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - node_filesystem_avail_bytes
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: 1da8d25e72ce4ca5a9bb5f9cc1da5e37
