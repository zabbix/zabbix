              manual_close: 'YES'
              dependencies:
                - name: 'Kubernetes Node: Link [{#IFNAME}]: Down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}])=0 and (last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}],#1)<>last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}],#2))'
                  recovery_expression: 'last(/Kubernetes Node by HTTP/kube.node.network.if.oper.status[{#IFNAME}])<>0 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: availability
