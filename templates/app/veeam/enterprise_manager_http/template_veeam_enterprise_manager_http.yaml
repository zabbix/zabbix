        - uuid: 525a61ff4fb747efab6ac58d1ac8b7c4
          name: 'Get metrics'
          type: SCRIPT
          key: veeam.manager.get.metrics
          delay: '{$VEEAM.MANAGER.DATA.FREQUENCY}'
          history: '0'
          value_type: TEXT
          params: |
            var Veeam = {
            	params: {},
            	request: new HttpRequest(),
            	session_id: '',
            
            	setParams: function (params) {
            		['api_endpoint', 'user', 'password'].forEach(function (field) {
            			if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
            				throw 'Required param is not set: ' + field + '.';
            			}
            		});
            
            		Veeam.params = params;
            
            		if (typeof Veeam.params.api_endpoint === 'string' && Veeam.params.api_endpoint.slice(-1) !== '/') {
            			Veeam.params.api_endpoint += '/';
            		}
            	},
            
            	getField: function (data, path, separator, default_value) {
            		if (typeof separator === 'undefined') {
            			separator = '.';
            		}
            
            		var steps = path.split(separator);
            
            		for (var i = 0; i < steps.length; i++) {
            			var step = steps[i];
            
            			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
            				if (typeof default_value === 'undefined') {
            					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
            				}
            
            				return default_value;
            			}
            
            			data = data[step];
            		}
            
            		return data;
            	},
            
            	getSessionId: function () {
            		var response;
            
            		if (typeof Veeam.params.http_proxy !== 'undefined' && Veeam.params.http_proxy !== '') {
            			Veeam.request.setProxy(Veeam.params.http_proxy);
            		}
            
            		Veeam.request.clearHeader();
            		Veeam.request.addHeader('Accept: application/json');
            		Veeam.request.addHeader('Authorization: Basic ' + btoa(Veeam.params.user + ':' + Veeam.params.password));
            		response = Veeam.request.post(Veeam.params.api_endpoint + 'api/sessionMngr/?v=latest');
            
            		if (Veeam.request.getStatus() !== 201 || response === null) {
            			throw 'Request failed with status code ' + Veeam.request.getStatus() + ': ' + response;
            		}
            
            		Veeam.session_id = Veeam.getField(JSON.parse(response), 'sessionId');
            	},
            
            	logout: function () {
            		Veeam.request.clearHeader();
            		Veeam.request.addHeader('Accept: application/json');
            		Veeam.request.addHeader('X-RestSvcSessionId: ' + Veeam.session_id);
            
            		var response = Veeam.request.delete(Veeam.params.api_endpoint + 'api/logonSessions/' + Veeam.session_id);
            
            		return JSON.stringify(response);
            	},
            
            	getRequest: function (url, session) {
            		var response;
            
            		if (typeof Veeam.params.http_proxy !== 'undefined' && Veeam.params.http_proxy !== '') {
            			Veeam.request.setProxy(Veeam.params.http_proxy);
            		}
            
            		Veeam.request.clearHeader();
            		Veeam.request.addHeader('Accept: application/json');
            		Veeam.request.addHeader('X-RestSvcSessionId: ' + session);
            
            		Zabbix.log(4, '[ VEEAM MANAGER ] request url: ' + url);
            
            		response = Veeam.request.get(url);
            
            		if (Veeam.request.getStatus() !== 200 || response === null) {
            			throw 'Request failed with status code ' + Veeam.request.getStatus() + ': ' + response;
            		}
            
            		try {
            			return JSON.parse(response);
            		}
            		catch (error) {
            			throw 'Failed to parse response received from API.';
            		}
            	},
            
            	getMetricsData: function () {
            		var data = {},
            			endpoints = {
            				backupFiles: 'api/backupFiles'
            			};
            
            		Veeam.getSessionId();
            
            		var links = (Veeam.getField(Veeam.getRequest(Veeam.params.api_endpoint + 'api/reports/summary', Veeam.session_id), 'links'));
            
            		links.forEach(function (field) {
            			data[field.name] = Veeam.getRequest(field.href, Veeam.session_id);
            		});
            
            		Object.keys(endpoints).forEach(function (key) {
            			data[key] = Veeam.getField(Veeam.getRequest(Veeam.params.api_endpoint + endpoints[key], Veeam.session_id), 'refs');
            			data[key] = data[key].map(function (item) {
            				return Veeam.getRequest(item.href + '?format=Entity', Veeam.session_id);
            			});
            		});
            		Veeam.logout();
            
            		return data;
            	}
            
            };
            try {
            	Veeam.setParams(JSON.parse(value));
            	return JSON.stringify(Veeam.getMetricsData());
            }
            catch (error) {
            	error += (String(error).slice(-1) === '.') ? '' : '.';
            	Zabbix.log(3, '[ VEEAM MANAGER ] ERROR: ' + error);
            	return JSON.stringify({ 'error': error });
            }
          description: 'The result of API requests is returned as JSON.'
          timeout: '{$VEEAM.MANAGER.DATA.TIMEOUT}'
          parameters:
            - name: api_endpoint
              value: '{$VEEAM.MANAGER.API.URL}'
            - name: http_proxy
              value: '{$VEEAM.MANAGER.HTTP.PROXY}'
            - name: password
              value: '{$VEEAM.MANAGER.PASSWORD}'
            - name: user
              value: '{$VEEAM.MANAGER.USER}'
          tags:
            - tag: component
              value: raw
