        - uuid: 22963d30f2054db594f9a0ca8b991cb7
          name: 'Repositories discovery'
          type: DEPENDENT
          key: veeam.repository.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#NAME}'
                value: '{$VEEAM.REPOSITORY.NAME.MATCHES}'
              - macro: '{#NAME}'
                value: '{$VEEAM.REPOSITORY.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discovery of all backup repositories connected to Veeam Backup Enterprise Manager.'
          item_prototypes:
            - uuid: a7d251d122a84fbc830bd7ec710ee4ca
              name: 'Repository [{#NAME}]: Backup size'
              type: DEPENDENT
              key: 'veeam.repository.backup.size[{#NAME}]'
              value_type: FLOAT
              units: B
              description: 'Backup data size on the backup repository `[{#NAME}]`.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Repositories.periods[?(@.name == "{#NAME}")].backupSize.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: veeam.manager.get.metrics
              tags:
                - tag: component
                  value: repository
                - tag: repository
                  value: '{#NAME}'
            - uuid: 86383a0c348d4b299828cfbdaeb7bef0
              name: 'Repository [{#NAME}]: Capacity'
              type: DEPENDENT
              key: 'veeam.repository.capacity[{#NAME}]'
              value_type: FLOAT
              units: B
              description: 'Total capacity of the backup repository `[{#NAME}]`.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Repositories.periods[?(@.name == "{#NAME}")].capacity.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: veeam.manager.get.metrics
              tags:
                - tag: component
                  value: repository
                - tag: repository
                  value: '{#NAME}'
            - uuid: 1cf072d4b73e406ba78c804b5cbcc572
              name: 'Repository [{#NAME}]: Free space'
              type: DEPENDENT
              key: 'veeam.repository.free.space[{#NAME}]'
              value_type: FLOAT
              units: B
              description: 'Free space on the backup repository `[{#NAME}]`.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.Repositories.periods[?(@.name == "{#NAME}")].freeSpace.first()'
              master_item:
                key: veeam.manager.get.metrics
              tags:
                - tag: component
                  value: repository
                - tag: repository
                  value: '{#NAME}'
          trigger_prototypes:
            - uuid: 8f45324a43a34c3c9427410ca88d546e
              expression: 'last(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.capacity[{#NAME}])>0 and min(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.free.space[{#NAME}],15m)/last(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.capacity[{#NAME}])*100<{$VEEAM.MANAGER.REPO.PFREE.CRIT}'
              name: 'Veeam Backup Enterprise Manager: Repository [{#NAME}]: Free space is critically low'
              priority: AVERAGE
              description: 'Free space on the repository `{#NAME}` is critically low.'
              tags:
                - tag: scope
                  value: capacity
            - uuid: 95e912451a0d4a18ae183c90a5bfbb2b
              expression: 'last(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.capacity[{#NAME}])>0 and min(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.free.space[{#NAME}],15m)/last(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.capacity[{#NAME}])*100<{$VEEAM.MANAGER.REPO.PFREE.WARN}'
              name: 'Veeam Backup Enterprise Manager: Repository [{#NAME}]: Free space is low'
              priority: WARNING
              description: 'Free space on the repository `{#NAME}` is low.'
              dependencies:
                - name: 'Veeam Backup Enterprise Manager: Repository [{#NAME}]: Free space is critically low'
                  expression: 'last(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.capacity[{#NAME}])>0 and min(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.free.space[{#NAME}],15m)/last(/Veeam Backup Enterprise Manager by HTTP/veeam.repository.capacity[{#NAME}])*100<{$VEEAM.MANAGER.REPO.PFREE.CRIT}'
              tags:
                - tag: scope
                  value: capacity
          master_item:
            key: veeam.manager.get.metrics
          lld_macro_paths:
            - lld_macro: '{#NAME}'
              path: $.name
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.Repositories.periods
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
