                  value: sessions
                - tag: creation-date
                  value: '{#CREATION.TIME}'
                - tag: session
                  value: '{#NAME}'
            - uuid: 3f449f47943b4877a32e89774712510f
              name: 'Session [{#NAME}] [{#TYPE}]: Progress percent'
              type: DEPENDENT
              key: 'veeam.sessions.progress.percent[{#ID}]'
              value_type: FLOAT
              units: '%'
              description: 'The progress of the session expressed as percentage.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.progressPercent
              master_item:
                key: 'veeam.sessions.raw[{#ID}]'
              tags:
                - tag: component
                  value: sessions
                - tag: creation-date
                  value: '{#CREATION.TIME}'
                - tag: session
                  value: '{#NAME}'
            - uuid: f82984e1180946c6b4bff1f46987555d
              name: 'Session [{#NAME}] [{#TYPE}]: Get data'
              type: DEPENDENT
              key: 'veeam.sessions.raw[{#ID}]'
              history: '0'
              value_type: TEXT
              description: 'Gets raw data from session with the name: `[{#NAME}]`, `[{#TYPE}]`.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.sessions.data.[?(@.id==''{#ID}'')].first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: veeam.get.metrics
              tags:
                - tag: component
                  value: raw
                - tag: session
                  value: '{#NAME}'
            - uuid: 5fb9dcb62bfe4d1dae94beefa329691d
              name: 'Session [{#NAME}] [{#TYPE}]: Result'
              type: DEPENDENT
              key: 'veeam.sessions.result[{#ID}]'
              trends: '0'
              description: 'The result of the session. The enums used: `None`, `Success`, `Warning`, `Failed`.'
              valuemap:
                name: 'Veeam session result'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.result.result
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        None: 1,
                        Success: 2,
                        Warning: 3,
                        Failed: 4
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
              master_item:
                key: 'veeam.sessions.raw[{#ID}]'
              tags:
                - tag: component
                  value: sessions
                - tag: creation-date
                  value: '{#CREATION.TIME}'
                - tag: session
                  value: '{#NAME}'
              trigger_prototypes:
                - uuid: eeb93a10f3d04eee819587c6fa4ce8f8
                  expression: 'last(/Veeam Backup and Replication by HTTP/veeam.sessions.result[{#ID}])=4'
                  name: 'Veeam Backup: Last result session failed'
                  event_name: 'Veeam Backup: Failed session [{#NAME}]'
                  priority: AVERAGE
                  description: 'The last result of the session `[{#NAME}]` is failed.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 8c7092e721eb4f8f8b53a07f0fb710a0
              name: 'Session [{#NAME}] [{#TYPE}]: State'
              type: DEPENDENT
              key: 'veeam.sessions.state[{#ID}]'
              trends: '0'
              description: 'The state of the session. The enums used: `Stopped`, `Starting`, `Stopping`, `Working`, `Pausing`, `Resuming`, `WaitingTape`, `Idle`, `Postprocessing`, `WaitingRepository`, `WaitingSlot`.'
              valuemap:
                name: 'Veeam session state'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.state
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                        Stopped: 1,
                        Starting: 2,
                        Stopping: 3,
                        Working: 4,
                        Pausing: 5,
                        Resuming: 6,
                        WaitingTape: 7,
                        Idle: 8,
                        Postprocessing: 9,
                        WaitingRepository: 10,
                        WaitingSlot: 11
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
              master_item:
                key: 'veeam.sessions.raw[{#ID}]'
              tags:
                - tag: component
                  value: sessions
                - tag: creation-date
                  value: '{#CREATION.TIME}'
                - tag: session
                  value: '{#NAME}'
          master_item:
            key: veeam.get.metrics
          lld_macro_paths:
            - lld_macro: '{#CREATION.TIME}'
              path: $.creationTime
            - lld_macro: '{#END.TIME}'
              path: $.endTime
            - lld_macro: '{#ID}'
              path: $.id
            - lld_macro: '{#NAME}'
              path: $.name
            - lld_macro: '{#RESULT}'
              path: $.result.result
            - lld_macro: '{#STATE}'
              path: $.state
            - lld_macro: '{#TYPE}'
              path: $.sessionType
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.sessions.data
            - type: JAVASCRIPT
              parameters:
                - |
                  var obj = JSON.parse(value, function (key, value) {
                  	if (key == 'creationTime') return new Date(value).toDateString();
                  	return value;
                  });
                  return JSON.stringify(obj);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
