                  token = auth_response.access_token;
                  
                  if (typeof token === 'undefined' || token === '') {
                  	throw 'Failed to retrieve access token from authorization response.';
                  }
                  
                  if ('{$VEEAM.HTTP.PROXY}' !== '') {
                  	request.setProxy('{$VEEAM.HTTP.PROXY}');
