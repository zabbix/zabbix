              priority: AVERAGE
              description: 'Zabbix has received errors in response to API requests.'
              tags:
                - tag: scope
                  value: availability
        - uuid: f8ef587e6d204e7da6e27e56b1131ca4
          name: 'Get metrics'
          type: SCRIPT
          key: veeam.get.metrics
          delay: '{$VEEAM.DATA.FREQUENCY}'
          history: '0'
          value_type: TEXT
          params: |
            var Veeam = {
            	params: {},
            	request: new HttpRequest(),
            	token: '',
            
            	setParams: function (params) {
            		['api_endpoint', 'api_version', 'user', 'password', 'created_after'].forEach(function (field) {
            			if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
            				throw 'Required param is not set: ' + field + '.';
            			}
            		});
            
            		Veeam.params = params;
            
            		if (typeof Veeam.params.api_endpoint === 'string' && Veeam.params.api_endpoint.slice(-1) !== '/') {
            			Veeam.params.api_endpoint += '/';
            		}
            
            		if (Veeam.params.created_after > 365 || Veeam.params.created_after < 1) {
            			throw 'Incorrect "created_after" parameter given: ' + Veeam.params.created_after + '\nMust be between 1 and 365 days.';
            		}
            	},
            
            	getField: function (data, path, separator, default_value) {
            		if (typeof separator === 'undefined') {
            			separator = '.';
            		}
            
            		var steps = path.split(separator);
            
            		for (var i = 0; i < steps.length; i++) {
            			var step = steps[i];
            
            			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
            				if (typeof default_value === 'undefined') {
            					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
            				}
            
            				return default_value;
            			}
            
            			data = data[step];
            		}
            
            		return data;
            	},
            
            	login: function () {
            		var response;
            
            		if (typeof Veeam.params.http_proxy !== 'undefined' && Veeam.params.http_proxy !== '') {
            			Veeam.request.setProxy(Veeam.params.http_proxy);
            		}
            
            		Veeam.request.addHeader('Content-Type: application/x-www-form-urlencoded');
            		Veeam.request.addHeader('x-api-version: ' + Veeam.params.api_version);
            		response = Veeam.request.post(Veeam.params.api_endpoint + 'api/oauth2/token',
            			'grant_type=password&username=' + encodeURIComponent(Veeam.params.user) + '&password=' + encodeURIComponent(Veeam.params.password));
            
            		if (Veeam.request.getStatus() !== 200 || response === null) {
            			throw 'Login failed with status code ' + Veeam.request.getStatus() + ': ' + response;
            		}
            
            		Veeam.token = Veeam.getField(JSON.parse(response), 'access_token');
            	},
            
            	logout: function () {
            		if (typeof Veeam.params.http_proxy !== 'undefined' && Veeam.params.http_proxy !== '') {
            			Veeam.request.setProxy(Veeam.params.http_proxy);
            		}
            
            		Veeam.request.clearHeader();
            		Veeam.request.addHeader('x-api-version: ' + Veeam.params.api_version);
            		Veeam.request.addHeader('Authorization: Bearer ' + Veeam.token);
            		var response = Veeam.request.post(Veeam.params.api_endpoint + 'api/oauth2/logout');
            
            		return JSON.stringify(response);
            	},
            
            	getRequest: function (url) {
            		var response;
            
            		if (typeof Veeam.params.http_proxy !== 'undefined' && Veeam.params.http_proxy !== '') {
            			Veeam.request.setProxy(Veeam.params.http_proxy);
            		}
            
            		Zabbix.log(4, '[ Veeam Backup and Replication ] Sending request: ' + url);
            		Veeam.request.clearHeader();
            
            		if (Veeam.token) {
            			Veeam.request.addHeader('Authorization: Bearer ' + Veeam.token);
            			Veeam.request.addHeader('x-api-version: ' + Veeam.params.api_version);
            			response = Veeam.request.get(url);
            		}
            
            		if (Veeam.request.getStatus() !== 200 || response === null) {
            			throw 'Request failed with status code ' + Veeam.request.getStatus() + ': ' + response;
            		}
            
            		try {
            			return JSON.parse(response);
            		}
            		catch (error) {
            			throw 'Failed to parse response received from API.';
            		}
            	},
            
            	getMetricsData: function () {
            		var data = {},
            			ms = 86400000,
            			start_date = new Date((new Date().getTime()) - ms * Veeam.params.created_after).toISOString().replace(/\.\d+/, ''),
            			endpoints = {
            				proxies: 'api/v1/backupInfrastructure/proxies',
            				proxies_states: 'api/v1/backupInfrastructure/proxies/states',
            				license: 'api/v1/license',
            				managedServers: 'api/v1/backupInfrastructure/managedServers',
            				repositories_states: 'api/v1/backupInfrastructure/repositories/states',
            				jobs_states: 'api/v1/jobs/states',
            				malware_events: 'api/v1/malwareDetection/events',
            				authorization_events: 'api/v1/authorization/events',
            				sessions: 'api/v1/sessions?createdAfterFilter=' + encodeURIComponent(start_date)
            			};
            
            		Veeam.login();
            		Object.keys(endpoints).forEach(function (key) {
            			data[key] = Veeam.getRequest(Veeam.params.api_endpoint + endpoints[key]);
            		});
            		Veeam.logout();
            
            		return data;
            	}
            };
            
            try {
            	Veeam.setParams(JSON.parse(value));
            	return JSON.stringify(Veeam.getMetricsData());
            }
            catch (error) {
            	error += (String(error).slice(-1) === '.') ? '' : '.';
            	Zabbix.log(3, '[ Veeam Backup and Replication ] ERROR: ' + error);
            	return JSON.stringify({ 'error': error });
            }
          description: 'The result of API requests is returned as JSON.'
          timeout: '{$VEEAM.DATA.TIMEOUT}'
          parameters:
            - name: api_endpoint
              value: '{$VEEAM.API.URL}'
            - name: api_version
              value: '{$VEEAM.API.VERSION}'
            - name: created_after
              value: '{$CREATED.AFTER}'
            - name: http_proxy
              value: '{$VEEAM.HTTP.PROXY}'
            - name: password
              value: '{$VEEAM.PASSWORD}'
            - name: user
              value: '{$VEEAM.USER}'
          tags:
            - tag: component
              value: raw
