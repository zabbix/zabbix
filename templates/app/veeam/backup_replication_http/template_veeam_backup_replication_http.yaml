        - uuid: bd9e21c825094553ad711a594d049a5b
          name: 'Get Security Analyzer results'
          type: HTTP_AGENT
          key: veeam.security.analyzer.get
          delay: '{$VEEAM.SECURITY.DATA.FREQUENCY}'
          history: '0'
          value_type: TEXT
          description: 'Authenticates with the Veeam API and retrieves security analyzer best practices data.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var auth_response,
                  	token,
                  	request = new HttpRequest(),
                  	url = '{$VEEAM.API.URL}' + '/api/v1/securityAnalyzer/bestPractices',
                  	response;
                  
                  try {
                  	auth_response = JSON.parse(value);
                  } catch (error) {
                  	throw 'Failed to parse authorization response: ' + error + '.';
