  templates:
    - uuid: c957b9e5317843b78bb55d87abb7da5f
      template: 'Podman by HTTP'
      name: 'Podman by HTTP'
      description: |
        Template for monitoring Podman via HTTP API. It includes discovery of containers and collection of various metrics such as container status, resource usage, and more.
        
        Generated by official Zabbix template tool "Templator"
      wizard_ready: 'YES'
      readme: |
        ## Overview
        
        This template is designed for the effortless deployment of Podman monitoring by Zabbix via HTTP and doesn't require any external scripts.
        
        Check the [`API documentation`](https://docs.podman.io/en/latest/_static/api.html?version=latest) for details.
        
        ## Setup
        
        Run an API service that listens on interfaces and custom port
        
        Example:
        
        ```bash
        podman system service --time=0 tcp:0.0.0.0:8080
        ```
        
        Note: for convenience, you can configure automatic start of the API service on system startup.
        
        ## API service security
        
        By default, the API service listens on all interfaces and is **not protected** by authentication. 
        All processes executing on the host can access the API service and perform any actions that the user running the API service has permissions for.
        This can pose a security risk if not properly configured. To enhance security, consider the following measures:
        
        1. **Restrict Access**: Configure firewall rules to restrict access to the API service to trusted IP addresses or networks.
        2. **Use VPN**: If remote access is required, consider using a VPN to securely connect to the network where the API service is running.
