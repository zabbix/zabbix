  triggers:
    - uuid: c5bdb7ee26a244c18f3e7c295e9b5b0b
      expression: 'min(/Podman by HTTP/podman.host.memory.free,5m)/ (last(/Podman by HTTP/podman.host.memory.total)+(last(/Podman by HTTP/podman.host.memory.total)=0)) * 100 * (last(/Podman by HTTP/podman.host.memory.total)>0)>{$PODMAN.HOST.MEMORY.HIGH}'
      name: 'Podman: Host memory utilization is high'
      priority: WARNING
      description: 'Trigger when the memory utilization of the host running Podman is too high.'
      tags:
        - tag: scope
          value: notice
