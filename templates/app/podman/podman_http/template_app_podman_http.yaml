      discovery_rules:
        - uuid: 817248dabe0046c3abb404cca1ea61c7
          name: 'Containers discovery'
          type: DEPENDENT
          key: podman.containers.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#CONTAINER.IMAGE}'
                value: '{$PODMAN.CONTAINER.FILTER.IMAGE.MATCHES}'
              - macro: '{#CONTAINER.IMAGE}'
                value: '{$PODMAN.CONTAINER.FILTER.IMAGE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#CONTAINER.NAME}'
                value: '{$PODMAN.CONTAINER.FILTER.NAME.MATCHES}'
              - macro: '{#CONTAINER.NAME}'
                value: '{$PODMAN.CONTAINER.FILTER.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#CONTAINER.POD}'
                value: '{$PODMAN.CONTAINER.FILTER.POD.MATCHES}'
              - macro: '{#CONTAINER.POD}'
                value: '{$PODMAN.CONTAINER.FILTER.POD.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#CONTAINER.STATE}'
                value: '{$PODMAN.CONTAINER.FILTER.STATE.MATCHES}'
              - macro: '{#CONTAINER.STATE}'
                value: '{$PODMAN.CONTAINER.FILTER.STATE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discovery of Podman containers.'
          item_prototypes:
            - uuid: 3dd8652f4c8e4b7a9c0d1e2f3a456789
              name: 'Container [{#CONTAINER.NAME}]: Average CPU usage'
              type: DEPENDENT
              key: 'podman.container.avgcpu[{#CONTAINER.ID}]'
              value_type: FLOAT
              units: '%'
              description: 'Average CPU usage of the container.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.stats[?(@.ContainerID=="{#CONTAINER.ID}")].AvgCPU.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 10m
              master_item:
                key: podman.get_data
              tags:
                - tag: component
                  value: cpu
                - tag: container
                  value: '{#CONTAINER.NAME}'
                - tag: image
                  value: '{#CONTAINER.IMAGE}'
                - tag: pod
                  value: '{#CONTAINER.POD}'
                - tag: podman
