        - uuid: 384829d761ba418e80ced877e82d1a7f
          name: 'Get data'
          type: SCRIPT
          key: podman.get_data
          history: '0'
          value_type: JSON
          params: |
            var output = {
            	data: {
            		containers: [],
            		images: [],
            		df: [],
            		stats: [],
            		info: {}
            	},
            	error: ''
            };
            
            var podman = {
            	params: {},
            
            	getField: function (data, path, separator, default_value) {
            		if (typeof separator === 'undefined') {
            			separator = '.';
            		}
            		var steps = path.split(separator);
            		for (var i = 0; i < steps.length; i++) {
            			var step = steps[i];
            			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
            				if (typeof default_value === 'undefined') {
            					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
            				}
            				return default_value;
            			}
            
            			data = data[step];
            		}
            
            		return data;
            	},
            
            	setParams: function (params) {
            		['podman_url'].forEach(function (field) {
            			if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
            				throw 'Required parameters are not set: "' + field + '".';
            			}
            			podman.params[field] = params[field];
            		});
            
            		podman.params.podman_url = podman.params.podman_url.replace(/^https?:\/\//, '').replace(/\/+$/, '');
            	},
            
            	getData: function () {
            		var request = new HttpRequest();
            
            		if (typeof podman.params.proxy !== 'undefined' && podman.params.proxy !== '') {
            			request.setProxy(podman.params.proxy);
            		}
            
            		var response_containers_list = [],
            			response_images_list = [],
            			response_df_list = [],
            			response_stats_list = [],
            			response_info = {};
            
            		try {
            			response_containers_list = request.get('http://' + podman.params.podman_url + '/v6.0.0/libpod/containers/json?all=true');
            
            			if (request.getStatus() !== 200) {
            				throw 'Status code ' + request.getStatus() + '. Request Url: ' + '"http://' + podman.params.podman_url + '/v6.0.0/libpod/containers/json?all=true"';
            			}
            		}
            
            		catch (error) {
            			throw 'Request failed. ' + error;
            		}
            
            		try {
            			response_containers_list = JSON.parse(response_containers_list);
            		}
            		catch (error) {
            			throw 'Failed to parse response. ' + error;
            		}
            
            		for (var i = 0; i < response_containers_list.length; i++) {
            			var container = response_containers_list[i];
            			output.data.containers.push({
            				id: podman.getField(container, 'Id'),
            				container: podman.getField(container, 'Names.0'),
            				image: podman.getField(container, 'Image'),
            				state: podman.getField(container, 'State'),
            				pod: podman.getField(container, 'PodName', '.', '')
            			});
            		}
            
            		try {
            			response_images_list = request.get('http://' + podman.params.podman_url + '/v6.0.0/libpod/images/json');
            
            			if (request.getStatus() !== 200) {
            				throw 'Status code ' + request.getStatus() + '. Request Url: ' + '"http://' + podman.params.podman_url + '/v6.0.0/libpod/images/json"';
            			}
            		}
            
            		catch (error) {
            			throw 'Request failed. ' + error;
            		}
            
            		try {
            			response_images_list = JSON.parse(response_images_list);
            		}
            		catch (error) {
            			throw 'Failed to parse response. ' + error;
            		}
            
            		output.data.images = response_images_list;
            
            		try {
            			response_df_list = request.get('http://' + podman.params.podman_url + '/v6.0.0/libpod/system/df');
            
            			if (request.getStatus() !== 200) {
            				throw 'Status code ' + request.getStatus() + '. Request Url: ' + '"http://' + podman.params.podman_url + '/v6.0.0/libpod/system/df"';
            			}
            		}
            
            		catch (error) {
            			throw 'Request failed. ' + error;
            		}
            
            		try {
            			response_df_list = JSON.parse(response_df_list);
            		}
            		catch (error) {
            			throw 'Failed to parse response. ' + error;
            		}
            
            		output.data.df = response_df_list;
            
            		try {
            			response_stats_list = request.get('http://' + podman.params.podman_url + '/v6.0.0/libpod/containers/stats?stream=false');
            
            			if (request.getStatus() !== 200) {
            				throw 'Status code ' + request.getStatus() + '. Request Url: ' + '"http://' + podman.params.podman_url + '/v6.0.0/libpod/containers/stats?stream=false"';
            			}
            		}
            
            		catch (error) {
            			throw 'Request failed. ' + error;
            		}
            
            		try {
            			response_stats_list = JSON.parse(response_stats_list);
            		}
            		catch (error) {
            			throw 'Failed to parse response. ' + error;
            		}
            
            		output.data.stats = podman.getField(response_stats_list, 'Stats', '.', []);
            
            		try {
            			response_info = request.get('http://' + podman.params.podman_url + '/v6.0.0/libpod/info');
            
            			if (request.getStatus() !== 200) {
            				throw 'Status code ' + request.getStatus() + '. Request Url: ' + '"http://' + podman.params.podman_url + '/v6.0.0/libpod/info"';
            			}
            		}
            
            		catch (error) {
            			throw 'Request failed. ' + error;
            		}
            
            		try {
            			response_info = JSON.parse(response_info);
            		}
            		catch (error) {
            			throw 'Failed to parse response. ' + error;
            		}
            
            		response_info['swapUse'] = podman.getField(response_info, 'host.swapTotal', '.', 0) - podman.getField(response_info, 'host.swapFree', '.', 0);
            		response_info['memUse'] = podman.getField(response_info, 'host.memTotal', '.', 0) - podman.getField(response_info, 'host.memFree', '.', 0);
            
            		output.data.info = response_info;
            	}
            };
            
            try {
            	podman.setParams(JSON.parse(value));
            	podman.getData();
            }
            catch (error) {
            	error += (String(error).endsWith('.')) ? '' : '.';
            	Zabbix.log(3, '[ Podman ] ERROR: ' + error);
            
            	output.error = error;
            }
            
            return JSON.stringify(output);
          description: 'Get data from Podman API.'
