  triggers:
    - uuid: a4aa19e9b6204ab2882b71e0578a30f2
      expression: 'min(/Podman by Zabbix agent active/podman.host.memory.free,5m)/ (last(/Podman by Zabbix agent active/podman.host.memory.total)+(last(/Podman by Zabbix agent active/podman.host.memory.total)=0)) * 100 * (last(/Podman by Zabbix agent active/podman.host.memory.total)>0)>{$PODMAN.HOST.MEMORY.HIGH}'
      name: 'Podman: Host memory utilization is high'
      priority: WARNING
      description: 'Trigger when the memory utilization of the host running Podman is too high.'
      tags:
        - tag: scope
          value: notice
