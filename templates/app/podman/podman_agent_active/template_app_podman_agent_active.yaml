              units: unixtime
              description: 'Checkpoint time of the container.'
              valuemap:
                name: Time
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.data.State.CheckpointedAt
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value === '0001-01-01T00:00:00Z') {
                      	return 1;
                      }
                      
                      
                      var safe_iso_string = value.replace(/(\.\d{3})\d+/, '$1'),
                      	unixtime = new Date(safe_iso_string).getTime();
                      
                      if (isNaN(unixtime)) {
                      		Zabbix.log(4, '[ Podman ] ERROR: Failed to parse value "' + value + '". Wrong date format. Expected ISO 8601 format: "YYYY-MM-DDTHH:mm:ss.sssZ".');
