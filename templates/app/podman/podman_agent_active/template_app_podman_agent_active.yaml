        - uuid: bbf34bddcc70427e981b8e2a1f703496
          name: 'Get data [Containers]'
          type: ZABBIX_ACTIVE
          key: 'web.page.get[http://127.0.0.1:{$PODMAN.PORT}/v6.0.0/libpod/containers/json?all=true]'
          history: '0'
          value_type: JSON
          description: 'Get data from Podman API (Containers).'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"error": "Error getting data from Podman API", "data": ""}'
            - type: REGEX
              parameters:
                - '^([\s\S]*?)\r?\n\r?\n([\s\S]*)$'
                - \2
            - type: JAVASCRIPT
              parameters:
                - |
                  var output = {
                  	data: {
                  		containers: []
                  	},
                  	error: ''
                  };
                  
                  var podman = {
                  
                  	getField: function (data, path, separator, default_value) {
                  		if (typeof separator === 'undefined') {
                  			separator = '.';
                  		}
                  		var steps = path.split(separator);
                  		for (var i = 0; i < steps.length; i++) {
                  			var step = steps[i];
                  			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
                  				if (typeof default_value === 'undefined') {
                  					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
                  				}
                  				return default_value;
                  			}
                  
                  			data = data[step];
                  		}
                  
                  		return data;
                  	},
                  
                  	getData: function () {
                  
                  		var response_containers_list = JSON.parse(value);
                  
                  		for (var i = 0; i < response_containers_list.length; i++) {
                  			var container = response_containers_list[i];
                  			output.data.containers.push({
                  				id: podman.getField(container, 'Id'),
                  				container: podman.getField(container, 'Names.0'),
                  				image: podman.getField(container, 'Image'),
                  				state: podman.getField(container, 'State'),
                  				pod: podman.getField(container, 'PodName', '.', '')
                  			});
                  		}
                  	}
                  };
                  
                  try {
                  	podman.getData();
                  }
                  catch (error) {
                  	error += (String(error).endsWith('.')) ? '' : '.';
                  	Zabbix.log(3, '[ Podman ] ERROR: ' + error);
                  
                  	output.error = error;
                  }
                  
                  return JSON.stringify(output);
          tags:
            - tag: component
              value: raw
        - uuid: f1c4d7c20c794353b50869033aa07708
          name: 'Get data [Container stats]'
          type: ZABBIX_ACTIVE
