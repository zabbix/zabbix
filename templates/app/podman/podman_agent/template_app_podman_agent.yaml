                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value === '0001-01-01T00:00:00Z') {
