        - uuid: 9c8b1e5a0c7d4d1f9b8e5a2c3f1a2b34
          name: 'Get data [Images]'
          key: 'web.page.get[http://127.0.0.1:{$PODMAN.PORT}/v6.0.0/libpod/images/json]'
