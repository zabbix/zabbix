  triggers:
    - uuid: 82e0c6778d3445bc93deb9c208b01169
      expression: 'min(/Podman by Zabbix agent/podman.host.memory.free,5m)/ (last(/Podman by Zabbix agent/podman.host.memory.total)+(last(/Podman by Zabbix agent/podman.host.memory.total)=0)) * 100 * (last(/Podman by Zabbix agent/podman.host.memory.total)>0)>{$PODMAN.HOST.MEMORY.HIGH}'
      name: 'Podman: Host memory utilization is high'
      priority: WARNING
      description: 'Trigger when the memory utilization of the host running Podman is too high.'
      tags:
        - tag: scope
          value: notice
