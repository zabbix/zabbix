            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$PODMAN.IMAGE.FILTER.NAME.MATCHES}'
          value: '.*'
          description: 'Regex to include images by name.'
          config:
            type: TEXT
            priority: '10'
            section_name: Filters
            label: 'Image name include filter'
            description: 'Regular expression to include images by name. Only images with names matching this regex will be included.'
        - macro: '{$PODMAN.IMAGE.FILTER.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Regex to exclude images by name.'
          config:
            type: TEXT
            priority: '11'
            section_name: Filters
            label: 'Image name exclude filter'
            description: 'Regular expression to exclude images by name. Images with names matching this regex will be excluded.'
        - macro: '{$PODMAN.PORT}'
          value: '8088'
          description: 'Port on which the Podman API service is listening.'
          config:
            type: TEXT
            priority: '1'
            label: 'Podman API port'
            description: 'Port on which the Podman API service is listening.'
            required: 'YES'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
