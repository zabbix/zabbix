      macros:
        - macro: '{$PODMAN.CONTAINER.CPU.HIGH}'
          value: '80'
          description: 'CPU usage percentage that is considered high for containers. Support context macro with container name, e.g. {$PODMAN.CONTAINER.CPU.HIGH:"container_name"}.'
          config:
            type: TEXT
            priority: '13'
            label: 'Container high CPU threshold'
            description: 'Define the CPU usage percentage that is considered high for containers. This is used for triggering alerts when the container''s CPU usage exceeds this threshold.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$PODMAN.CONTAINER.FILTER.IMAGE.MATCHES}'
          value: '.*'
          description: 'Regex to include containers by image.'
          config:
            type: TEXT
            priority: '4'
            section_name: Filters
            label: 'Container image include filter'
            description: 'Regular expression to include containers by image. Only containers with images matching this regex will be included.'
        - macro: '{$PODMAN.CONTAINER.FILTER.IMAGE.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Regex to exclude containers by image.'
          config:
            type: TEXT
            priority: '5'
            section_name: Filters
            label: 'Container image exclude filter'
            description: 'Regular expression to exclude containers by image. Containers with images matching this regex will be excluded.'
        - macro: '{$PODMAN.CONTAINER.FILTER.NAME.MATCHES}'
          value: '.*'
          description: 'Regex to include containers by name.'
          config:
            type: TEXT
            priority: '2'
            section_name: Filters
            label: 'Container name include filter'
            description: 'Regular expression to include containers by name. Only containers with names matching this regex will be included.'
        - macro: '{$PODMAN.CONTAINER.FILTER.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Regex to exclude containers by name.'
          config:
            type: TEXT
            priority: '3'
            section_name: Filters
            label: 'Container name exclude filter'
            description: 'Regular expression to exclude containers by name. Containers with names matching this regex will be excluded.'
        - macro: '{$PODMAN.CONTAINER.FILTER.POD.MATCHES}'
          value: '.*'
          description: 'Regex to include containers by pod.'
          config:
            type: TEXT
            priority: '8'
            section_name: Filters
            label: 'Container pod include filter'
            description: 'Regular expression to include containers by pod. Only containers with pods matching this regex will be included.'
        - macro: '{$PODMAN.CONTAINER.FILTER.POD.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Regex to exclude containers by pod.'
          config:
            type: TEXT
            priority: '9'
            section_name: Filters
            label: 'Container pod exclude filter'
            description: 'Regular expression to exclude containers by pod. Containers with pods matching this regex will be excluded.'
        - macro: '{$PODMAN.CONTAINER.FILTER.STATE.MATCHES}'
          value: '.*'
          description: 'Regex to include containers by state.'
          config:
            type: TEXT
            priority: '6'
            section_name: Filters
            label: 'Container state include filter'
            description: 'Regular expression to include containers by state. Only containers with states matching this regex will be included.'
        - macro: '{$PODMAN.CONTAINER.FILTER.STATE.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Regex to exclude containers by state.'
          config:
            type: TEXT
            priority: '7'
            section_name: Filters
            label: 'Container state exclude filter'
            description: 'Regular expression to exclude containers by state. Containers with states matching this regex will be excluded.'
        - macro: '{$PODMAN.CONTAINER.MEMORY.HIGH}'
          value: '80'
          description: 'Memory usage percentage that is considered high for containers. Support context macro with container name, e.g. {$PODMAN.CONTAINER.MEMORY.HIGH:"container_name"}.'
          config:
            type: TEXT
            priority: '14'
            label: 'Container high memory threshold'
            description: 'Define the memory usage percentage that is considered high for containers. This is used for triggering alerts when the container''s memory usage exceeds this threshold.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$PODMAN.CONTAINER.NORMAL_STATE}'
          value: '1'
          description: 'Normal state of the container. Support context macro with container name, e.g. {$PODMAN.CONTAINER.NORMAL_STATE:"container_name"}.'
          config:
            type: LIST
            priority: '12'
            label: 'Container normal state'
            description: 'Define the normal state of the container (e.g., running). This is used for triggering alerts when the container is not in this state.'
            options:
              - value: '1'
                text: running
              - value: '2'
                text: exited
              - value: '3'
                text: paused
              - value: '4'
                text: restarting
              - value: '5'
                text: removing
              - value: '6'
                text: created
              - value: '7'
                text: dead
              - value: '8'
                text: configured
              - value: '9'
                text: stopped
              - value: '10'
                text: stopping
              - value: '11'
                text: unknown
        - macro: '{$PODMAN.HOST.CPU.HIGH}'
          value: '80'
          description: 'CPU usage percentage that is considered high for the host.'
          config:
            type: TEXT
            priority: '15'
            label: 'Host high CPU threshold'
            description: 'Define the CPU usage percentage that is considered high for the host. This is used for triggering alerts when the host''s CPU usage exceeds this threshold.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$PODMAN.HOST.MEMORY.HIGH}'
