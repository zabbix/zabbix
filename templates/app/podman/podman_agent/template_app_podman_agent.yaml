                - tag: podman
                  value: container
          trigger_prototypes:
            - uuid: 3b40270769b749d7b6805a262cfa1650
              expression: 'change(/Podman by Zabbix agent/podman.container.network.errors_tx[{#CONTAINER.ID},{#NETWORK.INTERFACE}])>0 or change(/Podman by Zabbix agent/podman.container.network.errors_rx[{#CONTAINER.ID},{#NETWORK.INTERFACE}])>0'
              name: 'Podman: Container [{#CONTAINER.NAME}]: Interface [{#NETWORK.INTERFACE}] errors'
              opdata: 'RxErrors: {ITEM.LASTVALUE2}, TxErrors: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Trigger when count of errors on the network interface of the container is changing.'
              tags:
                - tag: scope
                  value: notice
          parent_discovery_rule:
            key: podman.containers.discovery
          master_item:
            key: 'web.page.get[http://127.0.0.1:{$PODMAN.PORT}/v6.0.0/libpod/containers/stats?stream=false]'
          lld_macro_paths:
            - lld_macro: '{#NETWORK.INTERFACE}'
              path: $.iface
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.Stats[?(@.ContainerID=="{#CONTAINER.ID}")].Network.first()'
              error_handler: CUSTOM_VALUE
              error_handler_params: '{}'
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                  	var network = JSON.parse(value);
                  }
                  
                  catch (error) {
                  	Zabbix.log(4, '[ Podman ] ERROR: Failed to parse value "' + value + '". ' + error);
                  	return '';
                  }
                  
                  var output = [];
                  
                  for (var iface in network) {
                  	if (network.hasOwnProperty(iface)) {
                  		output.push({
                  			iface: iface
                  		});
                  	}
                  }
                  
                  return JSON.stringify(output);
