              value: '{$CLAUDE.API.URL}'
            - name: bucket_width
              value: '{$CLAUDE.API.MSG.USAGE.BUCKET}'
            - name: http_proxy
              value: '{$CLAUDE.API.HTTP_PROXY}'
          tags:
            - tag: component
              value: raw
