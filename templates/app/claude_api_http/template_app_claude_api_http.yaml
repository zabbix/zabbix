            	entries = ClaudeAPI.apiRequest(endpoint, endpoint_params);
            	last_entry = entries.length > 0 ? entries[entries.length - 1] : {};
            	result = ClaudeAPI.getField(last_entry, 'results', '.', []).reduce(function (acc, item) {
