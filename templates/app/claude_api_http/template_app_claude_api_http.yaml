        - uuid: 59cc34f6ca3c49a9a91eda65d3c70da2
          name: 'Workspace [{#WORKSPACE.NAME}]: Cost model discovery'
          type: DEPENDENT
          key: 'claude.costs.model.discovery[{#WORKSPACE.ID}]'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#MODEL.NAME}'
                value: '{$CLAUDE.API.MODEL.MATCHES}'
              - macro: '{#MODEL.NAME}'
                value: '{$CLAUDE.API.MODEL.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Claude costs model discovery.'
          item_prototypes:
            - uuid: bd26dd3452be425481408a0297a23385
              name: 'Workspace [{#WORKSPACE.NAME}]: Model [{#MODEL.NAME}]: Total costs'
              type: DEPENDENT
              key: 'claude.costs.model.total[{#WORKSPACE.NAME}, {#MODEL.NAME}]'
              value_type: FLOAT
              units: '!USD'
              description: 'Total `{#WORKSPACE.NAME}` expenses for `{#MODEL.NAME}`.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.workspace_id == ''{#WORKSPACE.ID}'' && @.model == ''{#MODEL.NAME}'')].amount.sum()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              master_item:
                key: claude.costs.get
              trigger_prototypes:
                - uuid: bdeb02395fcb49e485567c0a00b1fa69
                  expression: 'last(/Claude API by HTTP/claude.costs.model.total[{#WORKSPACE.NAME}, {#MODEL.NAME}])>({$CLAUDE.API.MODEL.COST.WARN:"{#WORKSPACE.NAME}"})'
                  name: 'Claude API: Model {#MODEL.NAME} expenses exceeded the threshold'
                  event_name: 'Claude API: Model {#MODEL.NAME} expenses for {#WORKSPACE.NAME} exceeded {$CLAUDE.API.MODEL.COST.WARN:"{#WORKSPACE.NAME}"}'
                  opdata: 'Current value: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'Model expenses exceeded the threshold in the previous day.'
                  tags:
                    - tag: scope
                      value: notice
          parent_discovery_rule:
            key: claude.workspaces.discovery
          master_item:
            key: claude.costs.get
          lld_macro_paths:
            - lld_macro: '{#MODEL.NAME}'
              path: $.model
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.workspace_id == ''{#WORKSPACE.ID}'')]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value),
                  	seen = {},
                  	result = [];
                  
                  for (var i = 0; i < data.length; i++) {
                  	var item = data[i],
                  		key = item.workspace_id + '|' + item.model;
                  
                  	if (!seen[key]) {
                  		seen[key] = true;
                  		result.push({
                  			workspace_id: item.workspace_id,
                  			model: item.model
                  		});
                  	}
                  }
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
        - uuid: 8166b83f34724c7399dbcb76f4afc6d4
          name: 'Invite discovery'
          type: DEPENDENT
          key: claude.invites.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#INVITE.STATUS}'
                value: '{$CLAUDE.API.INVITE.STATUS.MATCHES}'
              - macro: '{#INVITE.STATUS}'
                value: '{$CLAUDE.API.INVITE.STATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          lifetime: 1h
          description: 'Invite discovery.'
          item_prototypes:
            - uuid: d8d0a003df4845b49fd5e076d8ca1263
              name: 'Invite [{#INVITE.EMAIL}]: Time left'
              type: DEPENDENT
              key: 'claude.invites.expires[{#INVITE.ID}]'
              value_type: FLOAT
              units: uptime
              description: 'Time left before the invite will expire.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.id == ''{#INVITE.ID}'')].expires_at.first()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var safe_iso_string = value.replace(/(\.\d{3})\d+/, '$1'),
                      	unixtime = new Date(safe_iso_string).getTime();
                      
                      if (isNaN(unixtime)) {
                      	Zabbix.log(4, '[ Claude API ] ERROR: Failed to parse value "' + value + '". Wrong date format. Expected ISO 8601 format: "YYYY-MM-DDTHH:mm:ss.sssZ".');
                      	return 0;
                      }
                      
                      return Math.trunc((Date.now() - unixtime) / 1000);
                - type: MULTIPLIER
                  parameters:
                    - '-1'
                - type: IN_RANGE
                  parameters:
                    - '1'
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: claude.invites.get
              tags:
                - tag: component
                  value: invites
              trigger_prototypes:
                - uuid: 533dfc2bb4a249dc95c279738c09d9cf
                  expression: 'last(/Claude API by HTTP/claude.invites.expires[{#INVITE.ID}])<({$CLAUDE.API.INVITE.EXPIRE.WARN}*3600)'
                  name: 'Claude API: Invite [{#INVITE.EMAIL}] will expire soon'
                  event_name: 'Claude API: Invite to {#INVITE.EMAIL} will expire in {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'Invite will expire.'
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Claude API: Invite [{#INVITE.EMAIL}] expired'
                      expression: 'last(/Claude API by HTTP/claude.invites.status[{#INVITE.ID}])=2'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 6e2670027fcf4c919ac0d8dfe4523c11
              name: 'Invite [{#INVITE.EMAIL}]: Status'
              type: DEPENDENT
              key: 'claude.invites.status[{#INVITE.ID}]'
              trends: '0'
              description: |
                Invite status.
                Possible values: "accepted", "expired", "deleted", "pending" and "unknown".
              valuemap:
                name: 'Invite status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.id == ''{#INVITE.ID}'')].status.first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: unknown
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var idx = {
                      	accepted: 1,
                      	expired: 2,
                      	deleted: 3,
                      	pending: 4
                      };
                      
                      return typeof idx[value] === 'undefined' ? 0 : idx[value];
              master_item:
                key: claude.invites.get
              tags:
                - tag: component
                  value: invites
              trigger_prototypes:
                - uuid: b075114f1ed34f7c8cecee5c2732a6d8
                  expression: 'last(/Claude API by HTTP/claude.invites.status[{#INVITE.ID}])=2'
                  name: 'Claude API: Invite [{#INVITE.EMAIL}] expired'
                  event_name: 'Claude API: Invite to {#INVITE.EMAIL} expired.'
                  priority: WARNING
                  description: 'Invite has expired.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: bea26157bf7f4e4899f53631951a4718
                  expression: 'last(/Claude API by HTTP/claude.invites.status[{#INVITE.ID}])=1'
                  name: 'Claude API: Invite [{#INVITE.EMAIL}] was accepted'
                  event_name: 'Claude API: Invite to {#INVITE.EMAIL} was accepted.'
                  priority: INFO
                  description: 'Invite was accepted.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
          master_item:
            key: claude.invites.get
          lld_macro_paths:
            - lld_macro: '{#INVITE.EMAIL}'
              path: $.email
            - lld_macro: '{#INVITE.ID}'
              path: $.id
            - lld_macro: '{#INVITE.STATUS}'
              path: $.status
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
