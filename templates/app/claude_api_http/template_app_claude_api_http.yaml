              type: DEPENDENT
              key: 'claude.workspaces.msg.tokens.out[{#WORKSPACE.ID}]'
              units: tok
              description: 'The number of output tokens generated.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.workspace_id == ''{#WORKSPACE.ID}'')].output_tokens.sum()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: claude.usage.messages.get
              tags:
                - tag: component
                  value: messages
                - tag: workspace_id
                  value: '{#WORKSPACE.ID}'
                - tag: workspace_name
                  value: '{#WORKSPACE.NAME}'
            - uuid: ed2daa88cfbc447699ab062b1dafe600
              name: 'Workspace [{#WORKSPACE.NAME}]: Uptime'
              type: DEPENDENT
              key: 'claude.workspaces.uptime[{#WORKSPACE.ID}]'
              units: uptime
              description: 'Workspace uptime - how long ago it was created.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.id == ''{#WORKSPACE.ID}'')].created_at.first()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var safe_iso_string = value.replace(/(\.\d{3})\d+/, '$1'),
                      	unixtime = new Date(safe_iso_string).getTime();
                      
                      if (isNaN(unixtime)) {
                      	Zabbix.log(4, '[ Claude API ] ERROR: Failed to parse value "' + value + '". Wrong date format. Expected ISO 8601 format: "YYYY-MM-DDTHH:mm:ss.sssZ".');
                      	return 0;
                      }
                      
                      return Math.trunc((Date.now() - unixtime) / 1000);
              master_item:
                key: claude.workspaces.get
              tags:
                - tag: component
                  value: health
                - tag: workspace_id
                  value: '{#WORKSPACE.ID}'
                - tag: workspace_name
                  value: '{#WORKSPACE.NAME}'
          master_item:
            key: claude.workspaces.get
          lld_macro_paths:
            - lld_macro: '{#WORKSPACE.ID}'
              path: $.id
            - lld_macro: '{#WORKSPACE.NAME}'
              path: $.name
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
