                      value: notice
            - uuid: e356aea476264ed69f3936752ddb4cb9
              name: 'Workspace [{#WORKSPACE.NAME}]: Key [{#KEY.NAME}]: Uptime'
              type: DEPENDENT
              key: 'claude.keys.uptime[{#WORKSPACE.ID}, {#KEY.ID}]'
              units: uptime
              description: 'API key uptime - how long ago it was created.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.id == ''{#KEY.ID}'')].created_at.first()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var safe_iso_string = value.replace(/(\.\d{3})\d+/, '$1'),
                      	unixtime = new Date(safe_iso_string).getTime();
                      
                      if (isNaN(unixtime)) {
                      	Zabbix.log(4, '[ Claude API ] ERROR: Failed to parse value "' + value + '". Wrong date format. Expected ISO 8601 format: "YYYY-MM-DDTHH:mm:ss.sssZ".');
                      	return 0;
                      }
                      
                      return Math.trunc((Date.now() - unixtime) / 1000);
              master_item:
                key: claude.keys.get
