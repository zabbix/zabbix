          history: '0'
          value_type: TEXT
          params: |
            var ClaudeAPI = {
            	params: {},
            
            	setParams: function (params) {
            		['api_url', 'api_token'].forEach(function (field) {
            			if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
            				throw 'Required param is not set: ' + field + '.';
            			}
            		});
            
            		ClaudeAPI.params = params;
            
            		if (typeof ClaudeAPI.params.api_url === 'string' && !ClaudeAPI.params.api_url.endsWith('/')) {
            			ClaudeAPI.params.api_url += '/';
            		}
            	},
            
            	getField: function (data, path, separator, default_value) {
            		if (typeof separator === 'undefined') {
            			separator = '.';
            		}
            
            		var steps = path.split(separator);
            
            		for (var i = 0; i < steps.length; i++) {
            			var step = steps[i];
            
            			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
            				if (typeof default_value === 'undefined') {
            					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
            				}
            
            				return default_value;
            			}
            
            			data = data[step];
            		}
            
            		return data;
            	},
            
            	apiRequest: function (endpoint, params) {
            		var response = [],
            			request = new HttpRequest(),
            			has_more = true,
            			next_page = '',
            			separator = params ? '&' : '?',
            			uri = ClaudeAPI.params.api_url + endpoint + params;
            
            		if (typeof ClaudeAPI.params.proxy !== 'undefined' && ClaudeAPI.params.proxy !== '') {
            			request.setProxy(ClaudeAPI.params.proxy);
            		}
            
            		request.addHeader('anthropic-version: 2023-06-01');
            		request.addHeader('x-api-key: ' + ClaudeAPI.params.api_token);
            
            		while (has_more) {
            			var answer;
            			try {
            				answer = JSON.parse(request.get(uri + next_page));
            			}
            			catch (e) {
            				throw 'Failed to parse API response: ' + e + '.';
            			}
            
            			has_more = ClaudeAPI.getField(answer, 'has_more', '.', false);
            			next_page = has_more
            				? separator + 'page=' + ClaudeAPI.getField(answer, 'next_page', '.', '')
            				: '';
            			response = response.concat(ClaudeAPI.getField(answer, 'data', '.', []));
            		}
            
            		return response;
            	}
            }
            
            
            var result = [],
            	endpoint = 'organizations/usage_report/messages',
            	endpoint_params = '',
            	entries = [],
            	last_entry = {};
            
            function bucket_time_period(bucket) {
            	var now = new Date(),
            		time_string = '';
            
            	switch (bucket) {
            		case '1m':
            			now.setSeconds(0, 0);
            			time_string += '&ending_at=' + now.toISOString();
            			now.setMinutes(now.getMinutes() - 1);
            			time_string += '&starting_at=' + now.toISOString() + '&bucket_width=1m';
            			break;
            		case '1h':
            			now.setMinutes(0, 0, 0);
            			time_string += '&ending_at=' + now.toISOString();
            			now.setHours(now.getHours() - 1);
            			time_string += '&starting_at=' + now.toISOString() + '&bucket_width=1h';
