        - uuid: e84cc20e465b4931a07754ea0b9e2159
          name: 'Limits: Get data'
          type: SCRIPT
          key: claude.limits.get
          delay: '{$CLAUDE.API.INTERVAL:limits}'
          history: '0'
          value_type: TEXT
          params: |
            var ClaudeAPI = {
            	params: {},
            
            	setParams: function (params) {
            		['api_url', 'api_token'].forEach(function (field) {
            			if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
            				throw 'Required param is not set: ' + field + '.';
            			}
            		});
            
            		ClaudeAPI.params = params;
            
            		if (typeof ClaudeAPI.params.api_url === 'string' && !ClaudeAPI.params.api_url.endsWith('/')) {
            			ClaudeAPI.params.api_url += '/';
            		}
            	},
            
            	getField: function (data, path, separator, default_value) {
            		if (typeof separator === 'undefined') {
            			separator = '.';
            		}
            
            		var steps = path.split(separator);
            
            		for (var i = 0; i < steps.length; i++) {
            			var step = steps[i];
            
            			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
            				if (typeof default_value === 'undefined') {
            					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
            				}
            
            				return default_value;
            			}
            
            			data = data[step];
            		}
            
            		return data;
            	},
            
            	apiRequest: function (endpoint, params) {
            		var response = [],
            			request = new HttpRequest(),
            			has_more = true,
            			next_page = '',
            			separator = params ? '&' : '?',
            			uri = ClaudeAPI.params.api_url + endpoint + params;
            
            		if (typeof ClaudeAPI.params.proxy !== 'undefined' && ClaudeAPI.params.proxy !== '') {
            			request.setProxy(ClaudeAPI.params.proxy);
            		}
            
            		request.addHeader('anthropic-version: 2023-06-01');
            		request.addHeader('x-api-key: ' + ClaudeAPI.params.api_token);
            
            		while (has_more) {
            			var answer;
            			try {
            				answer = JSON.parse(request.get(uri + next_page));
            			}
            			catch (e) {
            				throw 'Failed to parse API response: ' + e + '.';
            			}
            
            			has_more = ClaudeAPI.getField(answer, 'has_more', '.', false);
            			next_page = has_more
            				? separator + 'page=' + ClaudeAPI.getField(answer, 'next_page', '.', '')
            				: '';
            			response = response.concat(ClaudeAPI.getField(answer, 'data', '.', []));
            		}
            
            		return response;
            	}
            }
            
            
            function mergeLimits(organization_limits, workspace_limits) {
            	function modelsKey(models) {
            		return models ? models.slice().sort().join(',') : '';
            	}
            
            	return organization_limits.map(function (organization_limit_group) {
            		var workspace_limit_group = null;
            		for (var i = 0; i < workspace_limits.length; i++) {
            			if (workspace_limits[i].group_type === organization_limit_group.group_type
            				&& modelsKey(workspace_limits[i].models) === modelsKey(organization_limit_group.models)) {
            					workspace_limit_group = workspace_limits[i];
            					break;
            			}
            		}
            
            		return {
            			type: 'workspace_rate_limit',
            			group_type: organization_limit_group.group_type,
            			model_group: modelsToGroup(organization_limit_group.models || (workspace_limit_group && workspace_limit_group.models)),
            			limits: organization_limit_group.limits.map(function (organization_limit) {
            				var override = null;
            
            				if (workspace_limit_group) {
            					for (var j = 0; j < workspace_limit_group.limits.length; j++) {
            						if (workspace_limit_group.limits[j].type === organization_limit.type) {
            							override = workspace_limit_group.limits[j];
            							break;
            						}
            					}
            				}
            
            				if (override) {
            					return override;
            				}
            
            				return {
            					type: organization_limit.type,
            					value: organization_limit.value,
            					org_limit: organization_limit.value
            				};
            			})
            		};
            	});
            }
            
            function modelsToGroup(models) {
            	if (!models) {
            		return null;
            	}
            
            	for (var i = 0; i < models.length; i++) {
            		var m = models[i].toLowerCase();
            
            		if (m.indexOf('claude-opus-4') !== -1) {
            				return 'Opus';
            			}
            
            			if (m.indexOf('claude-sonnet-4') !== -1) {
            				return 'Sonnet';
            			}
            
            			if (m.indexOf('claude-haiku-4') !== -1)  {
            				return 'Haiku';
            			}
            
            			if (m.indexOf('claude-mythos') !== -1)  {
            				return 'Mythos';
            			}
            	}
            
            	return null;
            }
            
            var organization_result = [],
            	organization_endpoint = 'organizations/rate_limits',
            	organization_endpoint_params = '',
            	workspaces = [],
            	workspaces_endpoint = 'organizations/workspaces',
            	workspaces_endpoint_params = '',
            	result = [],
            	final_data = [];
            
            try {
            	ClaudeAPI.setParams(JSON.parse(value));
            	organization_result = ClaudeAPI.apiRequest(organization_endpoint, organization_endpoint_params);
            	workspaces = ClaudeAPI.apiRequest(workspaces_endpoint, workspaces_endpoint_params);
            	workspaces.forEach(function (workspace) {
            		var workspace_endpoint_params = '/' + workspace.id + '/rate_limits?group_type[]=model_group',
            			workspace_limit = ClaudeAPI.apiRequest(workspaces_endpoint, workspace_endpoint_params);
            		result = mergeLimits(organization_result, workspace_limit);
            		final_data.push({
            			workspace_id: workspace.id,
            			workspace_name: workspace.name,
            			rate_limits: result,
            		});
            	});
            }
            catch (error) {
            	error += (String(error).endsWith('.')) ? '' : '.';
            	Zabbix.log(3, '[ Claude API ] ERROR: ' + error);
            	result['error'] = error;
            }
            
            return JSON.stringify(final_data);
          description: 'Item retrieves organization limits.'
          timeout: '{$CLAUDE.API.TIMEOUT}'
          parameters:
            - name: api_token
              value: '{$CLAUDE.API.TOKEN}'
            - name: api_url
              value: '{$CLAUDE.API.URL}'
            - name: http_proxy
              value: '{$CLAUDE.API.HTTP_PROXY}'
          tags:
            - tag: component
              value: raw
