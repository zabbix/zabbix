        - uuid: 2945a45936a447708b8459804cd3d11a
          name: 'Assets: Get data'
          type: SCRIPT
          key: glpi.assets.data.get
          delay: 1h
          history: '0'
          value_type: TEXT
          params: |
            var GLPI = {
            	params: {},
            
            	setParams: function (params) {
            		['glpi_api_url', 'glpi_client_id', 'glpi_client_secret', 'glpi_username', 'glpi_password'].forEach(function (field) {
            			if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
            				throw 'Required param is not set: ' + field + '.';
            			}
            		});
            
            		GLPI.params = params;
            	},
            
            	getField: function (data, path, separator, default_value) {
            		if (typeof separator === 'undefined') {
            			separator = '.';
            		}
            		var steps = path.split(separator);
            		for (var i = 0; i < steps.length; i++) {
            			var step = steps[i];
            			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
            				if (typeof default_value === 'undefined') {
            					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
            				}
            				return default_value;
            			}
            
            			data = data[step];
            		}
            
            		return data;
            	},
            
            	getToken: function () {
            		var response,
            			token_request = new HttpRequest();
            
            		if (typeof GLPI.params.http_proxy !== 'undefined' && GLPI.params.http_proxy !== '') {
            			token_request.setProxy(GLPI.params.http_proxy);
            			Zabbix.log(4, '[ GLPI ] Using HTTP proxy: ' + GLPI.params.http_proxy);
            		}
            
            		token_request.addHeader('Content-Type: application/json');
            		response = token_request.post(
            			GLPI.params.glpi_api_url + '/token',
            			JSON.stringify({
            				grant_type: 'password',
            				client_id: GLPI.params.glpi_client_id,
            				client_secret: GLPI.params.glpi_client_secret,
            				username: GLPI.params.glpi_username,
            				password: GLPI.params.glpi_password,
            				scope: 'api'
            			})
            		);
            
            		if (token_request.getStatus() !== 200) {
            			throw 'Request failed with status code ' + token_request.getStatus() + ': ' + response;
            		}
            
            		try {
            			response = JSON.parse(response);
            			if (!response.hasOwnProperty('access_token')) {
            				throw null;
            			}
            		}
            		catch (error) {
            			throw 'Authentication response does not contain access token.';
            		}
            
            		GLPI.params.token = GLPI.getField(response, 'access_token');
            	},
            
            	request: function (url, return_range, pagination_required) {
            		return_range = (typeof return_range !== 'undefined' ? return_range : false);
            		pagination_required = (typeof pagination_required !== 'undefined' ? pagination_required : false);
            		
            		var request = new HttpRequest(),
            			response,
            			data;
            
            		if (pagination_required) {
            			data = [];
            			var start = 0,
            				total = null,
            				page_size = null;
            		}
            
            		if (typeof GLPI.params.http_proxy !== 'undefined' && GLPI.params.http_proxy !== '') {
            			request.setProxy(GLPI.params.http_proxy);
            			Zabbix.log(4, '[ GLPI ] Using HTTP proxy: ' + GLPI.params.http_proxy);
            		}
            
            		if (!GLPI.params.token) {
            			throw 'Request does not contain access token.';
            		}
            
            		request.addHeader('Authorization: Bearer ' + GLPI.params.token);
            
            		if (return_range) {
            			Zabbix.log(4, '[ GLPI ] Request url: ' + url);
            			response = request.get(url);
            
            			if (request.getStatus() < 200 || request.getStatus() >= 300) {
            				throw 'Request failed with status code ' + request.getStatus() + ': ' + response;
            			}
            
            			try {
            				var headers = request.getHeaders(),
            					content_range = headers['Content-Range'];
            				return parseInt(content_range.split('/')[1], 10);
            			}
            			catch (error) {
            				throw 'Failed to parse response received from GLPI API v2. Check debug log for more information.';
            			}
            		}
            
            		var current_url = url;
            
            		while (current_url) {
            			Zabbix.log(4, '[ GLPI ] Request url: ' + current_url);
            			response = request.get(current_url);
            
            			Zabbix.log(4, '[ GLPI ] Received response with status code ' + request.getStatus() + ': ' + response);
            
            			if (request.getStatus() < 200 || request.getStatus() >= 300) {
            				throw 'Request failed with status code ' + request.getStatus() + ': ' + response;
            			}
            
            			try {
            				response = JSON.parse(response);
            			}
            			catch (error) {
            				throw 'Failed to parse response received from GLPI API v2. Check debug log for more information.';
            			}
            
            			if (typeof response !== 'object' || response === null) {
            				throw 'Cannot process response data: received data is not an object.';
            			}
            
            			if (pagination_required) {
            
            				data = data.concat(response);
            				
            				if (total === null) {
            					var headers_pgn = request.getHeaders(),
            						content_range_pgn = headers_pgn['Content-Range'],
            						parts = content_range_pgn.split('/');
            
            					total = parseInt(parts[1], 10);
            					var range = parts[0].split('-');
            					page_size = parseInt(range[1], 10) - parseInt(range[0], 10) + 1;
            				}
            				
            				start += page_size;
            				current_url = (start < total ? url + '&start=' + start : '');
            			}
            			else {
            				data = response;
            				current_url = '';
            			}
            		}
            
            		return data;
            	}
            }
            
            function getMetricsData(section) {
            	var data = [],
            		types = GLPI.request(GLPI.params.glpi_api_url + '/' + section),
            		itemtype = '',
            		total = 0,
            		exclude_pattern = null;
            
            	if (typeof GLPI.params.glpi_exclude_types !== 'undefined' && GLPI.params.glpi_exclude_types !== '') {
            		try {
            			exclude_pattern = new RegExp(GLPI.params.glpi_exclude_types, 'i');
            		}
            		catch (error) {
            			throw 'Invalid regex pattern in glpi_exclude_types: ' + GLPI.params.glpi_exclude_types + '.';
            		}
            	}
            
            	if (exclude_pattern) {
            		types = types.filter(function(item) {
            			return !exclude_pattern.test(item.itemtype);
            		});
            	}
            
            	for (var i = 0; i < types.length; i++) {
            		itemtype = types[i].itemtype;
            		total = GLPI.request(GLPI.params.glpi_api_url + '/' + section + '/' + types[i].itemtype + '?filter=is_deleted==false&limit=1', true);
            
            		data.push({
            			type: itemtype,
            			count: total
            		});
            	}
            
            	return data;
            }
            
            var result = [];
            
            try {
            	GLPI.setParams(JSON.parse(value));
            	GLPI.getToken();
            	result = result.concat(getMetricsData('Assets'));
            	result = result.concat(getMetricsData('Assets/Custom'));
            }
            catch (error) {
            	error += (String(error).endsWith('.')) ? '' : '.';
            	Zabbix.log(3, '[ GLPI ] ERROR: ' + error);
            	result['error'] = error;
            }
            
            return JSON.stringify(result);
          description: 'Item for gathering GLPI Asset and Custom Asset data.'
