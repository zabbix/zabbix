      discovery_rules:
        - uuid: 17eb4ec0628c4e058b242ca1ce71a6b4
          name: 'Assets type discovery'
          type: DEPENDENT
          key: assets.type.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#ASSETS_TYPE}'
                value: '{$GLPI.ASSET.TYPE.MATCHES}'
              - macro: '{#ASSETS_TYPE}'
                value: '{$GLPI.ASSET.TYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Assets type discovery.'
          item_prototypes:
            - uuid: 630ceabc187d4e4990f5de14a24af9c6
              name: 'Assets [{#ASSETS_TYPE}]: Total'
              type: DEPENDENT
              key: 'glpi.assets.total[{#ASSETS_TYPE}]'
              description: 'Total number of {#ASSETS_TYPE} assets.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.type=="{#ASSETS_TYPE}")].count.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: glpi.assets.data.get
              tags:
                - tag: component
                  value: assets
              trigger_prototypes:
                - uuid: 12b7650f46b644aca6ff7f22de6ef987
                  expression: 'last(/GLPI by HTTP/glpi.assets.total[{#ASSETS_TYPE}],#1)<>last(/GLPI by HTTP/glpi.assets.total[{#ASSETS_TYPE}],#2)'
                  name: 'GLPI: Assets: Number of {#ASSETS_TYPE} items has changed'
                  event_name: 'GLPI: Assets: Number of {#ASSETS_TYPE} items has changed'
                  opdata: 'Current amount: {ITEM.LASTVALUE1}'
                  priority: INFO
                  description: 'Number of {#ASSETS_TYPE} items in Assets has changed. Acknowledge to close the problem manually.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
          master_item:
            key: glpi.assets.data.get
          lld_macro_paths:
            - lld_macro: '{#ASSETS_TYPE}'
              path: $.type
