            description: 'Number of open Major priority items to trigger an alert. Use context macros to set different thresholds per assistance type. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$GLPI.PRIORITY.VERY_HIGH.THRESHOLD}'
