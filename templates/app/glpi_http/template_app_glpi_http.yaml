          type: SECRET_TEXT
          description: 'Password of the dedicated monitoring user in GLPI.'
          config:
            type: TEXT
            priority: '7'
            label: 'GLPI password'
            description: 'Password of the dedicated monitoring user in GLPI.'
            required: 'YES'
        - macro: '{$GLPI.PRIORITY.HIGH.THRESHOLD}'
          value: '30'
          description: 'Number of open High priority items to trigger an alert. Use context macros to set different thresholds per assistance type.'
          config:
            type: TEXT
            priority: '19'
            section_name: Threshold
            label: 'High priority open threshold'
            description: 'Number of open High priority items to trigger an alert. Use context macros to set different thresholds per assistance type. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$GLPI.PRIORITY.MAJOR.THRESHOLD}'
