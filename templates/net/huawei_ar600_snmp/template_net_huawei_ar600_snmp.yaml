zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: ad4c3dad4b7b492685d1fd3bd3a664f0
      template: 'Huawei AR600 by SNMP'
      name: 'Huawei AR600 by SNMP'
      description: |
        Template Huawei AR600 Series by SNMP
        
        This template is intended for monitoring Huawei AR600 Series routers via SNMP.
        
        It provides monitoring for:
          - CPU, memory and temperature sensors,
          - Hardware inventory,
          - Network Quality Analysis (NQA): delay, jitter and packet loss,
          - QoS queues using HUAWEI-CBQOS-MIB,
          - Network interfaces and traffic statistics.
        
        MIBs used:
        HOST-RESOURCES-MIB
        EtherLike-MIB
        SNMPv2-MIB
        IF-MIB
        NQA-MIB
        HUAWEI-CBQOS-MIB
        HUAWEI-ENTITY-EXTENT-MIB
        
        You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback.
        
        Generated by official Zabbix template tool "Templator"
      wizard_ready: 'YES'
      readme: |
        ## Overview
        
        This template is intended for monitoring **Huawei AR600 Series** routers via SNMP.
        
        ### What is monitored
        It provides monitoring for:
        - CPU, memory and temperature sensors,
        - Hardware inventory,
        - Network Quality Analysis (NQA): delay, jitter and packet loss,
        - QoS queues using HUAWEI-CBQOS-MIB,
        - Network interfaces and traffic statistics.
        
        ### MIBs used
        HOST-RESOURCES-MIB
        EtherLike-MIB
        SNMPv2-MIB
        IF-MIB
        NQA-MIB
        HUAWEI-CBQOS-MIB
        HUAWEI-ENTITY-EXTENT-MIB
        
        For discussion, feedback, or improvements, please visit the Zabbix forum:  
        https://www.zabbix.com/forum/zabbix-suggestions-and-feedback
        
        See [Huawei support documentation](https://support.huawei.com/enterprise/en/doc/EDOC1100041787/6460e7f3/ar600-series) for details.
      vendor:
        name: Zabbix
        version: 7.4-0
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: a350a7f8ae8b4f339f3884610df875b1
          name: 'CoS walk'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2.1.1,1.3.6.1.2.1.2.2.1.2,1.3.6.1.4.1.2011.5.25.32.1.1.5.1.6.1.8,1.3.6.1.4.1.2011.5.25.32.1.1.5.1.6.1.10,1.3.6.1.4.1.2011.5.25.32.1.1.5.1.6.1.12]'
          key: huawei.ar600.cos.walk
          history: '0'
          value_type: TEXT
          description: |
            Raw SNMP walk of CBQoS-related tables (ifIndex, ifName, cbqosMatched, cbqosEnqueued, cbqosDiscarded).
            Used as the master item for CBQoS LLD and dependent items that extract per-interface / per-queue metrics.
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - ifIndex
                - 1.3.6.1.2.1.2.2.1.1
                - '0'
                - ifName
                - 1.3.6.1.2.1.2.2.1.2
                - '0'
                - cbqosMatched
                - 1.3.6.1.4.1.2011.5.25.32.1.1.5.1.6.1.8
                - '0'
                - cbqosEnqueued
                - 1.3.6.1.4.1.2011.5.25.32.1.1.5.1.6.1.10
                - '0'
                - cbqosDiscarded
                - 1.3.6.1.4.1.2011.5.25.32.1.1.5.1.6.1.12
                - '0'
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  for (var i = 0; i < data.length; i++) {
                    if (data[i]["{#SNMPINDEX}"]) {
                  	data[i].snmpIndex = data[i]["{#SNMPINDEX}"];
                    }
                  }
                  return JSON.stringify(data);
          tags:
            - tag: component
              value: raw
        - uuid: 1d7b3f6c4a0e4e9c9b3d7b9c1a2f0021
          name: 'Total power'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.31.3.1.0]'
          key: huawei.ar600.device.power.total
          units: W
          description: |
            MIB: HUAWEI-ENTITY-EXTENT-MIB
            Object: hwDevicePowerInfoTotalPower
            
            Indicates the total available power of the device.
          preprocessing:
            - type: NOT_MATCHES_REGEX
              parameters:
                - ^0$
              error_handler: CUSTOM_ERROR
              error_handler_params: 'The device does not support power information retrieval via SNMP.'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: power
        - uuid: 1d7b3f6c4a0e4e9c9b3d7b9c1a2f0001
          name: 'Used power'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.31.3.2.0]'
          key: huawei.ar600.device.power.used
          units: W
          description: |
            MIB: HUAWEI-ENTITY-EXTENT-MIB
            Object: hwDevicePowerInfoUsedPower
            
            Indicates the current power consumption of the device.
          preprocessing:
            - type: NOT_MATCHES_REGEX
              parameters:
                - ^0$
              error_handler: CUSTOM_ERROR
              error_handler_params: 'The device does not support power information retrieval via SNMP.'
          tags:
            - tag: component
              value: power
        - uuid: 29a3d94d4ee1417e92395384b1cd3227
          name: 'MPU walk'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.47.1.1.1.1.2,1.3.6.1.2.1.47.1.1.1.1.7]'
          key: huawei.ar600.mpu.walk
          history: '0'
          value_type: TEXT
          description: |
            Collects physical entity information for MPU (Main Processing Unit) components
            using ENTITY-MIB. This item performs an SNMP walk of entPhysicalDescr and entPhysicalName.
            
            The collected data is used as a master item for MPU low-level discovery (LLD),
            enabling identification and monitoring of hardware processing units present
            in the device.
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - entPhysicalDescr
                - 1.3.6.1.2.1.47.1.1.1.1.2
                - '0'
                - entPhysicalName
                - 1.3.6.1.2.1.47.1.1.1.1.7
                - '0'
          tags:
            - tag: component
              value: raw
        - uuid: 98f6ee6bd5504d639ab3af7c2b44c7e1
          name: 'Huawei AR600 Series: SNMP walk EtherLike-MIB interfaces'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.10.7.2.1.19,1.3.6.1.2.1.2.2.1.8,1.3.6.1.2.1.31.1.1.1.18,1.3.6.1.2.1.31.1.1.1.1,1.3.6.1.2.1.2.2.1.2]'
          key: huawei.ar600.net.if.duplex.walk
          history: '0'
          value_type: TEXT
          description: 'Discovering interfaces from IF-MIB and EtherLike-MIB. Interfaces with `up(1)` Operational Status are discovered.'
          tags:
            - tag: component
              value: raw
        - uuid: 2bb552be2f2f49abb1901be66a5ef785
          name: 'Huawei AR600 Series: SNMP walk network interfaces'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2.1.8,1.3.6.1.2.1.2.2.1.7,1.3.6.1.2.1.31.1.1.1.18,1.3.6.1.2.1.31.1.1.1.1,1.3.6.1.2.1.2.2.1.2,1.3.6.1.2.1.2.2.1.3,1.3.6.1.2.1.2.2.1.10,1.3.6.1.2.1.2.2.1.16,1.3.6.1.2.1.2.2.1.14,1.3.6.1.2.1.2.2.1.20,1.3.6.1.2.1.2.2.1.19,1.3.6.1.2.1.2.2.1.13,1.3.6.1.2.1.2.2.1.5]'
          key: huawei.ar600.net.if.walk
          history: '0'
          value_type: TEXT
          description: 'Discovering interfaces from IF-MIB.'
          tags:
            - tag: component
              value: raw
        - uuid: 29a3d94d4ee1417e92395384a1cd3229
          name: 'NQA walk'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.2011.5.25.111.4.3.1.46,1.3.6.1.4.1.2011.5.25.111.4.3.1.9,1.3.6.1.4.1.2011.5.25.111.4.3.1.8,1.3.6.1.4.1.2011.5.25.111.4.3.1.47,1.3.6.1.4.1.2011.5.25.111.4.3.1.50]'
          key: huawei.ar600.nqa.walk
          history: '0'
          value_type: TEXT
          description: |
            Collects raw Network Quality Analysis (NQA) statistics from the device using
            Huawei NQA MIB. This item performs an SNMP walk of RTT, packet loss, and jitter metrics.
            
            The output is used as a master item for NQA low-level discovery and dependent
            items, allowing per-test monitoring of latency, jitter, and packet loss.
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - rttAvg
                - 1.3.6.1.4.1.2011.5.25.111.4.3.1.46
                - '0'
                - rttMax
                - 1.3.6.1.4.1.2011.5.25.111.4.3.1.9
                - '0'
                - rttMin
                - 1.3.6.1.4.1.2011.5.25.111.4.3.1.8
                - '0'
                - packetLoss
                - 1.3.6.1.4.1.2011.5.25.111.4.3.1.47
                - '0'
                - jitter
                - 1.3.6.1.4.1.2011.5.25.111.4.3.1.50
                - '0'
          tags:
            - tag: component
              value: raw
        - uuid: db5a94f6cea14deba957202b2f014468
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: b030876299434f3ba43e11c584104a71
              expression: 'max(/Huawei AR600 by SNMP/icmpping,#3)=0'
              name: 'Huawei AR600: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 04b21adaf422473a88df2c52786474ee
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          description: 'The percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 42c4b0310aaf4b9c8cb502542b7dea91
              expression: 'min(/Huawei AR600 by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Huawei AR600 by SNMP/icmppingloss,5m)<100'
              name: 'Huawei AR600: High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'ICMP packets loss detected.'
              dependencies:
                - name: 'Huawei AR600: Unavailable by ICMP ping'
                  expression: 'max(/Huawei AR600 by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: a79e33e5fd264725b934f603fa071554
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          description: 'The ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 32b4d8f3eba34bd380803410111d4b6f
              expression: 'avg(/Huawei AR600 by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Huawei AR600: High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'Huawei AR600: High ICMP ping loss'
                  expression: 'min(/Huawei AR600 by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Huawei AR600 by SNMP/icmppingloss,5m)<100'
                - name: 'Huawei AR600: Unavailable by ICMP ping'
                  expression: 'max(/Huawei AR600 by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 62da59c7aae54df7976f327119fe7cd1
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person. If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 29a3e5267de94386a5985fcf37a09364
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: b12afb0277494024b1638ce620c4f2d1
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 02b453f44c014f2bb1053e801058b381
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 3996a3a8d927473aa07c47e63a06b864
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name. If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 072bf35ea9d04c559ada5cb12d4b6802
              expression: 'last(/Huawei AR600 by SNMP/system.name,#1)<>last(/Huawei AR600 by SNMP/system.name,#2) and length(last(/Huawei AR600 by SNMP/system.name))>0'
              name: 'Huawei AR600: System name has changed'
              event_name: 'Huawei AR600: System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: 010b97abddcd44bfb57e0eeb1b77f69e
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 9dbcc5a1cd7240c896e1ea718f9cca35
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.2.0]'
          key: 'system.objectid[sysObjectID.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity. This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 3e8c2d430441416b9ccec7dd95e21503
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          valuemap:
            name: 'Host availability'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: d3aba975ec574b258c7f971152c5d3cd
              expression: 'max(/Huawei AR600 by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Huawei AR600: No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              dependencies:
                - name: 'Huawei AR600: Unavailable by ICMP ping'
                  expression: 'max(/Huawei AR600 by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: a2e3937ea93d4e799a5cf3fe75bc7e49
          name: 'CoS queue discovery'
          type: DEPENDENT
          key: huawei.ar600.cos.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#DIRECTION}'
                value: '{$HUAWEI.AR600.COS.DIRECTION.MATCHES}'
              - macro: '{#DIRECTION}'
                value: '{$HUAWEI.AR600.COS.DIRECTION.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFNAME}'
                value: '{$HUAWEI.AR600.COS.IFNAME.MATCHES}'
              - macro: '{#IFNAME}'
                value: '{$HUAWEI.AR600.COS.IFNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#QUEUE}'
                value: '{$HUAWEI.AR600.COS.QUEUE.MATCHES}'
              - macro: '{#QUEUE}'
                value: '{$HUAWEI.AR600.COS.QUEUE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: |
            Discovers Class of Service (CoS) queues on network interfaces.
            
            Discovered queues are filtered using user-defined macros and used to create
            dependent items for traffic statistics.
          item_prototypes:
            - uuid: efec46a3d440401cb089d7153a697825
              name: '{#IFNAME} {#DIRECTION} queue {#QUEUE}: Discarded bytes rate'
              type: DEPENDENT
              key: 'huawei.ar600.cbqos.discarded.rate[{#SNMPINDEX}]'
              units: bps
              description: |
                Rate of bytes discarded by the CoS queue.
                
                Calculated from cumulative SNMP counters and converted to bytes per second.
                High values may indicate congestion or insufficient queue capacity.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.snmpIndex=="{#SNMPINDEX}")].cbqosDiscarded.first()'
                - type: CHANGE_PER_SECOND
              master_item:
                key: huawei.ar600.cos.walk
              tags:
                - tag: component
                  value: cos
                - tag: direction
                  value: '{#DIRECTION}'
                - tag: interface
                  value: '{#IFNAME}'
                - tag: queue
                  value: '{#QUEUE}'
              trigger_prototypes:
                - uuid: c3d4e5f6a7b8490a9b0c1d2e3f4a5b6c
                  expression: |
                    avg(/Huawei AR600 by SNMP/huawei.ar600.cbqos.discarded.rate[{#SNMPINDEX}],5m)
                    > {$HUAWEI.AR600.COS.DISCARDED.BPS.WARN}
                  name: 'Huawei AR600: COS [{#IFNAME} {#DIRECTION} queue {#QUEUE}]: Discarded traffic (warning)'
                  opdata: 'Current value: {ITEM.LASTVALUE} bps, threshold: {$HUAWEI.AR600.COS.DISCARDED.BPS.WARN} bps'
                  priority: AVERAGE
                  description: 'Discarded bytes rate exceeds warning threshold.'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: efec46a3d430401cb089d7153a697825
              name: '{#IFNAME} {#DIRECTION} queue {#QUEUE}: Enqueued bytes rate'
              type: DEPENDENT
              key: 'huawei.ar600.cbqos.enqueued.rate[{#SNMPINDEX}]'
              units: bps
              description: |
                Rate of bytes enqueued into the CoS queue.
                
                Represents traffic accepted by the queue and scheduled for transmission.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.snmpIndex=="{#SNMPINDEX}")].cbqosEnqueued.first()'
                - type: CHANGE_PER_SECOND
              master_item:
                key: huawei.ar600.cos.walk
              tags:
                - tag: component
                  value: cos
                - tag: direction
                  value: '{#DIRECTION}'
                - tag: interface
                  value: '{#IFNAME}'
                - tag: queue
                  value: '{#QUEUE}'
            - uuid: efec46a3d420401cb089d7153a697825
              name: '{#IFNAME} {#DIRECTION} queue {#QUEUE}: Matched bytes rate'
              type: DEPENDENT
              key: 'huawei.ar600.cbqos.matched.rate[{#SNMPINDEX}]'
              units: bps
              description: |
                Rate of bytes matched to this CoS queue based on classification rules.
                
                Reflects traffic classified into the queue before scheduling or dropping
                decisions are applied.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.snmpIndex=="{#SNMPINDEX}")].cbqosMatched.first()'
              master_item:
                key: huawei.ar600.cos.walk
              tags:
                - tag: component
                  value: cos
                - tag: direction
                  value: '{#DIRECTION}'
                - tag: interface
                  value: '{#IFNAME}'
                - tag: queue
                  value: '{#QUEUE}'
          master_item:
            key: huawei.ar600.cos.walk
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                  	var walkData = JSON.parse(value),
                  		interfaceNameByIndex = {},
                  		discoveryResult = [],
                  		seenQueues = {},
                  		i,
                  		walkRow,
                  		entry,
                  		snmp_index,
                  		snmpIndexParts,
                  		if_index,
                  		direction_num,
                  		queue,
                  		direction,
                  		uniq;
                  
                  	if (!Array.isArray(walkData)) {
                  		throw 'Input data is not an array';
                  	}
                  
                  	for (i = 0; i < walkData.length; i++) {
                  		walkRow = walkData[i];
                  
                  		if (typeof walkRow === 'object' && walkRow !== null) {
                  			if (walkRow.ifIndex && walkRow.ifName) {
                  				interfaceNameByIndex[walkRow.ifIndex] = walkRow.ifName;
                  			}
                  		}
                  	}
                  
                  	for (i = 0; i < walkData.length; i++) {
                  		entry = walkData[i];
                  		if (typeof entry !== 'object' || entry === null) {
                  			continue;
                  		}
                  
                  		if (!entry.cbqosMatched && !entry.cbqosEnqueued && !entry.cbqosDiscarded) {
                  			continue;
                  		}
                  
                  		snmp_index = entry['{#SNMPINDEX}'];
                  		if (!snmp_index) {
                  			continue;
                  		}
                  
                  		snmpIndexParts = snmp_index.split('.');
                  
                  		if (snmpIndexParts.length < 3) {
                  			continue;
                  		}
                  
                  		if_index = snmpIndexParts[0];
                  		direction_num = snmpIndexParts[1];
                  		queue = snmpIndexParts[2];
                  
                  		if (!interfaceNameByIndex[if_index]) {
                  			continue;
                  		}
                  
                  		if (direction_num === '1') {
                  			direction = 'IN';
                  		} else if (direction_num === '2') {
                  			direction = 'OUT';
                  		} else {
                  			Zabbix.log(
                  				3, '[ HUAWEI AR600 ][ QoS DISCOVERY ] Unknown direction value "' +
                  				direction_num + '" for SNMPINDEX ' + snmp_index);
                  			direction = 'UNKNOWN';
                  		}
                  
                  		uniq = if_index + '-' + direction + '-' + queue;
                  
                  		if (seenQueues[uniq]) {
                  			continue;
                  		}
                  
                  		seenQueues[uniq] = true;
                  
                  		discoveryResult.push({
                  			"{#SNMPINDEX}": snmp_index,
                  			"{#IFNAME}": interfaceNameByIndex[if_index],
                  			"{#DIRECTION}": direction,
                  			"{#QUEUE}": queue
                  		});
                  	}
                  
                  	return JSON.stringify(discoveryResult);
                  } catch (error) {
                  	error = (String(error).endsWith('.')) ? error : error + '.';
                  
                  	Zabbix.log(3, '[ HUAWEI AR600 ] ERROR: ' + error);
                  
                  	return JSON.stringify({ error: error });
                  }
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: a2e3937ea93d4e799a5cf3fe75bc7e48
          name: 'MPU Discovery'
          type: DEPENDENT
          key: huawei.ar600.mpu.discovery
          filter:
            conditions:
              - macro: '{#ENT_NAME}'
                value: 'SRU.*'
          description: |
            Discovers MPU (Main Processing Unit) components using data collected from the
            MPU walk item.
            
            Physical entity name and description are used to identify processing modules
            relevant for monitoring.
            
            Discovered entities can be used for further hardware health and performance
            monitoring.
          item_prototypes:
            - uuid: 29549c71091a44108377a90eb9afff23
              name: '{#ENT_NAME}: Temperature'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.31.1.1.1.1.11.{#SNMPINDEX}]'
