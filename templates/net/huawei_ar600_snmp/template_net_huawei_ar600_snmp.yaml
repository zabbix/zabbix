                - uuid: 7b2cffb3ad47440d8b79b39958794ed8
                  expression: 'avg(/Huawei AR600 by SNMP/sensor.temp.value[hwEntityTemperature.{#SNMPINDEX}],5m)<{$TEMP_CRIT_LOW:"{#ENT_NAME}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'min(/Huawei AR600 by SNMP/sensor.temp.value[hwEntityTemperature.{#SNMPINDEX}],5m)>{$TEMP_CRIT_LOW:"{#ENT_NAME}"}+3'
                  name: 'Huawei AR600: {#ENT_NAME}: Temperature is too low'
