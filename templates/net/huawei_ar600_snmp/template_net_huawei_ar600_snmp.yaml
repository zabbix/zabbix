                      recovery_expression: 'max(/Huawei AR600 by SNMP/sensor.temp.value[hwEntityTemperature.{#SNMPINDEX}],5m)<{$TEMP_CRIT:"{#ENT_NAME}"}-3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
