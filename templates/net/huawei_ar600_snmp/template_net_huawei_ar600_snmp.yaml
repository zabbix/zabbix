            - lld_macro: '{#ENT_NAME}'
              path: $.entPhysicalName
        - uuid: bc8e9d1a262b4b2697f98cef822a6e00
          name: 'NQA discovery'
          type: DEPENDENT
          key: huawei.ar600.nqa.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#NQA.ADMIN}'
                value: '{$HUAWEI.AR600.NQA.ADMIN.MATCHES}'
              - macro: '{#NQA.ADMIN}'
                value: '{$HUAWEI.AR600.NQA.ADMIN.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#NQA.TEST}'
                value: '{$HUAWEI.AR600.NQA.TEST.MATCHES}'
              - macro: '{#NQA.TEST}'
                value: '{$HUAWEI.AR600.NQA.TEST.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: |
            Discovers NQA tests based on data collected by the NQA walk item.
            
            Discovered NQA entities are filtered using user-defined macros and used to
            create per-test monitoring items and triggers.
          item_prototypes:
            - uuid: f2d3c2b1a09e4f5d8c7b6a5e4d3c2b1d
              name: 'NQA [{#NQA.ADMIN}/{#NQA.TEST}]: Jitter avg'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.111.4.3.1.50.{#LATEST_INDEX}]'
              key: 'huawei.ar600.nqa.jitter[{#NQA.ADMIN},{#NQA.TEST}]'
              units: ms
              description: |
                Average jitter measured by the NQA test.
                
                Jitter represents variation in packet delay and is critical for real-time
                applications such as voice and video.
              tags:
                - tag: admin
                  value: '{#NQA.ADMIN}'
                - tag: component
                  value: nqa
                - tag: test
                  value: '{#NQA.TEST}'
              trigger_prototypes:
                - uuid: d1e2f3a4b5c6478899a0b1c2d3e4f5a7
                  expression: 'avg(/Huawei AR600 by SNMP/huawei.ar600.nqa.jitter[{#NQA.ADMIN},{#NQA.TEST}],5m) > {$HUAWEI.AR600.JITTER.CRIT}'
                  name: 'Huawei AR600: NQA [{#NQA.ADMIN}/{#NQA.TEST}]: Jitter too high'
                  opdata: 'Current value: {ITEM.LASTVALUE} ms, threshold: {$HUAWEI.AR600.JITTER.CRIT} ms'
                  priority: AVERAGE
                  description: 'NQA jitter exceeds critical threshold.'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: f2d3c2b1a09e4f5d8c7b6a5e4d3c1b1b
              name: 'NQA [{#NQA.ADMIN}/{#NQA.TEST}]: Packet loss'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.111.4.3.1.47.{#LATEST_INDEX}]'
              key: 'huawei.ar600.nqa.packetloss[{#NQA.ADMIN},{#NQA.TEST}]'
              units: '%'
              description: |
                Packet loss ratio reported by the NQA test.
                
                Represents the percentage of packets lost during transmission between
                the source and destination.
              tags:
                - tag: admin
                  value: '{#NQA.ADMIN}'
                - tag: component
                  value: nqa
                - tag: test
                  value: '{#NQA.TEST}'
              trigger_prototypes:
                - uuid: d1e2f3a4b5c6478899a0b1c2d3e4f5a8
                  expression: 'avg(/Huawei AR600 by SNMP/huawei.ar600.nqa.packetloss[{#NQA.ADMIN},{#NQA.TEST}],5m) > {$HUAWEI.AR600.PACKET.LOSS.CRIT}'
                  name: 'Huawei AR600: NQA [{#NQA.ADMIN}/{#NQA.TEST}]: Packet loss detected'
                  opdata: 'Current value: {ITEM.LASTVALUE} %, threshold: {$HUAWEI.AR600.PACKET.LOSS.CRIT} %'
                  priority: AVERAGE
                  description: 'Packet loss exceeds critical threshold.'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: f4d3c2b1a09e4f5d8c7b6a5e4d3c2b1a
              name: 'NQA [{#NQA.ADMIN}/{#NQA.TEST}]: RTT avg'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.111.4.3.1.46.{#LATEST_INDEX}]'
              key: 'huawei.ar600.nqa.rtt.avg[{#NQA.ADMIN},{#NQA.TEST}]'
              units: ms
              description: |
                Average round-trip time (RTT) measured by the NQA test.
                
                Represents the mean latency between the source and destination over the
                evaluation interval.
              tags:
                - tag: admin
                  value: '{#NQA.ADMIN}'
                - tag: component
                  value: nqa
                - tag: test
                  value: '{#NQA.TEST}'
              trigger_prototypes:
                - uuid: d1e2f3a4b5c6478899a0b1c2d3e4f5b7
                  expression: 'avg(/Huawei AR600 by SNMP/huawei.ar600.nqa.rtt.avg[{#NQA.ADMIN},{#NQA.TEST}],5m) > {$HUAWEI.AR600.RTT.AVG.CRIT}'
                  name: 'Huawei AR600: NQA [{#NQA.ADMIN}/{#NQA.TEST}]: RTT average too high'
                  opdata: 'Current value: {ITEM.LASTVALUE} ms, threshold: {$HUAWEI.AR600.RTT.AVG.CRIT} ms'
                  priority: AVERAGE
                  description: 'Average RTT exceeds critical threshold.'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: f2d3c2b1a09e4f5d8c7b6a5e4d3c2b1c
              name: 'NQA [{#NQA.ADMIN}/{#NQA.TEST}]: RTT max'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.111.4.3.1.9.{#LATEST_INDEX}]'
              key: 'huawei.ar600.nqa.rtt.max[{#NQA.ADMIN},{#NQA.TEST}]'
              units: ms
              description: |
                Maximum round-trip time (RTT) observed during the NQA test interval.
                
                Indicates latency spikes that may affect application performance.
              tags:
                - tag: admin
                  value: '{#NQA.ADMIN}'
                - tag: component
                  value: nqa
                - tag: test
                  value: '{#NQA.TEST}'
            - uuid: f2d3c2b1a09e4f5d8c7b6a5e4d3c2b1b
              name: 'NQA [{#NQA.ADMIN}/{#NQA.TEST}]: RTT min'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.2011.5.25.111.4.3.1.8.{#LATEST_INDEX}]'
              key: 'huawei.ar600.nqa.rtt.min[{#NQA.ADMIN},{#NQA.TEST}]'
              units: ms
              description: |
                Minimum round-trip time (RTT) observed during the NQA test interval.
                
                Useful for identifying baseline latency under optimal conditions.
              tags:
                - tag: admin
                  value: '{#NQA.ADMIN}'
                - tag: component
                  value: nqa
                - tag: test
                  value: '{#NQA.TEST}'
          master_item:
            key: huawei.ar600.nqa.walk
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value),
                  	grouped = {},
                  	result = [],
                  	i, row, parts,
                  	adminLen, testLen,
                  	adminStart, testStart, probePos,
                  	admin, test, probe,
                  	key;
                  
                  	if (!Array.isArray(data)) {
                  		throw 'Input is not an array';
                  	}
                  
                  function decodeAscii(parts, start, length) {
                  	if (start + length > parts.length) {
                  		throw 'Invalid length for ASCII decoding';
                  	}
                  	var chars = [],
                  		j;
                  	for (j = 0; j < length; j++) {
                  		chars.push(String.fromCharCode(+parts[start + j]));
                  	}
                  	return chars.join('');
                  }
                  
                  for (i = 0; i < data.length; i++) {
                  	row = data[i];
                  	parts = row['{#SNMPINDEX}'].split('.');
                  	adminLen = +parts[0];
                  	adminStart = 1;
                  	admin = decodeAscii(parts, adminStart, adminLen);
                  	testLen = +parts[adminStart + adminLen];
                  	testStart = adminStart + adminLen + 1;
                  	test = decodeAscii(parts, testStart, testLen);
                  	probePos = testStart + testLen;
                  	probe = +parts[probePos];
                  	key = admin + '|' + test;
                  	if (!grouped[key] || probe > grouped[key].probe) {
                  		grouped[key] = {
                  			admin: admin,
                  			test: test,
                  			probe: probe,
                  			index: row['{#SNMPINDEX}']
                  		};
                  	}
                  }
                  
                  for (key in grouped) {
                  	result.push({
                  		"{#NQA.ADMIN}": grouped[key].admin,
                  		"{#NQA.TEST}": grouped[key].test,
                  		"{#LATEST_INDEX}": grouped[key].index.replace(/\.\d+$/, '.0')
                  	});
                  }
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: 4d142a571991482da0560cb2faa8f673
          name: 'Network interfaces discovery'
          type: DEPENDENT
          key: net.if.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
              - macro: '{#IFADMINSTATUS}'
                value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFALIAS}'
                value: '{$NET.IF.IFALIAS.MATCHES}'
              - macro: '{#IFALIAS}'
                value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFDESCR}'
                value: '{$NET.IF.IFDESCR.MATCHES}'
              - macro: '{#IFDESCR}'
                value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.MATCHES}'
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFOPERSTATUS}'
                value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
              - macro: '{#IFOPERSTATUS}'
                value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#IFTYPE}'
                value: '{$NET.IF.IFTYPE.MATCHES}'
              - macro: '{#IFTYPE}'
                value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Discovering interfaces from IF-MIB.'
          item_prototypes:
            - uuid: 018d93910eef44388fcd1eb1de63262b
              name: 'Interface [{#IFNAME}]: Inbound packets discarded'
              type: DEPENDENT
              key: 'net.if.in.discards[ifInDiscards.{#SNMPINDEX}]'
              description: |
                MIB: IF-MIB
                The number of inbound packets which were chosen to be discarded
                even though no errors had been detected to prevent their being deliverable to a higher-layer protocol.
                One possible reason for discarding such a packet could be to free up buffer space.
                Discontinuities in the value of this counter can occur at re-initialization of the management system,
                and at other times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 3m
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: f97ed0e4b7b3473a988f27a60e5d79ef
              name: 'Interface [{#IFNAME}]: Inbound packets with errors'
              type: DEPENDENT
              key: 'net.if.in.errors[ifInErrors.{#SNMPINDEX}]'
              description: |
                MIB: IF-MIB
                For packet-oriented interfaces, the number of inbound packets that contained errors preventing them from being deliverable to a higher-layer protocol.  For character-oriented or fixed-length interfaces, the number of inbound transmission units that contained errors preventing them from being deliverable to a higher-layer protocol. Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 3m
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 3a971825c99e476aa2c18b1a792ec19d
              name: 'Interface [{#IFNAME}]: Bits received'
              type: DEPENDENT
              key: 'net.if.in[ifInOctets.{#SNMPINDEX}]'
              units: bps
              description: |
                MIB: IF-MIB
                The total number of octets received on the interface,including framing characters. Discontinuities in the value of this counter can occur at re-initialization of the management system, and another times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 2395b3a694474b9894e64f759dbe805e
              name: 'Interface [{#IFNAME}]: Outbound packets discarded'
              type: DEPENDENT
              key: 'net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]'
              description: |
                MIB: IF-MIB
                The number of outbound packets which were chosen to be discarded
                even though no errors had been detected to prevent their being deliverable to a higher-layer protocol.
                One possible reason for discarding such a packet could be to free up buffer space.
                Discontinuities in the value of this counter can occur at re-initialization of the management system,
                and at other times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 3m
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: f6872ed88b464c37800738fd5e492896
              name: 'Interface [{#IFNAME}]: Outbound packets with errors'
              type: DEPENDENT
              key: 'net.if.out.errors[ifOutErrors.{#SNMPINDEX}]'
              description: |
                MIB: IF-MIB
                For packet-oriented interfaces, the number of outbound packets that contained errors preventing them from being deliverable to a higher-layer protocol.  For character-oriented or fixed-length interfaces, the number of outbound transmission units that contained errors preventing them from being deliverable to a higher-layer protocol. Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 3m
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 2a7b5b7e48444c8c8cf38f89a1a1091e
              name: 'Interface [{#IFNAME}]: Bits sent'
              type: DEPENDENT
              key: 'net.if.out[ifOutOctets.{#SNMPINDEX}]'
              units: bps
              description: |
                MIB: IF-MIB
                The total number of octets transmitted out of the interface, including framing characters. Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: b93b4164db1c4c838ecfd5c2b261acfb
              name: 'Interface [{#IFNAME}]: Speed'
              type: DEPENDENT
              key: 'net.if.speed[ifSpeed.{#SNMPINDEX}]'
              trends: '0'
              units: bps
              description: |
                MIB: IF-MIB
                An estimate of the interface's current bandwidth in bits per second.
                For interfaces which do not vary in bandwidth or for those where no accurate estimation can be made,
                this object should contain the nominal bandwidth.
                If the bandwidth of the interface is greater than the maximum value reportable by this object then
                this object should report its maximum value (4,294,967,295) and ifHighSpeed must be used to report the interface's speed.
                For a sub-layer which has no concept of bandwidth, this object should be zero.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.5.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 5m
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 43d9d7883a1b4f6dbe4e118ef12d731e
              name: 'Interface [{#IFNAME}]: Operational status'
              type: DEPENDENT
              key: 'net.if.status[ifOperStatus.{#SNMPINDEX}]'
              trends: '0'
              description: |
                MIB: IF-MIB
                The current operational state of the interface.
                - The testing(3) state indicates that no operational packet scan be passed
                - If ifAdminStatus is down(2) then ifOperStatus should be down(2)
                - If ifAdminStatus is changed to up(1) then ifOperStatus should change to up(1) if the interface is ready to transmit and receive network traffic
                - It should change todormant(5) if the interface is waiting for external actions (such as a serial line waiting for an incoming connection)
                - It should remain in the down(2) state if and only if there is a fault that prevents it from going to the up(1) state
                - It should remain in the notPresent(6) state if the interface has missing(typically, hardware) components.
              valuemap:
                name: 'IF-MIB::ifOperStatus'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 94097ac2b53748aea45fed2f3014c1b6
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
                  name: 'Huawei AR600: Interface [{#IFNAME}]: Link down'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the operations status is down.
                    2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine the context macro to "0", marking this interface as not important. No new trigger will be fired if this interface is down.
                    3. `last(/TEMPLATE_NAME/METRIC,#1)<>last(/TEMPLATE_NAME/METRIC,#2)` - the trigger fires only if the operational status was up to (1) sometime before (so, does not fire for "eternal off" interfaces.)
                    
                    WARNING: if closed manually - it will not fire again on the next poll, because of .diff.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 9470d6a01c4e4ea2a007582ac1c0ce64
              name: 'Interface [{#IFNAME}]: Interface type'
              type: DEPENDENT
              key: 'net.if.type[ifType.{#SNMPINDEX}]'
              trends: '0'
              description: |
                MIB: IF-MIB
                The type of interface.
                Additional values for ifType are assigned by the Internet Assigned Numbers Authority (IANA),
                through updating the syntax of the IANAifType textual convention.
              valuemap:
                name: 'IF-MIB::ifType'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: huawei.ar600.net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
          trigger_prototypes:
            - uuid: 13c523ffdf154e6fb1ab7628e3a2010a
              expression: |
                change(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])<0 and last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])>0
                and (
                last(/Huawei AR600 by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or
                last(/Huawei AR600 by SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or
                last(/Huawei AR600 by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11 or
                last(/Huawei AR600 by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or
                last(/Huawei AR600 by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or
                last(/Huawei AR600 by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117
                )
                and
                (last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                (change(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])>0 and last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}],#2)>0) or
                (last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)
              name: 'Huawei AR600: Interface [{#IFNAME}]: Ethernet has changed to lower speed than it was before'
              opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
              priority: INFO
              description: 'This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of autonegotiation issues. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              dependencies:
                - name: 'Huawei AR600: Interface [{#IFNAME}]: Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_expression: 'last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
            - uuid: 7594011ba1964285abd0f232ffeb22e3
              expression: |
                (avg(/Huawei AR600 by SNMP/net.if.in[ifInOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}]) or
                avg(/Huawei AR600 by SNMP/net.if.out[ifOutOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])) and
                last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                avg(/Huawei AR600 by SNMP/net.if.in[ifInOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}]) and
                avg(/Huawei AR600 by SNMP/net.if.out[ifOutOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/Huawei AR600 by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])
              name: 'Huawei AR600: Interface [{#IFNAME}]: High bandwidth usage'
              event_name: 'Huawei AR600: Interface [{#IFNAME}]: High bandwidth usage (>{$IF.UTIL.MAX:"{#IFNAME}"}%)'
              opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              manual_close: 'YES'
              dependencies:
                - name: 'Huawei AR600: Interface [{#IFNAME}]: Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_expression: 'last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
            - uuid: 2eb4baaf86a2405b9a1a232241eee72b
              expression: |
                min(/Huawei AR600 by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
                or min(/Huawei AR600 by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                max(/Huawei AR600 by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
                and max(/Huawei AR600 by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
              name: 'Huawei AR600: Interface [{#IFNAME}]: High error rate'
              event_name: 'Huawei AR600: Interface [{#IFNAME}]: High error rate (>{$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
              opdata: 'errors in: {ITEM.LASTVALUE1}, errors out: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'It recovers when it is below 80% of the `{$IF.ERRORS.WARN:"{#IFNAME}"}` threshold.'
              manual_close: 'YES'
              dependencies:
                - name: 'Huawei AR600: Interface [{#IFNAME}]: Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_expression: 'last(/Huawei AR600 by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
          master_item:
            key: huawei.ar600.net.if.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#IFOPERSTATUS}'
                - 1.3.6.1.2.1.2.2.1.8
                - '0'
                - '{#IFADMINSTATUS}'
                - 1.3.6.1.2.1.2.2.1.7
                - '0'
                - '{#IFALIAS}'
                - 1.3.6.1.2.1.31.1.1.1.18
                - '0'
                - '{#IFNAME}'
                - 1.3.6.1.2.1.31.1.1.1.1
                - '0'
                - '{#IFDESCR}'
                - 1.3.6.1.2.1.2.2.1.2
                - '0'
                - '{#IFTYPE}'
                - 1.3.6.1.2.1.2.2.1.3
                - '0'
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: 2a04f08ae9504f9dadb73550700960b1
          name: 'EtherLike-MIB Discovery'
          type: DEPENDENT
          key: net.if.duplex.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFOPERSTATUS}'
                value: '1'
              - macro: '{#SNMPVALUE}'
                value: (2|3)
              - macro: '{#SNMPVALUE}'
                operator: EXISTS
          description: 'Discovering interfaces from IF-MIB and EtherLike-MIB. Interfaces with `up(1)` Operational Status are discovered.'
          item_prototypes:
            - uuid: 6bb6b8b98190429ca7564944885f5bdd
              name: 'Interface {#IFNAME}({#IFALIAS}): Duplex status'
              type: DEPENDENT
              key: 'net.if.duplex[dot3StatsDuplexStatus.{#SNMPINDEX}]'
              description: |
                MIB: EtherLike-MIB
                The current mode of operation of the MAC entity. `unknown` indicates that the current duplex mode could not be determined.
                Management control of the duplex mode is accomplished through the MAU MIB. When an interface does not support autonegotiation or when autonegotiation is not enabled, the duplex mode is controlled using `ifMauDefaultType`. When autonegotiation is supported and enabled, duplex mode is controlled using `ifMauAutoNegAdvertisedBits`. In either case, the currently operating duplex mode in reflected both in this object and in `ifMauType`.
                Note that this object provides redundant information with `ifMauType`. Normally, redundant objects are discouraged. However, in this instance, it allows a management application to determine the duplex status of an interface without having to know every possible value of `ifMauType`. This was felt to be sufficiently valuable to justify the redundancy.
                Reference: [IEEE 802.3 Std.], 30.3.1.1.32,aDuplexStatus.
              valuemap:
                name: 'EtherLike-MIB::dot3StatsDuplexStatus'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.10.7.2.1.19.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: huawei.ar600.net.if.duplex.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: e6ae9fc7d4454d389d066450af3a3066
                  expression: 'last(/Huawei AR600 by SNMP/net.if.duplex[dot3StatsDuplexStatus.{#SNMPINDEX}])=2'
                  name: 'Huawei AR600: Interface {#IFNAME}({#IFALIAS}): In half-duplex mode'
                  priority: WARNING
                  description: 'Please check autonegotiation settings and cabling.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: performance
          master_item:
            key: huawei.ar600.net.if.duplex.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#SNMPVALUE}'
                - 1.3.6.1.2.1.10.7.2.1.19
                - '0'
                - '{#IFOPERSTATUS}'
                - 1.3.6.1.2.1.2.2.1.8
                - '0'
                - '{#IFALIAS}'
                - 1.3.6.1.2.1.31.1.1.1.18
                - '0'
                - '{#IFNAME}'
                - 1.3.6.1.2.1.31.1.1.1.1
                - '0'
                - '{#IFDESCR}'
                - 1.3.6.1.2.1.2.2.1.2
                - '0'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
      tags:
        - tag: class
          value: network
        - tag: target
          value: huawei
        - tag: target
          value: huawei-ar600
      macros:
        - macro: '{$CPU.UTIL.CRIT}'
          value: '90'
          description: 'Threshold of CPU utilization for warning trigger in %.'
          config:
            type: TEXT
            priority: '1'
            section_name: Thresholds
            label: 'Threshold for CPU utilization (critical)'
            description: 'Threshold of CPU utilization for warning trigger in %. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$HUAWEI.AR600.COS.DIRECTION.MATCHES}'
          value: ^OUT$
          description: 'Used to include CoS metric by queue direction: IN, OUT, or regex (default: OUT only)'
          config:
            type: TEXT
            priority: '28'
            section_name: Filters
            label: 'Filter for queue direction'
            description: 'Queue direction to discover: IN, OUT, or regex (default: OUT only)'
        - macro: '{$HUAWEI.AR600.COS.DIRECTION.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Used to exclude CoS metric by queue direction: IN, OUT, or regex (default: OUT only)'
          config:
            type: TEXT
            priority: '29'
            section_name: Filters
            label: 'Filter for queue direction'
            description: 'Queue direction to exclude: IN, OUT, or regex (default: OUT only)'
        - macro: '{$HUAWEI.AR600.COS.DISCARDED.BPS.WARN}'
          value: '100000'
          description: 'Warning threshold for discarded bytes rate (bps)'
          config:
            type: TEXT
            priority: '27'
            section_name: Thresholds
