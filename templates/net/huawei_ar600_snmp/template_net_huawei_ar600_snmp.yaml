            - uuid: 4472c8f94cd241468c851283f9854731
              name: '{#ENT_NAME}: Operating system'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.47.1.1.1.1.10.{#SNMPINDEX}]'
