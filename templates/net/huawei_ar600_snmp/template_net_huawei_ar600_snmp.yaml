  triggers:
    - uuid: 3a4b5c6d7e8f4a9b8c7d6e5f4a3b0001
      expression: |
        last(/Huawei AR600 by SNMP/huawei.ar600.device.power.used)
        / last(/Huawei AR600 by SNMP/huawei.ar600.device.power.total)
        * 100 > {$POWER.USAGE.WARN}
      name: 'Huawei AR600: High power utilization'
      opdata: 'Current power usage: {ITEM.LASTVALUE1} out of {ITEM.LASTVALUE2}.'
      priority: WARNING
      description: |
        Device power consumption is high.
        Trigger threshold: {$POWER.USAGE.WARN} %
      tags:
        - tag: scope
          value: performance
    - uuid: 6f00359af55f45909bdecbad234c7652
      expression: '(last(/Huawei AR600 by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Huawei AR600 by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Huawei AR600 by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/Huawei AR600 by SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'Huawei AR600: Host has been restarted'
      event_name: 'Huawei AR600: {HOST.NAME} has been restarted (uptime < 10m)'
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
        - name: 'Huawei AR600: No SNMP data collection'
          expression: 'max(/Huawei AR600 by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
      tags:
        - tag: scope
          value: notice
