                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/Huawei AR600 by SNMP/sensor.temp.value[hwEntityTemperature.{#SNMPINDEX}],5m)<{$TEMP_WARN:"{#ENT_NAME}"}-3'
                  name: 'Huawei AR600: {#ENT_NAME}: Temperature is above warning threshold'
                  event_name: 'Huawei AR600: {#ENT_NAME}: Temperature is above warning threshold: >{$TEMP_WARN:"{#ENT_NAME}"}'
                  opdata: 'Current value: {ITEM.LASTVALUE1}'
