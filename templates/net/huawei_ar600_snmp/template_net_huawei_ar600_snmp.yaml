              delay: 1h
              value_type: CHAR
              description: 'MIB: ENTITY-MIB'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: os
              trigger_prototypes:
                - uuid: 698067d647424c96addeb3c9f960dd06
                  expression: 'last(/Huawei AR600 by SNMP/system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}],#1)<>last(/Huawei AR600 by SNMP/system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}],#2) and length(last(/Huawei AR600 by SNMP/system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}]))>0'
                  name: 'Huawei AR600: {#ENT_NAME}: Operating system description has changed'
                  priority: INFO
                  description: 'Operating system description has changed. Possible reasons that system has been updated or replaced. Acknowledge to close the problem manually.'
