        - uuid: d88f629d86a6495fbe9cb2115cc683f9
          name: "Temperature Sensor Discovery"
          type: SNMP_AGENT
          snmp_oid: "discovery[{#TSINDEX},1.3.6.1.4.1.55062.1.12.8.1.1,{#TSNAME},1.3.6.1.4.1.55062.1.12.8.1.2]"
          key: qnap.temp.discovery
          delay: 15m
          item_prototypes:
            - uuid: 550e8400e29b41d4a71644665544a02f
              name: "{#TSNAME}: Temperature"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.55062.1.12.8.1.3.{#TSINDEX}"
              key: "qnap.temp.value[{#TSINDEX}]"
              delay: 5m
              units: C
              tags:
                - { tag: component, value: temperature }
                - { tag: component, value: health }
                - { tag: temp_group, value: "{#TEMP_GROUP}" }

            - uuid: 760e9bd522d043c2bd74f5b9fb9b737e
              name: "{#TSNAME}: Temperature anomaly score"
              type: DEPENDENT
              key: "qnap.temp.anomaly[{#TSINDEX}]"
              master_item:
                key: "qnap.temp.value[{#TSINDEX}]"
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var current = value;
                      var trend = Number(Trend.avg(current, 3600));
                      return Math.abs(current - trend);
              tags:
                - { tag: component, value: temperature }
                - { tag: temp_group, value: "{#TEMP_GROUP}" }

            - uuid: d650b6aeeed8408dbe6eca6314f880be
              name: "{#TSNAME}: Temperature Trend (1h)"
              type: DEPENDENT
              key: qnap.temp.trend[{#TSINDEX}]
              master_item:
                key: qnap.temp.value[{#TSINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      return Trend.avg(value, 3600);
              tags:
                - { tag: component, value: temperature }
                - { tag: temp_group, value: "{#TEMP_GROUP}" }

          trigger_prototypes:
            - uuid: 550e8400e29b41d4a71644665544a03a
              name: "{#TSNAME}: Temperature is above CPU alarm threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.temp.value[{#TSINDEX}])>{$CPU_TEMPERATURE_ALARM}"
              priority: HIGH
              tags:
                - { tag: component, value: temperature }
                - { tag: scope, value: availability }

            - uuid: 92a49977e20a42a08dccd43ffdcfae40
              name: "{#TSNAME}: Temperature anomaly detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.temp.anomaly[{#TSINDEX}])>5"
              priority: WARNING
              tags:
                - { tag: component, value: temperature }

            - uuid: 848d02b118e2442dad9932eab8b7ece0
              name: "{#TSNAME}: Temperature drift > 10°C in 1 hour"
              expression: "abs(last(/QNAP NAS LLD SNMP/qnap.temp.value[{#TSINDEX}]) - last(/QNAP NAS LLD SNMP/qnap.temp.trend[{#TSINDEX}]))>10"
              priority: WARNING
              tags:
                - { tag: component, value: temperature }

