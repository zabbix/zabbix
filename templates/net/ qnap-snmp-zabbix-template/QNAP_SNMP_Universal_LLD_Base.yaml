              name: "RAID Group {#RGINDEX}: Rebuild progress (%)"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.55062.1.10.6.1.6.{#RGINDEX}"
              key: "qnap.raid.rebuild.progress[{#RGINDEX}]"
              delay: 1m
