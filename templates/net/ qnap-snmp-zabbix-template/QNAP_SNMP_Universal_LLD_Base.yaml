            - uuid: 298ac1df6d504ebf852129de570610d6
              name: "Volume {#VOLINDEX}: Performance Anomaly Score"
              type: DEPENDENT
              key: qnap.vol.anomaly[{#VOLINDEX}]
              master_item:
                key: qnap.vol.latency.write[{#VOLINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var read = Number(getValue("qnap.vol.latency.read[{#VOLINDEX}]"));
                      var write = Number(value);
                      var read_avg = Number(Trend.avg(getValue("qnap.vol.latency.read[{#VOLINDEX}]"), 3600));
                      var write_avg = Number(Trend.avg(getValue("qnap.vol.latency.write[{#VOLINDEX}]"), 3600));

                      var score = 0;
                      if (read > read_avg*1.5) score += 50;
                      if (write > write_avg*1.5) score += 50;
                      return score;
              tags:
                - { tag: component, value: volume }

            - uuid: d87f97cce410437e9a9c9461d63fa0c5
              name: "Volume {#VOLINDEX}: Stability Index"
              type: DEPENDENT
              key: qnap.vol.stability[{#VOLINDEX}]
              master_item:
                key: qnap.vol.latency.write[{#VOLINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var read = Number(getValue("qnap.vol.latency.read[{#VOLINDEX}]"));
                      var write = Number(value);
                      var read_var = Math.abs(read - Number(Trend.avg(getValue("qnap.vol.latency.read[{#VOLINDEX}]"), 24*3600)));
                      var write_var = Math.abs(write - Number(Trend.avg(getValue("qnap.vol.latency.write[{#VOLINDEX}]"), 24*3600)));
                      return read_var*0.4 + write_var*0.6;
              tags:
                - { tag: component, value: volume }

          trigger_prototypes:
