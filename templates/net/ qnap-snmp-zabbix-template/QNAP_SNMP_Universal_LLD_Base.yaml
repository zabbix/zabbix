      discovery_rules:
        - uuid: 806b9add49e1409aa6111a43f08fc0ef
          name: "Network Interface LLD (IF-MIB)"
          type: SNMP_AGENT
          snmp_oid: "discovery[{#SNMPINDEX},1.3.6.1.2.1.2.2.1.1,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1]"
          key: if.discovery
          delay: 30m

          item_prototypes:
            - uuid: e475c87807df48d39315eb40c053e64e
              name: "Interface {#IFNAME}: Incoming traffic"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}"
              key: "if.in[{#IFNAME}]"
              delay: 1m
              units: bps
              preprocessing:
                - { type: CHANGE_PER_SECOND, parameters: [""] }
                - { type: MULTIPLIER, parameters: ["8"] }
              tags:
                - { tag: component, value: network }

            - uuid: e1a9c4b7d3f84a1c9b7e2d6f5c3a8e10
              name: "Interface {#IFNAME}: Outgoing traffic"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}"
              key: "if.out[{#IFNAME}]"
              delay: 1m
              units: bps
              preprocessing:
                - { type: CHANGE_PER_SECOND, parameters: [""] }
                - { type: MULTIPLIER, parameters: ["8"] }
              tags:
                - { tag: component, value: network }

            - uuid: d7e1b3c94f2a4e0c9a6d5f3b1c8e7a52
              name: "Interface {#IFNAME}: Operational status"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}"
              key: "if.status[{#IFNAME}]"
              delay: 1m
              valuemap:
                name: "IF-MIB Operational Status"
              tags:
                - { tag: component, value: network }

          trigger_prototypes:
            - uuid: 7c3e1b9d2f8a4c0e9b6d3f7a1c5e4b92
              name: "Interface {#IFNAME}: Link down"
              expression: "last(/QNAP NAS LLD SNMP/if.status[{#IFNAME}])<>1"
              priority: WARNING
              tags:
                - { tag: component, value: network }
                - { tag: scope, value: availability }

        - uuid: 8b6c14b4b2214b729181573df620a5a2
          name: "FAN Discovery"
          type: SNMP_AGENT
          snmp_oid: "discovery[{#FANINDEX},1.3.6.1.4.1.55062.1.12.9.1.1,{#FANNAME},1.3.6.1.4.1.55062.1.12.9.1.2]"
          key: qnap.fan.discovery
          delay: 15m
          item_prototypes:
            - uuid: 550e8400e29b41d4a71644665544a019
              name: "{#FANNAME}: Speed"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.55062.1.12.9.1.3.{#FANINDEX}"
              key: "qnap.fan.speed[{#FANINDEX}]"
              delay: 30m
              units: RPM
              tags:
                - { tag: component, value: system }

            - uuid: 550e8400e29b41d4a71644665544a01a
              name: "{#FANNAME}: Status"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.24681.1.4.1.1.1.1.2.2.1.4.{#FANINDEX}"
              key: "qnap.fan.status[{#FANINDEX}]"
              delay: 30m
              valuemap:
                name: "Alarm state"
              tags:
                - { tag: component, value: system }
                - { tag: component, value: health }

          trigger_prototypes:
            - uuid: 550e8400e29b41d4a71644665544b105
              name: "{#FANNAME}: Speed is below safe threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.fan.speed[{#FANINDEX}])<500"
              priority: WARNING
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: performance }

        - uuid: 3a3b403389af46b3b93cd6bd4ed96ac8
          name: "Disk Discovery"
          type: SNMP_AGENT
          key: qnap.disk.discovery
          snmp_oid: "discovery[{#HDDINDEX},1.3.6.1.4.1.55062.1.10.2.1.1,{#HDDSLOT},1.3.6.1.4.1.55062.1.10.2.1.2]"
          delay: 15m

          item_prototypes:
            - uuid: f4c7b9e12d8a4f0c9b3e6d5a1c7f2e64
              name: "HDD {#HDDSLOT}: Capacity"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.55062.1.10.2.1.9.{#HDDINDEX}"
              key: qnap.disk.capacity[{#HDDINDEX}]
              delay: 1h
              units: B
              tags:
                - { tag: component, value: disk }

            - uuid: 9f3c7e1a4b8d4f0c9a2d6b5f1c7e3a91
              name: "HDD {#HDDSLOT}: Temperature"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.55062.1.10.2.1.8.{#HDDINDEX}"
              key: qnap.disk.temp[{#HDDINDEX}]
              delay: 5m
              units: C
              tags:
                - { tag: component, value: disk }
                - { tag: component, value: health }

            - uuid: 550e8400e29b41d4a71644665544a01e
              name: "HDD {#HDDSLOT}: State"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.4.1.55062.1.10.2.1.7.{#HDDINDEX}"
              key: qnap.disk.state[{#HDDINDEX}]
              delay: 5m
              value_type: CHAR
              tags:
                - { tag: component, value: disk }
                - { tag: component, value: health }

            - uuid: fbff4f1c2e7f4fd787d8f534ac31fec3
              name: "Disk {#HDDSLOT}: Wear Leveling Count"
              type: SNMP_AGENT
              key: qnap.disk.wear[{#HDDINDEX}]
              snmp_oid: .1.3.6.1.4.1.24681.1.2.17.1.1.{#HDDINDEX}
              delay: 5m
              tags:
                - { tag: component, value: disk }

            - uuid: a63c33b69d4245aab0eef2a0a6650d34
              name: "Disk {#HDDSLOT}: Remaining Life (%)"
              type: SNMP_AGENT
              key: qnap.disk.life[{#HDDINDEX}]
              snmp_oid: .1.3.6.1.4.1.24681.1.2.17.1.2.{#HDDINDEX}
              delay: 5m
              tags:
                - { tag: component, value: disk }

            - uuid: 29ae42ad9dc24887b3623afc9053b7ac
              name: "Disk {#HDDSLOT}: Predictive Failure Score"
              type: DEPENDENT
              key: qnap.disk.predict[{#HDDINDEX}]
              master_item:
                key: qnap.disk.temp[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var temp = Number(value);
                      var life = Number(Trend.avg(getValue("qnap.disk.life[{#HDDINDEX}]"), 3600));
                      var wear = Number(getValue("qnap.disk.wear[{#HDDINDEX}]"));
                      var score = (temp * 0.4) + ((100 - life) * 0.4) + (wear * 0.2);
                      return score;
              tags:
                - { tag: component, value: disk }

            - uuid: 9b803ef33d214664943b990cc5ba5206
              name: "Disk {#HDDSLOT}: SMART 5 Reallocated Sectors"
              type: SNMP_AGENT
              key: qnap.smart.realloc[{#HDDINDEX}]
              snmp_oid: 1.3.6.1.4.1.55062.1.10.3.1.3.5.{#HDDINDEX}
              delay: 10m
              tags:
                - { tag: component, value: smart }

            - uuid: 20037de5a3d641cba3145d456f66fe4c
              name: "Disk {#HDDSLOT}: SMART 197 Pending Sectors"
              type: SNMP_AGENT
              key: qnap.smart.pending[{#HDDINDEX}]
              snmp_oid: 1.3.6.1.4.1.55062.1.10.3.1.3.197.{#HDDINDEX}
              delay: 10m
              tags:
                - { tag: component, value: smart }

            - uuid: c7302c666b8c4b56a1413e3cbb07fd80
              name: "Disk {#HDDSLOT}: SMART 198 Uncorrectable Sectors"
              type: SNMP_AGENT
              key: qnap.smart.uncorrect[{#HDDINDEX}]
              snmp_oid: 1.3.6.1.4.1.55062.1.10.3.1.3.198.{#HDDINDEX}
              delay: 10m
              tags:
                - { tag: component, value: smart }

            - uuid: a23209924f4b40e4a6cf13fe244f2181
              name: "Disk {#HDDSLOT}: Error Rate Score"
              type: DEPENDENT
              key: qnap.disk.error.score[{#HDDINDEX}]
              master_item:
                key: qnap.smart.realloc[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var realloc = Number(value);
                      var pending = Number(getValue("qnap.smart.pending[{#HDDINDEX}]"));
                      var uncorrect = Number(getValue("qnap.smart.uncorrect[{#HDDINDEX}]"));
                      return realloc*0.5 + pending*0.3 + uncorrect*0.2;
              tags:
                - { tag: component, value: disk }

            - uuid: 4ecc5769de8b4b52800d3fbaaeac8cb3
              name: "Disk {#HDDINDEX}: SMART Anomaly Score"
              type: DEPENDENT
              key: qnap.smart.anomaly[{#HDDINDEX}]
              master_item:
                key: qnap.smart.realloc[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var realloc = Number(value);
                      var realloc_avg = Number(Trend.avg(getValue("qnap.smart.realloc[{#HDDINDEX}]"), 7*24*3600));
                      var pending = Number(getValue("qnap.smart.pending[{#HDDINDEX}]"));
                      var pending_avg = Number(Trend.avg(getValue("qnap.smart.pending[{#HDDINDEX}]"), 7*24*3600));
                      var uncorrect = Number(getValue("qnap.smart.uncorrect[{#HDDINDEX}]"));
                      var uncorrect_avg = Number(Trend.avg(getValue("qnap.smart.uncorrect[{#HDDINDEX}]"), 7*24*3600));

                      var score = 0;
                      if (realloc > realloc_avg*1.5) score += 40;
                      if (pending > pending_avg*1.5) score += 40;
                      if (uncorrect > uncorrect_avg*1.5) score += 20;

                      return score;
              tags:
                - { tag: component, value: smart }

            - uuid: 2c119df762904f62be531cd3c3ac2e6f
              name: "Disk {#HDDINDEX}: Lifetime Remaining (days)"
              type: DEPENDENT
              key: qnap.disk.lifetime.days[{#HDDINDEX}]
              master_item:
                key: qnap.disk.life[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var life = Number(value); // remaining life %
                      var wear = Number(getValue("qnap.disk.wear[{#HDDINDEX}]"));
                      var anomaly = Number(getValue("qnap.smart.anomaly[{#HDDINDEX}]"));

                      // Simple model: lower life + high wear + anomalies = shorter lifespan
                      var base_days = life * 30; // assume 30 days per 1% life
                      var penalty = (wear * 0.2) + (anomaly * 0.5);
                      return Math.max(1, base_days - penalty);
              tags:
                - { tag: component, value: disk }

            - uuid: e3b86f339dc2457f9a52df2523845cbb
              name: "Disk {#HDDINDEX}: Thermal Stress Index"
              type: DEPENDENT
              key: qnap.disk.tsi[{#HDDINDEX}]
              master_item:
                key: qnap.disk.temp[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var temp = Number(value);
                      var drift = Number(getValue("qnap.disk.temp.drift[{#HDDINDEX}]"));
                      var anomaly = Number(getValue("qnap.smart.anomaly[{#HDDINDEX}]"));
                      return temp*0.5 + drift*0.3 + anomaly*0.2;
              tags:
                - { tag: component, value: temperature }

            - uuid: 80c22472a4e64e289878e073d64c3cfd
              name: "Disk {#HDDINDEX}: Failure Probability (%)"
              type: DEPENDENT
              key: qnap.disk.failure.prob[{#HDDINDEX}]
              master_item:
                key: qnap.smart.anomaly[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var anomaly = Number(value);
                      var life_days = Number(getValue("qnap.disk.lifetime.days[{#HDDINDEX}]"));
                      var tsi = Number(getValue("qnap.disk.tsi[{#HDDINDEX}]"));
                      var wear = Number(getValue("qnap.disk.wear[{#HDDINDEX}]"));
                      var life_pct = Number(getValue("qnap.disk.life[{#HDDINDEX}]"));

                      // Weighted probability model
                      var score =
                          anomaly * 0.35 +
                          tsi * 0.25 +
                          (100 - life_pct) * 0.20 +
                          wear * 0.10 +
                          (life_days < 60 ? 10 : 0);

                      return Math.min(100, Math.max(0, score));
              tags:
                - { tag: component, value: disk }

            - uuid: e46a600573f64f81bf2933ec7faddb2e
              name: "Disk {#HDDINDEX}: SMART Volatility Index"
              type: DEPENDENT
              key: qnap.smart.volatility[{#HDDINDEX}]
              master_item:
                key: qnap.smart.realloc[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      function vol(key) {
                        var now = Number(getValue(key));
                        var avg = Number(Trend.avg(getValue(key), 7*24*3600));
                        return Math.abs(now - avg);
                      }

                      var v1 = vol("qnap.smart.realloc[{#HDDINDEX}]");
                      var v2 = vol("qnap.smart.pending[{#HDDINDEX}]");
                      var v3 = vol("qnap.smart.uncorrect[{#HDDINDEX}]");

                      return v1*0.5 + v2*0.3 + v3*0.2;
              tags:
                - { tag: component, value: smart }

            - uuid: ecb9705a044348f0ba4f19b498f8505d
              name: "Disk {#HDDINDEX}: Degradation Velocity"
              type: DEPENDENT
              key: qnap.disk.degradation.velocity[{#HDDINDEX}]
              master_item:
                key: qnap.disk.life[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var now = Number(value);
                      var avg = Number(Trend.avg(getValue("qnap.disk.life[{#HDDINDEX}]"), 30*24*3600));
                      return avg - now; // positive = degrading
              tags:
                - { tag: component, value: disk }

            - uuid: 7eb27f519f9b428dbce8855cb156f36a
              name: "Disk {#HDDINDEX}: Thermal Fatigue Index"
              type: DEPENDENT
              key: qnap.disk.tfi[{#HDDINDEX}]
              master_item:
                key: qnap.disk.temp[{#HDDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var temp = Number(value);
                      var drift = Number(getValue("qnap.disk.temp.drift[{#HDDINDEX}]"));
                      var tsi = Number(getValue("qnap.disk.tsi[{#HDDINDEX}]"));
                      return temp*0.4 + drift*0.3 + tsi*0.3;
              tags:
                - { tag: component, value: temperature }

          trigger_prototypes:
            - uuid: 550e8400e29b41d4a71644665544a034
              name: "HDD {#HDDSLOT}: Temperature is above warning threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.disk.temp[{#HDDINDEX}])>{$HDD_TEMPERATURE_WARNING}"
              priority: WARNING
              tags:
                - { tag: component, value: disk }
                - { tag: scope, value: performance }

            - uuid: 550e8400e29b41d4a71644665544a035
              name: "HDD {#HDDSLOT}: Temperature is above critical threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.disk.temp[{#HDDINDEX}])>{$HDD_TEMPERATURE_ALARM}"
              priority: HIGH
              tags:
                - { tag: component, value: disk }
                - { tag: scope, value: availability }

            - uuid: 50f16f9666864bcbbcf64ea0010acc8b
              name: "Disk {#HDDSLOT}: Predictive failure risk high"
              expression: "last(/QNAP NAS LLD SNMP/qnap.disk.predict[{#HDDINDEX}])>70"
              priority: HIGH
              tags:
                - { tag: component, value: disk }

            - uuid: 02f3cd2f1a1f429f9b513405a9ce215c
              name: "Disk {#HDDSLOT}: Predictive health degraded"
              expression: "last(/QNAP NAS LLD SNMP/qnap.disk.predict[{#HDDINDEX}])>70"
              priority: WARNING
              tags:
                - { tag: component, value: sla }

            - uuid: 1d6dff87a1b34b069d3ffded47f0832a
              name: "Disk {#HDDINDEX}: Error rate high"
              expression: "last(/QNAP NAS LLD SNMP/qnap.disk.error.score[{#HDDINDEX}])>50"
              priority: HIGH
              tags:
                - { tag: component, value: disk }

            - uuid: 42bf76b2f0ff413280b7d0c4353e0b05
              name: "Disk {#HDDINDEX}: SMART anomaly detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.smart.anomaly[{#HDDINDEX}])>50"
              priority: HIGH
              tags:
                - { tag: component, value: smart }

            - uuid: 51c134d5f18f4bc38ffeaabd5e66e5e0
              name: "Disk {#HDDINDEX}: Lifetime critically low"
