              expression: "last(/QNAP NAS LLD SNMP/qnap.raid.rebuild.progress[{#RGINDEX}])>0"
              priority: INFO
              tags:
                - { tag: component, value: raid }
                - { tag: scope, value: maintenance }

            - uuid: 8fc8d474969e4840ab546ffceba868c4
              name: "RAID {#RAIDINDEX}: Rebuild ETA exceeds 24 hours"
              expression: "last(/QNAP NAS LLD SNMP/qnap.raid.rebuild.eta[{#RAIDINDEX}])>1440"
              priority: WARNING
              tags:
                - { tag: component, value: raid }

            - uuid: eedafcc7aa6245559ea43d738cc61492
              name: "RAID {#RAIDINDEX}: Consistency check failed"
              expression: "last(/QNAP NAS LLD SNMP/qnap.raid.scrub.status[{#RAIDINDEX}])=2"
              priority: HIGH
              tags:
                - { tag: component, value: raid }

            - uuid: a790b8491f31496e83490415b59ee093
              name: "RAID {#RAIDINDEX}: Rebuild speed abnormally low"
