                - { tag: component, value: performance }

            - uuid: abf03a9600fa4da8b252b9147e2c1181
              name: "RAID {#RAIDINDEX}: Rebuild Progress (%)"
              type: SNMP_AGENT
              key: qnap.raid.rebuild.progress[{#RAIDINDEX}]
              snmp_oid: .1.3.6.1.4.1.24681.1.2.15.1.7.{#RAIDINDEX}
              delay: 1m
              tags:
                - { tag: component, value: raid }

            - uuid: a07aa2069dad4295a5238d263a951137
              name: "RAID {#RAIDINDEX}: Rebuild ETA (minutes)"
              type: DEPENDENT
              key: qnap.raid.rebuild.eta[{#RAIDINDEX}]
              master_item:
                key: qnap.raid.rebuild.progress[{#RAIDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var progress = Number(value);
                      if (progress <= 0) return 0;
                      var rate = Trend.avg(progress, 600); // 10-minute trend
                      if (rate <= 0) return 0;
                      return Math.round((100 - progress) / rate);
              tags:
                - { tag: component, value: raid }

            - uuid: 2d20f89c63724c5babb3c2661b33f8f3
              name: "RAID {#RAIDINDEX}: Consistency Check Status"
              type: SNMP_AGENT
              key: qnap.raid.scrub.status[{#RAIDINDEX}]
              snmp_oid: .1.3.6.1.4.1.55062.1.15.1.8.{#RAIDINDEX}
              delay: 5m
              tags:
                - { tag: component, value: raid }

            - uuid: d48129f7ac814bc2b688d6d0fd43c54e
              name: "RAID {#RAIDINDEX}: Rebuild Speed (MB/s)"
              type: DEPENDENT
              key: qnap.raid.rebuild.speed[{#RAIDINDEX}]
              master_item:
                key: qnap.raid.scrub.status[{#RAIDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var progress = Number(getValue("qnap.raid.rebuild.progress[{#RAIDINDEX}]"));
                      var prev = Number(Trend.avg(getValue("qnap.raid.rebuild.progress[{#RAIDINDEX}]"), 300));
                      return Math.max(0, (progress - prev) * 20); // MB/s approx
              tags:
                - { tag: component, value: raid }

            - uuid: 0899ce0580c44614afb5810629bfaf00
              name: "RAID {#RAIDINDEX}: Rebuild Curve Fit ETA (min)"
              type: DEPENDENT
              key: qnap.raid.rebuild.curve.eta[{#RAIDINDEX}]
              master_item:
                key: qnap.raid.rebuild.progress[{#RAIDINDEX}]
              delay: 0
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var p = Number(value);
                      var p5 = Number(Trend.avg(getValue("qnap.raid.rebuild.progress[{#RAIDINDEX}]"), 300));
                      var speed = (p - p5) * 20; // MB/s approx
                      if (speed <= 0) return 9999;
                      return Math.max(1, (100 - p) * (1 / (speed / 100)));
              tags:
                - { tag: component, value: raid }

          trigger_prototypes:
            - uuid: 478d3d31f6af4e83a316342dce98bd2a
              name: "RAID Group {#RGINDEX}: Status is not optimal"
              expression: "last(/QNAP NAS LLD SNMP/qnap.raid.status[{#RGINDEX}])<>1"
