zabbix_export:
  version: "7.4"

  template_groups:
    - uuid: f2587d2720d6454eaea6f1aafb3d1c06
      name: "Templates/Network devices"

  hosts: []

  templates:
    - uuid: 605f422e65104122b30db8c336da0a16
      template: "QNAP NAS LLD SNMP"
      name: "QNAP NAS LLD SNMP v1.0.0"
      description: |
        Production‑ready SNMP Low‑Level Discovery (LLD) template for QNAP NAS storage devices.
        Version: 1.0.0
        Author: Majid Abdollahi

        This is the stable SNMP release.  
        Note: Modern QNAP models (including TS‑873AeU‑RP) expose only basic SNMP system metrics.
        Storage‑level SNMP OIDs are not available on QTS 5.x+, so LLD coverage is limited.

        This template provides complete, multi‑layer monitoring coverage for QNAP NAS systems using
        native SNMP OIDs, with full automatic discovery of disks, RAID groups, storage pools, volumes,
        fans, temperature sensors (with grouping), PSUs, UPS units, PCIe devices, BBU modules, NVMe
        devices, SMART attributes, and system health indicators. It is fully aligned with the Zabbix 7.4
        YAML schema and validated for compatibility with Zabbix 8.x.

        Core Features:
          • Automatic discovery of all major QNAP hardware components (HDDs, RAID groups, pools,
            volumes, fans, PSUs, UPS, temperature sensors, PCIe cards, BBU modules, NVMe devices,
            SMART attributes, system health)
          • Real‑time monitoring of CPU, memory, uptime, firmware version, SNMP agent availability,
            and system identity
          • Storage‑focused metrics including capacity, free space, utilization percentage, IOPS,
            throughput, temperature, wear‑leveling, remaining‑life, and SMART attribute values
          • RAID group status monitoring with valuemap‑based state interpretation, rebuild visibility,
            rebuild ETA estimation, consistency/scrub status, rebuild‑speed analytics, and curve‑fit ETA
          • Fan speed and health monitoring with alarm‑state mapping
          • Temperature sensor discovery with per‑sensor thresholds, grouping (CPU/System/HDD/Ambient),
            trend‑based averaging, drift detection, thermal‑stress scoring, and thermal‑fatigue modeling
          • UPS, PSU, NVMe, SSD cache, and BBU health monitoring for enterprise‑grade reliability
          • Dual‑controller awareness (role/failover) and PCIe link health for enterprise chassis

        Advanced Monitoring:
          • Predictive disk‑failure scoring using temperature, wear‑leveling, remaining‑life, and SMART data
          • Full SMART attribute discovery with per‑attribute monitoring, anomaly detection, and volatility scoring
          • SMART anomaly scoring using 7‑day statistical baselines
          • SMART Volatility Index (SVI) for long‑term attribute stability analysis
          • Disk lifetime forecasting (remaining days) using multi‑factor health modeling
          • Disk degradation velocity (DDV) for long‑term wear‑rate tracking
          • Disk failure‑probability modeling (DFP%) using multi‑factor predictive scoring
          • NVMe endurance tracking (TBW, remaining endurance %, temperature, thermal throttling)
          • RAID rebuild ETA calculation using short‑term trend analysis
          • RAID rebuild‑speed analytics with slow‑rebuild detection
          • RAID rebuild curve‑fit ETA prediction for long‑duration rebuilds
          • RAID consistency/scrub monitoring with failure detection
          • Pool fragmentation and allocation‑efficiency monitoring with 24‑hour trend analysis
          • Volume I/O latency (read/write), queue‑depth visibility, and performance anomaly scoring
          • Volume Stability Index (VSI) for long‑term latency variance analysis
          • Threshold‑based alerting for HDD temperature (warning/critical)
          • Pool and volume free‑space alarms with customizable thresholds
          • System‑wide temperature alarms using CPU, chassis, and grouped sensors
          • Memory and CPU utilization alerts for performance diagnostics
          • Firmware update detection and firmware integrity deep‑check monitoring
          • Antivirus engine status, malware scan results, and last scan timestamp
          • Service‑level monitoring for SMB, AFP, NFS, FTP, SSH
          • Security‑focused monitoring including failed login bursts, intrusion detection,
            unexpected reboot detection, and system event log visibility
          • SLA‑oriented metrics for availability, performance, and capacity with dedicated triggers
          • Fleet‑level capacity, RAID health, predictive‑risk, anomaly, and failure‑probability aggregation
          • Trend‑based analytics for IOPS, throughput, temperature, thermal drift, fragmentation,
            SMART anomalies, volatility, and degradation velocity

        Template Architecture:
          • Fully LLD‑driven storage, hardware, service, and security monitoring — no manual configuration required
          • Clean separation of static system items and dynamic LLD components
          • Optimized polling intervals for performance‑critical vs. slow‑changing metrics
          • Native Zabbix valuemap support for RAID, PSU, UPS, fan, health, alarm state, security,
            SLA state, PCIe link state, controller role, NVMe endurance, SMART severity, anomaly levels,
            volatility, and predictive‑risk scoring
          • Consistent naming, tagging, and key structure for dashboards, filtering, SLA views,
            fleet‑level analytics, and multi‑NAS reporting
          • Predictive analytics for disk health, RAID rebuild forecasting, SMART anomaly detection,
            thermal stress scoring, degradation velocity, and long‑term performance trend analysis

        Intended Use:
          • Suitable for all QNAP NAS models supporting SNMP v2/v3
          • Designed for production environments requiring deep visibility into storage health,
            performance, security, SLA compliance, and hardware reliability
          • Ideal for NOC/SOC teams, storage administrators, and environments with multiple QNAP units
            and enterprise/dual‑controller chassis

        Compatibility:
          • Fully compatible with Zabbix 7.4
          • Validated for import and runtime behavior on Zabbix 8.x for version 0.9.0

      groups:
        - name: "Templates/Network devices"

      macros:
        - macro: "{$HDD_TEMPERATURE_WARNING}"
          value: "50"
        - macro: "{$HDD_TEMPERATURE_ALARM}"
          value: "60"
        - macro: "{$CPU_TEMPERATURE_ALARM}"
          value: "85"
        - macro: "{$SYSTEM_TEMPERATURE_ALARM}"
          value: "70"
        - macro: "{$POOL_SIZE_ALARM}"
          value: "20"
        - macro: "{$MEMORY_FREE_ALARM}"
          value: "10"
        - macro: "{$TEMP_CPU_GROUP}"
          value: "CPU"
        - macro: "{$TEMP_SYS_GROUP}"
          value: "System"
        - macro: "{$TEMP_HDD_GROUP}"
          value: "HDD"
        - macro: "{$TEMP_AMBIENT_GROUP}"
          value: "Ambient"

      items:
        - uuid: 5382956a88ab42b7849c4e32c3c80905
          name: "CPU temperature"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.5.0
          key: qnap.cpu.temp.legacy
          delay: 60s
          units: C
          tags:
            - { tag: component, value: system }

        - uuid: 3bee94619f814efe8b15619101aafc00
          name: "CPU: Temperature"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.4.2.0
          key: qnap.cpu.temp
          delay: 30m
          units: C
          tags:
            - { tag: component, value: system }
          triggers:
            - uuid: e247fc1786924301a9f045038fb27c6a
              name: "System: High temperature detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.cpu.temp)>{$SYSTEM_TEMPERATURE_ALARM}"
              priority: HIGH
              tags:
                - { tag: component, value: temperature }
                - { tag: scope, value: availability }

        - uuid: 47f986792b9842369951660e7c5a0dac
          name: "CPU: Usage"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.1.0
          key: qnap.cpu.usage
          delay: 60s
          units: "%"
          tags:
            - { tag: component, value: system }
          triggers:
            - uuid: bc50e5032b51420c92da2f7b6d764a6c
              name: "System: CPU usage is too high"
              expression: "last(/QNAP NAS LLD SNMP/qnap.cpu.usage)>90"
              priority: WARNING
              tags:
                - { tag: component, value: cpu }
                - { tag: scope, value: performance }

        - uuid: 84b4ae3601df4e92ae31cc96072b9395
          name: "CPU: Load average (1m)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.3.10.1.0"
          key: qnap.cpu.load1
          delay: 1m
          tags:
            - { tag: component, value: cpu }

        - uuid: 89498aa2bb2f46d28cc93d647be66b12
          name: "CPU: Load average (5m)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.3.10.2.0"
          key: qnap.cpu.load5
          delay: 1m
          tags:
            - { tag: component, value: cpu }

        - uuid: 1d6d232c92ba43b7942f852443d67606
          name: "CPU: Load average (15m)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.3.10.3.0"
          key: qnap.cpu.load15
          delay: 1m
          tags:
            - { tag: component, value: cpu }

        - uuid: ecb221080e7c45209ca14c1ea360fea1
          name: "SLA: Availability %"
          type: CALCULATED
          key: qnap.sla.availability
          params: "100*(last(//icmpping)=1)"
          delay: 5m
          units: "%"
          tags:
            - { tag: sla, value: availability }
          triggers:
            - uuid: f0a42913fb0545fc98c849f3fd4ae6a0
              name: "SLA: Availability below threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.sla.availability)<{$SLA_AVAILABILITY_MIN}"
              priority: WARNING
              tags:
                - { tag: sla, value: availability }

        - uuid: 67a1464b1bb3458ea75436e8732a42d4
          name: "SLA: Performance %"
          type: CALCULATED
          key: qnap.sla.performance
          params: "100 - avg(//system.cpu.util[,idle],5m)"
          delay: 5m
          units: "%"
          tags:
            - { tag: sla, value: performance }
          triggers:
            - uuid: 5900858ddb7847638ffa1ed4b7052973
              name: "SLA: Performance below threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.sla.performance)<{$SLA_PERFORMANCE_MIN}"
              priority: WARNING
              tags:
                - { tag: sla, value: performance }

        - uuid: 87b4153390c94304bb9d8d3726ccfde3
          name: "SLA: Capacity %"
          type: CALCULATED
          key: qnap.sla.capacity
          params: "100 - (last(//vfs.fs.size[/,pfree]))"
          delay: 5m
          units: "%"
          tags:
            - { tag: sla, value: capacity }
          triggers:
            - uuid: 41428bb07109480ea10e215a03929f90
              name: "SLA: Capacity below threshold"
              expression: "last(/QNAP NAS LLD SNMP/qnap.sla.capacity)<{$SLA_CAPACITY_MIN}"
              priority: WARNING
              tags:
                - { tag: sla, value: capacity }

        - uuid: 079d379fe0c94959907dea9c8b6ccac1
          name: "Fleet: RAID Health Monitor"
          type: CALCULATED
          key: qnap.fleet.raid.health
          params: "0"
          delay: 1h
          tags:
            - { tag: component, value: fleet }
          triggers:
            - uuid: acf8bf05b75649848ef51f83f137488d
              name: "Fleet: Multiple NAS units reporting degraded RAID"
              expression: "count(/QNAP NAS LLD SNMP/qnap.raid.status[*],#1,ne,1)>2"
              priority: HIGH
              tags:
                - { tag: component, value: fleet }

        - uuid: 43c33929ad1f486e9887d284e35a742e
          name: "Controller: Role"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.1.0"
          key: qnap.controller.role
          valuemap:
            name: "Controller Role"
          tags:
            - { tag: component, value: controller }

        - uuid: 4a515c107fa140598bb4acd81fb50070
          name: "Controller: Failover State"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.2.0"
          key: qnap.controller.failover
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: controller }

        - uuid: a8ea9b7a81c54c6faee48c5db9e5486d
          name: "SNMP agent: Stability counter"
          type: INTERNAL
          key: "zabbix[host,snmp,available]"
          delay: 1m
          tags:
            - { tag: component, value: availability }
            - { tag: scope, value: stability }
          triggers:
            - uuid: b5827d0a9d6e4adcb78f876d944cd1cb
              name: "SNMP agent: Flapping detected"
              expression: "count(/QNAP NAS LLD SNMP/zabbix[host,snmp,available],5m,0)=0"
              priority: WARNING
              tags:
                - { tag: component, value: availability }
                - { tag: scope, value: stability }

        - uuid: 3e0cbd80036d403788ea95b7d024fa7c
          name: "System: Total memory"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.2.0
          key: qnap.mem.total
          delay: 1h
          units: B
          tags:
            - { tag: component, value: system }

        - uuid: 8d964dd2a46d468083afa96854c07e70
          name: "System: Free memory"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.3.0
          key: qnap.mem.free
          delay: 60s
          units: B
          preprocessing:
            - { type: MULTIPLIER, parameters: ["1000"] }
          tags:
            - { tag: component, value: system }

        - uuid: fbe257a949dc40b492055c5f47a1e4e8
          name: "System: Free memory (%)"
          type: CALCULATED
          key: qnap.mem.free.pct
          delay: 60s
          value_type: FLOAT
          units: "%"
          params: "last(//qnap.mem.free)/(last(//qnap.mem.total)/100)"
          tags:
            - { tag: component, value: system }
          triggers:
            - uuid: e79579722e48444b8c2b1c9c5340b06d
              name: "System: Free memory is too low"
              expression: "last(/QNAP NAS LLD SNMP/qnap.mem.free.pct)<{$MEMORY_FREE_ALARM}"
              priority: WARNING
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: capacity }

        - uuid: 36cfce1050a44ecfbcfd2eebb64f1570
          name: "NVMe Cache: Health status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.50.1.1.0"
          key: qnap.nvme.health
          delay: 5m
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: nvme }
            - { tag: component, value: cache }
          triggers:
            - uuid: 475ff9f9177947f6a9d0952f189d29f8
              name: "NVMe Cache: Health issue detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.nvme.health)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: nvme }
                - { tag: scope, value: availability }

        - uuid: be7587e2789e423caca92a64970fc939
          name: "SSD Cache: Wear level (%)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.50.2.1.0"
          key: qnap.ssd.wear
          delay: 10m
          units: "%"
          tags:
            - { tag: component, value: ssd }
            - { tag: component, value: cache }
          triggers:
            - uuid: 971db53b52dd425baaaec09b7de77871
              name: "SSD Cache: Wear level critical"
              expression: "last(/QNAP NAS LLD SNMP/qnap.ssd.wear)>80"
              priority: HIGH
              tags:
                - { tag: component, value: ssd }
                - { tag: scope, value: capacity }

        - uuid: 2739afdabc6f4320ba4780bd04ace024
          name: "Snapshots: Space used (%)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.80.1.1.0"
          key: qnap.snapshots.used.pct
          delay: 10m
          units: "%"
          tags:
            - { tag: component, value: snapshot }
            - { tag: component, value: storage }
          triggers:
            - uuid: 913a06cc167b4645919afe25cb7baef4
              name: "Snapshots: Space usage high"
              expression: "last(/QNAP NAS LLD SNMP/qnap.snapshots.used.pct)>80"
              priority: HIGH
              tags:
                - { tag: component, value: snapshot }
                - { tag: scope, value: capacity }

        - uuid: 4f653a0ed56b4483a04075454686c088
          name: "Replication: Last job status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.100.1.1.0"
          key: qnap.replication.status
          delay: 10m
          valuemap:
            name: "Alarm state"
          tags:
            - { tag: component, value: replication }
            - { tag: component, value: backup }
          triggers:
            - uuid: 1717031dba614d418a1c67f2a7c91947
              name: "Replication: Last job failed"
              expression: "last(/QNAP NAS LLD SNMP/qnap.replication.status)=2"
              priority: HIGH
              tags:
                - { tag: component, value: replication }
                - { tag: scope, value: availability }

        - uuid: 9a89a7bcf4e24332ba040300a026fb14
          name: "Antivirus: Last scan time"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.110.1.2.0"
          key: qnap.antivirus.lastscan
          delay: 1h
          value_type: TEXT
          tags:
            - { tag: component, value: antivirus }

        - uuid: 042feb89d0a84471b56273f6ecd76f68
          name: "Antivirus: Engine status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.110.1.1.0"
          key: qnap.antivirus.status
          delay: 10m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: antivirus }
            - { tag: component, value: security }
          triggers:
            - uuid: 9f075936fbde4db8b19dbd4b36fa4450
              name: "Antivirus: Engine is disabled"
              expression: "last(/QNAP NAS LLD SNMP/qnap.antivirus.status)=0"
              priority: WARNING
              tags:
                - { tag: component, value: antivirus }
                - { tag: scope, value: security }

        - uuid: d7cdeec72509409a83f554f35bda0ddc
          name: "BBU: Status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.50.3.1.0"
          key: qnap.bbu.status
          delay: 5m
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: bbu }
            - { tag: component, value: cache }
          triggers:
            - uuid: 62b52ffe3ed044f7895d73feb41fb3ab
              name: "BBU: Failure detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.bbu.status)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: bbu }
                - { tag: scope, value: availability }

        - uuid: cc1fa5918a65409db64b7cced02c6a93
          name: "System: Uptime"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.25.1.1.0
          key: qnap.system.uptime
          delay: 60s
          units: uptime
          preprocessing:
            - { type: MULTIPLIER, parameters: ["0.01"] }
          tags:
            - { tag: component, value: system }

        - uuid: 4d0e4f136cd94f6489182a861cbfef1c
          name: "System: Hostname"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.4.0
          key: qnap.system.hostname
          delay: 2h
          value_type: TEXT
          inventory_link: NAME
          tags:
            - { tag: component, value: system }

        - uuid: 0e898d890ac740af9bb747ed73404540
          name: "System: Serial no."
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.5.0
          key: qnap.system.serial
          delay: 2h
          value_type: TEXT
          inventory_link: SERIALNO_A
          tags:
            - { tag: component, value: system }

        - uuid: 5450bf634ccd4ec6aae4810f66bb9b67
          name: "Security: Failed login burst"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.40.1.2.0"
          key: qnap.security.failed.burst
          delay: 1m
          tags:
            - { tag: component, value: security }
            - { tag: scope, value: intrusion }

        - uuid: eccb6898dc424b45a6f8d1c6f2987155
          name: "Security: Firmware integrity (deep)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.40.2.2.0"
          key: qnap.security.fw.integrity.deep
          delay: 1h
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: security }
            - { tag: scope, value: integrity }
          triggers:
            - uuid: ac246472a01042f2a4a0bc90f577b619
              name: "Security: Firmware integrity deep check failed"
              expression: "last(/QNAP NAS LLD SNMP/qnap.security.fw.integrity.deep)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: security }
                - { tag: scope, value: integrity }

        - uuid: 264de4e4acc24dd98749fc797a190a3f
          name: "System: Firmware version"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.6.0
          key: qnap.system.fw.version
          value_type: TEXT
          inventory_link: SERIALNO_B
          tags:
            - { tag: component, value: system }

        - uuid: cc3f2780e46e42df94e1fda63e111b8b
          name: "System: Firmware update available"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.7.0
          key: qnap.system.fw.update.available
          delay: 1h
          valuemap:
            name: "Firmware Version Available"
          tags:
            - { tag: component, value: system }
            - { tag: component, value: health }
          triggers:
            - uuid: 1a0992ec7fbb4a3ab86d8c641f80f760
              name: "System: Firmware update available"
              expression: "last(/QNAP NAS LLD SNMP/qnap.system.fw.update.available)=1"
              priority: INFO
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: maintenance }

        - uuid: 133f619e7b694ad0a36f40b2f6b7413d
          name: "Security: Firmware integrity status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.40.2.1.0"
          key: qnap.security.fw.integrity
          delay: 1h
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: security }
            - { tag: component, value: firmware }
          triggers:
            - uuid: bba7b42911dd499cb9fc861868dd6327
              name: "Security: Firmware integrity issue detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.security.fw.integrity)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: security }
                - { tag: scope, value: integrity }

        - uuid: efebf11efc5f486dabecb5a045329ffb
          name: "SNMP agent availability"
          type: INTERNAL
          key: "zabbix[host,snmp,available]"
          history: 7d
          tags:
            - { tag: component, value: availability }
            - { tag: component, value: health }
          triggers:
            - uuid: fa6ecfbc30b94c3a9e8d981dfc3b6911
              name: "System: SNMP agent is unavailable"
              expression: "last(/QNAP NAS LLD SNMP/zabbix[host,snmp,available])=0"
              priority: HIGH
              tags:
                - { tag: component, value: availability }
                - { tag: scope, value: connectivity }

        - uuid: 5b0395c7e75f4c7c86f92133b96a99de
          name: "Service: SMB status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.1.0"
          key: qnap.service.smb
          delay: 5m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: service }
            - { tag: service, value: smb }
          triggers:
            - uuid: d30bd6676ad14e8ab54a2d1b5e2dd9a4
